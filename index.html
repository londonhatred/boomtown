<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#EFE7D5" />
<title>Festival Planner</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Festival">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFE7D5;
    --card:#F7F1E3;
    --panel:#E7DCC4;
    --ink:#1C1B16;
    --ink-2:#403D32;
    --muted:#7C7458;
    --line:rgba(28,27,22,.18);
    --line-strong:rgba(28,27,22,.4);
    --rule:#1C1B16;
    --accent:#D6371C;
    --accent-ink:#FBF4E4;
    --teal:#1E5A50;
    --gold:#B5852A;
    --violet:#6B4FA0;
    --radius:6px;
    --radius-sm:4px;
    --hard:3px 3px 0 var(--ink);
    --hard-sm:2px 2px 0 var(--ink);
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Archivo",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100dvh;line-height:1.45;
  }
  h1,h2,h3,.display{font-family:"Anton",Impact,sans-serif;font-weight:400;letter-spacing:.01em;line-height:.98;margin:0;text-transform:uppercase}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px}
  a{color:var(--accent)}
  ::selection{background:var(--accent);color:var(--accent-ink)}

  .app{max-width:760px;margin:0 auto;padding:0 16px calc(100px + var(--safe-b))}
  .topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:14px 0;background:var(--paper);border-bottom:2px solid var(--rule)}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;background:none;border:none;padding:0;margin:0;font:inherit;color:inherit;text-align:left;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .brand:active{opacity:.7}
  .brand .mark{width:40px;height:40px;flex:none;background:var(--accent);border:2px solid var(--ink);
    box-shadow:var(--hard-sm);position:relative}
  .brand .mark::after{content:"★";position:absolute;inset:0;display:grid;place-items:center;color:var(--accent-ink);font-size:18px;line-height:1}
  .brand .name{font-family:"Anton";font-size:19px;letter-spacing:.02em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand .sub{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  .who{display:flex;align-items:center;gap:9px;flex:none}
  .avatar{width:34px;height:34px;display:grid;place-items:center;font-weight:800;font-size:13px;
    color:var(--paper);background:var(--ink);border:2px solid var(--ink)}
  .avatar.adm{background:var(--accent);color:var(--accent-ink)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 15px;
    border-radius:var(--radius-sm);font-weight:700;font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;
    background:var(--card);color:var(--ink);border:2px solid var(--ink);transition:transform .06s ease}
  .btn:active{transform:translate(1px,1px)}
  .btn.primary{background:var(--accent);color:var(--accent-ink);box-shadow:var(--hard-sm)}
  .btn.primary:active{box-shadow:1px 1px 0 var(--ink)}
  .btn.lime{background:var(--ink);color:var(--paper)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:8px 11px;font-size:11px}
  .btn.icon{padding:8px 10px}
  .btn.danger{background:transparent;color:var(--accent);border-color:var(--accent)}
  .btn:disabled{opacity:.4;pointer-events:none}
  .btn.block{width:100%}

  .card{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);padding:16px}
  .muted{color:var(--muted)}
  .tag{font-size:11px;color:var(--muted);font-weight:600;text-transform:none;letter-spacing:0}

  .field{display:block;margin-bottom:12px}
  .field>span{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:12px 13px;border-radius:var(--radius-sm);color:var(--ink);
    background:var(--paper);border:2px solid var(--ink);outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:var(--hard-sm)}
  .fld-label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);margin-bottom:6px}
  .inp{width:100%;padding:12px 13px;border-radius:var(--radius-sm);color:var(--ink);background:var(--paper);border:2px solid var(--ink);outline:none;font:inherit}
  .inp:focus{border-color:var(--accent);box-shadow:var(--hard-sm)}
  .col-grid{display:flex;flex-wrap:wrap;gap:9px}
  .col-swatch{width:38px;height:38px;border-radius:50%;border:2px solid var(--ink);cursor:pointer;padding:0;position:relative}
  .col-swatch.on{box-shadow:0 0 0 3px var(--paper),0 0 0 5px var(--ink)}
  .intro-modal{padding:22px 20px calc(20px + var(--safe-b))}
  .intro-dots{display:flex;gap:6px;margin-bottom:4px}
  .intro-dots span{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .intro-dots span.on{background:var(--accent)}
  .rate-line{display:flex;align-items:center;gap:10px;margin-top:8px}
  .rate-open{border:2px solid var(--ink);background:var(--paper);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer}
  .rate-open.rated{background:var(--gold);border-color:var(--gold)}
  .rate-agg{font-size:11.5px;color:var(--ink-2);font-weight:600}
  .rate-modal{padding:20px 20px calc(20px + var(--safe-b));text-align:center}
  .rate-act{font-weight:700;font-size:15px;margin:4px 0 6px}
  .rate-big{font-family:"Anton";font-size:54px;line-height:1;color:var(--accent)}
  .rate-slider{width:100%;margin:14px 0 2px;accent-color:var(--accent)}
  .rate-scale{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-2)}
  .fav{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line);font-size:13.5px}
  .fav:first-child{border-top:none}
  .fav-rank{font-family:"Anton";font-size:17px;color:var(--accent);width:20px;flex:none;text-align:center}
  .fav-name{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fav-bar{height:5px;background:var(--line);border-radius:3px;margin-top:4px;overflow:hidden}
  .fav-bar i{display:block;height:100%;background:var(--teal)}
  .fav-score{font-family:"Anton";font-size:15px;color:var(--teal);flex:none}
  .av{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;font-size:11px;flex:none}
  .depart-card{background:var(--ink);color:var(--paper);border-radius:var(--radius);padding:16px;margin-bottom:14px}
  .depart-head{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(239,231,213,.2);padding-bottom:8px;margin-bottom:10px}
  .depart-lbl{font-family:"Anton";text-transform:uppercase;letter-spacing:.12em;font-size:13px;color:#E8A33D}
  .depart-at{font-family:"Anton";font-size:15px;letter-spacing:.04em}
  .depart-time{font-family:"Anton";font-size:46px;line-height:1;letter-spacing:.02em}
  .depart-time small{font-size:18px;opacity:.7;margin:0 2px 0 1px}
  .depart-act{font-weight:800;font-size:16px;margin-top:8px}
  .depart-meta{font-size:12.5px;opacity:.85;margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .depart-warn{margin-top:10px;background:var(--accent);color:#fff;font-weight:800;font-size:12px;padding:5px 10px;border-radius:7px;display:inline-block;text-transform:uppercase;letter-spacing:.04em}
  .recap{background:var(--ink);color:var(--paper);border-radius:var(--radius);padding:20px;text-align:center}
  .recap h3{font-family:"Anton";font-weight:400;font-size:24px;margin:0 0 2px;text-transform:uppercase;letter-spacing:.01em}
  .recap .sub{font-size:11px;opacity:.65;margin-bottom:18px;text-transform:uppercase;letter-spacing:.14em}
  .recap-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .recap-stat .n{font-family:"Anton";font-size:32px;line-height:1;color:#E8A33D}
  .recap-stat .l{font-size:10px;text-transform:uppercase;letter-spacing:.06em;opacity:.8;margin-top:4px}
  .recap-foot{margin-top:18px;font-size:12.5px;border-top:1px solid rgba(239,231,213,.2);padding-top:13px}
  .rating-nudge{position:fixed;left:12px;right:12px;bottom:78px;z-index:115;display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--gold);color:var(--ink);border-radius:12px;padding:11px 14px;font-size:13px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.22)}
  .rating-nudge button{border:none;border-radius:999px;font-weight:800;font-size:12px;cursor:pointer;padding:5px 12px}
  .rating-nudge .rn-rate{background:var(--ink);color:var(--paper);margin-right:6px}
  .rating-nudge .rn-x{background:transparent;color:var(--ink);padding:5px 8px}
  .row{display:flex;gap:10px}.row>*{flex:1}

  .auth-wrap{min-height:100dvh;display:grid;place-items:center;padding:24px}
  .auth{width:100%;max-width:390px}
  .auth .hero{text-align:left;margin-bottom:26px;border-bottom:3px solid var(--ink);padding-bottom:18px}
  .auth .hero h1{font-size:58px;color:var(--ink);line-height:.9}
  .auth .hero h1 .amp{color:var(--accent)}
  .auth .hero p{color:var(--ink-2);margin:14px 0 0;font-size:14px;font-weight:500}
  .seg{display:flex;border:2px solid var(--ink);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:18px}
  .seg button{flex:1;padding:11px;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:var(--card)}
  .seg button.on{background:var(--ink);color:var(--paper)}
  .note{font-size:12px;color:var(--muted);margin-top:14px;text-align:left;line-height:1.5}
  .err{background:transparent;border:2px solid var(--accent);color:var(--accent);padding:10px 12px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;font-weight:600}

  .nav{position:fixed;left:0;right:0;bottom:0;z-index:50;padding:0;background:var(--paper);border-top:2px solid var(--rule)}
  .nav-inner{max-width:760px;margin:0 auto;display:flex;padding:6px 8px calc(6px + var(--safe-b))}
  .nav-inner button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;
    color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-bottom:3px solid transparent}
  .nav-inner button svg{width:21px;height:21px}
  .nav-inner button.on{color:var(--ink);border-bottom-color:var(--accent)}
  .nav-inner button.on svg{stroke:var(--accent)}

  .sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:18px 0 14px;
    border-bottom:2px solid var(--ink);padding-bottom:10px}
  .sec-head h2{font-size:30px}
  .sec-head .lead{color:var(--muted);font-size:12px;margin-top:6px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}

  .filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
  .filters::-webkit-scrollbar{display:none}
  .chip{flex:none;padding:7px 13px;border-radius:2px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    background:transparent;border:1.5px solid var(--ink);color:var(--ink-2);white-space:nowrap}
  .chip.on{background:var(--ink);color:var(--paper)}
  .search{width:100%;padding:12px 14px;border-radius:var(--radius-sm);background:var(--paper);border:2px solid var(--ink);color:var(--ink);outline:none;margin-bottom:12px}
  .search:focus{border-color:var(--accent);box-shadow:var(--hard-sm)}

  .day-label{font-family:"Anton";font-size:24px;text-transform:uppercase;letter-spacing:.02em;margin:26px 0 12px;
    display:flex;align-items:center;gap:12px;color:var(--ink)}
  .day-label::after{content:"";flex:1;height:2px;background:var(--ink)}
  .ev{display:flex;gap:12px;align-items:stretch;background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);
    padding:12px;margin-bottom:10px;position:relative}
  .ev .time{flex:none;width:62px;text-align:center;display:flex;flex-direction:column;justify-content:center;border-right:2px solid var(--ink);padding-right:10px}
  .ev .time .t{font-family:"Anton";font-size:17px}
  .ev .time .t2{font-size:10.5px;color:var(--muted);margin-top:3px;font-weight:600}
  .ev .body{flex:1;min-width:0}
  .ev .body h3{font-family:"Archivo";font-weight:800;font-size:17px;letter-spacing:-.01em;text-transform:none}
  .ev .meta{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px;align-items:center}
  .ev .loc{font-size:12px;color:var(--ink-2);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .ev .notes{font-size:13px;color:var(--ink-2);margin-top:7px}
  .ev .act{flex:none;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:center}
  .pick-btn{width:44px;height:44px;border-radius:var(--radius-sm);display:grid;place-items:center;background:var(--paper);border:2px solid var(--ink)}
  .pick-btn svg{width:22px;height:22px;fill:none;stroke:var(--ink);stroke-width:2.4}
  .pick-btn.on{background:var(--accent);border-color:var(--ink)}
  .pick-btn.on svg{stroke:var(--accent-ink)}
  .ev.clash{outline:2px solid var(--accent);outline-offset:2px}
  .clash-note{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--accent);margin-top:7px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
  .area-tag{display:inline-flex;align-items:center;font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
    color:#fff;background:var(--c,#777);padding:3px 9px;border-radius:2px;border:1.5px solid var(--ink)}
  .cdot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--ink);display:inline-block;margin-right:1px;vertical-align:-1px}

  .goers{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
  .goer{font-size:11px;font-weight:700;padding:3px 9px;border-radius:2px;background:transparent;border:1.5px solid var(--line-strong);color:var(--ink-2)}
  .goer.me{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .count-badge{font-family:"Anton";font-size:13px;color:var(--accent);letter-spacing:.03em}

  .empty{text-align:center;padding:48px 20px;color:var(--muted)}
  .empty .big{font-size:42px;margin-bottom:10px;filter:grayscale(.2)}
  .empty h3{font-family:"Anton";color:var(--ink);margin-bottom:8px;font-size:22px}

  .admin-block{margin-bottom:14px}
  .district{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
  .district .dh{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 14px;background:var(--ink);color:var(--paper)}
  .district .dh .nm{font-family:"Anton";font-size:17px;letter-spacing:.02em;display:flex;align-items:center;gap:9px}
  .dswatch{width:16px;height:16px;border-radius:3px;border:2px solid var(--paper);flex:none}
  .palette{display:flex;flex-wrap:wrap;gap:7px;padding:11px 14px 4px;align-items:center}
  .palette .plabel{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-right:2px}
  .palette .sw{width:26px;height:26px;border-radius:4px;border:2px solid var(--ink);cursor:pointer;position:relative}
  .palette .sw.on::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:14px;font-weight:900;text-shadow:0 1px 2px rgba(0,0,0,.5)}
  .district .dh .btn{border-color:var(--paper);color:var(--paper)}
  .district .dh .btn.danger{color:var(--paper);border-color:var(--paper)}
  .stages{padding:11px 14px;display:flex;flex-wrap:wrap;gap:8px}
  .stage-chip{display:flex;align-items:center;gap:7px;padding:6px 6px 6px 11px;border-radius:2px;background:var(--paper);border:1.5px solid var(--ink);font-size:13px;font-weight:700}
  .stage-chip button{color:var(--muted);font-weight:800;line-height:1;padding:2px 4px}
  .stage-chip button:hover{color:var(--accent)}
  .add-inline{display:flex;gap:8px;align-items:center;padding:0 14px 13px}
  .add-inline input{flex:1;padding:10px 11px;border-radius:var(--radius-sm);background:var(--paper);border:2px solid var(--ink);color:var(--ink);outline:none;font-size:14px}

  .modal-bg{position:fixed;inset:0;z-index:60;background:rgba(28,27,22,.55);display:grid;place-items:end center;padding:0}
  .modal{width:100%;max-width:760px;background:var(--paper);border-top:3px solid var(--ink);border-radius:0;
    padding:18px 18px calc(20px + var(--safe-b));max-height:94dvh;overflow:auto;animation:slideup .2s ease}
  @keyframes slideup{from{transform:translateY(30px)}to{transform:translateY(0)}}
  .modal h2{font-size:26px}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;border-bottom:2px solid var(--ink);padding-bottom:12px}

  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(104px + var(--safe-b));z-index:80;
    background:var(--ink);color:var(--paper);font-weight:700;font-size:12.5px;letter-spacing:.05em;text-transform:uppercase;
    padding:11px 18px;border-radius:var(--radius-sm);box-shadow:var(--hard);animation:pop .18s ease}
  @keyframes pop{from{transform:translate(-50%,8px);opacity:0}to{transform:translate(-50%,0);opacity:1}}

  .loader{min-height:60dvh;display:grid;place-items:center;color:var(--muted)}
  .spin{width:32px;height:32px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--accent);animation:sp 1s linear infinite;margin:0 auto 14px}
  @keyframes sp{to{transform:rotate(360deg)}}

  .stat-row{display:flex;gap:10px;margin-bottom:14px}
  .stat{flex:1;background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);padding:13px}
  .stat .n{font-family:"Anton";font-size:30px;line-height:1}
  .stat .l{font-size:10.5px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.06em;font-weight:700}

  .config-warn{background:var(--card);border:2px solid var(--accent);border-radius:var(--radius);padding:16px;font-size:13.5px;line-height:1.6}
  .config-warn code{background:var(--panel);padding:2px 6px;border-radius:3px;font-size:12.5px}

  /* bulk importer */
  .bulk-tabs{display:flex;border:2px solid var(--ink);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:14px}
  .bulk-tabs button{flex:1;padding:10px;font-weight:700;font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);background:var(--card)}
  .bulk-tabs button.on{background:var(--accent);color:var(--accent-ink)}
  .bulk-ta{width:100%;min-height:150px;padding:12px 13px;border-radius:var(--radius-sm);background:var(--paper);
    border:2px solid var(--ink);color:var(--ink);outline:none;font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:13.5px;line-height:1.7;resize:vertical}
  .bulk-ta:focus{border-color:var(--accent)}
  .fmt{background:var(--panel);border:1.5px dashed var(--line-strong);border-radius:var(--radius-sm);padding:11px 13px;font-size:12.5px;line-height:1.6;margin-bottom:12px}
  .fmt code{background:var(--paper);padding:1px 5px;border-radius:3px;font-size:12px}
  .prev{border:2px solid var(--ink);border-radius:var(--radius-sm);margin:12px 0;overflow:hidden}
  .prev-head{background:var(--ink);color:var(--paper);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:8px 12px;display:flex;justify-content:space-between}
  .prev-body{max-height:230px;overflow:auto}
  .prev-row{display:flex;gap:10px;align-items:baseline;padding:8px 12px;border-bottom:1px solid var(--line);font-size:13px}
  .prev-row:last-child{border-bottom:none}
  .prev-row .pday{width:34px;flex:none;font-weight:800;font-size:10px;text-transform:uppercase;color:var(--muted)}
  .prev-row .ptime{width:96px;flex:none;font-family:ui-monospace,monospace;font-size:12px;font-weight:600}
  .prev-row .ptitle{flex:1;min-width:0;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .prev-row .ploc{font-size:11px;color:var(--muted);flex:none;max-width:38%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .prev-row.bad{background:rgba(214,55,28,.08)}
  .prev-row.bad .ptitle{color:var(--accent)}
  .prev-row .stt{flex:none;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em}
  .prev-row.bad .stt{color:var(--accent)}
  .prev-row.new .stt{color:var(--teal)}
  .chk{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;margin-bottom:12px;cursor:pointer}
  .chk input{width:20px;height:20px;accent-color:var(--accent)}

  /* admin stage rows with location */
  .stage-list{flex-direction:column;align-items:stretch;gap:7px}
  .stage-row{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--paper);
    border:1.5px solid var(--ink);border-radius:var(--radius-sm);padding:7px 9px 7px 12px}
  .stage-row .sname{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .stage-row .locdot{font-size:13px}
  .srow-act{display:flex;gap:6px;flex:none}
  .btn.xs{padding:6px 9px;font-size:10px;letter-spacing:.04em}
  .btn.xs.del{padding:6px 8px;color:var(--muted)}
  .btn.xs.del:hover{color:var(--accent)}

  /* find / compass */
  .find-enable{text-align:center;padding:30px 18px}
  .find-enable .big{font-size:46px;margin-bottom:10px}
  .find-enable h3{font-family:"Anton";font-size:22px;margin-bottom:8px}
  .find-enable p{color:var(--ink-2);font-size:13.5px;max-width:340px;margin:0 auto 18px;line-height:1.55}
  .readout{background:var(--ink);color:var(--paper);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .readout .r-name{font-family:"Anton";font-size:20px;letter-spacing:.02em;line-height:1}
  .readout .r-dir{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#d8cdb2;margin-top:5px;font-weight:700}
  .readout .r-dist{font-family:"Anton";font-size:30px;color:var(--paper);line-height:1;text-align:right}
  .readout .r-dist small{display:block;font-family:"Archivo";font-size:10px;letter-spacing:.06em;color:#d8cdb2;font-weight:700;margin-top:3px;text-transform:uppercase}
  .readout.r-here .r-dist{color:#9FD8C4}
  .r-right{display:flex;align-items:center;gap:10px}
  .r-clear{flex:none;width:30px;height:30px;border-radius:50%;border:1.5px solid #6f6a5e;background:transparent;color:#d8cdb2;font-size:14px;line-height:1;cursor:pointer;padding:0}
  .r-clear:active{background:#6f6a5e;color:var(--ink)}
  .wt-time.here{color:var(--accent)}
  .radar-wrap{display:flex;justify-content:center;margin:4px 0 12px}
  #radar{width:100%;max-width:320px;height:auto;touch-action:manipulation}
  #radar .ring{fill:none;stroke:var(--line-strong);stroke-width:1.5}
  #radar .ring-lbl{fill:var(--muted);font:600 9px Archivo,sans-serif;letter-spacing:.04em}
  #radar .cross{stroke:var(--line);stroke-width:1}
  #radar .me{fill:var(--ink)}
  #radar .fwd{fill:var(--accent)}
  #radar .fwd-lbl{fill:var(--muted);font:700 9px Archivo,sans-serif;letter-spacing:.08em;text-transform:uppercase}
  #radar .rdot{cursor:pointer}
  #radar .rdot circle{stroke:var(--ink);stroke-width:2}
  #radar .rdot text{fill:var(--ink);font:700 9.5px Archivo,sans-serif}
  #radar .rdot.sel circle{stroke-width:3}
  #radar .rdot.sel text{font-weight:800}
  #radar .needle{fill:var(--accent);stroke:var(--ink);stroke-width:1.5}
  .find-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .find-acc{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.04em;text-transform:uppercase}
  .mode-toggle{display:flex;border:2px solid var(--ink);border-radius:var(--radius-sm);overflow:hidden}
  .mode-toggle button{padding:7px 12px;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);background:var(--card)}
  .mode-toggle button.on{background:var(--ink);color:var(--paper)}
  .target-chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
  .find-prompt{background:var(--panel);border:2px dashed var(--line);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;font-size:13.5px;font-weight:600;color:var(--ink-2);text-align:center;line-height:1.4}
  .target-chips::-webkit-scrollbar{display:none}
  .tchip{flex:none;display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:2px;font-size:12px;font-weight:700;
    background:transparent;border:1.5px solid var(--ink);color:var(--ink-2);white-space:nowrap}
  .tchip.on{background:var(--ink);color:var(--paper)}
  .tchip .cdot{margin:0}
  .find-note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:4px}
  #radar .dot-init{fill:#fff;font:800 8px Archivo,sans-serif;text-shadow:0 1px 1px rgba(0,0,0,.4)}
  #radar .dot-name{fill:var(--ink);font:700 9.5px Archivo,sans-serif}
  .share-row{display:flex;align-items:center;justify-content:space-between;gap:14px;background:var(--card);
    border:2px solid var(--ink);border-radius:var(--radius);padding:13px 15px;margin-bottom:14px}
  .share-row b{font-size:14px}
  .switch{flex:none;width:52px;height:30px;border-radius:999px;border:2px solid var(--ink);background:var(--paper);position:relative;transition:background .15s}
  .switch span{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:var(--ink);transition:transform .15s}
  .switch.on{background:var(--accent)}
  .switch.on span{transform:translateX(22px);background:var(--accent-ink)}
  .live-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;background:var(--accent);
    color:var(--accent-ink);font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;border:2px solid var(--ink)}
  .live-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--accent-ink);animation:blink 1.4s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .legend{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
  .leg{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:2px;font-size:11.5px;font-weight:700;
    letter-spacing:.03em;text-transform:uppercase;background:transparent;border:1.5px solid var(--ink);color:var(--ink-2);opacity:.45}
  .leg.on{opacity:1}
  .leg b{font-family:"Anton";font-weight:400;font-size:13px}
  .leg .ldot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--ink)}
  .cemoji{font-size:14px;line-height:1}
  #radar .dot-emoji{font-size:11px}
  .type-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
  .type-chip{padding:9px 13px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;
    background:var(--card);border:2px solid var(--ink);color:var(--ink)}
  .type-chip.on{background:var(--ink);color:var(--paper)}
  .pin-shared{font-size:9.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--accent-ink);
    background:var(--teal);border:1.5px solid var(--ink);border-radius:2px;padding:1px 6px;margin-left:4px}
  .find-actions{display:flex;gap:8px;margin-bottom:14px}
  .find-actions .btn{flex:1;padding:10px 6px;font-size:11px}
  .next-card{background:var(--ink);color:var(--paper);border-radius:var(--radius);padding:15px 16px;margin-bottom:14px}
  .next-card.live{background:var(--accent)}
  .next-card .nc-tag{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;opacity:.8;margin-bottom:5px}
  .next-card .nc-name{font-family:"Anton";font-size:22px;line-height:1;text-transform:uppercase}
  .next-card .nc-meta{font-size:12.5px;margin-top:8px;opacity:.95;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .next-card .area-tag{border-color:rgba(255,255,255,.5)}
  .lost-banner{display:flex;align-items:center;gap:8px;width:100%;background:var(--accent);color:var(--accent-ink);
    border:2px solid var(--ink);border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:14px;font-size:13.5px;font-weight:700;text-align:left;
    box-shadow:var(--hard-sm)}
  .lost-banner b{font-weight:800}
  .tchip.lost{border-color:var(--accent);color:var(--accent)}
  #radar .lost-ring{fill:none;stroke:#D6371C;stroke-width:3;animation:lostpulse 1.1s infinite}
  @keyframes lostpulse{0%,100%{opacity:.2}50%{opacity:.9}}

  /* menu */
  .menu-list{display:flex;flex-direction:column;gap:7px}
  .menu-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:var(--radius-sm);
    background:var(--card);border:2px solid var(--ink);font-weight:700;font-size:14.5px;text-align:left}
  .menu-item.on{background:var(--ink);color:var(--paper)}
  .menu-item .mi-e{font-size:18px;line-height:1}

  /* chat */
  .chat-scroll{display:flex;flex-direction:column;gap:10px;min-height:50dvh;padding:4px 2px 10px}
  .msg{max-width:82%;align-self:flex-start;display:flex;flex-direction:column;gap:2px}
  .msg.mine{align-self:flex-end;align-items:flex-end}
  .msg-who{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-left:4px}
  .bubble{background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:9px 13px;font-size:14.5px;line-height:1.35;word-break:break-word}
  .msg.mine .bubble{background:var(--ink);color:var(--paper)}
  .msg.mine .bubble a{color:#ffd9c9}
  .msg-time{font-size:10px;color:var(--muted);margin:0 4px}
  .chat-input{display:flex;gap:8px;padding:8px 0;background:var(--paper)}
  .chat-input input{flex:1;padding:12px 14px;border-radius:var(--radius-sm);background:var(--paper);border:2px solid var(--ink);color:var(--ink);outline:none}
  .chat-input input:focus{border-color:var(--accent)}
  .mention{font-weight:800;color:var(--accent)}
  .msg.mine .mention{color:#ffd9c9}
  .mention.me{background:var(--accent);color:var(--accent-ink);border-radius:3px;padding:0 4px}
  .msg.pinged .bubble{border-color:var(--accent);box-shadow:var(--hard-sm)}
  .chat-compose{position:sticky;bottom:calc(96px + var(--safe-b));background:var(--paper)}
  .mention-pop{position:absolute;left:0;right:56px;bottom:100%;margin-bottom:6px;background:var(--card);
    border:2px solid var(--ink);border-radius:var(--radius-sm);box-shadow:var(--hard);overflow:hidden;max-height:210px;overflow-y:auto}
  .mention-opt{display:flex;align-items:center;gap:10px;width:100%;padding:10px 13px;text-align:left;font-weight:700;font-size:14px;border-bottom:1px solid var(--line)}
  .mention-opt:last-child{border-bottom:none}
  .mention-opt:hover{background:var(--panel)}
  .mention-opt .mo-av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:800;flex:none;border:1.5px solid var(--ink)}

  /* info */
  .info-item{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
  .info-item h3{font-family:"Archivo";font-weight:800;font-size:16px;text-transform:none;margin-bottom:5px}
  .info-body{font-size:14px;color:var(--ink-2);white-space:pre-wrap;line-height:1.5;word-break:break-word}

  /* packing */
  .pack-bar{height:8px;background:var(--panel);border:1.5px solid var(--ink);border-radius:999px;overflow:hidden;margin-bottom:14px}
  .pack-fill{height:100%;background:var(--teal);transition:width .2s}
  .pack-list{display:flex;flex-direction:column;gap:7px}
  .pack-row{display:flex;align-items:center;gap:6px;background:var(--card);border:2px solid var(--ink);border-radius:var(--radius-sm);overflow:hidden}
  .pack-row.on{background:var(--panel)}
  .pack-tap{flex:1;display:flex;align-items:center;gap:11px;padding:11px 13px;text-align:left}
  .pack-box{width:22px;height:22px;flex:none;border:2px solid var(--ink);border-radius:4px;display:grid;place-items:center;font-weight:900;font-size:14px;background:var(--paper)}
  .pack-row.on .pack-box{background:var(--teal);color:#fff}
  .pack-row.on .pack-label{text-decoration:line-through;color:var(--muted)}
  .pack-label{font-size:14.5px;font-weight:600}
  .pack-del{flex:none;padding:0 13px;align-self:stretch;color:var(--muted);font-weight:800}
  .pack-del:hover{color:var(--accent)}

  /* free-time */
  .free-card{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px}
  .free-head{font-family:"Anton";font-size:16px;text-transform:uppercase;letter-spacing:.02em;margin-bottom:4px}
  .free-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line);font-size:14px}
  .free-row .free-day{font-weight:800;font-size:11px;text-transform:uppercase;color:var(--muted);width:32px}
  .free-row .free-len{margin-left:auto;font-size:12px;color:var(--teal);font-weight:700}

  .changed-badge{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--accent-ink);
    background:var(--accent);border:1.5px solid var(--ink);border-radius:2px;padding:2px 7px}

  .sel-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;padding:10px 12px;background:var(--panel);border:2px solid var(--ink);border-radius:var(--radius-sm)}
  .sel-bar .btn{flex:1}
  .day-sel{margin-left:auto;font-family:"Archivo";font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    padding:4px 9px;border-radius:2px;border:1.5px solid var(--ink);background:transparent;color:var(--ink-2)}
  .day-sel.on{background:var(--ink);color:var(--paper)}
  .ev-check{flex:none;width:30px;align-self:stretch;display:grid;place-items:center;background:var(--paper);
    border:2px solid var(--ink);border-radius:var(--radius-sm);font-weight:900;font-size:15px;color:var(--paper)}
  .ev-check.on{background:var(--accent);color:var(--accent-ink)}
  .ev.rowsel{outline:2px solid var(--accent);outline-offset:1px}
  .ev.shift{background:var(--panel)}
  .ev.shift h3{font-family:"Archivo";font-weight:800;font-size:16px;text-transform:none}
  .secret-tag{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--paper);
    background:var(--ink);border-radius:2px;padding:2px 8px}
  .day-pick{display:flex;gap:6px;flex-wrap:wrap}
  .day-opt{flex:1;min-width:54px;padding:10px 6px;border-radius:var(--radius-sm);border:2px solid var(--ink);
    background:var(--card);font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2)}
  .day-opt.on{background:var(--ink);color:var(--paper)}

  /* meetup windows list */
  .meet-sub{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin:2px 0 12px;font-size:11px;color:var(--muted);font-weight:600;line-height:1.4}
  .meet-weigh{flex:none;text-align:right;text-transform:uppercase;letter-spacing:.04em;font-weight:700}
  .link-btn{background:none;border:none;color:var(--accent);font-weight:700;font-size:11px;text-decoration:underline;padding:0;text-transform:none;letter-spacing:0}
  .meet-list{display:flex;flex-direction:column;gap:8px}
  .meet-row{display:flex;align-items:center;gap:12px;padding:11px 13px;background:var(--paper);border:2px solid var(--ink);border-radius:var(--radius-sm);width:100%;text-align:left;cursor:pointer}
  .meet-row:active{transform:translate(1px,1px)}
  .mr-left{flex:1;min-width:0}
  .mr-time{font-family:"Anton";font-size:17px;letter-spacing:.01em;line-height:1}
  .mr-who{font-size:11.5px;color:var(--muted);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
  .mr-right{flex:none;text-align:right}
  .mr-count{font-family:"Anton";font-size:22px;line-height:1;color:var(--teal)}
  .mr-count span{font-family:"Archivo";font-size:12px;color:var(--muted);font-weight:700}
  .mr-len{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:3px}

  /* rally calls */
  .live-mini{font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-ink);background:var(--accent);border:1.5px solid var(--ink);border-radius:2px;padding:1px 6px;vertical-align:2px}
  .call-list{display:flex;flex-direction:column;gap:8px}
  .call-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--paper);border:1.5px solid var(--ink);border-radius:var(--radius-sm)}
  .call-main{flex:1;min-width:0}
  .call-title{font-weight:800;font-size:14px}
  .call-sub{font-size:11.5px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* crew picker */
  .crew-list{display:flex;flex-direction:column;gap:7px;max-height:50dvh;overflow-y:auto}
  .crew-opt{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;text-align:left;font-weight:700;font-size:14px;
    background:var(--card);border:2px solid var(--ink);border-radius:var(--radius-sm)}
  .crew-opt.on{background:var(--panel)}
  .crew-opt .crew-chk{margin-left:auto;font-weight:900;color:var(--teal);font-size:16px}
  .crew-opt .mo-av{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:800;flex:none;border:1.5px solid var(--ink)}
  .seed-live{background:var(--ink);color:var(--paper);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:10px;font-size:13px;line-height:1.45}
  .seed-live b{color:var(--gold)}
  .test-banner{background:var(--violet);color:#fff;font-size:12.5px;font-weight:700;padding:7px 12px;display:flex;align-items:center;justify-content:center;gap:10px;text-align:center;line-height:1.3}
  .test-exit{flex:none;background:#fff;color:var(--violet);border:none;border-radius:999px;padding:3px 11px;font-weight:800;font-size:12px;cursor:pointer}
  .app.testmode .topbar{border-top:2px solid var(--violet)}
  .test-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
  .test-step .ts-n{flex:none;width:22px;height:22px;border-radius:50%;background:var(--violet);color:#fff;font-weight:800;font-size:12px;display:grid;place-items:center;margin-top:1px}
  button.stat.stat-tap{cursor:pointer;border:2px solid var(--accent);font:inherit;text-align:left;-webkit-tap-highlight-color:transparent}
  button.stat.stat-tap .l{color:var(--accent);font-weight:700}
  .clash-modal-body{overflow-y:auto;max-height:72vh}
  .clash-modal-body .free-card{border:none!important;margin:0;padding:0}
  /* walk-times-from-here list */
  .wt-list{display:flex;flex-direction:column;gap:2px;margin-top:8px}
  .wt-row{display:flex;align-items:center;gap:9px;padding:9px 2px;border-top:1px solid var(--line);width:100%;text-align:left;font-size:13.5px}
  .wt-row:first-child{border-top:none}
  .wt-dot{flex:none;width:11px;height:11px;border-radius:50%;border:1.5px solid var(--ink)}
  .wt-name{flex:1;min-width:0;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .wt-time{flex:none;font-family:"Anton";font-size:14px;color:var(--teal)}
  /* admin walk-time matrix */
  .wm-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.wm{border-collapse:collapse;font-size:12px;min-width:100%}
  table.wm th,table.wm td{border:1px solid var(--line);padding:5px 7px;text-align:center;white-space:nowrap}
  table.wm thead th,table.wm tbody th{background:var(--panel);font-family:"Anton";font-weight:400;letter-spacing:.02em}
  table.wm td small{font-size:8px;opacity:.6;margin-left:1px}
  .wm-self{color:var(--muted)}
  .wm-meas{background:rgba(30,90,80,.12);color:var(--teal);font-weight:700}
  .wm-est{color:var(--ink-2)}
  .wm-meas-k{color:var(--teal);font-weight:800}
  .wm-est-k{color:var(--ink-2);font-weight:800}
  .seed-live #seed-clock{font-family:"Anton";font-size:16px;margin-left:4px}

  /* ---------- HOME ---------- */

<body>
<div id="root"></div>

<script type="module">
/* ============================================================
   FESTIVAL PLANNER
   ------------------------------------------------------------
   SETUP (see README.md for full steps):
   1. Create a free Firebase project, enable Cloud Firestore.
   2. Paste your config into FIREBASE_CONFIG below.
   3. Set ADMIN_CODE to a secret only you know — entering it on
      sign-up makes that account an admin.
   ============================================================ */

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBTbrKrHADeshcLQb4TyD2F99HVvRRb7MQ",
  authDomain: "boomtown-32345.firebaseapp.com",
  projectId: "boomtown-32345",
  storageBucket: "boomtown-32345.firebasestorage.app",
  messagingSenderId: "138467434890",
  appId: "1:138467434890:web:042ff480bdad8e5705a873"
};

const ADMIN_CODE = "change-me-admin";   // <-- change this before deploying
const FESTIVAL_NAME_DEFAULT = "Our Festival";

/* ------------------------------------------------------------ */

const DAYS = ["Wednesday","Thursday","Friday","Saturday","Sunday"];
const AREA_COLORS = ["#D6371C","#1E5A50","#2B4C9B","#B5852A","#7A3B6B","#3C6B33","#A0522D","#41566B","#B5306E","#1C1B16"];
const NO_AREA_COLOR = "#8A8068";
function districtColor(id){
  const idx = state.structure.districts.findIndex(x=>x.id===id);
  if(idx<0) return NO_AREA_COLOR;
  const d = state.structure.districts[idx];
  return d.color || AREA_COLORS[idx % AREA_COLORS.length];
}
function nextAreaColor(){
  const used = new Set(state.structure.districts.map(d=>d.color).filter(Boolean));
  return AREA_COLORS.find(c=>!used.has(c)) || AREA_COLORS[state.structure.districts.length % AREA_COLORS.length];
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
  collection, doc, onSnapshot, setDoc, deleteDoc,
  getDocs, query, where, addDoc, updateDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const root = document.getElementById("root");

/* ---- Config guard ---- */
if (FIREBASE_CONFIG.apiKey === "PASTE_YOUR_API_KEY") {
  root.innerHTML = `<div class="auth-wrap"><div class="auth">
    <div class="hero"><h1>Festival Planner</h1></div>
    <div class="config-warn">
      <b>Almost there — Firebase isn't configured yet.</b><br><br>
      Open <code>index.html</code> and paste your Firebase project config into the
      <code>FIREBASE_CONFIG</code> object near the top of the script, then set your
      secret <code>ADMIN_CODE</code>. Full step-by-step instructions are in
      <code>README.md</code>. Reload this page once that's done.
    </div>
  </div></div>`;
  throw new Error("Firebase not configured");
}

const app = initializeApp(FIREBASE_CONFIG);
// Offline-first: cache reads locally and queue writes to replay when signal returns.
let db;
try {
  db = initializeFirestore(app, { localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }) });
} catch (e) {
  db = getFirestore(app);
}

/* ---- Firestore refs ----
   TEST MODE: a fully separate sandbox. When on, every collection is prefixed with "test_"
   and the structure doc lives at meta/structure_test, so real festival data is untouched.
   The mode is fixed at page load (persisted in localStorage) and toggling reloads the page,
   so all snapshot listeners re-establish cleanly against the right world. */
const TEST_MODE = localStorage.getItem("fp_testmode")==="1";
// Battery saver: throttles GPS frequency, pauses live location sharing, slows live updates.
let BATTERY_SAVER = localStorage.getItem("fp_battsaver")==="1";
function setBatterySaver(on){
  BATTERY_SAVER = on;
  if(on) localStorage.setItem("fp_battsaver","1"); else localStorage.removeItem("fp_battsaver");
  if(on && find.share) stopShare(true);          // pause live sharing to save power
  else if(find.started){ stopFindSensors(); if(state.view==="find") startFindSensors(); }  // restart GPS at new cadence
  renderApp();
}
const PFX = TEST_MODE ? "test_" : "";
function setTestMode(on){
  if(on) localStorage.setItem("fp_testmode","1"); else localStorage.removeItem("fp_testmode");
  location.reload();
}
// prefixed collection + doc helpers
const pcol = name => collection(db, PFX+name);
const dref = (name, ...path) => doc(db, PFX+name, ...path);

const refStructure = TEST_MODE ? doc(db, "meta", "structure_test") : doc(db, "meta", "structure");
const colEvents    = pcol("events");
const colUsers     = pcol("users");
const colPicks     = pcol("picks");
const colLocations = pcol("locations");
const colPins      = pcol("pins");
const colMessages  = pcol("messages");
const colCalls     = pcol("calls");
const colPacking   = pcol("packing");
const colShifts    = pcol("shifts");
const colLegs      = pcol("legs");   // crowdsourced walk-time samples between stage pairs
const colRatings   = pcol("ratings"); // set ratings: doc id `userId__eventId`, {userId,eventId,score 0-10,createdAt}

/* ---- App state ---- */
const state = {
  user: null,                 // {id,name,admin}
  structure: { festivalName: FESTIVAL_NAME_DEFAULT, districts: [] },
  events: [],                 // [{id,...}]
  users: [],                  // [{id,name,admin}]
  picks: [],                  // [{id,userId,eventId}]
  messages: [],               // [{id,userId,name,text,createdAt}]
  myPacking: { checked:[], mine:[] },
  shifts: [],                 // private, owner-only: [{id,ownerId,label,day,start,end,note}]
  legs: [],                   // walk-time samples: [{id,pair,sec,dist,seed}]
  ratings: [],                // set ratings: [{id,userId,eventId,score}]
  menuOpen: false,
  locations: [],              // [{id(userId),name,lat,lng,acc,updatedAt}]
  pins: [],                   // [{id,ownerId,ownerName,label,type,lat,lng,shared,updatedAt}]
  calls: [],                  // live rally calls: [{id,userId,name,kind,label,at,in:[ids],createdAt,expiresAt}]
  crew: [],                   // local: ids of my "core crew" for meetup weighing
  meetMode: "all",            // "all" | "crew"
  meetDay: null,              // selected day in meetup finder
  onnowFilter: "all",         // on-now board filter: all | mine | <districtId>
  view: "home",
  ready: { events:false, users:false, picks:false, structure:false },
  filters: { day:"all", district:"all", search:"" },
  sharedFriend: "all",
  recapDay: null,             // recap view: null = overall, else a day name
  modal: null
};

/* ---- Helpers ---- */
const uid = () => Math.random().toString(36).slice(2,10);
const esc = s => (s??"").toString().replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const toMin = t => { if(!t) return 0; const [h,m]=t.split(":").map(Number); return h*60+(m||0); };
const dayIdx = d => DAYS.indexOf(d);
function timeRangeMin(ev){ // returns [start, end] in festival-day minutes (late-night counts as same night)
  let s = festMin(ev.start), e = festMin(ev.end);
  if (e <= s) e += 24*60;
  return [s,e];
}
function overlaps(a,b){
  if (a.day !== b.day) return false;
  const [as,ae]=timeRangeMin(a), [bs,be]=timeRangeMin(b);
  return as < be && bs < ae;
}
function fmt12(t){
  if(!t) return "";
  let [h,m]=t.split(":").map(Number);
  const ap = h>=12 ? "pm":"am"; let hh = h%12; if(hh===0) hh=12;
  return m? `${hh}:${String(m).padStart(2,"0")}${ap}` : `${hh}${ap}`;
}
function initials(name){
  return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase() || "?";
}
/* admin feature flags (default ON) and festival-date helpers */
function feat(name){ const f=state.structure.features; return f ? f[name]!==false : true; }
function festivalStart(){ const s=state.structure.festivalStartDate; return s ? new Date(s+"T00:00:00") : null; }
function dateForDay(day){ const base=festivalStart(); if(!base) return null; const d=new Date(base); d.setDate(d.getDate()+Math.max(0,DAYS.indexOf(day))); return d; }
// Festival "day" runs noon→noon-ish: clock times before this hour belong to the PREVIOUS day's night.
const DAY_ROLLOVER_HOUR = 6;   // 00:00–05:59 counts as the late night of the day named on the event
function isLateNight(hhmm){ if(!hhmm) return false; const h=+hhmm.split(":")[0]; return h < DAY_ROLLOVER_HOUR; }
// minutes-since-noon ordering within a festival day, so 02:00 sorts AFTER 23:00
function festMin(hhmm){ if(!hhmm) return 0; let m=toMin(hhmm); if(isLateNight(hhmm)) m+=24*60; return m; }
function eventStart(ev){ const d=dateForDay(ev.day); if(!d||!ev.start) return null; const [h,m]=ev.start.split(":").map(Number); const dt=new Date(d); dt.setHours(h,m||0,0,0); if(isLateNight(ev.start)) dt.setDate(dt.getDate()+1); return dt; }
function eventEnd(ev){ const s=eventStart(ev); if(!s) return null; if(!ev.end) return new Date(s.getTime()+60*60000); const [h,m]=ev.end.split(":").map(Number); const dt=new Date(s); dt.setHours(h,m||0,0,0); if(dt<=s) dt.setDate(dt.getDate()+1); return dt; }
function nextPickInfo(){
  if(!festivalStart()) return null;
  const ids=myPickIds();
  let items=state.events.filter(e=>ids.has(e.id)).map(e=>({ev:e,s:eventStart(e),e2:eventEnd(e),shift:false}));
  if(feat("shifts")) items=items.concat((state.shifts||[]).map(sh=>({ev:sh,s:eventStart(sh),e2:eventEnd(sh),shift:true})));
  items=items.filter(x=>x.s);
  if(!items.length) return null;
  const now=Date.now();
  const onNow=items.filter(x=>x.s.getTime()<=now && x.e2.getTime()>now).sort((a,b)=>a.e2-b.e2)[0];
  if(onNow) return {ev:onNow.ev, status:"now", until:onNow.e2, shift:onNow.shift};
  const upcoming=items.filter(x=>x.s.getTime()>now).sort((a,b)=>a.s-b.s)[0];
  if(upcoming) return {ev:upcoming.ev, status:"soon", at:upcoming.s, mins:Math.round((upcoming.s.getTime()-now)/60000), shift:upcoming.shift};
  return null;
}
function untilText(mins){
  if(mins<1) return "any moment";
  if(mins<60) return `in ${mins} min`;
  const h=Math.floor(mins/60), m=mins%60;
  if(mins<24*60) return m? `in ${h}h ${m}m` : `in ${h}h`;
  const d=Math.round(mins/1440); return `in ${d} day${d>1?'s':''}`;
}
function next5am(from){ const d=new Date(from); const r=new Date(d); r.setHours(5,0,0,0); if(r<=d) r.setDate(r.getDate()+1); return r.getTime(); }
function toast(msg){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),1700);
}

/* ---- Auth (lightweight, friends-only) ---- */
async function signup(name, passcode, adminCode){
  name = name.trim();
  if(name.length<2) throw new Error("Please enter your name.");
  if(passcode.length<3) throw new Error("Passcode must be at least 3 characters.");
  const existing = await getDocs(query(colUsers, where("nameLower","==",name.toLowerCase())));
  if(!existing.empty) throw new Error("That name is taken — try logging in instead.");
  const isAdmin = adminCode && adminCode === ADMIN_CODE;
  const ref = await addDoc(colUsers, {
    name, nameLower:name.toLowerCase(), passcode, admin:!!isAdmin, createdAt:serverTimestamp()
  });
  localStorage.setItem("fp_uid", ref.id);
  localStorage.setItem("fp_user", JSON.stringify({ id:ref.id, name, admin:!!isAdmin, _realAdmin: (!TEST_MODE && !!isAdmin) }));
  return { id:ref.id, name, admin:!!isAdmin };
}
// Update the logged-in user's display name + colour. Name is tied to login, so guard against
// collisions and keep local storage / state in sync so the session stays valid.
async function saveProfile(newName, color){
  newName=newName.trim();
  if(!newName) throw new Error("Name can't be empty");
  const lower=newName.toLowerCase();
  if(lower !== state.user.name.toLowerCase()){
    const clash=await getDocs(query(colUsers, where("nameLower","==",lower)));
    if(!clash.empty && clash.docs.some(d=>d.id!==state.user.id)) throw new Error("That name's taken");
  }
  await setDoc(dref("users",state.user.id), { name:newName, nameLower:lower, color:color||null }, {merge:true});
  state.user.name=newName; state.user.color=color||null;
  // keep the cached login record current (login matches on name)
  const cached=JSON.parse(localStorage.getItem("fp_user")||"{}");
  localStorage.setItem("fp_user", JSON.stringify({...cached, id:state.user.id, name:newName, admin:state.user.admin}));
}
// ---- set ratings ----
function myRating(eventId){ const r=state.ratings.find(x=>x.id===state.user.id+"__"+eventId); return r?r.score:null; }
async function saveRating(eventId, score){
  await setDoc(dref("ratings", state.user.id+"__"+eventId), { userId:state.user.id, eventId, score, createdAt:serverTimestamp() }, {merge:true});
}
async function clearRating(eventId){ try{ await deleteDoc(dref("ratings", state.user.id+"__"+eventId)); }catch(e){} }
function eventRatingAgg(eventId){
  const rs=state.ratings.filter(x=>x.eventId===eventId);
  if(!rs.length) return null;
  return { avg: rs.reduce((a,b)=>a+b.score,0)/rs.length, count: rs.length };
}
// top-rated events across the crew (min 1 rating), for the faves board
function topRatedEvents(limit){
  const byEvent={};
  state.ratings.forEach(r=>{ (byEvent[r.eventId]=byEvent[r.eventId]||[]).push(r.score); });
  const rows=Object.entries(byEvent).map(([eid,scores])=>{
    const ev=state.events.find(e=>e.id===eid);
    return ev ? { ev, avg:scores.reduce((a,b)=>a+b,0)/scores.length, count:scores.length } : null;
  }).filter(Boolean).sort((a,b)=> b.avg-a.avg || b.count-a.count);
  return limit?rows.slice(0,limit):rows;
}
async function login(name, passcode){
  name = name.trim();
  const snap = await getDocs(query(colUsers, where("nameLower","==",name.toLowerCase())));
  if(snap.empty) throw new Error("No account with that name.");
  const d = snap.docs[0];
  if(d.data().passcode !== passcode) throw new Error("Wrong passcode.");
  localStorage.setItem("fp_uid", d.id);
  // Preserve _realAdmin across logins: only true when logging in via real mode AND the user is admin there.
  const isAdminNow = !!d.data().admin;
  const prevCache = JSON.parse(localStorage.getItem("fp_user")||"null");
  const realAdmin = TEST_MODE ? (prevCache && prevCache.id===d.id ? !!prevCache._realAdmin : false) : isAdminNow;
  localStorage.setItem("fp_user", JSON.stringify({ id:d.id, name:d.data().name, admin:isAdminNow, _realAdmin: realAdmin }));
  return { id:d.id, name:d.data().name, admin:isAdminNow };

// PWA: register the service worker (offline app shell + notifications) and watch for updates.
let _swReg=null, _swReloading=false;
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("./sw.js").then(reg=>{
      _swReg=reg;
      // If there's already a worker waiting (update downloaded on a previous visit), prompt now.
      if(reg.waiting && navigator.serviceWorker.controller) showUpdateBanner();
      // A new worker started installing — when it finishes and one's already controlling, it's an update.
      reg.addEventListener("updatefound", ()=>{
        const nw=reg.installing; if(!nw) return;
        nw.addEventListener("statechange", ()=>{
          if(nw.state==="installed" && navigator.serviceWorker.controller) showUpdateBanner();
        });
      });
    }).catch(()=>{});
    // When the new worker takes control (after the user taps Update), reload once to get the new build.
    navigator.serviceWorker.addEventListener("controllerchange", ()=>{
      if(_swReloading) return; _swReloading=true; location.reload();
    });
  });
  // Check for an update on launch and whenever the app regains focus (no battery-draining polling).
  const checkForUpdate=()=>{ if(_swReg) _swReg.update().catch(()=>{}); };
  document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) checkForUpdate(); });
  window.addEventListener("focus", checkForUpdate);
}
function showUpdateBanner(){
  if(document.getElementById("update-bar")) return;   // already showing
  const bar=document.createElement("div");
  bar.className="update-bar"; bar.id="update-bar";
  bar.innerHTML=`<span>A new version is ready.</span><button id="update-btn">Update now</button>`;
  document.body.appendChild(bar);
  document.getElementById("update-btn").onclick=()=>{
    const w=_swReg && _swReg.waiting;
    if(w){ bar.querySelector("span").textContent="Updating…"; w.postMessage({type:"skipWaiting"}); }
    else location.reload();   // fallback
  };
}

  // don't yank focus mid-typing (chat / search inputs)

// Gentle, dismissable nudge to rate a just-ended pick (only once per act, never forced).
let _ratingNudged = {};
function maybeRatingNudge(){
  if(!feat("ratings") || !state.user) return;
  if(document.querySelector(".modal-bg")) return;
  const now=Date.now();
  const ids=myPickIds();
  // a pick that ended in the last ~20 min, not yet rated, not yet nudged this session
  const cand=state.events.find(e=>{
    if(!ids.has(e.id)) return false;
    const end=eventEnd(e); if(!end) return false;
    const ago=now-end.getTime();
    return ago>0 && ago<20*60000 && myRating(e.id)==null && !_ratingNudged[e.id];
  });
  if(!cand) return;
  _ratingNudged[cand.id]=true;
  showRatingNudge(cand);
}

function afterData(){
  const savedUid = localStorage.getItem("fp_uid");
  if(savedUid && !state.user){
    if(!state.ready.users) return;       // wait for users to resolve identity
    const me = state.users.find(u=>u.id===savedUid);
    if(me){ state.user = {...me}; }
    else {
      // Don't log out over a transient/empty sync — fall back to the locally cached profile.
      let cached=null; try{ cached=JSON.parse(localStorage.getItem("fp_user")||"null"); }catch(e){}
      if(cached && cached.id===savedUid){ state.user = {...cached}; }
      else { localStorage.removeItem("fp_uid"); localStorage.removeItem("fp_user"); renderAuth(); return; }
    }
  }
  if(!state.user){ return; }              // auth screen handles its own render
  // Auto-elevate: if this user is admin in real mode (per their cached profile from real-mode signup/login)
  // but lands in test mode as a non-admin, mirror their admin status into test_users — once.
  if(TEST_MODE && state.user && !state.user.admin && !window._adminElevateChecked){
    window._adminElevateChecked = true;
    try{
      const cached = JSON.parse(localStorage.getItem("fp_user")||"null");
      // Only trust the cache if it's for the same person AND was last written by real-mode login (admin:true)
      if(cached && cached.id===state.user.id && cached.admin===true && cached._realAdmin===true){
        setDoc(dref("users", state.user.id), { admin:true }, {merge:true}).then(()=>{
          state.user = {...state.user, admin:true};
          toast("Admin restored in test mode");
          renderApp();
        }).catch(()=>{});
      }
    }catch(e){}
  }
  if(!find.packingSubbed){ find.packingSubbed=true; subscribeMyPacking(); }
  if(!allReady()){ root.innerHTML = loaderHTML(); return; }
  renderApp();
  maybeNotifyChanges(); scheduleNotifications();
  if(navigator.onLine) refreshWeather().then(()=>{ if(state.view==="home"&&!document.querySelector(".modal-bg")) renderView(); });
  restorePersistedToggles();
  maybeShowIntro();
}

function attendeeChips(goers){

function groupByDay(list){
  const m = {}; DAYS.forEach(d=>m[d]=[]);
  list.forEach(e=>{ if(!m[e.day]) m[e.day]=[]; m[e.day].push(e); });

/* ---------- HOME ---------- */
// "before" | "during" | "after" | "nodate"
function festivalPhase(){
  const base=festivalStart(); if(!base) return "nodate";
  const now=Date.now();
  const startMs=new Date(base); startMs.setHours(12,0,0,0);              // gates open ~ noon Wed
  const endMs=new Date(base); endMs.setDate(endMs.getDate()+DAYS.length-1); endMs.setHours(DAY_ROLLOVER_HOUR,0,0,0); endMs.setDate(endMs.getDate()+1); // ~6am after Sunday
  if(now < startMs.getTime()) return "before";
  if(now > endMs.getTime()) return "after";
  return "during";
}
function currentFestivalDay(){
  // which DAY name "now" belongs to, honouring the 6am rollover
  const base=festivalStart(); if(!base) return DAYS[0];
  const now=new Date();
  let idx=Math.round((new Date(now.getFullYear(),now.getMonth(),now.getDate()) - new Date(base.getFullYear(),base.getMonth(),base.getDate()))/86400000);
  if(now.getHours() < DAY_ROLLOVER_HOUR) idx-=1;   // early morning belongs to previous day
  return DAYS[Math.max(0,Math.min(DAYS.length-1,idx))];
}
function onNowEvents(){
  const now=Date.now();
  return state.events.map(e=>({e,s:eventStart(e),e2:eventEnd(e)})).filter(x=>x.s && x.s.getTime()<=now && x.e2.getTime()>now)
    .sort((a,b)=>a.e2-b.e2).map(x=>x.e);
}
function startingSoonEvents(mins){
  const now=Date.now(), horizon=now+mins*60000;
  return state.events.map(e=>({e,s:eventStart(e)})).filter(x=>x.s && x.s.getTime()>now && x.s.getTime()<=horizon)
    .sort((a,b)=>a.s-b.s).map(x=>x.e);
}
function unreadMentionCount(){
  if(!feat("chat")) return 0;
  const me=state.user.id;
  return state.messages.filter(m=>m.userId!==me && (m.createdAt&&m.createdAt.toMillis?m.createdAt.toMillis():0)>find.sessionStart && ((m.mentions&&m.mentions.includes(me))||messageMentionsMe(m.text||""))).length;
}
function changedPickCount(){
  if(!feat("alerts")) return 0;
  const ids=myPickIds();
  return state.events.filter(e=>ids.has(e.id)&&eventChanged(e)).length;
}

function viewHome(){
  const phase=festivalPhase();
  const fname=esc(state.structure.festivalName||"Festival");
  const hi=`<div class="home-hi"><div><div class="home-hello">Hi ${esc(state.user.name.split(/\s+/)[0])} </div><div class="home-fname">${fname}</div></div></div>`;

  if(phase==="before"||phase==="nodate"){
    return hi + homeBefore(phase);
  }
  if(phase==="after"){
    return hi + `<div class="home-card"><div class="hc-title">That's a wrap </div><div class="find-note">Hope it was magic. ${feat("recap")?'Your festival recap is in the menu.':'Thanks for using the planner!'}</div></div>`
      + homeQuickActions();
  }
  return hi + homeDuring();
}

function homeBefore(phase){
  const ids=myPickIds();
  const picks=state.events.filter(e=>ids.has(e.id));
  const daysPlanned=new Set(picks.map(e=>e.day));
  const noPlan=DAYS.filter(d=> state.events.some(e=>e.day===d) && !daysPlanned.has(d));
  let countdown="";
  if(phase==="before"){
    const base=festivalStart(); const startMs=new Date(base); startMs.setHours(12,0,0,0);
    const days=Math.ceil((startMs.getTime()-Date.now())/86400000);
    countdown=`<div class="home-count"><span class="hc-n">${days}</span> day${days!==1?'s':''} to go</div>`;
  } else {
    countdown=`<div class="home-count"><span class="hc-n">soon</span> set a start date in Manage for countdowns &amp; “up next”</div>`;
  }
  // packing progress
  let pack="";
  if(feat("packing")){
    const shared=(state.structure.packingItems||[]).length, mine=(state.myPacking.mine||[]).length;
    const total=shared+mine, done=(state.myPacking.checked||[]).length;
    if(total) pack=`<button class="home-card tappable" data-go="packing"><div class="hc-row"><div><div class="hc-title">Packing</div><div class="find-note">${done}/${total} packed</div></div><div class="hc-pct">${Math.round(done/total*100)}%</div></div><div class="pack-bar" style="margin-top:8px"><div class="pack-fill" style="width:${Math.round(done/total*100)}%"></div></div></button>`;
  }
  const planLine = picks.length
    ? `${picks.length} pick${picks.length>1?'s':''}${noPlan.length?` · nothing planned ${noPlan.length>1?'for '+noPlan.length+' days':'for '+noPlan[0]}`:` · all days covered `}`
    : `You haven't picked any acts yet`;
  return `${countdown}
    <button class="home-card tappable" data-go="browse"><div class="hc-row"><div><div class="hc-title">Your plan</div><div class="find-note">${planLine}</div></div><div class="hc-go">›</div></div></button>
    ${pack}
    ${feat("info")?`<button class="home-card tappable" data-go="info"><div class="hc-title">ℹ️ Festival info</div><div class="find-note">Travel, essentials &amp; emergency info</div></button>`:""}
    ${homeQuickActions()}`;
}

function homeDuring(){
  const cards=[];

  // 1) NOW / NEXT (personal up-next + what's on now across stages)
  const np = (feat("nextAct")&&festivalStart()) ? nextPickInfo() : null;
  let nextCard="";
  if(np){
    if(np.shift){
      const when=np.status==="now"?`On now · until ${esc(fmt12(np.ev.end||""))}`:`${untilText(np.mins)} · ${esc(fmt12(np.ev.start))}`;
      nextCard=`<div class="home-card accent"><div class="hc-tag">${np.status==="now"?"On shift now":"Your shift up next"}</div><div class="hc-big">${esc(np.ev.label||"Work shift")}</div><div class="hc-meta">${when}</div></div>`;
    } else {
      const walk = (locationEnabled()&&find.pos) ? walkLineFor(np.ev) : "";
      if(np.status==="now"){
        const when=`On now · until ${esc(fmt12(toHM(np.until)))}`;
        nextCard=`<div class="home-card accent"><div class="hc-tag">Happening now</div>
          <div class="hc-big">${esc(np.ev.title)}</div>
          <div class="hc-meta"><span class="area-tag" style="--c:${districtColor(np.ev.districtId)}">${esc(np.ev.districtName)}</span> ${esc(np.ev.stageName)} · ${when}${walk?` · ${walk}`:""}</div>
          ${(locationEnabled()&&stagesWithCoords().some(s=>s.name===np.ev.stageName))?`<button class="btn lime sm" data-goto-stage="${esc(np.ev.stageName)}" style="margin-top:10px">Point me there →</button>`:""}</div>`;
      } else {
        // departure-board style countdown to your next pick
        const h=Math.floor(np.mins/60), m=np.mins%60;
        const big = np.mins<60 ? `${np.mins}<small>min</small>` : `${h}<small>h</small> ${String(m).padStart(2,"0")}<small>m</small>`;
        const leaveSoon = walk && np.mins<=20;   // nudge if it's close and there's a walk
        nextCard=`<div class="depart-card">
          <div class="depart-head"><span class="depart-lbl">Starts in</span><span class="depart-at">${esc(fmt12(np.ev.start))}</span></div>
          <div class="depart-time">${big}</div>
          <div class="depart-act">${esc(np.ev.title)}</div>
          <div class="depart-meta"><span class="area-tag" style="--c:${districtColor(np.ev.districtId)}">${esc(np.ev.districtName)}</span> ${esc(np.ev.stageName)}${walk?` · ${walk}`:""}</div>
          ${leaveSoon?`<div class="depart-warn">Leave soon to make it</div>`:""}
          ${(locationEnabled()&&stagesWithCoords().some(s=>s.name===np.ev.stageName))?`<button class="btn lime sm" data-goto-stage="${esc(np.ev.stageName)}" style="margin-top:10px">Point me there →</button>`:""}
        </div>`;
      }
    }
  }
  cards.push(nextCard);

  // weather strip + clash resolver (both auto-hide when empty)
  cards.push(weatherCard());
  cards.push(clashCard(6));

  // 2) ON NOW across the festival (your areas/picks first feel: just show a few)
  const onNow=onNowEvents();
  if(onNow.length){
    const ids=myPickIds();
    const onnowTarget = (feat("onnow")&&festivalStart()) ? "onnow" : "browse";
    const rows=onNow.slice(0,6).map(e=>`<button class="onnow-row tappable" data-go="${onnowTarget}"><span class="area-tag" style="--c:${districtColor(e.districtId)}">${esc(e.stageName)}</span><span class="onnow-title">${esc(e.title)}${ids.has(e.id)?' <span class="onnow-mine">★</span>':''}</span><span class="onnow-end">til ${esc(fmt12(e.end||""))}</span></button>`).join("");
    cards.push(`<div class="home-card"><div class="hc-title">On now <span class="hc-count">${onNow.length}</span></div><div class="onnow-list">${rows}</div>${onNow.length>6?`<button class="link-btn" data-go="${onnowTarget}" style="margin-top:8px">see all ${onNow.length} →</button>`:""}</div>`);
  }

  // 3) ACTIVE RALLY CALLS
  if(feat("overlaps")){
    const calls=activeCalls();
    if(calls.length){
      const rows=calls.slice(0,3).map(c=>{
        const ins=(c.in||[]).length; const joined=(c.in||[]).includes(state.user.id); const mine=c.userId===state.user.id;
        return `<div class="call-row"><div class="call-main"><div class="call-title">${callText(c)}</div><div class="call-sub">${esc(c.name||'?')} · ${ins} in</div></div>${mine?'':`<button class="btn ${joined?'lime':'primary'} sm" data-joincall="${c.id}">${joined?'✓ In':'I’m in'}</button>`}</div>`;
      }).join("");
      cards.push(`<div class="home-card"><div class="hc-title">Rally calls <span class="live-mini">live</span></div><div class="call-list">${rows}</div><button class="link-btn" data-go="shared" style="margin-top:8px">go to group →</button></div>`);
    }
  }

  // 4) NEEDS ATTENTION (mentions, changed picks)
  const mentions=unreadMentionCount(), changed=changedPickCount();
  if(mentions||changed){
    const bits=[];
    if(mentions) bits.push(`<button class="attn-pill" data-go="chat">${mentions} mention${mentions>1?'s':''}</button>`);
    if(changed) bits.push(`<button class="attn-pill" data-go="mine">${changed} set time${changed>1?'s':''} changed</button>`);
    cards.push(`<div class="home-card"><div class="hc-title">Heads up</div><div class="attn-row">${bits.join("")}</div></div>`);
  }

  // 5) THE CREW (who's sharing, roughly where)
  if(locationEnabled()){
    const ppl=peopleWithCoords();
    if(ppl.length){
      const rows=ppl.slice(0,6).map(p=>{
        let where="sharing"; if(find.pos){ const nr=nearestStage(p.lat,p.lng); const d=haversine(find.pos.lat,find.pos.lng,p.lat,p.lng); where=(nr?("near "+nr.stage.name):fmtDist(d)+" away"); }
        return `<button class="crew-row tappable" data-go="find"><span class="mo-av" style="background:${personColor(p.id)}">${esc(initials(p.name))}</span><span class="crew-nm">${esc(p.name)}${p.lost?' ':''}</span><span class="crew-where">${esc(where)} · ${agoText(p.ts)}</span></button>`;
      }).join("");
      cards.push(`<div class="home-card"><div class="hc-title">Your crew <span class="hc-count">${ppl.length}</span></div><div class="crew-rows">${rows}</div></div>`);
    } else if(!find.share){
      cards.push(`<div class="home-card"><div class="hc-title">Find your crew</div><div class="find-note">Turn on location sharing so you can find each other.</div><button class="btn primary sm" data-go="find" style="margin-top:10px">Open Find →</button></div>`);
    }
  }

  // 6) TODAY'S REMAINING PICKS
  const today=currentFestivalDay();
  const ids=myPickIds(); const now=Date.now();
  const todayLeft=sortEvents(state.events.filter(e=>ids.has(e.id)&&e.day===today)).filter(e=>{ const s=eventStart(e); return s && s.getTime()>now-30*60000; });
  if(todayLeft.length){
    const rows=todayLeft.slice(0,5).map(e=>`<button class="today-row tappable" data-go="mine"><span class="today-time">${esc(fmt12(e.start))}</span><span class="today-title">${esc(e.title)}</span><span class="area-tag" style="--c:${districtColor(e.districtId)}">${esc(e.stageName)}</span></button>`).join("");

  cards.push(recsCard());

  cards.push(homeQuickActions());

  return cards.filter(Boolean).join("");
}

// acts your crew (or group) is seeing that you're free for and haven't picked
function setRecs(limit){
  if(!feat("recs")||!festivalStart()) return [];
  const me=state.user.id;
  const myIds=myPickIds();
  // who counts: crew if set & in crew mode-ish, else whole group (minus me)
  let peers = state.users.map(u=>u.id).filter(id=>id!==me);
  if(state.crew && state.crew.length) peers = peers.filter(id=>state.crew.includes(id));
  const peerSet=new Set(peers);
  // my busy intervals per day (picks + shifts) for "am I free" test
  const myBusy={};
  DAYS.forEach(d=>{ myBusy[d]=[]; });
  state.events.filter(e=>myIds.has(e.id)).forEach(e=>{ (myBusy[e.day]=myBusy[e.day]||[]).push(timeRangeMin(e)); });
  (state.shifts||[]).forEach(sh=>{ (myBusy[sh.day]=myBusy[sh.day]||[]).push(timeRangeMin({day:sh.day,start:sh.start,end:sh.end||addHour(sh.start)})); });
  const freeFor=e=>{ const [s,en]=timeRangeMin(e); return !(myBusy[e.day]||[]).some(([bs,be])=> s<be && bs<en); };
  // count peer picks per event
  const peerCount={};
  state.picks.forEach(p=>{ if(p.userId!==me && peerSet.has(p.userId)) peerCount[p.eventId]=(peerCount[p.eventId]||0)+1; });
  const now=Date.now();
  const recs=state.events.filter(e=>{
    if(myIds.has(e.id)) return false;                 // already going
    if(!peerCount[e.id]) return false;                // nobody's going
    const ss=eventStart(e); if(ss && ss.getTime()<now-30*60000) return false;  // already passed
    return freeFor(e);                                // you're free
  }).map(e=>({e, n:peerCount[e.id], who:state.picks.filter(p=>p.eventId===e.id && peerSet.has(p.userId)).map(p=>{const u=state.users.find(x=>x.id===p.userId);return u?u.name:"?";})}))
    .sort((a,b)=> b.n-a.n || (eventStart(a.e)?.getTime()||0)-(eventStart(b.e)?.getTime()||0));
  return limit?recs.slice(0,limit):recs;
}

function festivalCoords(){
  // average of pinned stages, else fall back to the device's current GPS position
  const ss=stagesWithCoords();
  if(ss.length) return { lat: ss.reduce((a,s)=>a+s.lat,0)/ss.length, lng: ss.reduce((a,s)=>a+s.lng,0)/ss.length };
  if(find.pos) return { lat:find.pos.lat, lng:find.pos.lng };   // before stages are pinned, use where you are
  return null;
}
// daylight from lat/long + date — pure math, works offline
function sunTimes(date,lat,lng){
  const rad=Math.PI/180;
  const dayMs=86400000, J1970=2440588, J2000=2451545;
  const toJulian=d=>d.valueOf()/dayMs-0.5+J1970;
  const toDays=d=>toJulian(d)-J2000;
  const e=rad*23.4397;
  const M=rad*(357.5291+0.98560028*toDays(date));
  const C=rad*(1.9148*Math.sin(M)+0.02*Math.sin(2*M)+0.0003*Math.sin(3*M));
  const L=M+C+rad*102.9372+Math.PI;
  const dec=Math.asin(Math.sin(0)*Math.cos(e)+Math.cos(0)*Math.sin(e)*Math.sin(L));
  const lw=rad*-lng;
  const n=Math.round(toDays(date)-0.0009-lw/(2*Math.PI));
  const ds=0.0009+lw/(2*Math.PI)+n;
  const Ms=rad*(357.5291+0.98560028*(ds+ (J2000-J2000)));
  // simpler: use approximate transit
  const Jtransit=J2000+ds+0.0053*Math.sin(M)-0.0069*Math.sin(2*(M+C+rad*102.9372+Math.PI));
  const h0=(-0.83)*rad;
  const w0=Math.acos((Math.sin(h0)-Math.sin(rad*lat)*Math.sin(dec))/(Math.cos(rad*lat)*Math.cos(dec)));
  if(isNaN(w0)) return null;
  const Jset=Jtransit+ (w0/(2*Math.PI));
  const Jrise=Jtransit-(w0/(2*Math.PI));
  const fromJulian=j=>new Date((j+0.5-J1970)*dayMs);
  return { sunrise:fromJulian(Jrise), sunset:fromJulian(Jset) };
}

async function refreshWeather(){
