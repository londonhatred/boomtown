  return ["straight ahead","ahead & right","to your right","behind-right","behind you","behind-left","to your left","ahead & left"][i];
}
function stagesWithCoords(){
  const out=[];
  state.structure.districts.forEach(d=>(d.stages||[]).forEach(s=>{
    if(typeof s.lat==="number" && typeof s.lng==="number")
      out.push({id:s.id,name:s.name,sub:d.name,color:districtColor(d.id),lat:s.lat,lng:s.lng});
  }));

/* ============================================================
   WALK-TIME LEARNING
   Seed routes (admin-walked) + crowdsourced legs from movement,
   median-based, with straight-line fallback. Stored as derived
   leg samples only — no long-term raw GPS trails.
   ============================================================ */
const STAGE_RADIUS = 35;        // metres: default "you're at this stage" (side stages / unsized)
const HERE_RADIUS = 15;         // metres: close enough to show "HERE" instead of a jittery small distance
const WALK_MPS_FALLBACK = 1.15; // ~4.1 km/h walking, padded for crowds
const DETOUR_FACTOR = 1.35;     // straight-line → real path padding
const MIN_LEG_SEC = 40, MAX_LEG_SEC = 60*60;       // sanity bounds
const MAX_LEG_SPEED = 3.0;      // m/s; faster = probably a vehicle/GPS jump, discard
let trip = null;                 // {fromStage, startT, lastPt, lastT, dist}

// A stage's "you're here" radius. Main stages store a measured radius (from two-corner pinning);
// side stages may store a nudged size; everything else falls back to the default.
function stageRadius(st){
  if(st && typeof st.radius==="number" && st.radius>0) return st.radius;
  return STAGE_RADIUS;
}
function nearestStage(lat,lng){
  // Pick the stage whose own radius you're inside; if several, the nearest centre wins.
  let best=null, bd=Infinity;
  stagesWithCoords().forEach(s=>{
    const d=haversine(lat,lng,s.lat,s.lng);
    if(d<=stageRadius(s) && d<bd){ bd=d; best=s; }
  });
  return best ? {stage:best, dist:bd} : null;
}
function trackTrip(pos, acc){
  if(!feat("overlaps")&&!locationEnabled()) return;   // tie to location features
  if(acc && acc>60) return;                            // ignore very fuzzy fixes
  const now=Date.now(); const here=nearestStage(pos.lat,pos.lng);
  if(!trip){
    if(here) trip={fromStage:here.stage.id, startT:now, lastPt:pos, lastT:now, dist:0};
    return;
  }
  // accumulate path distance with a plausible-speed filter
  const seg=haversine(trip.lastPt.lat,trip.lastPt.lng,pos.lat,pos.lng);
  const dt=(now-trip.lastT)/1000;
  if(dt>0 && seg/dt <= MAX_LEG_SPEED){ trip.dist+=seg; }
  trip.lastPt=pos; trip.lastT=now;
  // arrived at a different stage? record the leg.
  if(here && here.stage.id!==trip.fromStage){
    const sec=Math.round((now-trip.startT)/1000);
    if(sec>=MIN_LEG_SEC && sec<=MAX_LEG_SEC && trip.dist>10){
      recordLeg(trip.fromStage, here.stage.id, sec, Math.round(trip.dist));
    }
    trip={fromStage:here.stage.id, startT:now, lastPt:pos, lastT:now, dist:0}; // chain onward
  }
}
const legKey=(a,b)=> a<b ? a+"__"+b : b+"__"+a;   // undirected pair
// ---- Route congestion: cross-reference recent walk times across everyone vs the route's baseline ----
// A single slow walker is ambiguous; several slow walkers on the same route right now is congestion.
const CONGESTION_RECENT_MS = 45*60*1000;   // "recent" window
function routeCongestion(){
  if(!adminFeat("pacer")) return [];
  if(!state.legs || !state.legs.length) return [];
  const now=Date.now();
  const byPair={};
  state.legs.forEach(l=>{
    if(!l.pair || !l.sec) return;
    const ts = (typeof l.tms==="number") ? l.tms : (l.at && l.at.toMillis ? l.at.toMillis() : null);
    if(!byPair[l.pair]) byPair[l.pair]={all:[], recent:[], walkers:new Set()};
    byPair[l.pair].all.push(l.sec);
    if(ts && now-ts <= CONGESTION_RECENT_MS){ byPair[l.pair].recent.push(l.sec); byPair[l.pair].walkers.add(l.by||"?"); }
  });
  const out=[];
  Object.entries(byPair).forEach(([pair,g])=>{
    if(g.recent.length<1 || g.all.length<2) return;
    const baseline=median(g.all), recent=median(g.recent);
    if(!baseline || !recent) return;
    const ratio=recent/baseline;
    const walkers=g.walkers.size;
    // Honesty gate: need either 2+ recent walkers, OR one walker who's dramatically slower.
    const trustworthy = walkers>=2 || ratio>=1.6;
    if(!trustworthy) return;
    if(ratio < 1.25) return;                       // not meaningfully slower
    const [a,b]=pair.split("__");
    const sa=stagesWithCoords().find(s=>s.id===a), sb=stagesWithCoords().find(s=>s.id===b);
    if(!sa||!sb) return;                            // need named stages
    out.push({
      pair, a:sa, b:sb, ratio, walkers,
      baselineMin:Math.round(baseline/60), recentMin:Math.round(recent/60),
      level: ratio>=1.5 ? "slow" : "busy"
    });
  });
  return out.sort((x,y)=> y.ratio-x.ratio);
}
function congestionForRoute(aId,bId){
  const key=legKey(aId,bId);
  return routeCongestion().find(r=>r.pair===key) || null;
}
// ---- Pace tracker: today's walk legs vs your historical baseline ----
async function recordLeg(a,b,sec,dist){
  try{ await addDoc(colLegs, { pair:legKey(a,b), sec, dist, by:state.user.id, at:serverTimestamp() }); }catch(e){}
}
function paceToday(){
  if(!adminFeat("pacer") || !state.user) return null;
  if(!state.legs || state.legs.length<4) return null;
  const todayStart = (()=>{ const d=new Date(); d.setHours(DAY_ROLLOVER_HOUR,0,0,0); return d.getTime(); })();
  const mine = state.legs.filter(l=>l.by===state.user.id && l.at && l.at.toMillis);
  if(mine.length<4) return null;
  // Group by pair: collect today's samples vs historical
  const byPair={};
  mine.forEach(l=>{
    const ts=l.at.toMillis();
    const p=l.pair;
    if(!byPair[p]) byPair[p]={today:[], hist:[]};
    if(ts>=todayStart) byPair[p].today.push(l.sec); else byPair[p].hist.push(l.sec);
  });
  const ratios=[];
  Object.values(byPair).forEach(g=>{
    if(!g.today.length || !g.hist.length) return;
    const t=median(g.today), h=median(g.hist);
    if(t && h) ratios.push(t/h);
  });
  if(ratios.length<2) return null;       // need pairs to average
  const avg=ratios.reduce((a,b)=>a+b,0)/ratios.length;
  return { ratio:avg, pairsSeen:ratios.length };
}
function paceCard(){
  const p=paceToday(); if(!p) return "";
  if(p.ratio<=1.05) return "";           // not slower in any meaningful way
  const pct=Math.round((p.ratio-1)*100);
  if(pct<10) return "";                  // sub-noise; ignore
  // If routes are congested for others too, it's probably not you — say so honestly.
  const congested = routeCongestion().length;
  if(congested){
    return `<div class="home-card pace-card">
      <div class="hc-title">🚶 Slow going</div>
      <p style="font-size:13.5px;line-height:1.45;margin:6px 0 0">You're about <b>${pct}% slower</b> than usual — but ${congested>1?`${congested} routes look`:"a route looks"} busy for everyone right now, so it's likely crowds, not you. <button class="link-btn" data-go="traffic">See traffic →</button></p>
    </div>`;
  }
  return `<div class="home-card pace-card">
    <div class="hc-title">🐢 Heads up</div>
    <p style="font-size:13.5px;line-height:1.45;margin:6px 0 0">You're moving about <b>${pct}% slower</b> than your usual pace today (across ${p.pairsSeen} stretches). Body might be asking for a sit-down.</p>
  </div>`;
}
// admin "walk this route now" — records a high-trust seed leg from the timed walk
async function recordSeedLeg(a,b,sec,dist){
  try{ await addDoc(colLegs, { pair:legKey(a,b), sec, dist, by:state.user.id, seed:true, at:serverTimestamp() }); }catch(e){}
}

function median(arr){ if(!arr.length) return null; const s=[...arr].sort((x,y)=>x-y); const m=Math.floor(s.length/2); return s.length%2?s[m]:(s[m-1]+s[m])/2; }
// walk seconds between two stage ids: measured median if we have it, else straight-line estimate
function walkSeconds(aId,bId){
  if(aId===bId) return 0;
  const key=legKey(aId,bId);
  const samples=state.legs.filter(l=>l.pair===key);
  if(samples.length){
    // weight seeds a bit by counting them twice
    const times=[]; samples.forEach(l=>{ times.push(l.sec); if(l.seed) times.push(l.sec); });
    const med=median(times); if(med) return med;
  }
  // fallback: straight-line × detour ÷ walking speed
  const A=stagesWithCoords().find(s=>s.id===aId), B=stagesWithCoords().find(s=>s.id===bId);
  if(!A||!B) return null;
  const d=haversine(A.lat,A.lng,B.lat,B.lng)*DETOUR_FACTOR;
  return Math.round(d/WALK_MPS_FALLBACK);
}
function walkSecondsFromPos(pos,bId){
  // distance from a free GPS point to a target stage (used for leave-now / clash when located but not at a stage)
  const B=stagesWithCoords().find(s=>s.id===bId); if(!B||!pos) return null;
  const here=nearestStage(pos.lat,pos.lng);
  if(here) return walkSeconds(here.stage.id,bId);
  const d=haversine(pos.lat,pos.lng,B.lat,B.lng)*DETOUR_FACTOR;
  return Math.round(d/WALK_MPS_FALLBACK);
}
function fmtWalk(sec){ if(sec==null) return ""; const m=Math.max(1,Math.round(sec/60)); return "~"+m+" min walk"; }
// stages with a walk-time from the user's current position, nearest-first
function walkTimesFromHere(limit){
  if(!locationEnabled() || !find.pos) return [];
  const out=stagesWithCoords().map(s=>{
    const sec=walkSecondsFromPos(find.pos, s.id);
    const dist=haversine(find.pos.lat, find.pos.lng, s.lat, s.lng);
    return { stage:s, sec:(sec==null?Infinity:sec), dist };
  }).filter(x=>isFinite(x.sec)).sort((a,b)=>a.sec-b.sec);
  return limit?out.slice(0,limit):out;
}
function walkTimesCard(limit, title){
  const list=walkTimesFromHere(limit);
  if(!list.length) return "";
  const rows=list.map(x=>{
    const here = x.dist!=null && x.dist<=HERE_RADIUS;
    return `<button class="wt-row tappable" data-goto-stage="${esc(x.stage.name)}"><span class="wt-dot" style="background:${x.stage.color}"></span><span class="wt-name">${esc(x.stage.name)}</span><span class="wt-time${here?' here':''}">${here?"HERE":fmtWalk(x.sec).replace(" walk","")}</span></button>`;
  }).join("");
  return `<div class="home-card"><div class="hc-title">${title||"Walk times from here"}</div><div class="wt-list">${rows}</div></div>`;
}
async function clearWalkData(){
  const snap=await getDocs(colLegs);
  const ids=snap.docs.map(d=>d.id);
  for(let i=0;i<ids.length;i+=20){ await Promise.all(ids.slice(i,i+20).map(id=>deleteDoc(dref("legs",id)))); }
  await saveStructure({...state.structure, walkReset:Date.now()});
}
// ============================================================
//  TEST MODE sandbox — generate a believable festival & wipe it.
//  In test mode all collections are already prefixed (test_), so these
//  writes/deletes only ever touch the sandbox, never real data.
// ============================================================
// Step 1: create the test STAGES only (the "map") — no acts. Preserves existing pins/coords if re-run.
async function createTestStages(){
  if(!TEST_MODE) return;
  const now=new Date();
  // Anchor the festival day so that NOW reliably reads as "during" (the phase gate opens at noon).
  // Only set the date if we don't already have one (don't clobber a custom setup).
  const anchor=new Date(now);
  if(now.getHours() < 12) anchor.setDate(anchor.getDate()-1);
  const ymd= state.structure.festivalStartDate || `${anchor.getFullYear()}-${String(anchor.getMonth()+1).padStart(2,"0")}-${String(anchor.getDate()).padStart(2,"0")}`;
  // placeholder stage map — only the ones not already present get added
  const defaults=[
    {id:"t_main", name:"Main Field",  stages:[{id:"t_s1",name:"Main Stage"}]},
    {id:"t_woods",name:"The Woods",   stages:[{id:"t_s2",name:"Forest Clearing"}]},
    {id:"t_barn", name:"The Barn",    stages:[{id:"t_s3",name:"Barn Stage"}]},
    {id:"t_tent", name:"Big Top",     stages:[{id:"t_s4",name:"Circus Tent"}]},
  ];
  // Start from existing districts (custom ones the user built), preserve their coords.
  const districts = (state.structure.districts||[]).map(d=>({...d, stages:(d.stages||[]).map(st=>({...st}))}));
  const existingDistrictIds = new Set(districts.map(d=>d.id));
  // Append any placeholder district that isn't already there (by id)
  defaults.forEach(d=>{ if(!existingDistrictIds.has(d.id)) districts.push({...d, stages:d.stages.map(st=>({...st}))}); });
  await saveStructure({
    ...state.structure,
    festivalName: state.structure.festivalName || "Test Festival",
    districts, festivalStartDate:ymd,
    features:state.structure.features||{}, adminFeatures:state.structure.adminFeatures||{},
    autoStopHours: state.structure.autoStopHours||4
  });
}
// Test-mode pin generator: scatters realistic-feeling stage pins around a fixed centre.
// Site model: 560m radius circle → ~1.1km diameter straight-line, ~1.5km walked with the app's
// existing 1.35× detour factor → ~25 min end-to-end at crowd-padded pace. Matches felt experience.
// Districts go into 2–3 random clusters; stages within a district cluster around its centre.
// Main-tagged stages get both corners pinned synthetically so they "just work" via the v53 path.
// Test-mode: shift the festival's start date so a chosen day lands on "today". Time-of-day follows
// real wall-clock. Also re-stamps sim ratings (simAt) against the new event end times so the picked
// day looks plausibly in-progress (anything that ended pre-now becomes visible via the v57 time gate).
async function simulateFestivalDay(dayName){
  if(!TEST_MODE) return;
  const idx = DAYS.indexOf(dayName);
  if(idx<0) throw new Error("bad-day");
  // Today's local date as YYYY-MM-DD, then subtract idx days so adding idx back lands on today.
  const today = new Date();
  today.setHours(0,0,0,0);
  const newStart = new Date(today);
  newStart.setDate(newStart.getDate() - idx);
  const ymd = `${newStart.getFullYear()}-${String(newStart.getMonth()+1).padStart(2,"0")}-${String(newStart.getDate()).padStart(2,"0")}`;
  await saveStructure({...state.structure, festivalStartDate: ymd});
  // Wait one tick so state.structure reflects the new date before we use eventEnd().
  await new Promise(r=>setTimeout(r,50));
  // Re-stamp sim ratings: for every existing rating on a sim user, recompute simAt from the event's
  // new end time. Ratings whose new simAt is in the past will reveal immediately via the time-gate.
  const sims = state.users.filter(u=>u.sim).map(u=>u.id);
  const simSet = new Set(sims);
  const updates = [];
  state._allRatings.forEach(r=>{
    if(!simSet.has(r.userId)) return;             // only re-stamp sim ratings, leave real users alone
    const ev = state.events.find(e=>e.id===r.eventId);
    if(!ev) return;
    const end = eventEnd(ev); if(!end) return;
    const offsetMs = (typeof r.simAt==="number" && typeof r._origEnd==="number")
      ? (r.simAt - r._origEnd)
      : (2 + Math.floor(Math.random()*8))*60000;  // 2–10 min after end if we lost the original offset
    const newSimAt = end.getTime() + offsetMs;
    updates.push({id:r.id, simAt:newSimAt});
  });
  // Batch the writes (cap concurrency)
  for(let i=0;i<updates.length;i+=20){
    await Promise.all(updates.slice(i,i+20).map(u=>setDoc(dref("ratings",u.id), { simAt:u.simAt }, {merge:true})));
  }
  // applyRatingTimeGate runs on the next minute tick anyway, but force it now so the UI updates immediately.
  applyRatingTimeGate();
}
// Test-mode pin generator: scatters realistic-feeling stage pins around a fixed centre.
async function generateTestStagePins(){
  if(!TEST_MODE) return;
  const SITE_RADIUS = 560;          // metres from centre to outer ring
  const CLUSTER_OFFSET_MIN = 350;   // each cluster centre this far+ from site centre
  const CLUSTER_OFFSET_MAX = 560;   // and no further than this (so clusters can sit on opposite sides)
  const DIST_JITTER = 100;          // district centre this far from its cluster centre
  const STAGE_SPREAD = 45;          // stages within ~this many metres of district centre
  const STAGE_JITTER = 22;          // small random nudge so stages don't sit exactly on each other
  const MAIN_SPAN_MIN = 60;         // metres between the two corners of a main stage
  const MAIN_SPAN_MAX = 110;

  // Need a centre. Use stored testCenter if it exists (preserves walk-time learning across re-shuffles).
  // Otherwise grab current GPS and store it.
  let centre = state.structure.testCenter;
  if(!centre || typeof centre.lat!=="number"){
    if(!navigator.geolocation) throw new Error("no-geo");
    centre = await new Promise((resolve,reject)=>{
      navigator.geolocation.getCurrentPosition(
        pos=>resolve({lat:+pos.coords.latitude.toFixed(6), lng:+pos.coords.longitude.toFixed(6)}),
        err=>reject(new Error(err.code===1?"location-blocked":"no-fix")),
        {enableHighAccuracy:true,timeout:12000,maximumAge:0}
      );
    });
  }
  // Helper: offset a {lat,lng} by metres on a bearing (0=N, 90=E)
  const offsetLatLng = (lat,lng, metres, bearingRad) => {
    const R = 6378137;                                  // earth radius m
    const dLat = (metres * Math.cos(bearingRad)) / R;
    const dLng = (metres * Math.sin(bearingRad)) / (R * Math.cos(lat*Math.PI/180));
    return { lat: +(lat + dLat*180/Math.PI).toFixed(6), lng: +(lng + dLng*180/Math.PI).toFixed(6) };
  };
  const rand=(a,b)=> a + Math.random()*(b-a);
  const rng = ()=> Math.random();

  // Pick how many clusters (2 or 3) and place each cluster centre at a random bearing from the site centre.
  // Bearings are fully random so two clusters can naturally land on opposite sides, giving a real end-to-end span.
  // After placing each, light "repulsion" from previously-placed clusters keeps them from overlapping.
  const districts = (state.structure.districts||[]);
  if(!districts.length) throw new Error("no-districts");
  const clusterCount = Math.min(3, Math.max(2, Math.round(districts.length/4)));
  const clusterCentres = [];
  for(let c=0;c<clusterCount;c++){
    let best=null, bestSep=-1;
    // try 6 candidate bearings, pick the one most separated from existing clusters (simple repulsion)
    for(let tries=0; tries<6; tries++){
      const bearing = rng()*2*Math.PI;
      const dist    = rand(CLUSTER_OFFSET_MIN, CLUSTER_OFFSET_MAX);
      const pt = offsetLatLng(centre.lat, centre.lng, dist, bearing);
      const minSep = clusterCentres.reduce((m,p)=>{
        const d = haversine(pt.lat, pt.lng, p.lat, p.lng);
        return d<m?d:m;
      }, Infinity);
      if(minSep > bestSep){ bestSep=minSep; best=pt; }
    }
    clusterCentres.push(best);
  }
  // Assign each district to a random cluster, then place its centre near that cluster.
  // Place stages clustered around the district centre. Main stages get c1/c2 corners.
  const newDistricts = districts.map(d=>{
    const cc = clusterCentres[Math.floor(rng()*clusterCentres.length)];
    const distBearing = rng()*2*Math.PI;
    const distOffset  = rand(0, DIST_JITTER);
    const dCentre = offsetLatLng(cc.lat, cc.lng, distOffset, distBearing);

    const stages = (d.stages||[]).map(st=>{
      const sBearing = rng()*2*Math.PI;
      const sOffset  = rand(0, STAGE_SPREAD) + (rng()-0.5)*STAGE_JITTER;
      const sCentre  = offsetLatLng(dCentre.lat, dCentre.lng, Math.abs(sOffset), sBearing);
      // Strip any existing pin/corner data first (full regenerate, not merge).
      const {lat,lng,radius,c1lat,c1lng,c2lat,c2lng, ...rest}=st;
      const ns = {...rest, lat:sCentre.lat, lng:sCentre.lng};
      // Main stages: drop two corners so the stage gets a measured radius via the existing v53 code path.
      if(st.type==="main"){
        const span = rand(MAIN_SPAN_MIN, MAIN_SPAN_MAX);
        const ang  = rng()*2*Math.PI;
        const c1 = offsetLatLng(sCentre.lat, sCentre.lng, span/2, ang);
        const c2 = offsetLatLng(sCentre.lat, sCentre.lng, span/2, ang+Math.PI);
        ns.c1lat=c1.lat; ns.c1lng=c1.lng;
        ns.c2lat=c2.lat; ns.c2lng=c2.lng;
        ns.radius=Math.max(STAGE_RADIUS, Math.round(span/2 + 10));
      }
      return ns;
    });
    return {...d, stages};
  });
  await saveStructure({...state.structure, districts:newDistricts, testCenter:centre});
}
// Step 2: generate the LINEUP onto the existing test stages. Wipes only events, keeps stages/pins/walk-data.
async function generateTestLineup(){
  if(!TEST_MODE) return;
  // need stages first
  const stages=[];

  if(!stages.length) throw new Error("no-stages");

  for(let i=0;i<rids.length;i+=20){ await Promise.all(rids.slice(i,i+20).map(id=>deleteDoc(dref("ratings",id)))); }
  const cpsnap=await getDocs(colCopresence); const cpids=cpsnap.docs.map(d=>d.id);
  for(let i=0;i<cpids.length;i+=20){ await Promise.all(cpids.slice(i,i+20).map(id=>deleteDoc(dref("copresence",id)))); }
  const day=currentFestivalDay();   // tag acts to the day "now" resolves to (matches the date anchor)
  // Anchor the window to a clean quarter-hour ~30 min ago, so every act (base + a 15-min multiple)
  // lands neatly on :00/:15/:30/:45 — like a real festival programme. Something's already "on now".
  const QUARTER=15*60000;
  const base=Math.floor((Date.now()-30*60000)/QUARTER)*QUARTER;
  const at=o=>toHM(new Date(base+o*60000));
  const ACTS=[
    // band-style
    "Aurora Skies","Midnight Caller","The Velvet Drop","Echo & Pulse","Glass Animals Jr","Sunbeam Collective",
    "Bass Theory","Northern Lights","Paper Tigers","The Lowlands","Disco Volante","Neon Forest","Wild Honey",
    "Tidal","Crooked Teeth","Lunar Tide","Brass Monkey","The Haxans","Solar Flare","Cosmic Dust",
    "Riptide","Golden Hour","Static Bloom","Moth & Moon","Deep End","The Foxgloves","Velvet Sky","Iron Bloom",
    "Sable & Sons","The Quiet Hours","Marigold","Pulsewidth","Honeytrap","The Wandering","Cinder","Low Country",
    "Saltwater","Ember & Oak","Night Bus","The Reverie","Wax Lyrical","Dust Devils","Slow Tide","Kingfisher",
    "The Gloaming","Copper Wren","Fathom","Tin Soldiers","Hidden Hand","Wildflower","The Paper Kites Jr",
    "Smoke & Mirrors","The Brass Tacks","Coral Throne","Black Velvet","The Wax Birds","Rust & Bone",
    "Silver Linings","The Tall Grass","Moonshine Revival","Fox & Feather","The Drowned World","Amber Run Jr",
    "The Loose Ends","Painted Wolves","Sea Change","The Wild Roots","Echo Chamber","Hollow Bones",
    "The Night Porters","Glasshouse","Tin Pan Alley","The Slow Burn","Driftwood","The Hinterland",
    // solo-style
    "Sol Marin","Vera Wilde","Otis Grey","Lola Ferreira","Cass Holloway","Dré Saint","June Hartley","Milo Vance",
    "Saffron Boyd","Theo Marsh","Indra Bell","Rufus Crane","Nadia Voss","Eli Sundberg","Margo Tate","Kit Ferris",
    "Anais Roux","Bobby Slade","Esme Lindqvist","Ravi Mistry",
    // DJ-style
    "DJ Halcyon","Velour","Subsonic","Mira Glow","Tunnel Vision","Late Reply","Acid Rain","DJ Marrow",
    "Loop Theory","Nightshift","Patchwork","DJ Tidewater","Glint","Overtone","Submerge","DJ Foxglove",
    "Bassline Betty","Modulate","DJ Castaway","Phase Lock","Halftone","DJ Wildfire","Crosswire","Lowtide Sound",
    "Vinyl Frontier","DJ Petrichor","Sundown Sound","Polyrhythm","DJ Cinder","Afterglow"
  ];
  // Shuffle the pool so each generation feels fresh, and so the first acts aren't always the same.
  const pool=[...ACTS];
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  let ai=0; const ev=[];
  const nextName=()=>{
    // Wrap around if we somehow exhaust the pool (many stages × long window). Append a numeral on wrap
    // so we never show a literal duplicate name in the same generation.
    const base=pool[ai % pool.length];
    const wrap=Math.floor(ai/pool.length);
    ai++;
    return wrap>0 ? `${base} ${["II","III","IV","V"][wrap-1]||("#"+(wrap+1))}` : base;
  };
  stages.forEach((s,si)=>{
    // First act on the first 3 stages all START at the same clean boundary (minute 15) → a genuine
    // cross-stage clash the planner can route between. Other stages stagger in 15-min steps.
    let t = si<3 ? 15 : si*15;
    const windowEnd=600;                                   // 10-hour window
    // Lengths weighted to mirror the real Boomtown distribution from the live CSV:
    // 60min ≈ 60%, 90min ≈ 20%, then 45, 75, 120, 30 — heavy on the clean hour/90.
    const LENS=[60,60,60,60,60,60,90,90,90,45,75,30,120];
    // Gaps mirror reality too: half of acts back-to-back, half with a 30-min changeover, occasional 15.
    const GAPS=[0,0,0,0,0,30,30,30,30,15];
    while(t<windowEnd){
      const len=LENS[Math.floor(Math.random()*LENS.length)];
      ev.push({ districtId:s.d.id, districtName:s.d.name, stageId:s.st.id, stageName:s.st.name, day, start:at(t), end:at(t+len), title:nextName(), notes:"" });
      t+=len+GAPS[Math.floor(Math.random()*GAPS.length)];  // next act on THIS stage starts after this one ends, still on a boundary
    }
  });
  // (no extra overlay — each stage runs its own sequential chain, so there is never
  //  more than one act on the same stage at once; clashes only ever occur across stages.)
  for(const e of ev){ await addDoc(colEvents, {...e, createdAt:serverTimestamp()}); }
}
// Test-only: populate fake crew activity so social features can be seen without other phones.
async function simulateCrew(){
  if(!TEST_MODE) return;
  // Clear any prior simulated crew so repeated runs don't pile up.
  try{
    const usnap=await getDocs(colUsers);
    const oldSim=usnap.docs.filter(d=>d.data().sim===true).map(d=>d.id);
    for(const uid of oldSim){
      await deleteDoc(dref("users",uid)).catch(()=>{});
      for(const col of [colPicks, colRatings, colSafety]){
        const snap=await getDocs(col);
        const mine=snap.docs.filter(d=>d.id.startsWith(uid+"__")).map(d=>d.id);
        for(let i=0;i<mine.length;i+=20){ await Promise.all(mine.slice(i,i+20).map(id=>deleteDoc(doc(col,id)))); }
      }
    }
    // clear sim co-presence (by sim users)
    const cpsnap=await getDocs(colCopresence);
    const oldCp=cpsnap.docs.filter(d=>String(d.data().by||"").startsWith("sim_")).map(d=>d.id);
    for(let i=0;i<oldCp.length;i+=20){ await Promise.all(oldCp.slice(i,i+20).map(id=>deleteDoc(dref("copresence",id)))); }
    // clear sim walk legs (sim_hist_/sim_now_ walkers)
    const lsnap=await getDocs(colLegs);
    const oldLegs=lsnap.docs.filter(d=>String(d.data().by||"").startsWith("sim_")).map(d=>d.id);
    for(let i=0;i<oldLegs.length;i+=20){ await Promise.all(oldLegs.slice(i,i+20).map(id=>deleteDoc(dref("legs",id)))); }
    // clear meetup votes belonging to deleted/sim users (orphan cleanup).
    // Real-user votes survive; only votes whose userId no longer exists in users get cleared.
    const usnap2=await getDocs(colUsers);
    const liveUserIds=new Set(usnap2.docs.map(d=>d.id));
    const mvsnap=await getDocs(colMeetVotes);
    const orphanVotes=mvsnap.docs.filter(d=>!liveUserIds.has(d.data().userId)).map(d=>d.id);
    for(let i=0;i<orphanVotes.length;i+=20){ await Promise.all(orphanVotes.slice(i,i+20).map(id=>deleteDoc(dref("meetvotes",id)))); }
  }catch(e){}

  const NAMES=["Sam","Jo","Mira","Theo","Nadia","Ravi","Esme","Cass","Otis","Lola","Kit","June","Milo","Vera","Dré"];
  const TAGS=["vibe","sound","crowd","surprise","dancing"];
  const esnap=await getDocs(colEvents);
  const events=esnap.docs.map(d=>({id:d.id, ...d.data()})).filter(e=>eventStart(e)&&eventEnd(e));
  if(!events.length) throw new Error("no-events");
  const day=currentFestivalDay();
  const todays = events.filter(e=>!day || e.day===day).sort((a,b)=>eventStart(a)-eventStart(b));
  if(!todays.length) throw new Error("no-events");
  const stagesMap = {};
  stagesWithCoords().forEach(s=>stagesMap[s.name]=s);
  const pick=(arr,n)=>{ const c=[...arr]; const out=[]; while(c.length&&out.length<n){ out.push(c.splice(Math.floor(Math.random()*c.length),1)[0]); } return out; };

  for(let i=0;i<NAMES.length;i++){
    const uid="sim_"+i+"_"+Math.random().toString(36).slice(2,7);
    // Build an ITINERARY: a non-overlapping chain of acts across the day this friend "attends".
    // Greedy walk through the day picking ~60-70% of slots, skipping overlaps.
    const itinerary=[];
    let lastEnd=0;
    todays.forEach(e=>{
      const st=eventStart(e).getTime(), en=eventEnd(e).getTime();
      if(st<lastEnd) return;                       // would overlap what they're already at
      if(Math.random()<0.38) return;               // skip some slots (gaps = realism)
      itinerary.push({ eventId:e.id, stageName:e.stageName, start:st, end:en });
      lastEnd=en;
    });
    if(!itinerary.length && todays[0]){
      const e=todays[0]; itinerary.push({eventId:e.id, stageName:e.stageName, start:eventStart(e).getTime(), end:eventEnd(e).getTime()});
    }
    // user doc carries the itinerary so live positions can be derived at render time
    await setDoc(dref("users", uid), {
      name:NAMES[i], admin:false, color:personColor(uid),
      sim:true, simItin:itinerary
    });
    // PICKS for everything on their itinerary (so "going" counts, crowd radar, recs all populate)
    for(const it of itinerary){
      await setDoc(dref("picks", uid+"__"+it.eventId), { userId:uid, eventId:it.eventId, mustSee:Math.random()<0.3, createdAt:serverTimestamp() }, {merge:true});
    }
    // RATINGS — scheduled a few minutes after each set ends. Most get rated, some never (realism).
    for(const it of itinerary){
      if(Math.random()<0.25) continue;             // ~quarter never bother rating
      const score=Math.round((5+Math.random()*5)*2)/2;
      const tags=pick(TAGS, Math.floor(Math.random()*3));
      const ratedAt = it.end + (2+Math.floor(Math.random()*8))*60000;   // 2–10 min after it ends
      // simAt (plain ms) lets the time-gate reveal it exactly when due; createdAt also set for ordering.
      await setDoc(dref("ratings", uid+"__"+it.eventId),
        { userId:uid, eventId:it.eventId, score, tags, simAt:ratedAt, createdAt:serverTimestamp() }, {merge:true});
    }
    // SAFE CHECK-IN for tonight (most check in)
    if(day && Math.random()<0.75){
      await setDoc(dref("safety", uid+"__"+day), { userId:uid, day, checkedAt:serverTimestamp() }, {merge:true});
    }
  }

  // Co-presence / togetherness is now DERIVED live from itineraries (see derivedSimCopresence),
  // so we no longer pre-write hundreds of co-presence docs here. Fewer writes, and it builds
  // through the day as time passes — same trick as the moving map dots.
  applyRatingTimeGate();
  // SIM WALK LEGS: give a couple of routes a baseline of historical walks plus a cluster of
  // slow recent walks, so the Site traffic page has something to show in testing.
  const pinned=stagesWithCoords();
  if(pinned.length>=2){
    const now=Date.now();
    const mkLeg=(a,b,sec,tms,by)=>addDoc(colLegs,{ pair:legKey(a,b), sec, dist:Math.round(sec*1.3), by, at:serverTimestamp(), tms }).catch(()=>{});
    // pick up to 2 routes between adjacent pinned stages
    const routes=[];
    for(let i=0;i+1<pinned.length && routes.length<2;i++){ routes.push([pinned[i], pinned[i+1]]); }
    routes.forEach((pairStages,ri)=>{
      const [A,B]=pairStages;
      const base = 240 + ri*120;               // baseline ~4–6 min
      // historical baseline walks — timestamped hours ago so they form the baseline, not "recent"
      for(let k=0;k<4;k++){ mkLeg(A.id,B.id, base + Math.round((Math.random()-0.5)*40), now-(3*3600000+k*600000), "sim_hist_"+k); }
      // recent SLOW walks by different sim walkers, within the last ~15 min (the congestion signal)
      const slow = Math.round(base * (1.4 + ri*0.2));   // 40–60% slower
      for(let k=0;k<3;k++){ mkLeg(A.id,B.id, slow + Math.round((Math.random()-0.5)*30), now-(k*4*60000), "sim_now_"+k); }
    });
  }
}

function startSeedWalk(){
  if(!navigator.geolocation){ toast("Location not supported"); return; }
  navigator.geolocation.getCurrentPosition(p=>{
    const here=nearestStage(p.coords.latitude,p.coords.longitude);
    if(!here){ toast("Stand at a stage to start timing"); return; }
    find.seedActive=true; find.seedFrom=here.stage.id; find.seedStartT=Date.now();
    find.seedPt={lat:p.coords.latitude,lng:p.coords.longitude}; find.seedDist=0;
    find.seedWatch=navigator.geolocation.watchPosition(q=>{
      const pos={lat:q.coords.latitude,lng:q.coords.longitude};
      if(find.seedPt){ const seg=haversine(find.seedPt.lat,find.seedPt.lng,pos.lat,pos.lng); if(seg<200) find.seedDist+=seg; }
      find.seedPt=pos;
    }, ()=>{}, {enableHighAccuracy:true,maximumAge:0,timeout:20000});
    find.seedClock=setInterval(()=>{ const el=document.getElementById("seed-clock"); if(el){ const s=Math.round((Date.now()-find.seedStartT)/1000); el.textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); } },1000);
    toast("Timing — walk to another stage"); renderView();
  }, ()=>toast("Couldn't get location"), {enableHighAccuracy:true,maximumAge:0,timeout:15000});
}
function stopSeedWalk(){
  const finish=(lat,lng)=>{
    const here=nearestStage(lat,lng);
    cleanupSeed();
    if(!here || here.stage.id===find.seedFrom){ toast("Stop at a different stage to save the route"); renderView(); return; }
    const sec=Math.round((Date.now()-find.seedStartT)/1000);
    recordSeedLeg(find.seedFrom, here.stage.id, sec, Math.round(find.seedDist));
    const from=stagesWithCoords().find(s=>s.id===find.seedFrom), to=here.stage;
    toast(`Saved ${from?from.name:"?"} → ${to.name}: ~${Math.max(1,Math.round(sec/60))} min`); renderView();
  };
  if(navigator.geolocation) navigator.geolocation.getCurrentPosition(p=>finish(p.coords.latitude,p.coords.longitude), ()=>{ if(find.seedPt) finish(find.seedPt.lat,find.seedPt.lng); else { cleanupSeed(); renderView(); } }, {enableHighAccuracy:true,maximumAge:0,timeout:15000});
  else if(find.seedPt) finish(find.seedPt.lat,find.seedPt.lng);
}
function cleanupSeed(){
  if(find.seedWatch!=null && navigator.geolocation) navigator.geolocation.clearWatch(find.seedWatch);
  if(find.seedClock) clearInterval(find.seedClock);
  find.seedActive=false; find.seedWatch=null; find.seedClock=null;
}

function peopleWithCoords(){
  const now=Date.now(); const out=[];
  state.locations.forEach(l=>{
    if(l.id===state.user.id) return;
    if(typeof l.lat!=="number" || typeof l.lng!=="number") return;
    const ts = (l.updatedAt && l.updatedAt.toMillis) ? l.updatedAt.toMillis() : now;
    if(now-ts > 8*60*1000) return;            // hide stale (>8 min, ~5 missed updates)
    const u=state.users.find(x=>x.id===l.id);
    out.push({id:l.id, name:userName(l.id), color:personColor(l.id), lat:l.lat, lng:l.lng, ts, lost:!!l.lost});
  });
  // Simulated friends: derive a live position from their itinerary + the current time.
  simPositions().forEach(p=>out.push(p));
  return out;
}
// Compute where each simulated friend "is" right now from their stored itinerary.
// At a stage during a set → at that stage (jittered). Between sets → partway to the next stage.
function simPositions(){
  const now=Date.now(); const out=[];
  const stageByName={}; stagesWithCoords().forEach(s=>stageByName[s.name]=s);
  const jit=(seed)=>((Math.sin(seed*99.7)*0.5+0.5)-0.5)*0.00018;  // ~±10m deterministic-ish wobble
  state.users.filter(u=>u.sim && Array.isArray(u.simItin) && u.simItin.length).forEach(u=>{
    const itin=u.simItin.slice().sort((a,b)=>a.start-b.start);
    // Only show during the festival window (first start → last end + 20min)
    const firstStart=itin[0].start, lastEnd=itin[itin.length-1].end;
    if(now < firstStart-10*60000 || now > lastEnd+20*60000) return;
    let lat=null, lng=null;
    // are they currently AT a set?
    const at=itin.find(it=>now>=it.start && now<=it.end);
    if(at && stageByName[at.stageName]){ lat=stageByName[at.stageName].lat; lng=stageByName[at.stageName].lng; }
    else {
      // between sets: interpolate from previous stage to next stage by elapsed fraction
      let prev=null, nextIt=null;
      for(const it of itin){ if(it.end<=now) prev=it; if(it.start>now && !nextIt) nextIt=it; }
      const ps=prev&&stageByName[prev.stageName], ns=nextIt&&stageByName[nextIt.stageName];
      if(ps&&ns){
        const span=nextIt.start-prev.end, f= span>0 ? Math.min(1,Math.max(0,(now-prev.end)/span)) : 0;
        lat=ps.lat+(ns.lat-ps.lat)*f; lng=ps.lng+(ns.lng-ps.lng)*f;
      } else if(ps){ lat=ps.lat; lng=ps.lng; }
      else if(ns){ lat=ns.lat; lng=ns.lng; }
    }
    if(lat==null) return;
    const seed=(u.id.charCodeAt(4)||7);
    out.push({ id:u.id, name:u.name, color:personColor(u.id), lat:lat+jit(seed), lng:lng+jit(seed+1), ts:now, lost:false, sim:true });
  });
  return out;
}

function pinMeta(t){ return PIN_TYPES[t] || PIN_TYPES.other; }
function pinsForMe(){
  const me=state.user.id; const out=[];
  state.pins.forEach(p=>{
    if(p.id==="rally" || p.type==="rally") return;          // rally handled separately
    if(p.type==="beacon" || (typeof p.id==="string" && p.id.startsWith("beacon__"))) return;  // beacons handled separately
    if(typeof p.lat!=="number" || typeof p.lng!=="number") return;

}

// ---- "Where were you?" private breadcrumb trail (on-device only, never shared) ----
// Trail: record densely enough to capture the actual route walked (not a corner-cutting
// straight line). Points are cheap (we already have the GPS fixes); cap keeps storage bounded.
const TRAIL_KEY="fp_trail", TRAIL_MIN_GAP=15000, TRAIL_MIN_MOVE=8, TRAIL_MAX=2000;
function loadTrail(){ try{ return JSON.parse(localStorage.getItem(TRAIL_KEY)||"[]"); }catch(e){ return []; } }
function recordTrailPoint(pos){
  if(!pos) return;
  const t=loadTrail();
  const last=t[t.length-1];
  const now=Date.now();
  if(last){
    if(now-last.t < TRAIL_MIN_GAP) return;                               // at most one point / 3 min
    if(haversine(last.lat,last.lng,pos.lat,pos.lng) < TRAIL_MIN_MOVE) return;  // ignore standing still
  }
  t.push({lat:+pos.lat.toFixed(5), lng:+pos.lng.toFixed(5), t:now});
  while(t.length>TRAIL_MAX) t.shift();
  try{ localStorage.setItem(TRAIL_KEY, JSON.stringify(t)); }catch(e){}
}
function clearTrail(){ localStorage.removeItem(TRAIL_KEY); }

function buildTargets(){

  // other people's live "find me" beacons
  activeBeacons().forEach(b=>{ if(b.ownerId!==state.user.id) out.push({id:"bk:"+b.id, kind:"beacon", name:(b.ownerName||"Someone")+"'s spot", emoji:"📍", color:"#D6371C", lat:b.lat, lng:b.lng}); });
  if(find.show.stages) stagesWithCoords().forEach(s=>out.push({...s, id:"st:"+s.id, kind:"stage"}));
  if(find.show.pins)   pinsForMe().forEach(p=>out.push({...p, id:"pn:"+p.id, kind:"pin"}));
  if(find.show.people){

    ppl.forEach(p=>out.push({...p, id:"pe:"+p.id, kind:"person"}));
  }
  return out;
}

/* ---- live location sharing (periodic, battery-friendly) ---- */
function writeMyLocation(){
  if(!find.share || !find.pos || !state.user) return;
  find.myUpdated=Date.now();
  trackTrip(find.pos, find.acc);   // crowdsourced walk-time learning
  recordTrailPoint(find.pos);      // personal route history (Where were you)
  setDoc(dref("locations",state.user.id),
    { name:state.user.name, lat:+find.pos.lat.toFixed(6), lng:+find.pos.lng.toFixed(6), acc:find.acc||null, lost:!!find.lost, updatedAt:serverTimestamp() }
  ).catch(()=>{});
  // Co-presence sampling — log each nearby crew member.
  // Two-sided: both phones write samples for the same pair; aggregator dedupes by minute bucket.
  logCopresence();
}
const COPRESENCE_RADIUS = 30;     // metres — "you were together"
function logCopresence(){
  if(!find.pos || !state.user) return;
  const now=Date.now();
  state.locations.forEach(l=>{
    if(!l || l.id===state.user.id) return;
    if(typeof l.lat!=="number" || typeof l.lng!=="number") return;
    const ts = (l.updatedAt && l.updatedAt.toMillis) ? l.updatedAt.toMillis() : now;
    if(now-ts > 5*60*1000) return;             // stale, don't pair
    const d = haversine(find.pos.lat, find.pos.lng, l.lat, l.lng);
    if(d > COPRESENCE_RADIUS) return;
    const pair = [state.user.id, l.id].sort().join("__");
    // bucket per 2 minutes so simultaneous writes don't double-count when aggregating
    const bucket = Math.floor(now/(2*60*1000));
    addDoc(colCopresence, { pair, bucket, by:state.user.id, near:l.id, dist:Math.round(d), at:serverTimestamp() }).catch(()=>{});
  });
}
function startShare(){
  if(find.shareTimer) return;
  if(!navigator.geolocation){ toast("Location not supported"); return; }
  if(!locationEnabled()){ toast("Location features are off"); return; }
  find.share=true;
  shareFixNow();
  find.shareTimer=setInterval(()=>shareFixNow(), BATTERY_SAVER ? 300000 : 90000);   // 5 min in saver, else ~1.5 min
  localStorage.setItem("fp_share","1");       // remember across refreshes
  if(feat("autoStop")){
    const hrs=Math.max(1, +state.structure.autoStopHours || 4);
    find.autoStopAt=Date.now()+hrs*3600000;
    find.autoStopTimer=setTimeout(()=>{ stopShare(true); toast("Auto-stopped sharing"); if(state.user) renderApp(); }, hrs*3600000);
  }
}
// A single GPS fix that updates position, writes location, and refreshes the radar.
// Exposed so the foreground-resume path can re-kick it immediately (mobile browsers
// suspend timers while backgrounded; this is recovery, not a background loop).
function shareFixNow(){
  if(!find.share || !navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    p=>{ find.pos={lat:p.coords.latitude,lng:p.coords.longitude}; find.acc=p.coords.accuracy; writeMyLocation();
         if(state.view==="find" && document.getElementById("radar")) updateFindDynamic(); },
    e=>{ if(e.code===1){ toast("Location blocked"); stopShare(); renderApp(); } },
    {enableHighAccuracy:true,maximumAge:0,timeout:20000}   // maximumAge:0 → force a truly fresh reading
  );
}
// If sharing is meant to be on but the browser killed our interval while backgrounded, restart it.
function ensureShareAlive(){
  if(!find.share) return;
  shareFixNow();                                  // immediate fresh reading
  if(!find.shareTimer){
    find.shareTimer=setInterval(()=>shareFixNow(), BATTERY_SAVER ? 300000 : 90000);
  }
}
function stopShare(userInitiated=false){
  find.share=false; find.lost=false;
  if(userInitiated) localStorage.removeItem("fp_share");   // keep saved intent through GPS hiccups / auto-stop
  if(find.shareTimer){ clearInterval(find.shareTimer); find.shareTimer=null; }
  if(find.autoStopTimer){ clearTimeout(find.autoStopTimer); find.autoStopTimer=null; }
  find.autoStopAt=0;
  trip = null;   // drop any in-progress trip trail
  if(state.user) deleteDoc(dref("locations",state.user.id)).catch(()=>{});
}
window.addEventListener("pagehide",()=>{ if(find.share && state.user){ try{ deleteDoc(dref("locations",state.user.id)); }catch(e){} } });

function enableFind(){
  // iOS needs an explicit gesture-triggered permission request for the compass
  find.orientNeedsGesture=false;
  try{
    if(typeof DeviceOrientationEvent!=="undefined" && typeof DeviceOrientationEvent.requestPermission==="function"){
      DeviceOrientationEvent.requestPermission().then(()=>{ bindOrientation(); if(state.view==="find") renderView(); }).catch(()=>{});
    }
  }catch(e){}
  startFindSensors();
}
function bindOrientation(){
  if(find.orientBound) return;
  let lastPaint=0;
  const handler=ev=>{
    let h=null;
    if(typeof ev.webkitCompassHeading==="number" && !isNaN(ev.webkitCompassHeading)) h=ev.webkitCompassHeading;
    else if(ev.alpha!=null){ const off=(screen.orientation&&screen.orientation.angle)||0; h=(360-ev.alpha+off)%360; }
    if(h==null||isNaN(h)) return;
    find.heading=h;
    find.orientLastEvent=Date.now();           // watchdog: note we're receiving events
    const had=find.hasOrientation; find.hasOrientation=true;
    if(state.view!=="find") return;
    if(!had){ renderView(); return; }
    const now=Date.now();
    if(now-lastPaint < 100) return;            // throttle: at most ~10 updates/sec (compass fires far faster)
    lastPaint=now;
    updateFindDynamic();
  };
  find.orientHandler=handler;
  window.addEventListener("deviceorientationabsolute",handler,true);
  window.addEventListener("deviceorientation",handler,true);
  find.orientBound=true;
  find.orientLastEvent=Date.now();
}
// Recover a stalled compass (iOS sometimes silently stops delivering orientation events,
// e.g. after heavy DOM work like pinning a stage). Tear the listener down and re-add it —
// permission persists for the session, so no re-prompt is needed.
function rebindOrientation(){
  if(find.orientHandler){
    window.removeEventListener("deviceorientationabsolute",find.orientHandler,true);
    window.removeEventListener("deviceorientation",find.orientHandler,true);
  }
  find.orientBound=false; find.orientHandler=null;
  bindOrientation();
}
// Watchdog: keep the compass alive. iOS in particular silently stops delivering orientation
// events (after heavy DOM work, or just over time). We rebind when events go quiet, and if a
// rebind doesn't bring them back we surface a one-tap re-enable (a user gesture reliably
// restarts iOS sensors when nothing else will).
function checkOrientationAlive(){
  if(!find.orientBound || !find.hasOrientation) return;
  const quietFor = find.orientLastEvent ? (Date.now()-find.orientLastEvent) : 0;
  // 7s rather than 4s: a phone held dead-still genuinely emits fewer events, so don't over-trigger.
  if(quietFor > 7000){
    find._orientRebinds = (find._orientRebinds||0) + 1;
    rebindOrientation();
    // If we've rebound a few times and it's STILL quiet, the silent recovery isn't working —
    // offer a manual re-enable (only while on Find, where the compass is actually shown).
    if(find._orientRebinds >= 3 && state.view==="find"){
      find.orientStalled = true;
      if(!document.querySelector(".modal-bg")) { const v=document.getElementById("view"); if(v) renderView(); }
    }
  } else if(quietFor < 3000){
    // healthy again — reset the escalation + clear any stalled flag
    if(find._orientRebinds || find.orientStalled){
      find._orientRebinds = 0; find.orientStalled = false;
      if(state.view==="find" && !document.querySelector(".modal-bg")){ const v=document.getElementById("view"); if(v) renderView(); }
    }
  }
}
function startFindSensors(skipOrientation){
  if(find.started) return;
  find.started=true; find.error=null;
  if(navigator.geolocation){
    find.geoWatch=navigator.geolocation.watchPosition(
      p=>{ const a=p.coords.accuracy;
           // skip a wildly inaccurate reading if we already have a decent recent fix
           if(find.pos && a>120 && find.acc && find.acc<a*0.6){ return; }
           const firstFix = !find.pos;
           find.pos={lat:p.coords.latitude,lng:p.coords.longitude}; find.acc=a; find.error=null;
           recordTrailPoint(find.pos);
           if(firstFix && navigator.onLine){
             // coords may not have existed when weather first tried to load (no pinned stages yet) — retry now
             refreshWeather().then(()=>{ if(state.view==="home"&&!document.querySelector(".modal-bg")) renderView(); }).catch(()=>{});
           }
           if(state.view==="find"){ if(!document.getElementById("radar")) renderView(); else updateFindDynamic(); } },
      e=>{ find.error = e.code===1 ? "denied" : "unavailable"; if(state.view==="find") renderView(); },
      BATTERY_SAVER ? {enableHighAccuracy:false,maximumAge:60000,timeout:30000} : {enableHighAccuracy:true,maximumAge:0,timeout:20000}
    );
  } else { find.error="unsupported"; }
  if(!skipOrientation) bindOrientation();
  if(state.view==="find") renderView();
}
function stopFindSensors(){
  if(find.geoWatch!=null && navigator.geolocation) navigator.geolocation.clearWatch(find.geoWatch);
  find.geoWatch=null;
  if(find.orientBound && find.orientHandler){
    window.removeEventListener("deviceorientationabsolute",find.orientHandler,true);
    window.removeEventListener("deviceorientation",find.orientHandler,true);
  }
  find.orientBound=false; find.started=false;
}

  const tgt = hasTarget ? targets.find(t=>t.id===find.target) : null;

  return head + shareRow + lostBanner + legend + topBlock + `

        <polygon class="needle" id="findarrow" points="140,34 132,150 140,140 148,150" style="display:none"></polygon>

    ${tgt ? `<p class="find-note" style="margin-top:12px">Hold the phone flat for the compass. If the arrow drifts, wave it in a figure-8, or switch to North-up. People &amp; pins update roughly every 1½ minutes.</p>` : ""}
  `;
}

function updateFindDynamic(){
  const radar=document.getElementById("radar");
  if(!radar || !find.pos) return;
  const targets=buildTargets();
  if(!targets.length) return;
  const headingUp = find.headingMode!=="north" && find.hasOrientation;
  const heading = headingUp ? (find.heading||0) : 0;
  const cx=140, cy=140, maxR=120;

  const items=targets.map(t=>({ ...t,
    d:haversine(find.pos.lat,find.pos.lng,t.lat,t.lng),
    b:bearing(find.pos.lat,find.pos.lng,t.lat,t.lng) }));
  const scale=Math.max(...items.map(s=>s.d), 30);

  items.forEach(s=>{
    const rel=(headingUp? s.b-heading : s.b)*Math.PI/180;
    const rr=Math.min(s.d/scale,1)*maxR;
    const x=cx+Math.sin(rel)*rr, y=cy-Math.cos(rel)*rr;
    const g=document.getElementById("dot-"+s.id);
    if(g){ g.setAttribute("transform",`translate(${x.toFixed(1)},${y.toFixed(1)})`); g.classList.toggle("sel",s.id===find.target); }
  });

  const r1=document.getElementById("ring-half"); if(r1) r1.textContent=fmtDist(scale/2);
  const r2=document.getElementById("ring-full"); if(r2) r2.textContent=fmtDist(scale);
  const fwd=document.getElementById("fwd-label"); if(fwd) fwd.textContent = headingUp ? "▲" : "N";

  const t=items.find(s=>s.id===find.target);
  const arrow=document.getElementById("findarrow");
  const ro=document.getElementById("find-readout");
  if(t){
    const rel = headingUp ? t.b-heading : t.b;
    if(arrow){ arrow.style.display=""; arrow.setAttribute("transform",`rotate(${rel.toFixed(1)} 140 140)`); }
    if(ro){
      ro.querySelector(".r-name").textContent=t.name;
      const here = t.d!=null && t.d<=HERE_RADIUS;
      ro.classList.toggle("r-here", here);
      if(here){
        ro.querySelector(".r-dist").innerHTML=`HERE`;
        let dir = t.kind==="person" ? (t.lost?"needs help · together":"you're together") : "you're here";
        ro.querySelector(".r-dir").textContent = dir;
      } else {
        ro.querySelector(".r-dist").innerHTML=`${fmtDist(t.d)}<small>away</small>`;
        let dir = headingUp ? relDirText(rel) : (cardinal(t.b)+" of you");
        if(t.kind==="person") dir = (t.lost?"needs help · ":"")+dir+(t.ts?(" · "+agoText(t.ts)):"");
        else if(t.kind==="rally") dir = "🚩 meet-up point · "+dir;
        else if(t.kind==="pin") dir += " · "+(t.note?esc(t.note):(t.mine?"your pin":esc(t.ownerName||"shared")+"'s pin"));
        ro.querySelector(".r-dir").textContent = dir;
      }
    }
  } else if(arrow){ arrow.style.display="none"; }

  const acc=document.getElementById("find-acc"); if(acc && find.acc) acc.textContent="GPS ±"+Math.round(find.acc)+" m";
}

function linkify(s){
  let out = esc(s).replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  // highlight @mentions that match a known group member (longest name first)
  const names=[...state.users].sort((a,b)=>b.name.length-a.name.length);
  names.forEach(u=>{
    const safe=esc(u.name).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    const re=new RegExp("@"+safe+"(?![\\w])","gi");
    const me = u.id===state.user.id;
    out = out.replace(re, `<span class="mention${me?' me':''}">@${esc(u.name)}</span>`);
  });
  return out;
}
function messageMentionsMe(text){
  if(!text||!state.user) return false;
  const safe=state.user.name.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  return new RegExp("@"+safe+"(?![\\w])","i").test(text);
}
function clockMs(ms){ const d=new Date(ms); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function minToHM(m){ m=((m%1440)+1440)%1440; return fmt12(String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0")); }

function markChangesSeen(){ const m={}; state.events.forEach(e=>{ if(e.changedAt&&e.changedAt.toMillis) m[e.id]=e.changedAt.toMillis(); }); localStorage.setItem("fp_seen", JSON.stringify(m)); }

function notifyState(){

  if(find.notify) return "On — a nudge ~15 min before your picks"+(festivalStart()?" (while the app is open).":", once the organiser sets the festival date.");

async function toggleNotify(){
  if(find.notify){
    find.notify=false; localStorage.removeItem("fp_notify"); find.notifyTimers.forEach(clearTimeout); find.notifyTimers=[];
    unsubscribePush().catch(()=>{});               // tell the server to stop pushing to this device
    toast("Reminders off"); return;
  }
  if(typeof Notification==="undefined"){ toast("Notifications not supported"); return; }
  try{ const p = Notification.permission==="granted" ? "granted" : await Notification.requestPermission(); if(p!=="granted"){ toast("Notifications blocked"); return; } }
  catch(e){ toast("Notifications unavailable"); return; }
  find.notify=true; localStorage.setItem("fp_notify","1"); scheduleNotifications(); toast("Reminders on");
  subscribePush().catch(()=>{});                   // subscribe to server push too (silent if VAPID not configured)
}

// ---- Web Push subscription (Tier 3 notifications) ----
// Stores each device's PushSubscription under users/{userId}/pushSubs/{deviceId}.
// Cloud Function reads these to send pushes when the app is closed.
function urlBase64ToUint8Array(b64){
  const pad="=".repeat((4-b64.length%4)%4);
  const s=(b64+pad).replace(/-/g,"+").replace(/_/g,"/");
  const raw=atob(s); const out=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) out[i]=raw.charCodeAt(i);
  return out;
}
function deviceId(){
  let d=localStorage.getItem("fp_device");
  if(!d){ d=Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem("fp_device",d); }
  return d;
}
async function subscribePush(){
  if(!VAPID_PUBLIC_KEY) return;
  if(!("serviceWorker" in navigator) || !("PushManager" in window)) return;
  if(!state.user) return;
  try{
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if(!sub){
      sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY) });
    }
    const subRef = doc(db, (TEST_MODE?"test_":"")+"users", state.user.id, "pushSubs", deviceId());
    await setDoc(subRef, {
      endpoint: sub.endpoint,
      keys: sub.toJSON().keys,
      platform: navigator.userAgent.slice(0,160),
      updatedAt: serverTimestamp()
    }, {merge:true});
  }catch(e){
    // Silent in production. console.warn keeps a breadcrumb in dev tools if you ever need to diagnose again.
    try{ console.warn("subscribePush failed", e); }catch(_){}
  }
}
async function unsubscribePush(){
  if(!("serviceWorker" in navigator)) return;
  try{
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    if(sub) await sub.unsubscribe();
    if(state.user){
      const subRef = doc(db, (TEST_MODE?"test_":"")+"users", state.user.id, "pushSubs", deviceId());
      await deleteDoc(subRef).catch(()=>{});
    }
  }catch(e){}
}
function scheduleNotifications(){
  find.notifyTimers.forEach(clearTimeout); find.notifyTimers=[];
  if(!feat("notify")||!find.notify||!festivalStart()) return;
  if(typeof Notification==="undefined"||Notification.permission!=="granted") return;
  const ids=myPickIds(), now=Date.now();
  state.events.filter(e=>ids.has(e.id)).forEach(e=>{
    const s=eventStart(e); if(!s) return;
    // standard 15-min "starting soon"
    const lead=s.getTime()-15*60000;
    if(lead>now && lead-now < 12*3600000)
      find.notifyTimers.push(setTimeout(()=>{ pushNotify("Starting soon", `${e.title} at ${e.stageName} in ~15 min`, "soon-"+e.id); }, lead-now));
    // "leave now" — fire earlier by the estimated walk time, if we can estimate it
    const st=stagesWithCoords().find(x=>x.name===e.stageName);
    if(st){
      const walkSec = find.pos ? walkSecondsFromPos(find.pos, st.id) : null;
      if(walkSec && walkSec>3*60){                       // only worth it if >3 min away
        const walkMin=Math.round(walkSec/60);
        const leaveAt=s.getTime()-walkSec*1000-2*60000;  // leave + 2 min buffer
        if(leaveAt>now && leaveAt-now < 12*3600000 && leaveAt < lead)  // only if earlier than the 15-min nudge
          find.notifyTimers.push(setTimeout(()=>{ pushNotify("Time to head over", `Leave now for ${e.title} — ~${walkMin} min walk to ${e.stageName}`, "leave-"+e.id); }, leaveAt-now));
      }
    }
  });
  if(feat("shifts")) (state.shifts||[]).forEach(sh=>{
    const s=eventStart(sh); if(!s) return;
    const lead=s.getTime()-15*60000;
    if(lead>now && lead-now < 12*3600000)
      find.notifyTimers.push(setTimeout(()=>{ pushNotify("Shift soon", `${sh.label||"Work shift"} starts in ~15 min`, "shift-"+sh.id); }, lead-now));
  });
}
function maybeNotifyChanges(){
  if(!feat("alerts")||!feat("notify")||!find.notify) return;
  if(typeof Notification==="undefined"||Notification.permission!=="granted") return;
  const ids=myPickIds();
  state.events.forEach(e=>{
    if(!ids.has(e.id)||!e.changedAt||!e.changedAt.toMillis) return;
    const t=e.changedAt.toMillis();
    if(t>find.sessionStart && find.notifiedChanges[e.id]!==t){
      find.notifiedChanges[e.id]=t;
      pushNotify("Set time changed", `${e.title} → ${e.day} ${fmt12(e.start)} at ${e.stageName}`, "chg-"+e.id);
    }
  });
}

      <label class="field"><span>Start</span><input id="s-start" type="time" value="${esc(sh.start||"12:00")}"></label>
      <label class="field"><span>End</span><input id="s-end" type="time" value="${esc(sh.end||"19:00")}"></label>
    </div>
    <label class="field"><span>Note <span class="tag">(optional, private)</span></span><textarea id="s-note" rows="2" placeholder="e.g. meet supervisor at gate B, hi-vis required">${esc(sh.note||"")}</textarea></label>
    <button class="btn primary block" id="s-save">${editing?"Save shift":"Add shift"+(days.length>1?" ("+days.length+" days)":"")}</button>
  </div>`;
  document.body.appendChild(wrap);
  const close=()=>{ state.modal=null; wrap.remove(); };
  wrap.querySelector("#s-close").onclick=close; wrap.onclick=e=>{ if(e.target===wrap) close(); };
  const saveBtn=wrap.querySelector("#s-save");
  wrap.querySelectorAll("[data-day]").forEach(b=>b.onclick=()=>{
    const d=b.dataset.day;
    if(editing){ days=[d]; wrap.querySelectorAll("[data-day]").forEach(x=>x.classList.toggle("on",x===b)); }
    else { if(days.includes(d)) days=days.filter(x=>x!==d); else days.push(d); b.classList.toggle("on"); saveBtn.textContent="Add shift"+(days.length>1?" ("+days.length+" days)":""); }
  });
  const err=m=>wrap.querySelector("#s-err").innerHTML=`<div class="err">${esc(m)}</div>`;
  saveBtn.onclick=async()=>{
    const label=wrap.querySelector("#s-label").value.trim()||"Work shift";
    const start=wrap.querySelector("#s-start").value, end=wrap.querySelector("#s-end").value;
    const note=wrap.querySelector("#s-note").value;
    if(!days.length) return err("Pick at least one day.");
    if(!start) return err("Set a start time.");
    saveBtn.disabled=true;
    try{
      if(editing) await saveShift({id:sh.id, label, day:days[0], start, end, note});
      else for(const d of days) await saveShift({label, day:d, start, end, note});
      close(); toast(editing?"Shift saved":`Added ${days.length>1?days.length+" shifts":"shift"}`);
    }catch(e){ saveBtn.disabled=false; err("Couldn’t save — try again."); }
  };
}

function togglePack(id){ const c=new Set(state.myPacking.checked); c.has(id)?c.delete(id):c.add(id); state.myPacking.checked=[...c]; savePacking().catch(()=>{}); renderView(); }
function addMyPack(label){ label=(label||"").trim(); if(!label) return; state.myPacking.mine=[...(state.myPacking.mine||[]),{id:uid(),label:label.slice(0,80)}]; savePacking().catch(()=>{}); renderView(); }
function removeMyPack(id){ state.myPacking.mine=(state.myPacking.mine||[]).filter(x=>x.id!==id); const c=new Set(state.myPacking.checked); c.delete(id); state.myPacking.checked=[...c]; savePacking().catch(()=>{}); renderView(); }

/* ---- free-time finder ---- */
/* ============================================================
   GROUP MEETUP FINDER — availability across people, not just gaps
   ============================================================ */
const MEET_START=12*60, MEET_END=30*60;          // festival-day window: noon → 6am next
const MEET_STEP=15;                               // resolution in minutes

// people we weigh: those who've actually planned (>=2 picks), optionally limited to my crew
function meetPeople(){
  const planned={};
  state.picks.forEach(p=>{ planned[p.userId]=(planned[p.userId]||0)+1; });
  let ids=state.users.map(u=>u.id).filter(id=>(planned[id]||0)>=2);
  if(state.meetMode==="crew" && state.crew.length){
    const crewSet=new Set([...state.crew, state.user.id]);
    ids=ids.filter(id=>crewSet.has(id));
  }
  return ids;
}
// busy intervals (festival-day minutes) for a given person on a given day
function busyFor(userId,day){
  const ids=new Set(state.picks.filter(p=>p.userId===userId).map(p=>p.eventId));
  const evs=state.events.filter(e=>ids.has(e.id)&&e.day===day);
  const blocks=evs.slice();
  if(userId===state.user.id) (state.shifts||[]).filter(sh=>sh.day===day).forEach(sh=>blocks.push(sh));
  return blocks.map(e=>{ let s=festMin(e.start), en=e.end?festMin(e.end):s+60; if(en<=s) en+=1440; return [s,en]; });
}
// for each step in the day, how many of `people` are free
function availabilityProfile(day, people){
  const slots=[];
  const busy=people.map(id=>busyFor(id,day));
  for(let t=MEET_START;t<MEET_END;t+=MEET_STEP){
    let free=0;
    busy.forEach(intervals=>{ const b=intervals.some(([s,e])=> t>=s && t<e); if(!b) free++; });
    slots.push(free);
  }
  return slots; // array of counts, index i => time MEET_START + i*MEET_STEP
}
// merge contiguous steps where free-count stays high into ranked windows
function bestWindows(day, people, minLen){
  const prof=availabilityProfile(day,people);
  const n=people.length||1;
  // threshold: at least ~60% free (and at least 2), so it stays useful at scale
  const need=Math.max(2, Math.ceil(n*0.6));
  // If 'day' is today, drop windows that have already ended — no use suggesting a past slot.
  const today = currentFestivalDay();
  let nowMin = -1;
  if(day===today){
    const now=new Date();
    nowMin = now.getHours()*60 + now.getMinutes();
    // late-night wrap: between rollover and noon, "today" is still last night → add a day
    if(nowMin < MEET_START) nowMin += 24*60;
  }
  const wins=[]; let i=0;
  while(i<prof.length){
    if(prof[i]>=need){
      let j=i, minFree=prof[i], maxFree=prof[i], peakIdx=i;
      while(j<prof.length && prof[j]>=need){ if(prof[j]>maxFree){ maxFree=prof[j]; peakIdx=j; } minFree=Math.min(minFree,prof[j]); j++; }
      const start=MEET_START+i*MEET_STEP, end=MEET_START+j*MEET_STEP, len=end-start;
      const peak=MEET_START+peakIdx*MEET_STEP;
      // Skip if entirely in the past today. If partly in past, clip to "now" so the window starts from now.
      if(nowMin>=0 && end <= nowMin){ i=j; continue; }
      let startEff=start, peakEff=peak;
      if(nowMin>=0 && start < nowMin){
        // round nowMin up to the next MEET_STEP boundary so window starts on a clean tick
        startEff = Math.ceil(nowMin/MEET_STEP)*MEET_STEP;
        if(peakEff < startEff) peakEff = startEff;
      }
      const lenEff = end - startEff;
      if(lenEff>=minLen) wins.push({day,start:startEff,end,len:lenEff,minFree,maxFree,peak:peakEff});
      i=j;
    } else i++;
  }
  // sort: most people first, then longest window
  return wins.sort((a,b)=> b.maxFree-a.maxFree || b.len-a.len || a.start-b.start);
}
function whoFreeAt(day, minute, people){
  const free=[],busy=[];
  people.forEach(id=>{ const b=busyFor(id,day).some(([s,e])=>minute>=s&&minute<e); (b?busy:free).push(id); });
  return {free,busy};
}

function meetupCard(){
  if(!feat("overlaps")) return "";
  const people=meetPeople();
  const totalPlanned=people.length;
  const days=DAYS.filter(d=> state.events.some(e=>e.day===d) );
  if(!state.meetDay || !days.includes(state.meetDay)){
    // default to a day that has events; prefer today-ish later, simple for now
    state.meetDay = days[0]||DAYS[0];
  }
  const day=state.meetDay;

  const modeTabs=`<div class="mode-toggle" style="margin-bottom:10px">
    <button data-meetmode="all" class="${state.meetMode!=='crew'?'on':''}">Whole group</button>
    <button data-meetmode="crew" class="${state.meetMode==='crew'?'on':''}">My crew${state.crew.length?` (${state.crew.length})`:''}</button>
  </div>`;
  const dayTabs=`<div class="filters" style="margin-bottom:10px">${days.map(d=>`<button class="chip ${d===day?'on':''}" data-meetday="${d}">${d.slice(0,3)}</button>`).join("")}</div>`;

  if(state.meetMode==="crew" && !state.crew.length){
    return `<div class="free-card">
      <div class="free-head">When can we meet?</div>
      ${modeTabs}
      <div class="find-note">Pick your core crew — the few people you actually want to link up with — and I’ll show when most of you are free.</div>
      <button class="btn primary block" id="crew-edit" style="margin-top:10px">Choose my crew</button>
    </div>`;
  }
  if(totalPlanned<1){
    return `<div class="free-card"><div class="free-head">When can we meet?</div>${modeTabs}
      <div class="find-note">Once a few people have picked some acts, I’ll show the best times to meet up here.</div></div>`;
  }

  const maxN=people.length||1;
  const wins=bestWindows(day,people,30).slice(0,6);
  const fmtLen=m=>{ const h=Math.floor(m/60),mm=m%60; return (h?h+"h":"")+(mm?(h?" ":"")+mm+"m":(h?"":"0m")); };
  // Compute the user's own busy ranges so we can soft-mark sub-slots that clash with their picks.
  const myBusy = state.user ? busyFor(state.user.id, day) : [];
  const isMineBusy = (slotStart, slotEnd) => myBusy.some(([s,e])=>slotStart<e && slotEnd>s);
  // Votes scoped to the current people set (so whole-group vs my-crew is respected).
  const peopleSet = new Set(people);
  const winRows = wins.length ? wins.map(w=>{
    const {free}=whoFreeAt(day,w.peak,people);
    const names=free.map(id=>userName(id));
    const shown=names.slice(0,5).map(esc).join(", ")+(names.length>5?` +${names.length-5}`:"");
    // Sub-slots: 15-min if window ≤ 60min, otherwise 30-min (capped per your spec).
    const step = (w.end - w.start) <= 60 ? 15 : 30;
    const slots=[];
    for(let t=w.start; t<w.end; t+=step) slots.push(t);
    const myId = state.user && state.user.id;
    const subHtml = slots.length ? slots.map(t=>{
      const tEnd = t+step;
      // Count votes from people in scope only
      const voters = state.meetVotes.filter(v=>v.day===day && v.slot===t && peopleSet.has(v.userId));
      const count = voters.length;
      const mine = !!voters.find(v=>v.userId===myId);
      const clash = isMineBusy(t, tEnd);
      const cls = ["sub-slot", mine?"on":"", clash?"clash":"", count>=Math.max(2, Math.ceil(maxN*0.5))?"hot":""].filter(Boolean).join(" ");
      return `<button class="${cls}" data-vote="${day}|${t}" title="${minToHM(t)}–${minToHM(tEnd)}${clash?' · you have a pick here':''}">
        <span class="ss-time">${minToHM(t)}</span>
        ${count?`<span class="ss-count">${count}</span>`:""}
      </button>`;
    }).join("") : "";
    return `<div class="meet-block">
      <button class="meet-row" data-meetwin="${day}|${w.peak}">
        <div class="mr-left">
          <div class="mr-time">${minToHM(w.start)} – ${minToHM(w.end)}</div>
          <div class="mr-who">${shown}</div>
        </div>
        <div class="mr-right">
          <div class="mr-count">${w.maxFree}<span>/${maxN}</span></div>
          <div class="mr-len">${fmtLen(w.len)} free</div>
        </div>
      </button>
      ${subHtml ? `<div class="sub-slots">${subHtml}</div>` : ""}
    </div>`;
  }).join("") : `<div class="find-note">No window where most of you are free today — schedules are packed! Use a rally call below to grab people in the moment.</div>`;

  return `<div class="free-card">
    <div class="free-head">Best times to meet</div>
    ${modeTabs}${dayTabs}
    <div class="meet-sub"><span>Tap the row to see who's free. Tap a time below it to vote — most-voted slots highlight.</span>
      <span class="meet-weigh">${maxN} ${state.meetMode==='crew'?'crew':'planned'}${state.meetMode==='crew'?` · <button class="link-btn" id="crew-edit">edit</button>`:''}</span></div>
    <div class="meet-list">${winRows}</div>
  </div>`;
}

/* ---- live rally calls ---- */
const CALL_KINDS={ food:{e:"🍔",label:"Food"}, drinks:{e:"🍺",label:"Drinks"}, coffee:{e:"☕️",label:"Coffee/break"}, meet:{e:"📍",label:"Meet up"} };
function callText(c){ if(c.kind==="beacon") return esc(c.label||"dropped a beacon"); const k=CALL_KINDS[c.kind]||CALL_KINDS.meet; return `${k.e} ${esc(c.label||k.label)}${c.at?` · ${esc(c.at)}`:" · now"}`; }
async function createCall(kind,label,at){
  const ttl=2*3600000; // calls live 2h
  await addDoc(colCalls,{ userId:state.user.id, name:state.user.name, kind, label:(label||"").trim(), at:(at||"").trim(),
    "in":[state.user.id], createdAt:serverTimestamp(), expiresAt:Date.now()+ttl });
}
async function joinCall(c){
  const set=new Set(c.in||[]); set.has(state.user.id)?set.delete(state.user.id):set.add(state.user.id);
  await updateDoc(dref("calls",c.id), { "in":[...set] });
}
async function endCall(id){ await deleteDoc(dref("calls",id)); }
function callsCard(){
  if(!feat("overlaps")) return "";
  const calls=activeCalls();
  const mineActive = calls.some(c=>c.userId===state.user.id);
  const list = calls.length ? calls.map(c=>{
    const ins=(c.in||[]); const joined=ins.includes(state.user.id); const mine=c.userId===state.user.id;
    const names=ins.map(id=>userName(id));
    return `<div class="call-row">
      <div class="call-main"><div class="call-title">${callText(c)}</div>
        <div class="call-sub">${esc(c.name||'?')} · ${ins.length} in${ins.length?': '+names.slice(0,4).map(esc).join(", ")+(names.length>4?` +${names.length-4}`:''):''}</div></div>
      ${mine?`<button class="btn danger sm" data-endcall="${c.id}">End</button>`
            :`<button class="btn ${joined?'lime':'primary'} sm" data-joincall="${c.id}">${joined?'✓ In':'I’m in'}</button>`}
    </div>`;
  }).join("") : `<div class="find-note">Nobody’s called anything yet. Keen for food or a break? Send a call and see who joins.</div>`;
  return `<div class="free-card" style="margin-top:14px">
    <div class="free-head">Rally calls <span class="live-mini">live</span></div>
    <div class="call-list">${list}</div>
    <button class="btn primary block" id="call-new" style="margin-top:12px">${mineActive?'Send another call':'Start a call'}</button>
  </div>`;
}
function renderCallModal(){
  const existing=document.querySelector(".modal-bg"); if(existing) existing.remove();
  let kind="food";
  const wrap=document.createElement("div"); wrap.className="modal-bg";
  wrap.innerHTML=`<div class="modal">
    <div class="modal-head"><h2>Start a rally call</h2><button class="btn ghost sm" id="c-close">Close</button></div>
    <div class="find-note" style="margin-bottom:10px">Broadcast what you’re keen for — people tap “I’m in” so you get a live count.</div>
    <div class="type-chips" id="c-kinds">${Object.entries(CALL_KINDS).map(([k,m])=>`<button class="type-chip ${k==='food'?'on':''}" data-ck="${k}">${m.e} ${m.label}</button>`).join("")}</div>
    <label class="field" style="margin-top:12px"><span>When <span class="tag">(optional — blank = now)</span></span><input id="c-at" placeholder="e.g. ~5pm, in 30 min, after this set"></label>
    <label class="field"><span>Note <span class="tag">(optional)</span></span><input id="c-label" placeholder="e.g. burrito van by the lake"></label>
    <button class="btn primary block" id="c-send">Send call</button>
  </div>`;
  document.body.appendChild(wrap);
  const close=()=>{ state.modal=null; wrap.remove(); };
  wrap.querySelector("#c-close").onclick=close; wrap.onclick=e=>{ if(e.target===wrap) close(); };
  wrap.querySelectorAll("[data-ck]").forEach(b=>b.onclick=()=>{ kind=b.dataset.ck; wrap.querySelectorAll("[data-ck]").forEach(x=>x.classList.toggle("on",x===b)); });
  wrap.querySelector("#c-send").onclick=async()=>{
    try{ await createCall(kind, wrap.querySelector("#c-label").value, wrap.querySelector("#c-at").value); close(); toast("Call sent"); }
    catch(e){ toast("Couldn’t send — check connection"); }
  };
}
function renderMeetWinModal(){
  const existing=document.querySelector(".modal-bg"); if(existing) existing.remove();
  const {day,mid,free,busy}=state.modal.data;
  const wrap=document.createElement("div"); wrap.className="modal-bg";
  wrap.innerHTML=`<div class="modal">
    <div class="modal-head"><h2>${day} · ${minToHM(mid)}</h2><button class="btn ghost sm" id="mw-close">Close</button></div>
    <div class="free-head" style="font-size:14px;margin-bottom:6px">${free.length} free${busy.length?` · ${busy.length} busy`:''}</div>
    ${free.length?`<div class="goers" style="margin-bottom:10px">${free.map(n=>`<span class="goer me">${esc(n)}</span>`).join("")}</div>`:''}
    ${busy.length?`<div class="find-note" style="margin-bottom:4px">Busy then:</div><div class="goers" style="margin-bottom:10px">${busy.map(n=>`<span class="goer">${esc(n)}</span>`).join("")}</div>`:''}
    <div class="row" style="gap:8px">
      <button class="btn primary" id="mw-chat" style="flex:1">Suggest in chat</button>
      <button class="btn lime" id="mw-call" style="flex:1">Start a call</button>
    </div>
  </div>`;
  document.body.appendChild(wrap);
  const close=()=>{ state.modal=null; wrap.remove(); };
  wrap.querySelector("#mw-close").onclick=close; wrap.onclick=e=>{ if(e.target===wrap) close(); };
  wrap.querySelector("#mw-chat").onclick=async()=>{
    try{ await sendMessage(`Meetup idea: ${day} around ${minToHM(mid)} — ${free.length} of us free then. Who’s in?`); close(); state.view="chat"; renderApp(); }
    catch(e){ toast("Couldn’t post"); }
  };
  wrap.querySelector("#mw-call").onclick=()=>{ state.modal={type:"call"}; renderCallModal(); };
}
function renderCrewModal(){
  const existing=document.querySelector(".modal-bg"); if(existing) existing.remove();
  const sel=new Set(state.crew);
  const others=state.users.filter(u=>u.id!==state.user.id);
  const wrap=document.createElement("div"); wrap.className="modal-bg";
  wrap.innerHTML=`<div class="modal">
    <div class="modal-head"><h2>My crew</h2><button class="btn ghost sm" id="cw-close">Close</button></div>
    <div class="find-note" style="margin-bottom:12px">Pick the people you actually want to meet up with. The finder will weigh just these (plus you). Saved on this phone only.</div>
    <div class="crew-list">${others.length?others.map(u=>`<button class="crew-opt ${sel.has(u.id)?'on':''}" data-crew="${u.id}"><span class="mo-av" style="background:${personColor(u.id)}">${esc(initials(u.name))}</span>${esc(u.name)}<span class="crew-chk">${sel.has(u.id)?'✓':''}</span></button>`).join(""):'<div class="find-note">No one else has joined yet.</div>'}</div>
    <button class="btn primary block" id="cw-save" style="margin-top:14px">Save crew</button>
  </div>`;
  document.body.appendChild(wrap);
  const close=()=>{ state.modal=null; wrap.remove(); };
  wrap.querySelector("#cw-close").onclick=close; wrap.onclick=e=>{ if(e.target===wrap) close(); };
  wrap.querySelectorAll("[data-crew]").forEach(b=>b.onclick=()=>{ const id=b.dataset.crew; sel.has(id)?sel.delete(id):sel.add(id); b.classList.toggle("on"); b.querySelector(".crew-chk").textContent=sel.has(id)?'✓':''; });
  wrap.querySelector("#cw-save").onclick=()=>{ state.crew=[...sel]; localStorage.setItem("fp_crew",JSON.stringify(state.crew)); state.meetMode="crew"; close(); renderView(); toast("Crew saved"); };
}
