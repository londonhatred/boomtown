/* ---------- WEATHER (cached, sunrise/sunset offline) ---------- */
function festivalCoords(){
  // average of pinned stages, else fall back to the device's current GPS position
  const ss=stagesWithCoords();
  if(ss.length) return { lat: ss.reduce((a,s)=>a+s.lat,0)/ss.length, lng: ss.reduce((a,s)=>a+s.lng,0)/ss.length };
  if(find.pos) return { lat:find.pos.lat, lng:find.pos.lng };   // before stages are pinned, use where you are
  return null;
}
// daylight from lat/long + date — pure math, works offline
function sunTimes(date,lat,lng){
  const rad=Math.PI/180;
  const dayMs=86400000, J1970=2440588, J2000=2451545;
  const toJulian=d=>d.valueOf()/dayMs-0.5+J1970;
  const toDays=d=>toJulian(d)-J2000;
  const e=rad*23.4397;
  const M=rad*(357.5291+0.98560028*toDays(date));
  const C=rad*(1.9148*Math.sin(M)+0.02*Math.sin(2*M)+0.0003*Math.sin(3*M));
  const L=M+C+rad*102.9372+Math.PI;
  const dec=Math.asin(Math.sin(0)*Math.cos(e)+Math.cos(0)*Math.sin(e)*Math.sin(L));
  const lw=rad*-lng;
  const n=Math.round(toDays(date)-0.0009-lw/(2*Math.PI));
  const ds=0.0009+lw/(2*Math.PI)+n;
  const Ms=rad*(357.5291+0.98560028*(ds+ (J2000-J2000)));
  // simpler: use approximate transit
  const Jtransit=J2000+ds+0.0053*Math.sin(M)-0.0069*Math.sin(2*(M+C+rad*102.9372+Math.PI));
  const h0=(-0.83)*rad;
  const w0=Math.acos((Math.sin(h0)-Math.sin(rad*lat)*Math.sin(dec))/(Math.cos(rad*lat)*Math.cos(dec)));
  if(isNaN(w0)) return null;
  const Jset=Jtransit+ (w0/(2*Math.PI));
  const Jrise=Jtransit-(w0/(2*Math.PI));
  const fromJulian=j=>new Date((j+0.5-J1970)*dayMs);
  return { sunrise:fromJulian(Jrise), sunset:fromJulian(Jset) };
}
function weatherCard(){
  if(!feat("weather")||!festivalStart()) return "";
  const co=festivalCoords();
  const day=currentFestivalDay();
  const date=dateForDay(day)||new Date();
  let sunrise="", sunset="";
  if(co){
    const st=sunTimes(date,co.lat,co.lng);
    if(st&&st.sunrise&&st.sunset){ sunrise=clockMs(st.sunrise.getTime()); sunset=clockMs(st.sunset.getTime()); }
  }
  // cached forecast (fetched by refreshWeather when online).
  // Temp/rain always reflect REAL today (the only thing the API can actually forecast);
  // the festival "day" may be months out, so we never key the forecast to it.
  const w=state.structure.weatherCache;
  let hi=null, lo=null, rain=null, forecastForToday=false;
  if(w && w.daily){
    const realToday = new Date().toISOString().slice(0,10);
    let i=(w.daily.time||[]).indexOf(realToday);
    if(i<0) i = (w.daily.time||[]).length ? 0 : -1;   // fall back to first available day
    else forecastForToday=true;
    if(i>=0){
      hi=Math.round(w.daily.temperature_2m_max[i]); lo=Math.round(w.daily.temperature_2m_min[i]);
      rain=w.daily.precipitation_probability_max?w.daily.precipitation_probability_max[i]:null;
    }
  }
  // nothing to show yet — explain why instead of rendering blank
  if(!co){
    return `<div class="home-card weather-card"><div class="hc-title">Weather &amp; daylight</div><div class="wc-hint">Turn on location (or pin a stage) to see the forecast, sunrise &amp; sunset.</div></div>`;
  }
  const items=[];
  if(hi!=null) items.push(`<div class="wc-item"><div class="wc-lbl">High</div><div class="wc-val">${hi}°</div></div>`);
  if(lo!=null) items.push(`<div class="wc-item"><div class="wc-lbl">Low</div><div class="wc-val">${lo}°</div></div>`);
  if(rain!=null) items.push(`<div class="wc-item"><div class="wc-lbl">Rain</div><div class="wc-val">${rain}%</div></div>`);
  if(sunrise) items.push(`<div class="wc-item"><div class="wc-lbl">Sunrise</div><div class="wc-val">${sunrise}</div></div>`);
  if(sunset) items.push(`<div class="wc-item"><div class="wc-lbl">Sunset</div><div class="wc-val">${sunset}</div></div>`);
  if(!items.length) return "";
  const fcMissing = (hi==null && navigator.onLine);
  // If the festival is more than ~2 days out, the temps are "today's", so say so.
  const festFar = (()=>{ const fd=dateForDay(currentFestivalDay()); if(!fd) return false; return (fd.getTime()-Date.now()) > 2*86400000; })();
  const header = festFar ? `Weather today` : `Weather &amp; daylight · ${day.slice(0,3)}`;
  return `<div class="home-card weather-card">
    <div class="hc-title">${header}</div>
    <div class="wc-grid">${items.join("")}</div>
    ${festFar && hi!=null ? `<div class="wc-hint">Showing today's weather — festival forecast appears nearer the time.</div>` : (fcMissing?`<div class="wc-hint">Forecast loads when online — pull up again in a moment.</div>`:"")}
  </div>`;
}
function weatherNudgeCard(){
  if(!adminFeat("weatherx")) return "";
  const w=state.structure.weatherCache; if(!w) return "";
  const nudges=[];
  // Rain nudge: next 3h, >=60% precip probability anywhere
  if(w.hourly && w.hourly.time && w.hourly.precipitation_probability){
    const now=new Date();
    const nowH=now.toISOString().slice(0,13);
    const idx=w.hourly.time.findIndex(t=>t.slice(0,13)>=nowH);
    if(idx>=0){
      let maxP=0, atHour=null;
      for(let i=idx;i<Math.min(idx+3, w.hourly.time.length);i++){
        const p=w.hourly.precipitation_probability[i]||0;
        if(p>maxP){ maxP=p; atHour=w.hourly.time[i]; }
      }
      if(maxP>=60){
        const t=atHour ? new Date(atHour) : null;
        const tlbl=t ? (()=>{ let h=t.getHours(); const ap=h>=12?'pm':'am'; h=h%12||12; return `${h}${ap}`; })() : "soon";
        nudges.push({kind:"rain", emoji:"☔", text:`Rain likely around ${tlbl} (${maxP}%) — grab a layer.`});
      }
    }
  }
  // Today's low temp + UV
  if(w.daily && w.daily.time){
    const today=new Date().toISOString().slice(0,10);
    const i=w.daily.time.indexOf(today);
    if(i>=0){
      const lo=w.daily.temperature_2m_min ? w.daily.temperature_2m_min[i] : null;
      const uv=w.daily.uv_index_max ? w.daily.uv_index_max[i] : null;
      if(lo!=null && lo<=8) nudges.push({kind:"cold", emoji:"🧥", text:`Cold tonight — low of ${Math.round(lo)}°. Bring a layer for the small hours.`});
      const isDay = (()=>{ const h=new Date().getHours(); return h>=9 && h<=17; })();
      if(uv!=null && uv>=7 && isDay) nudges.push({kind:"uv", emoji:"☀", text:`High UV today (index ${Math.round(uv)}) — sunscreen + water.`});
    }
  }
  if(!nudges.length) return "";
  return `<div class="home-card weather-nudge">
    <div class="hc-title">${nudges[0].emoji} Heads up</div>
    ${nudges.map(n=>`<div style="font-size:13.5px;line-height:1.45;margin-top:4px">${esc(n.text)}</div>`).join("")}
  </div>`;
}
async function refreshWeather(){
  if(!feat("weather")) return;
  if(!navigator.onLine) return;
  const co=festivalCoords(); if(!co) return;
  // only skip a refetch if we have a RECENT cache that actually contains data
  const w=state.structure.weatherCache;
  if(w && w.daily && (w.daily.time||[]).length && w.fetchedAt && Date.now()-w.fetchedAt < 3*3600000) return;
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${co.lat.toFixed(3)}&longitude=${co.lng.toFixed(3)}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,uv_index_max&hourly=temperature_2m,precipitation_probability&timezone=auto&forecast_days=3`;
    const res=await fetch(url); if(!res.ok) return;
    const data=await res.json();
    if(!data || !data.daily || !(data.daily.time||[]).length) return;   // don't cache an empty response
    if(state.user && state.user.admin) await saveStructure({...state.structure, weatherCache:{ daily:data.daily, hourly:data.hourly||null, fetchedAt:Date.now() }});
    else state.structure.weatherCache={ daily:data.daily, hourly:data.hourly||null, fetchedAt:Date.now() };  // local only for non-admins
  }catch(e){}
}

/* ---------- CLASH RESOLVER ---------- */
// group a day's picks into clusters of mutually-overlapping events
function clashClusters(day, opts){
  const futureOnly = opts && opts.futureOnly;
  const now=Date.now();
  const ids=myPickIds();
  let list=sortEvents(state.events.filter(e=>ids.has(e.id)&&e.day===day))
    .map(e=>({e, r:timeRangeMin(e)}));
  // work shifts are immovable blocks — fold them in so overlapping picks register as clashes
  if(feat("shifts")){
    (state.shifts||[]).filter(sh=>sh.day===day).forEach(sh=>{
      const ev={id:"sh:"+sh.id, title:sh.label||"Work shift", stageName:"", districtId:null, day, start:sh.start, end:sh.end||addHour(sh.start), _shift:true};
      list.push({e:ev, r:timeRangeMin(ev), isShift:true});
    });
    list.sort((a,b)=> a.r[0]-b.r[0] || a.r[1]-b.r[1]);
  }
  const clusters=[];
  let cur=null, curEnd=-1;
  list.forEach(item=>{
    const [s,en]=item.r;
    if(cur && s < curEnd){           // overlaps the running cluster window
      cur.push(item); curEnd=Math.max(curEnd,en);
    } else {
      if(cur && cur.length>1) clusters.push(cur);
      cur=[item]; curEnd=en;
    }
  });
  if(cur && cur.length>1) clusters.push(cur);
  // only keep clusters that contain at least one real pick (not shift-only)
  let out = clusters.filter(c=>c.some(x=>!x.isShift));
  // for live/actionable views: drop clusters where every act has already ended (can't act on them)
  if(futureOnly){
    out = out.filter(c=> c.some(x=>{ const en=eventEnd(x.e); return !en || en.getTime()>now; }));
  }
  return out;
}
function walkMinBetween(aName,bName){
  const sa=stagesWithCoords().find(s=>s.name===aName), sb=stagesWithCoords().find(s=>s.name===bName);
  if(sa&&sb){ const w=walkSeconds(sa.id,sb.id); if(w!=null) return Math.max(1,Math.round(w/60)); }
  return null;
}
// how many of my crew (or whole group if no crew) picked an event
function crewGoing(eventId){
  const me=state.user.id;
  let peers=state.users.map(u=>u.id).filter(id=>id!==me);
  const usingCrew = state.crew && state.crew.length;
  if(usingCrew) peers=peers.filter(id=>state.crew.includes(id));
  const peerSet=new Set(peers);
  return state.picks.filter(p=>p.eventId===eventId && peerSet.has(p.userId)).length;
}
// Route through a clash cluster. Protects must-see acts in full (reserving their time);
// routes the rest into the gaps around them. Returns {route, missed, mustConflict}.
const MIN_WORTH=10;     // minutes — ignore slivers smaller than this
const SOLID_CHUNK=20;   // minutes — below this counts as a "sliver" worth flagging
// find a set of must-sees that all mutually overlap (the contested headliner pile-up)
function clashingMustSet(items){
  const must=myMustSee();
  const ms=items.filter(x=>must.has(x.e.id));
  if(ms.length<2) return [];
  // greedily collect must-sees that overlap the others' shared window
  const overlap=(a,b)=>a.r[0]<b.r[1]&&b.r[0]<a.r[1];
  // build clusters of mutually-overlapping must-sees; return the largest such group of size>=2
  let best=[];
  for(let i=0;i<ms.length;i++){
    const group=[ms[i]];
    for(let j=0;j<ms.length;j++){ if(j!==i && group.every(g=>overlap(g,ms[j]))) group.push(ms[j]); }
    if(group.length>best.length) best=group;
  }
  return best.length>=2?best.sort((a,b)=>a.r[1]-b.r[1]):[];
}
function planCluster(items){
  const must = myMustSee();
  const sorted=[...items].sort((a,b)=> a.r[0]-b.r[0] || a.r[1]-b.r[1]);
  const musts = sorted.filter(x=>must.has(x.e.id) && !x.isShift);
  const conflictMusts = clashingMustSet(sorted.filter(x=>!x.isShift));   // 2+ must-sees that mutually clash
  // protected = work shifts (always) + non-overlapping subset of must-sees (earliest-ending wins)
  const protectedSet=new Set();
  const protectedBlocks=[];
  // shifts are hard, immovable blocks — reserve first
  sorted.filter(x=>x.isShift).forEach(sh=>{ protectedBlocks.push([sh.r[0], sh.r[1]]); protectedSet.add(sh.e.id); });
  if(musts.length){
    [...musts].sort((a,b)=>a.r[1]-b.r[1]).forEach(m=>{
      const [s,e]=m.r;
      if(!protectedBlocks.some(([ps,pe])=> s<pe && ps<e)){ protectedSet.add(m.e.id); protectedBlocks.push([s,e]); }
    });
  }
  const route=[]; const missed=[];
  let freeAt=null, atStage=null;
  for(let i=0;i<sorted.length;i++){
    const it=sorted[i]; const [s,e]=it.r;
    const isProtected=protectedSet.has(it.e.id);
    if(isProtected){
      route.push({item:it, seeFrom:s, seeTo:e, seeMin:e-s, partialStart:false, partialEnd:false, must:!it.isShift, shift:!!it.isShift});
      freeAt=e; atStage=it.e.stageName; continue;
    }
    let arrive = freeAt===null ? s : Math.max(s, freeAt + (walkMinBetween(atStage,it.e.stageName)||0));
    protectedBlocks.forEach(([ps,pe])=>{ if(arrive<pe && ps<=arrive) arrive=pe; });
    let cap=e;
    protectedBlocks.forEach(([ps,pe])=>{ if(ps>=arrive && ps<cap) cap=ps; });
    if(cap-arrive < MIN_WORTH){ missed.push(it); continue; }
    let leaveBy=cap;
    const nxt=sorted[i+1];
    if(nxt && cap===e){
      const wm=walkMinBetween(it.e.stageName, nxt.e.stageName)||0;
      const nxtProtected=protectedSet.has(nxt.e.id);
      const beThereBy = nxtProtected ? nxt.r[0] : (nxt.r[1]-MIN_WORTH);
      const mustLeave = Math.min(e, beThereBy - wm);
      if(mustLeave>=arrive+MIN_WORTH) leaveBy=Math.min(cap, Math.max(mustLeave, arrive));
    }
    route.push({item:it, seeFrom:arrive, seeTo:leaveBy, seeMin:leaveBy-arrive, partialStart:arrive>s, partialEnd:leaveBy<e, must:false});
    freeAt=leaveBy; atStage=it.e.stageName;
  }
  route.sort((a,b)=>a.seeFrom-b.seeFrom);
  // A "parallel alternative": an act that got missed/slivered not because it barely overlaps the
  // cluster, but because it runs concurrently with something already routed. These shouldn't be
  // called "probably skip" — they're a genuine either/or the user should know about.
  const routedIds=new Set(route.map(r=>r.item.e.id));
  const parallels=[];
  // drop a trailing sliver (last segment, non-must, under SOLID_CHUNK) → suggest skipping it,
  // BUT only if it's genuinely a thin fragment, not a full act that simply overlapped a routed one.
  let skipTail=null;
  if(route.length>=2){
    const last=route[route.length-1];
    const fullLen=last.item.r[1]-last.item.r[0];
    if(!last.must && last.seeMin<SOLID_CHUNK){
      if(fullLen>=SOLID_CHUNK){ parallels.push(last.item); route.pop(); }   // substantial act, just overlapped → alternative
      else { skipTail=last.item; route.pop(); }                            // genuinely short overlap → skip
    }
  }
  // any act fully missed but substantial and overlapping a routed act = also a parallel alternative
  for(const m of missed){
    if(m.isShift) continue;
    const [ms,me]=m.r; const fullLen=me-ms;
    if(fullLen>=SOLID_CHUNK && route.some(r=>!r.shift && ms<r.seeTo && r.seeFrom<me)){
      if(!parallels.includes(m)) parallels.push(m);
    }
  }
  const trueMissed = missed.filter(m=>!parallels.includes(m));
  return {route, missed:trueMissed, conflictMusts, skipTail, parallels};
}
// build an even-split route across a set of mutually-clashing must-sees (earliest-ending first)
function splitMustRoute(group){
  // contested window = latest start → earliest end isn't right; use overall span they share.
  const spanStart=Math.max(...group.map(g=>g.r[0]));   // when all are running
  const spanEnd=Math.min(...group.map(g=>g.r[1]));
  // but really you can use each act's own time; simplest fair model: divide [earliest start, latest end] evenly
  const start=Math.min(...group.map(g=>g.r[0]));
  const end=Math.max(...group.map(g=>g.r[1]));
  const n=group.length;
  const ordered=[...group].sort((a,b)=>a.r[1]-b.r[1]);   // earliest-ending first
  const slice=(end-start)/n;
  const segs=[]; let t=start;
  ordered.forEach((g,i)=>{
    let segStart=Math.max(t, g.r[0]);
    let segEnd= i===n-1 ? Math.min(end,g.r[1]) : t+slice;
    segEnd=Math.min(segEnd, g.r[1]);
    if(i>0){ const wm=walkMinBetween(ordered[i-1].e.stageName,g.e.stageName)||0; segStart=Math.max(segStart,t+wm); }
    segs.push({item:g, from:Math.round(segStart), to:Math.round(segEnd), min:Math.max(0,Math.round(segEnd-segStart))});
    t=segEnd;
  });
  return segs;
}
function clusterAdvice(items){
  const {route, missed, conflictMusts, skipTail, parallels}=planCluster(items);

  // ----- multiple clashing must-sees: offer split + pick-one, warn honestly -----
  let header="";
  if(conflictMusts.length>=2){
    const n=conflictMusts.length;
    const names=conflictMusts.map(m=>`★ ${esc(m.e.title)}`).join(", ");
    const splitSegs=splitMustRoute(conflictMusts);
    const splitTxt=splitSegs.map((s,i)=>{
      const wm=i>0?walkMinBetween(splitSegs[i-1].item.e.stageName,s.item.e.stageName):null;
      return `<b>${esc(s.item.e.title)}</b> ${minToHM(s.from)}–${minToHM(s.to)} <span class="ca-dur">~${s.min} min</span>${wm?` <span class="ca-dur">(+~${wm} min walk)</span>`:''}`;
    }).join(" → ");
    const fraction = n===2?"halves each":n===3?"thirds":`1/${n} each`;
    const strong = n>=3 ? `<span class="ca-conflict">${n} must-sees at once — splitting means only ~${Math.round(splitSegs.reduce((a,s)=>a+s.min,0)/n)} min of each. Strongly consider dropping one.</span>`
                        : `<span class="ca-conflict">${names} all clash — you can't see each in full.</span>`;
    // route any NON-must acts into time left after the split ends
    const splitEnd = Math.max(...splitSegs.map(s=>s.to));
    const lastStage = splitSegs[splitSegs.length-1].item.e.stageName;
    const conflictIds = new Set(conflictMusts.map(m=>m.e.id));
    const leftovers=[];
    let freeAt=splitEnd, atStage=lastStage;
    [...items].filter(x=>!conflictIds.has(x.e.id)).sort((a,b)=>a.r[1]-b.r[1]).forEach(x=>{
      const [s,e]=x.r;
      const arrive=Math.max(s, freeAt + (walkMinBetween(atStage,x.e.stageName)||0));
      const seeMin=e-arrive;
      if(seeMin>=MIN_WORTH){ leftovers.push({item:x, from:arrive, to:e, min:seeMin}); freeAt=e; atStage=x.e.stageName; }
    });
    let leftoverTxt="";
    if(leftovers.length){
      leftoverTxt=` <span class="ca-extra">Then still catch ${leftovers.map(l=>`<b>${esc(l.item.e.title)}</b> from ${minToHM(l.from)} (~${l.min} min)`).join(", ")}.</span>`;
    }
    header = `${strong}
      <div class="ca-opt"><span class="ca-lead">Split (${fraction}):</span> ${splitTxt}.${leftoverTxt} <span class="ca-miss">You'd see none of the must-sees in full — usually better to pick one.</span></div>
      <div class="ca-opt"><span class="ca-lead">Or commit:</span> ${conflictMusts.map(m=>`<b>${esc(m.e.title)}</b>`).join(" / ")} — choose your favourite and see it properly.</div>`;
    return header;
  }

  // ----- shift swallows the whole cluster: route is just the shift, everything else missed -----
  const shiftItem = items.find(x=>x.isShift);
  if(shiftItem && missed.length && route.every(r=>r.shift)){
    const missedActs = missed.filter(m=>!m.isShift).map(m=>esc(m.e.title));
    return `<span class="ca-conflict">You're working ${esc(fmt12(shiftItem.e.start))}–${esc(fmt12(shiftItem.e.end))}</span> — you'll miss ${missedActs.join(", ")}.`;
  }

  // ----- normal single-or-no must-see routing -----
  if(route.length<=1){
    // if the one surviving item is a shift, there's nothing to "pick"
    if(route.length===1 && route[0].shift){
      return `<span class="ca-conflict">You're working ${esc(fmt12(route[0].item.e.start))}–${esc(fmt12(route[0].item.e.end))}</span>${missed.length?` — you'll miss ${missed.filter(m=>!m.isShift).map(m=>esc(m.e.title)).join(", ")}.`:'.'}`;
    }
    const stages=[...new Set(items.filter(x=>!x.isShift).map(x=>x.e.stageName))];
    let maxWm=null;
    for(let i=0;i<stages.length;i++)for(let j=i+1;j<stages.length;j++){ const wm=walkMinBetween(stages[i],stages[j]); if(wm!=null&&(maxWm==null||wm>maxWm)) maxWm=wm; }
    let line=`<span class="ca-lead">Pick one</span> — these run at the same time${maxWm!=null?`, stages ~${maxWm} min apart`:''}.`;
    if(skipTail) line+=` <span class="ca-miss">${esc(skipTail.e.title)} barely overlaps — probably skip.</span>`;
    return line;
  }
  const parts=route.map((r,i)=>{
    const t=esc(r.item.e.title);
    const star=r.shift?'':(r.must?'★ ':'');
    if(r.shift){ // shift is a fixed block — phrase as "working"
      return `${star}<b>${t}</b> ${minToHM(r.seeFrom)}–${minToHM(r.seeTo)} <span class="ca-dur">working</span>`;
    }
    const sliver = !r.must && r.seeMin<SOLID_CHUNK;
    const dur=`<span class="ca-dur">~${r.seeMin} min${sliver?' · could skip':''}</span>`;
    if(i===0) return `${star}<b>${t}</b> till ${minToHM(r.seeTo)} ${dur}`;
    const wm=walkMinBetween(route[i-1].item.e.stageName, r.item.e.stageName);
    const verb = r.partialStart ? `catch ${star}<b>${t}</b> from ${minToHM(r.seeFrom)}` : `${star}<b>${t}</b>`;
    return `${verb}${wm!=null?` (~${wm} min walk)`:''}${r.partialEnd?` till ${minToHM(r.seeTo)}`:''} ${dur}`;
  });
  let line=`<span class="ca-lead">One option:</span> ${parts.join(" → ")}.`;
  const hasShift=route.some(r=>r.shift);
  if(missed.length) line += ` <span class="ca-miss">${hasShift?"You're working then — you'll miss":"Can't also fit"} ${missed.map(m=>esc(m.e.title)).join(", ")}.</span>`;
  if(skipTail) line += ` <span class="ca-miss">${esc(skipTail.e.title)}'s only a few min by then — probably skip.</span>`;
  if(parallels && parallels.length){
    line += ` <span class="ca-extra">Also on then: ${parallels.map(p=>`<b>${esc(p.e.title)}</b> (${esc(fmt12(p.e.start))}–${esc(fmt12(p.e.end))})`).join(", ")} — runs alongside, so it's an either/or.</span>`;
  }
  const slivers=route.filter(r=>!r.must && r.seeMin<SOLID_CHUNK);
  if(slivers.length>=Math.max(1,route.length-1) && route.length>=2 && !route.some(r=>r.must)){
    line += ` <span class="ca-miss">That's a lot of dashing for short bits — you might enjoy committing to one or two instead.</span>`;
  }
  return line;
}
// Compact Home warning: just the count + a tap target. The full advice opens in a modal.
function clashWarnCard(){
  const ids=myPickIds();
  const days=DAYS.filter(d=> state.events.some(e=>ids.has(e.id)&&e.day===d));
  let n=0;
  days.forEach(d=>{ n += clashClusters(d,{futureOnly:true}).length; });
  if(!n) return "";
  return `<button class="clash-warn tappable" id="home-clashwarn" aria-label="See clash advice">
    <span class="cw-ico" aria-hidden="true">⚠</span>
    <span class="cw-text"><b>${n} schedule clash${n>1?'es':''}</b><span class="cw-sub">tap to see how to navigate them</span></span>
    <span class="cw-arrow">›</span>
  </button>`;
}
function clashCard(limit){
  const ids=myPickIds();
  const days=DAYS.filter(d=> state.events.some(e=>ids.has(e.id)&&e.day===d));
  const clusters=[];
  days.forEach(d=>{ clashClusters(d,{futureOnly:true}).forEach(c=>clusters.push({day:d, items:c})); });
  if(!clusters.length) return "";
  const cap = (typeof limit==="number") ? limit : clusters.length;
  const rows=clusters.slice(0,cap).map(c=>{
    const start=c.items.map(x=>x.r[0]).reduce((a,b)=>Math.min(a,b));
    const acts=c.items.map(x=>{
      if(x.isShift){
        return `<div class="ci-act"><span class="ci-title">${esc(x.e.title)}</span><span class="ci-stage">${esc(fmt12(x.e.start))}${x.e.end?'–'+esc(fmt12(x.e.end)):''} · working</span></div>`;
      }
      const n=crewGoing(x.e.id);
      const crewWord=(state.crew&&state.crew.length)?"crew":"going";
      return `<div class="ci-act"><span class="ci-title">${esc(x.e.title)}</span><span class="ci-stage">${esc(fmt12(x.e.start))}${x.e.end?'–'+esc(fmt12(x.e.end)):''}${n?` · ${n} ${crewWord}`:''}</span></div>`;
    }).join("");
    return `<div class="clash-item">
      <div class="clash-when">${c.day.slice(0,3)} · ${minToHM(start)} · ${c.items.length} clash</div>
      <div class="clash-acts">${acts}</div>
      <div class="clash-advice">${clusterAdvice(c.items)}</div>
    </div>`;
  }).join("");
  return `<div class="free-card" style="border-color:var(--accent)"><div class="free-head">${clusters.length} clash${clusters.length>1?'es':''} in your plan</div>
    <div class="find-note" style="margin-bottom:8px">Overlapping picks — grouped by when they collide.</div>
    <div class="clash-list">${rows}</div>${clusters.length>cap?`<div class="find-note" style="margin-top:8px">+${clusters.length-cap} more</div>`:""}</div>`;
}

/* ---------- MY PLAN ---------- */
function viewMine(){
  const ids = myPickIds();
  let list = sortEvents(state.events.filter(e=>ids.has(e.id)));
  const shifts = (state.shifts||[]).slice();
  // clash detection (picks vs picks, and picks vs my shifts).
  // Only flag clashes that are still actionable — once both acts have ended, it's not a live clash.
  const _now=Date.now();
  const notEnded = e => { const en=eventEnd(e); return !en || en.getTime()>_now; };
  const clashSet = new Set();
  for(let i=0;i<list.length;i++) for(let j=i+1;j<list.length;j++){
    if(overlaps(list[i],list[j]) && (notEnded(list[i])||notEnded(list[j]))){ clashSet.add(list[i].id); clashSet.add(list[j].id); }
  }
  shifts.forEach(sh=>{ list.forEach(e=>{ if(overlaps({day:sh.day,start:sh.start,end:sh.end||addHour(sh.start)}, e) && notEnded(e)){ clashSet.add(e.id); clashSet.add("sh:"+sh.id); } }); });
  const daysActive = new Set([...list.map(e=>e.day), ...shifts.map(s=>s.day)]).size;

  const addShiftBtn = feat("shifts") ? `<button class="btn ghost sm no-print" id="add-shift" style="flex:none">＋ Shift</button>` : "";

  if(list.length===0 && shifts.length===0){
    return `
      <div class="sec-head"><div><h2>My plan</h2><div class="lead">Your personal weekend schedule.</div></div>${addShiftBtn}</div>
      ${emptyState("","Nothing picked yet","Go to Browse and tap the ✓ on acts you want to catch."+(feat("shifts")?" Working the festival? Add a private shift with ＋ Shift.":""))}`;
  }

  // group BOTH events and shifts by day. Use festMin so post-midnight (late-night) times
  // sort AFTER the evening, not before the afternoon (00:30 belongs at the end of the night).
  const byDay={}; DAYS.forEach(d=>byDay[d]=[]);

        return nClash ? `<button class="stat stat-tap" id="open-clashes"><div class="n">${nClash}</div><div class="l">Clashes · tap for advice</div></button>`

// ---- Energy patterns: gentle observations from picks, ratings & trail ----
// Uses only existing data. Honest about needing multiple days to mean anything.
function energyData(){
  const out={ rated:[], hours:{}, latestEnd:null, gapsAfter:[] };
  const myR = state.ratings.filter(r=>r.userId===state.user.id);
  myR.forEach(r=>{
    const ev=state.events.find(e=>e.id===r.eventId); if(!ev) return;
    const end=eventEnd(ev); if(!end) return;
    out.rated.push({ev, score:r.score, end});
    const h=end.getHours();
    if(!out.hours[h]) out.hours[h]={count:0,sum:0};
    out.hours[h].count++; out.hours[h].sum+=r.score;
    if(!out.latestEnd || end>out.latestEnd) out.latestEnd=end;
  });
  return out;
}
function peakHour(){
  const d=energyData();
  let best=null;
  Object.entries(d.hours).forEach(([h,v])=>{
    // peak = the hour where you rated the most sets (engagement-weighted), with avg ≥ 7 as a sanity check
    if(v.count>=2 && v.sum/v.count>=7){ if(!best || v.count>best.count) best={h:+h, count:v.count, avg:v.sum/v.count}; }
  });
  return best;
}
// Should a "you're running long" nudge fire? Honest gate: festival "during" phase, energy admin-feat on,
// at least 3 rated sets total, we have a clear peak, today's current hour is >=3 hours past peak,
// and it's been >2 hrs since last engagement. At most once per day (localStorage dedupe).
function shouldEnergyNudge(){
  if(!adminFeat("energy") || !state.user) return null;
  if(festivalPhase()!=="during") return null;
  const today=currentFestivalDay(); if(!today) return null;
  const tag="fp_energy_"+today;
  if(localStorage.getItem(tag)==="1") return null;
  const d=energyData(); if(d.rated.length<3) return null;
  const peak=peakHour(); if(!peak) return null;
  const now=new Date(); const curH=now.getHours();
  // simple "past peak by 3h" check (handles wraparound for late-night peaks)
  const peakH=peak.h; const hoursPastPeak=((curH-peakH)+24)%24;
  if(hoursPastPeak<3 || hoursPastPeak>10) return null;   // not "running long", or too long ago to count
  const sinceLast=(d.latestEnd ? (now-d.latestEnd)/3600000 : 999);
  if(sinceLast<2) return null;                            // recently engaged → not a taper
  return { peakH, hoursPastPeak:Math.round(hoursPastPeak), tag };
}
function dismissEnergyNudge(tag){ try{ localStorage.setItem(tag,"1"); }catch(e){} }
function energyNudgeCard(){
  const n=shouldEnergyNudge(); if(!n) return "";
  const peakFmt=`${(n.peakH%12)||12}${n.peakH>=12?'pm':'am'}`;
  return `<div class="home-card energy-card" id="energy-nudge">
    <div class="hc-title" style="display:flex;align-items:center;gap:6px">💛 A gentle nudge</div>
    <p style="font-size:13.5px;line-height:1.45;margin:6px 0 10px">Your peak's usually around <b>${peakFmt}</b> and you're ${n.hoursPastPeak}h past it. If you're flagging, a sit-down + water now will pay dividends later.</p>
    <button class="btn ghost sm" id="energy-dismiss" data-tag="${n.tag}">Got it, hush for today</button>
  </div>`;
}

// ---- Should-I-go oracle ----
// Tap any future-and-not-yet-picked event → focused popup with grounded data + a verdict line.
function openOracle(eventId){
  const ev=state.events.find(e=>e.id===eventId); if(!ev) return;
  const start=eventStart(ev), end=eventEnd(ev);
  let score=0; const lines=[];
  const pushLine = (good, text, weight) => { score += (good?weight:-weight); lines.push({good, text, weight}); };

  // 1) Stage personality
  const personalityList = stagePersonality();
  const stagePer = personalityList.find(p=>p.stage===ev.stageName);
  if(stagePer){
    if(stagePer.avg>=8)        pushLine(true,  `This stage averages <b>${stagePer.avg.toFixed(1)}</b> across the weekend — solid form.`, 2);
    else if(stagePer.avg>=7)   pushLine(true,  `This stage averages <b>${stagePer.avg.toFixed(1)}</b> — generally well-rated.`, 1);
    else if(stagePer.avg<6)    pushLine(false, `This stage averages <b>${stagePer.avg.toFixed(1)}</b> across the weekend — quieter form.`, 1);
  }

  // 2) Crew picks — show names, weight must-sees more heavily
  const crewPicks = state.picks.filter(p=>p.eventId===ev.id && p.userId!==state.user.id);
  const crewMusts  = crewPicks.filter(p=>p.mustSee);
  const crewPlain  = crewPicks.filter(p=>!p.mustSee);
  const nameOf = id => userName(id);
  const formatNames = (list, limit) => {
    if(!list.length) return "";
    if(list.length<=limit) return list.length===1 ? list[0] : list.length===2 ? `${list[0]} and ${list[1]}` : `${list.slice(0,-1).join(", ")} and ${list[list.length-1]}`;
    const extra = list.length-limit;
    return `${list.slice(0,limit).join(", ")} and ${extra} other${extra>1?'s':''}`;
  };
  if(crewMusts.length){
    const names = formatNames(crewMusts.map(p=>nameOf(p.userId)), 3);
    const w = Math.min(4, crewMusts.length*1.5);   // must-see is worth 1.5 each, capped 4
    pushLine(true, `<b>★ ${names}</b> ${crewMusts.length===1?"has":"have"} this as a must-see.`, w);
  }
  if(crewPlain.length){
    const names = formatNames(crewPlain.map(p=>nameOf(p.userId)), 3);
    const w = Math.min(2, crewPlain.length*0.5);   // pick alone is 0.5 each, capped 2
    pushLine(true, `${names} ${crewPlain.length===1?"has":"have"} it on their plan.`, w);
  }

  // 3) Crew already near the stage right now (only for imminent sets — starts within 30 min)
  const minsTo = start ? (start.getTime()-Date.now())/60000 : null;
  if(minsTo!=null && minsTo<=30 && minsTo>=-15 && ev.stageName){
    const stage = stagesWithCoords().find(s=>s.name===ev.stageName);
    if(stage){
      const NEAR = 60;   // metres
      const here = peopleWithCoords().filter(p=>haversine(p.lat,p.lng,stage.lat,stage.lng)<=NEAR);
      if(here.length){
        const names = formatNames(here.map(p=>p.name), 3);
        pushLine(true, `<b>${names}</b> ${here.length===1?"is":"are"} at the stage right now.`, 2);
      }
    }
  }

  // 4) Clash check
  const ids=myPickIds();
  const clashWith = state.events.filter(e=>ids.has(e.id) && e.day===ev.day).find(e=>{
    const s2=eventStart(e), e2=eventEnd(e);
    return s2 && e2 && start && end && (s2 < end) && (e2 > start);
  });
  if(clashWith){
    pushLine(false, `Clashes with your pick: <b>${esc(clashWith.title)}</b> (${fmt12(clashWith.start)}–${clashWith.end?fmt12(clashWith.end):""}).`, 3);
  } else {
    pushLine(true, `No clash with your picks.`, 0.5);
  }

  // 5) Walk from previous pick
  const myEarlier = state.events.filter(e=>ids.has(e.id) && e.day===ev.day).map(e=>({e, end:eventEnd(e)})).filter(x=>x.end && x.end<=start).sort((a,b)=>b.end-a.end);
  if(myEarlier.length){
    const prev=myEarlier[0].e;
    if(prev.stageName && ev.stageName){
      const prevS=stagesWithCoords().find(s=>s.name===prev.stageName);
      const thisS=stagesWithCoords().find(s=>s.name===ev.stageName);
      if(prevS && thisS){
        const sec=walkSeconds(prevS.id, thisS.id);
        if(sec){
          const min=Math.round(sec/60);
          if(min>15)      pushLine(false, `Long walk from your prior pick: <b>${min} min</b>.`, 1);
          else if(min<=5) pushLine(true,  `Short hop from <i>${esc(prev.title)}</i>: <b>${min} min</b>.`, 0.5);
          else            pushLine(true,  `<b>${min} min</b> walk from <i>${esc(prev.title)}</i>.`, 0);
        }
      }
    }
  }

  // 6) Time-of-day fit — does it align with your peak hour?
  if(start){
    const peak=peakHour();
    if(peak){
      const setH=start.getHours();
      const distH = Math.min(((setH-peak.h)+24)%24, ((peak.h-setH)+24)%24);
      if(distH<=1)        pushLine(true,  `Right in your <b>peak hour</b> (~${(peak.h%12)||12}${peak.h>=12?'pm':'am'}).`, 1);
      else if(distH>=6)   pushLine(false, `Well outside your usual peak hour (~${(peak.h%12)||12}${peak.h>=12?'pm':'am'}).`, 1);
    }
  }

  // 7) Have I rated this artist (same title) before?
  if(state.user){
    const prevRatings = state.ratings
      .filter(r=>r.userId===state.user.id && r.eventId!==ev.id)
      .map(r=>({r, e:state.events.find(x=>x.id===r.eventId)}))
      .filter(x=>x.e && x.e.title.toLowerCase()===ev.title.toLowerCase());
    if(prevRatings.length){
      const avg = prevRatings.reduce((a,b)=>a+b.r.score,0)/prevRatings.length;
      if(avg>=8)      pushLine(true,  `You rated them <b>${avg.toFixed(1)}</b> the last time you saw them.`, 2);
      else if(avg<=5) pushLine(false, `You rated them <b>${avg.toFixed(1)}</b> the last time you saw them.`, 2);
      else            pushLine(true,  `Last time, you rated them ${avg.toFixed(1)}.`, 0);
    }
  }

  // 8) Rain during set
  const w=state.structure.weatherCache;
  if(w && w.hourly && w.hourly.time && w.hourly.precipitation_probability && start){
    const sH=start.toISOString().slice(0,13);
    const eH=end?end.toISOString().slice(0,13):sH;
    let maxP=0;
    for(let i=0;i<w.hourly.time.length;i++){
      const h=w.hourly.time[i].slice(0,13);
      if(h>=sH && h<=eH){ const p=w.hourly.precipitation_probability[i]||0; if(p>maxP) maxP=p; }
    }
    if(maxP>=60) pushLine(false, `<b>${maxP}% rain</b> forecast during the set.`, 1);
  }

  // Sort lines by weight so the strongest signals appear first
  lines.sort((a,b)=>b.weight-a.weight);

  // Verdict — wider thresholds now that the score range is larger (-9..+13 ish)
  let verdict, verdictKind;
  if(score>=4)         { verdict="Go.";                       verdictKind="go"; }
  else if(score>=1.5)  { verdict="Worth a try.";              verdictKind="try"; }
  else if(score>=-0.5) { verdict="Coin flip — your call.";    verdictKind="try"; }
  else                 { verdict="Skip — unless you love them."; verdictKind="skip"; }
  // For coin-flips, surface the single most-influential line as the deciding factor
  let swingNote = "";
  if(verdictKind==="try" && score>=-0.5 && score<2 && lines.length){
    const swing = lines.find(l=>l.weight>=1);
    if(swing) swingNote = `<div class="or-swing">The deciding factor: <b>${swing.good?"+":"−"}</b> ${swing.text}</div>`;
  }

  const wrap=document.createElement("div"); wrap.className="modal-bg";
  wrap.innerHTML=`<div class="modal oracle-modal">
    <div class="modal-head"><h2>Should I go?</h2><button class="btn ghost sm" id="or-close">Close</button></div>
    <div class="or-act"><b>${esc(ev.title)}</b><br><span class="find-note">${esc(ev.stageName||"")} · ${fmt12(ev.start)}${ev.end?'–'+fmt12(ev.end):""}</span></div>
    <div class="or-verdict or-${verdictKind}">${verdict}</div>
    ${swingNote}
    <div class="or-lines">

// Hue per tag, blended in HSL for multi-tag ratings. Returns a CSS color string.
const TAG_HUES = { vibe:170, sound:42, crowd:9, surprise:264, dancing:28 };
function moodColor(tags){
  if(!Array.isArray(tags) || !tags.length) return "var(--line)";
  // Blend hues using circular mean (avoid 350° + 10° → 180° bug)
  let sx=0, sy=0, n=0;
  tags.forEach(t=>{ const h=TAG_HUES[t]; if(h==null) return; const r=h*Math.PI/180; sx+=Math.cos(r); sy+=Math.sin(r); n++; });
  if(!n) return "var(--line)";
  const hue = (Math.atan2(sy/n, sx/n) * 180/Math.PI + 360) % 360;
  return `hsl(${Math.round(hue)} 55% 48%)`;
}
function moodChip(tags, size){
  const c=moodColor(tags);

  return `<span class="mood-chip" style="background:${c};width:${s}px;height:${s}px" aria-hidden="true"></span>`;
}

// ---- Festival recap: per-day + overall "in numbers" ----
function recapStats(dayName){
  // dayName === null → whole festival; else just that day
  const ids=myPickIds();
  const now=Date.now();
  let seen=state.events.filter(e=>ids.has(e.id)).filter(e=>{
    if(dayName && e.day!==dayName) return false;
    const end=eventEnd(e); return end && end.getTime()<=now;       // only count acts that have happened
  });
  // miles walked from the private trail (filter to the day's window if per-day)
  const trail=loadTrail();
  let pts=trail;
  if(dayName){
    const base=dateForDay(dayName);
    if(base){
      const dayStart=new Date(base); dayStart.setHours(DAY_ROLLOVER_HOUR,0,0,0);
      const dayEnd=new Date(dayStart); dayEnd.setDate(dayEnd.getDate()+1);
      pts=trail.filter(p=>p.t>=dayStart.getTime() && p.t<dayEnd.getTime());
    }
  }
  let metres=0;
  for(let i=1;i<pts.length;i++) metres+=haversine(pts[i-1].lat,pts[i-1].lng,pts[i].lat,pts[i].lng);
  const miles=metres/1609.34;
  // clashes survived: clusters (for the day, or all days) fully in the past
  let clashes=0;
  const days = dayName ? [dayName] : DAYS;
  days.forEach(d=>{
    if(!state.events.some(e=>ids.has(e.id)&&e.day===d)) return;
    clashClusters(d).forEach(c=>{
      const evs=c.filter(x=>!x.isShift).map(x=>x.e);
      if(evs.length>=2 && evs.every(e=>{const en=eventEnd(e); return en && en.getTime()<=now;})) clashes++;
    });
  });
  // latest night: latest end among seen picks
  let latest=null;
  seen.forEach(e=>{ const en=eventEnd(e); if(en && (!latest || en>latest)) latest=en; });
  // my ratings + top set
  const myRated=seen.map(e=>{
    const rd=state.ratings.find(x=>x.id===state.user.id+"__"+e.id);
    return rd ? {e, r:rd.score, tags:rd.tags||[]} : null;
  }).filter(Boolean).sort((a,b)=>b.r-a.r);
  const topSet=myRated[0]||null;
  return { seenCount:seen.length, miles, clashes, latest, ratedCount:myRated.length, topSet };
}

function stagePersonality(){

// ---- Togetherness: who you've actually spent the festival with ----
// Derive co-presence buckets live from sim itineraries (no writes). Same trick as simPositions:
// two sims (or a sim + you) at the same stage at the same time, up to "now", are "together".
// This replaces the old pre-written sim co-presence — fewer writes, and togetherness builds live.
function derivedSimCopresence(){
  const now=Date.now();
  const out=[];
  const sims = state.users.filter(u=>u.sim && Array.isArray(u.simItin) && u.simItin.length);
  if(!sims.length) return out;
  // my plan as an itinerary, so my own togetherness with sims builds too
  const myItin = state.user ? state.picks.filter(p=>p.userId===state.user.id)
      .map(p=>state.events.find(e=>e.id===p.eventId)).filter(Boolean)
      .map(e=>({stageName:e.stageName, start:eventStart(e)&&eventStart(e).getTime(), end:eventEnd(e)&&eventEnd(e).getTime()}))
      .filter(x=>x.start&&x.end) : [];
  const people = sims.map(s=>({id:s.id, itin:s.simItin}));
  if(myItin.length && state.user) people.push({id:state.user.id, itin:myItin});
  // pairwise overlaps, only counting time that has already elapsed (<= now)
  for(let a=0;a<people.length;a++){
    for(let b=a+1;b<people.length;b++){
      const pair=[people[a].id, people[b].id].sort().join("__");
      people[a].itin.forEach(ia=>{
        people[b].itin.forEach(ib=>{
          if(ia.stageName!==ib.stageName) return;
          const start=Math.max(ia.start, ib.start), end=Math.min(ia.end, ib.end, now);
          if(end<=start) return;
          for(let t=start; t<end; t+=2*60000){ out.push({ pair, bucket:Math.floor(t/(2*60000)) }); }
        });
      });
    }
  }
  return out;
}
// Real (Firestore) + derived (sim) co-presence, for togetherness.
function effectiveCopresence(){
  return state.copresence.concat(derivedSimCopresence());
}
// Real time = unique 2-minute buckets per pair (both sides log, we dedupe).
// Witnessed = events both members rated. Planned = events both members picked.
function togetherness(){
  if(!state.user) return [];
  // Aggregate co-presence buckets per pair
  const buckets = {};   // pair -> Set of buckets
  effectiveCopresence().forEach(s=>{
    if(!s.pair || s.bucket==null) return;
    if(s.pair.indexOf(state.user.id)<0) return;
    (buckets[s.pair] = buckets[s.pair] || new Set()).add(s.bucket);
  });
  // Witnessed: my ratings overlapped with theirs by eventId
  const myRated = new Set(state.ratings.filter(r=>r.userId===state.user.id).map(r=>r.eventId));
  // Planned: my picks
  const myPicks = new Set(state.picks.filter(p=>p.userId===state.user.id).map(p=>p.eventId));
  // Build per-friend stats
  const rows = state.users.filter(u=>u.id!==state.user.id).map(u=>{
    const pair = [state.user.id, u.id].sort().join("__");
    const buckSet = buckets[pair] || new Set();
    const minutes = buckSet.size * 2;     // each bucket is 2 minutes
    let witnessed=0, planned=0;
    state.ratings.filter(r=>r.userId===u.id).forEach(r=>{ if(myRated.has(r.eventId)) witnessed++; });
    state.picks.filter(p=>p.userId===u.id).forEach(p=>{ if(myPicks.has(p.eventId)) planned++; });
    return { user:u, minutes, witnessed, planned };
  });
  // Sort by a composite "togetherness" score: real minutes weighted heaviest
  rows.forEach(r=>{ r.score = r.minutes + r.witnessed*5 + r.planned*2; });
  rows.sort((a,b)=> b.score-a.score);
  return rows;
}

// ---- Crew DNA ----
// A portrait of the group, computed from collective ratings, picks, and tags.
// Every line grounded; only shows lines we have data for.
function crewDNA(){
  const dna = {
    crewSize: state.users.length,
    raters: 0,                          // how many users have rated anything
    ratingsTotal: 0,
    peakHour: null,                     // {h, count}
    homeStage: null,                    // {stage, avg, count, districtId, districtName}
    tagTop: null,                       // {tag, count}
    signature: "",                      // composed personality line
    contrarian: null,                   // {user, diffFromMean}
    unanimous: null,                    // {ev, scores:[], avg, spread}
    sharedSets: 0,                      // sets rated by 2+ crew
  };
  if(!state.ratings.length) return dna;
  // Who rated anything
  const raterIds = new Set(state.ratings.map(r=>r.userId));
  dna.raters = raterIds.size;
  dna.ratingsTotal = state.ratings.length;
  // Collective peak hour
  const hourCounts = {};
  state.ratings.forEach(r=>{
    const ev=state.events.find(e=>e.id===r.eventId); if(!ev) return;
    const end=eventEnd(ev); if(!end) return;
    const h=end.getHours();
    hourCounts[h] = (hourCounts[h]||0) + 1;
  });
  let bestH=null, bestC=0;
  Object.entries(hourCounts).forEach(([h,c])=>{ if(c>bestC){ bestH=+h; bestC=c; } });
  if(bestC>=3) dna.peakHour = { h:bestH, count:bestC };
  // Home stage — most-rated stage with avg
  const sp = stagePersonality();
  if(sp.length){
    // Sort by count first, then avg, to find the place the crew kept going back to
    const home = [...sp].sort((a,b)=> b.count-a.count || b.avg-a.avg)[0];
    dna.homeStage = home;
  }
  // Top tag across all rated sets with tags
  const tagCounts = {};
  state.ratings.forEach(r=>{ (r.tags||[]).forEach(t=>{ tagCounts[t] = (tagCounts[t]||0)+1; }); });
  let bestT=null, bestTC=0;
  Object.entries(tagCounts).forEach(([t,c])=>{ if(c>bestTC){ bestT=t; bestTC=c; } });
  if(bestTC>=2) dna.tagTop = { tag:bestT, count:bestTC };
  // Contrarian — user whose ratings most diverge from the crew mean on shared sets
  // Build: for each event with ≥2 ratings, the mean. Per user: average diff from mean across all shared sets they rated.
  const byEvent = {};
  state.ratings.forEach(r=>{ (byEvent[r.eventId]=byEvent[r.eventId]||[]).push(r); });
  const userDiffs = {};   // userId → {diffSum, n}
  Object.values(byEvent).forEach(list=>{
    if(list.length<2) return;
    const mean = list.reduce((a,b)=>a+b.score,0)/list.length;
    list.forEach(r=>{
      userDiffs[r.userId] = userDiffs[r.userId] || {diffSum:0, n:0};
      userDiffs[r.userId].diffSum += (r.score - mean);
      userDiffs[r.userId].n++;
    });
  });
  let worstId=null, worstAbs=0, worstDelta=0;
  Object.entries(userDiffs).forEach(([uid,d])=>{
    if(d.n<3) return;            // need at least 3 shared sets to call it a pattern
    const avg = d.diffSum/d.n;
    if(Math.abs(avg)>worstAbs){ worstAbs=Math.abs(avg); worstId=uid; worstDelta=avg; }
  });
  if(worstId && worstAbs>=0.7){
    const u=state.users.find(x=>x.id===worstId);
    dna.contrarian = { user:u, delta:worstDelta };
  }
  // Most-shared set — the set rated by most crew members
  const sharedSetEntries = Object.entries(byEvent).filter(([,list])=>list.length>=2);
  dna.sharedSets = sharedSetEntries.length;
  if(sharedSetEntries.length){
    const top = sharedSetEntries.map(([eid,list])=>{
      const avg = list.reduce((a,b)=>a+b.score,0)/list.length;
      const spread = Math.max(...list.map(r=>r.score)) - Math.min(...list.map(r=>r.score));
      const ev = state.events.find(e=>e.id===eid);
      return { ev, scores:list, avg, spread };
    }).filter(x=>x.ev).sort((a,b)=> b.scores.length-a.scores.length || a.spread-b.spread || b.avg-a.avg)[0];
    if(top) dna.unanimous = top;
  }
  // Signature line — a natural sentence assembled from real signals (not a Mad-Lib).
  // Computes a couple of extra characteristics for flavour.
  const allScores = state.ratings.map(r=>r.score);
  const avgScore = allScores.length ? allScores.reduce((a,b)=>a+b,0)/allScores.length : null;
  // generosity
  let generosity="";
  if(avgScore!=null){
    generosity = avgScore>=8.2 ? "easily pleased" : avgScore>=7 ? "warm-hearted" : avgScore>=5.5 ? "fair but firm" : "hard to impress";
  }
  // time-of-day character (richer than before)
  let timeChar="";

  }
  // taste anchor
  let tasteAnchor="";
  if(dna.tagTop){
    const t=dna.tagTop.tag;
    const map={ vibe:"chasing a feeling", sound:"in it for the sound", crowd:"there for the crowd", surprise:"hunting the unexpected", dancing:"only happy when dancing" };
    tasteAnchor = map[t] || `drawn to the ${t}`;
  }
  // assemble: "Night owls, in it for the sound, easily pleased — and loyal to Lion's Den."
  const lead=[];
  if(timeChar) lead.push(timeChar[0].toUpperCase()+timeChar.slice(1));
  if(tasteAnchor) lead.push(tasteAnchor);
  if(generosity) lead.push(generosity);
  let sentence = lead.join(", ");
  if(dna.homeStage){
    sentence += sentence ? ` — and loyal to ${dna.homeStage.stage}.` : `Loyal to ${dna.homeStage.stage}.`;
  } else if(sentence){
    sentence += ".";
  }
  dna.signature = sentence;
  return dna;
}

// ---- Festival diary: a timeline of your weekend written from real data only ----
// Every line is grounded in a data point. No invented flavour, no embellishment.
// Returns chronological array of { t:Date, kind, text, score? } for one festival day.
function diaryEntriesForDay(day){
  const out=[];
  const ids=myPickIds();
  const dayStart=dateForDay(day); if(!dayStart) return [];
  // "Day" window: noon → noon+24h (matches festivalPhase/currentFestivalDay logic)
  const startMs = (()=>{ const d=new Date(dayStart); d.setHours(DAY_ROLLOVER_HOUR,0,0,0); return d.getTime(); })();
  const endMs   = startMs + 24*3600000;
  const inDay = ts => ts>=startMs && ts<endMs;
  // 1) Acts you picked (and saw — i.e. ended already), in order
  state.events.filter(e=>ids.has(e.id) && e.day===day).forEach(e=>{
    const start=eventStart(e), end=eventEnd(e); if(!start||!end) return;
    if(end.getTime()>Date.now()) return;                       // not happened yet
    const rd = state.ratings.find(r=>r.id===state.user.id+"__"+e.id);
    const scoreTxt = rd ? ` · Rated ${rd.score.toFixed(1)}` : "";
    const tagTxt   = (rd && rd.tags && rd.tags.length) ? " · " + rd.tags.join(", ") : "";
    out.push({ t:start, kind:"set", text:`${esc(e.title)} @ ${esc(e.stageName||"")}${scoreTxt}${tagTxt}`, score: rd?rd.score:null, tags: rd?(rd.tags||[]):[] });
  });
  // 2) Acts you stumbled into (rated, not picked, end-time within the day)
  state.ratings.filter(r=>r.userId===state.user.id).forEach(r=>{
    if(ids.has(r.eventId)) return;                              // already covered above
    const e=state.events.find(x=>x.id===r.eventId); if(!e) return;
    const start=eventStart(e), end=eventEnd(e); if(!start||!end) return;
    if(!inDay(start.getTime())) return;
    const tagTxt = (r.tags && r.tags.length) ? " · " + r.tags.join(", ") : "";
    out.push({ t:start, kind:"stumble", text:`Caught ${esc(e.title)} @ ${esc(e.stageName||"")} · Rated ${r.score.toFixed(1)}${tagTxt}`, score:r.score, tags:r.tags||[] });
  });
  // 3) Safe check-in
  const safe=state.safety.find(s=>s.userId===state.user.id && s.day===day);
  if(safe && safe.checkedAt && safe.checkedAt.toMillis){
    out.push({ t:new Date(safe.checkedAt.toMillis()), kind:"safe", text:"Checked in safe — home for the night." });
  }
  // 4) Sleep window (start = bed)
  if(adminFeat("sleep")){
    sleepNights().forEach(n=>{
      if(!inDay(n.bed.getTime())) return;
      out.push({ t:n.bed, kind:"bed", text:`Slept ~${n.hours.toFixed(1)}h (woke ${formatTime12(n.up)})` });
    });
  }
  // 5) First trail point in day (arrival / first move)
  const trail=loadTrail();
  const firstInDay = trail.find(p=>inDay(p.t));
  if(firstInDay){
    const near = nearestStageTo(firstInDay.lat, firstInDay.lng);
    out.push({ t:new Date(firstInDay.t), kind:"arrive", text: near ? `First moved near ${esc(near.name)}.` : "First moved around the site." });
  }
  out.sort((a,b)=>a.t-b.t);
  return out;
}
function formatTime12(d){ let h=d.getHours(); const ap=h>=12?'pm':'am'; h=h%12||12; const m=d.getMinutes(); return `${h}${m?':'+String(m).padStart(2,"0"):""}${ap}`; }
function nearestStageTo(lat,lng){
  const stages=stagesWithCoords(); if(!stages.length) return null;
  let best=null, bestD=Infinity;
  stages.forEach(s=>{ const d=haversine(lat,lng,s.lat,s.lng); if(d<bestD){ bestD=d; best=s; } });
  return (best && bestD<=300) ? best : null;
}
function diaryDaySummary(day){
  const ids=myPickIds();
  // Ratings for the day (picked + stumbled)
  const dayEvents = new Set(state.events.filter(e=>e.day===day).map(e=>e.id));
  const myR = state.ratings.filter(r=>r.userId===state.user.id && dayEvents.has(r.eventId));
  let top=null;
  myR.forEach(r=>{ if(!top||r.score>top.score) top={...r, ev:state.events.find(e=>e.id===r.eventId)}; });
  // Walking miles for the day from the trail
  const trail=loadTrail();
  const dayStart=dateForDay(day); if(!dayStart) return null;
  const startMs=(()=>{ const d=new Date(dayStart); d.setHours(DAY_ROLLOVER_HOUR,0,0,0); return d.getTime(); })();
  const endMs=startMs+24*3600000;
  const pts=trail.filter(p=>p.t>=startMs&&p.t<endMs);
  let metres=0;
  for(let i=1;i<pts.length;i++) metres+=haversine(pts[i-1].lat,pts[i-1].lng,pts[i].lat,pts[i].lng);
  return {
    miles: metres/1609.34,
    setsSeen: state.events.filter(e=>ids.has(e.id) && e.day===day && eventEnd(e) && eventEnd(e).getTime()<Date.now()).length,
    ratedCount: myR.length,
    topSet: top
  };
}

function viewTrail(){
  const trail=loadTrail();
  const stages=stagesWithCoords();
  const showHeat = adminFeat("heatmap");
  const head=`<div class="sec-head"><div><h2>Where were you?</h2><div class="lead">A private trail of where you wandered. Stays on your phone only.</div></div></div>`;
  if(trail.length<2){
    return head+emptyState("","Not much yet","Keep the app's location on as you move around and your trail builds up here. Nothing is shared — it's just for you.");
  }
  const mode = (showHeat && state.trailMode==="heat") ? "heat" : "path";
  const toggleBar = showHeat ? `<div class="filters" style="margin-bottom:10px">
    <button class="chip ${mode==='path'?'on':''}" data-trail-mode="path">Path</button>
    <button class="chip ${mode==='heat'?'on':''}" data-trail-mode="heat">Where you settled</button>
  </div>` : "";
  // shared coordinate maths for both modes
  const pts=trail.map(p=>({lat:p.lat,lng:p.lng})).concat(stages.map(s=>({lat:s.lat,lng:s.lng})));
  const lats=pts.map(p=>p.lat), lngs=pts.map(p=>p.lng);
  const minLat=Math.min(...lats), maxLat=Math.max(...lats), minLng=Math.min(...lngs), maxLng=Math.max(...lngs);
  const W=300,H=300,PAD=24;
  const spanLat=(maxLat-minLat)||0.0001, spanLng=(maxLng-minLng)||0.0001;
  const sx=v=>PAD+((v-minLng)/spanLng)*(W-2*PAD);
  const sy=v=>H-PAD-((v-minLat)/spanLat)*(H-2*PAD);   // north up
  const stageDots=stages.map(s=>`<circle cx="${sx(s.lng).toFixed(1)}" cy="${sy(s.lat).toFixed(1)}" r="5" fill="${s.color}" stroke="var(--ink)" stroke-width="1.5"/><text x="${sx(s.lng).toFixed(1)}" y="${(sy(s.lat)-8).toFixed(1)}" font-size="8" text-anchor="middle" fill="var(--ink-2)">${esc(abbrev(s.name))}</text>`).join("");
  const fmtT=ts=>{ const d=new Date(ts); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };

  let chart;
  if(mode==="heat"){
    // Time-weighted heatmap: weight each point by how long until the NEXT point (time spent there).
    const COLS=12, ROWS=12;
    const grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));
    let totalMin=0;
    for(let i=0;i<trail.length;i++){
      const p=trail[i];
      const next=trail[i+1];
      const dwellMs = next ? Math.min(45*60000, next.t-p.t) : 5*60000;   // cap at 45min so a single big gap doesn't dominate
      const dwellMin = dwellMs/60000;
      totalMin += dwellMin;
      const cx=Math.min(COLS-1, Math.max(0, Math.floor((p.lng-minLng)/spanLng*COLS)));
      const cy=Math.min(ROWS-1, Math.max(0, Math.floor((1-(p.lat-minLat)/spanLat)*ROWS)));   // y-flip for north up
      grid[cy][cx]+=dwellMin;
    }
    const max=Math.max(1,...grid.flat());
    const cellW=(W-2*PAD)/COLS, cellH=(H-2*PAD)/ROWS;
    const cells=[];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
      const v=grid[r][c]; if(v<=0) continue;
      const alpha=Math.min(0.85, 0.15+0.7*(v/max));
      cells.push(`<rect x="${(PAD+c*cellW).toFixed(1)}" y="${(PAD+r*cellH).toFixed(1)}" width="${cellW.toFixed(1)}" height="${cellH.toFixed(1)}" fill="rgba(214,55,28,${alpha.toFixed(2)})"/>`);
    }
    chart=`<svg viewBox="0 0 ${W} ${H}" style="width:100%">
      <text x="${W/2}" y="13" text-anchor="middle" font-family="Anton" font-size="11" fill="var(--ink-2)">N ↑</text>
      ${cells.join("")}
      ${stageDots}
    </svg>
    <div class="find-note" style="margin-top:8px">Brighter = longer dwelt. Total tracked time: ~${Math.round(totalMin)} min across ${trail.length} points.</div>`;
  } else {
    const path=trail.map((p,i)=>`${i?'L':'M'}${sx(p.lng).toFixed(1)},${sy(p.lat).toFixed(1)}`).join(" ");
    const start=trail[0], end=trail[trail.length-1];
    chart=`<svg viewBox="0 0 ${W} ${H}" style="width:100%">
      <text x="${W/2}" y="13" text-anchor="middle" font-family="Anton" font-size="11" fill="var(--ink-2)">N ↑</text>
      <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-dasharray="1 6" stroke-linecap="round" stroke-linejoin="round"/>
      ${stageDots}
      <circle cx="${sx(start.lng).toFixed(1)}" cy="${sy(start.lat).toFixed(1)}" r="5" fill="var(--ink-2)"/>
      <circle cx="${sx(end.lng).toFixed(1)}" cy="${sy(end.lat).toFixed(1)}" r="6" fill="var(--accent)"/>
    </svg>
    <div class="find-note" style="display:flex;justify-content:space-between;margin-top:4px">
      <span>● Start ${fmtT(start.t)}</span><span style="color:var(--accent)">● Latest ${fmtT(end.t)}</span>
    </div>
    <div class="find-note" style="margin-top:8px">${trail.length} points · joined in order you visited them. Coloured dots are pinned stages for reference. Records best while the app is open — phones pause location for backgrounded apps, so gaps mean the app was closed or minimised.</div>`;
  }
  return head+`
    <div class="card">
      ${toggleBar}
      ${chart}
      <button class="btn ghost block" id="trail-clear" style="margin-top:12px">Clear my trail</button>
    </div>`;
}

function adminEventList(){
  const list = sortEvents(state.events);
  if(!list.length) return state.structure.districts.length? emptyState("","No events yet","Tap “Add event” to start building the lineup.") : "";
  const g = groupByDay(list);
  const sel = adminSel.on;
  return DAYS.filter(d=>g[d]&&g[d].length).map(d=>{
    const dayIds=g[d].map(e=>e.id);
    const allSel=sel && dayIds.every(id=>adminSel.ids.has(id));
    return `
    <div class="day-label">${d}${sel?`<button class="day-sel ${allSel?'on':''}" data-selday="${d}">${allSel?'✓ day':'select day'}</button>`:''}</div>
    ${g[d].map(e=>{
      const checked=adminSel.ids.has(e.id);
      return `<div class="ev ${sel&&checked?'rowsel':''}" data-ev="${e.id}" style="box-shadow:inset 5px 0 0 ${districtColor(e.districtId)}">
        ${sel?`<button class="ev-check ${checked?'on':''}" data-selev="${e.id}" aria-label="select">${checked?'✓':''}</button>`:''}
        <div class="time"><div class="t">${esc(fmt12(e.start))}</div><div class="t2">${e.end?('→ '+esc(fmt12(e.end))):''}</div></div>
        <div class="body">
          <h3>${esc(e.title)}</h3>
          <div class="meta"><span class="area-tag" style="--c:${districtColor(e.districtId)}">${esc(e.districtName)}</span><span class="loc">${esc(e.stageName)}</span></div>
        </div>
        ${sel?'':`<div class="act" style="flex-direction:column;gap:6px">
          <button class="btn ghost sm" data-edit-ev="${e.id}">Edit</button>
          <button class="btn danger sm" data-del-ev="${e.id}">Del</button>
        </div>`}
      </div>`;
    }).join("")}
  `;}).join("");
}

/* ============================================================
   WIRING (event delegation per view)
   ============================================================ */
function wireView(){
  const v = document.getElementById("view");
  if(!v) return;

  // home / generic navigation tiles
  v.querySelectorAll("[data-go]").forEach(b=>b.onclick=(e)=>{
    if(e.target.closest("[data-joincall],[data-goto-stage]")) return; // let specific actions handle themselves
    if(b.dataset.targetPerson){ find.target="pe:"+b.dataset.targetPerson; find.enabledOnce=true; localStorage.setItem("fp_findon","1"); }
    state.view=b.dataset.go; renderApp();
  });

  // pick toggles (browse / mine / shared)
  v.querySelectorAll("[data-pick]").forEach(b=>b.onclick=async()=>{
    b.classList.toggle("on");
    try{ await togglePick(b.dataset.pick); }catch(e){ toast("Couldn't save — try again"); }
  });
  v.querySelectorAll("[data-must]").forEach(b=>b.onclick=async()=>{
    try{ await toggleMustSee(b.dataset.must); }catch(e){ toast("Couldn't save — try again"); }
  });
  v.querySelectorAll("[data-oracle]").forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); openOracle(b.dataset.oracle); });
  v.querySelectorAll("[data-goto-stage]").forEach(b=>b.onclick=()=>{
    const s=stagesWithCoords().find(x=>x.name===b.dataset.gotoStage);
    if(s) find.target="st:"+s.id;
    find.enabledOnce=true; localStorage.setItem("fp_findon","1"); state.view="find"; renderApp();
  });
  v.querySelectorAll("[data-cr-go]").forEach(b=>b.onclick=()=>{
    const s=stagesWithCoords().find(x=>x.name===b.dataset.crGo);
    if(s){ find.target="st:"+s.id; find.enabledOnce=true; localStorage.setItem("fp_findon","1"); state.view="find"; renderApp(); }
  });

  // ---- browse filters ----
  const search = v.querySelector("#search");
  if(search) search.oninput = e=>{ state.filters.search=e.target.value; const pos=e.target.selectionStart; renderView(); const s2=document.querySelector("#search"); if(s2){s2.focus(); s2.setSelectionRange(pos,pos);} };
  v.querySelectorAll("[data-fday]").forEach(b=>b.onclick=()=>{ state.filters.day=b.dataset.fday; renderView(); });
  v.querySelectorAll("[data-fdist]").forEach(b=>b.onclick=()=>{ state.filters.district=b.dataset.fdist; renderView(); });

  // ---- shared friend selector ----
  v.querySelectorAll("[data-friend]").forEach(b=>b.onclick=()=>{ state.sharedFriend=b.dataset.friend; renderView(); });
  v.querySelectorAll("[data-onf]").forEach(b=>b.onclick=()=>{ state.onnowFilter=b.dataset.onf; renderView(); });
  // ---- meetup finder ----
  v.querySelectorAll("[data-meetmode]").forEach(b=>b.onclick=()=>{ state.meetMode=b.dataset.meetmode; renderView(); });
  v.querySelectorAll("[data-meetday]").forEach(b=>b.onclick=()=>{ state.meetDay=b.dataset.meetday; renderView(); });
  const crewEdit=v.querySelector("#crew-edit"); if(crewEdit) crewEdit.onclick=()=>{ state.modal={type:"crew"}; renderModal(); };
  v.querySelectorAll("[data-meetwin]").forEach(b=>b.onclick=()=>{
    const [day,mid]=b.dataset.meetwin.split("|");
    const people=meetPeople(); const {free,busy}=whoFreeAt(day,+mid,people);
    const fNames=free.map(id=>userName(id));
    const bNames=busy.map(id=>userName(id));
    state.modal={type:"meetwin",data:{day,mid:+mid,free:fNames,busy:bNames}}; renderModal();
  });
  // Sub-slot voting: tap to add yourself, tap again to remove. Doc id = `userId__day__slot` for upsert/delete.
  v.querySelectorAll("[data-vote]").forEach(b=>b.onclick=async(e)=>{
    e.stopPropagation();
    if(!state.user) return;
    const [day,slot]=b.dataset.vote.split("|");
    const slotN=+slot;
    const id=`${state.user.id}__${day}__${slotN}`;
    const existing=state.meetVotes.find(v=>v.id===id);
    try{
      if(existing){ await deleteDoc(dref("meetvotes",id)); }

    const [did,sid,which]=b.dataset.corner.split(":");
    const dist=state.structure.districts.find(x=>x.id===did);
    const st=dist&&(dist.stages||[]).find(x=>x.id===sid);
    if(!st) return;
    const apply=async(lat,lng)=>{
      const districts=state.structure.districts.map(d=>d.id!==did?d:{...d,stages:d.stages.map(s=>{
        if(s.id!==sid) return s;
        const ns={...s, type:"main"};
        if(which==="1"){ ns.c1lat=lat; ns.c1lng=lng; }
        else { ns.c2lat=lat; ns.c2lng=lng; }
        // if both corners present, compute centre + radius (half the span + small margin)
        if(typeof ns.c1lat==="number" && typeof ns.c2lat==="number"){
          ns.lat=+((ns.c1lat+ns.c2lat)/2).toFixed(6);
          ns.lng=+((ns.c1lng+ns.c2lng)/2).toFixed(6);
          const span=haversine(ns.c1lat,ns.c1lng,ns.c2lat,ns.c2lng);
          ns.radius=Math.max(STAGE_RADIUS, Math.round(span/2 + 10));   // half-span + 10m margin, never below default
        }
        return ns;
      })});
      await saveStructure({...state.structure,districts});
      toast(which==="1" ? "Corner 1 set — now pin corner 2" : "Main stage area set");
    };
    const manual=()=>{
      const v2=prompt(`Coordinates for corner ${which} of "${st.name}" as: latitude, longitude`, "");
      if(!v2) return;
      const m=v2.split(/[, ]+/).map(x=>parseFloat(x)).filter(n=>!isNaN(n));
      if(m.length!==2||Math.abs(m[0])>90||Math.abs(m[1])>180){ toast("Couldn't read those coordinates"); return; }
      apply(m[0],m[1]);
    };
    if(!navigator.geolocation){ manual(); return; }
    const orig=b.textContent; b.textContent="Locating…"; b.disabled=true;
    navigator.geolocation.getCurrentPosition(
      pos=>{ b.textContent=orig; b.disabled=false; apply(+pos.coords.latitude.toFixed(6),+pos.coords.longitude.toFixed(6)); },
      err=>{ b.textContent=orig; b.disabled=false; toast(err.code===1?"Location blocked — enter manually":"No GPS fix — enter manually"); manual(); },
      {enableHighAccuracy:true,timeout:12000,maximumAge:0}
    );
  });
  v.querySelectorAll("[data-del-s]").forEach(b=>b.onclick=async()=>{
    const [did,sid]=b.dataset.delS.split(":");
    const districts=state.structure.districts.map(d=>d.id===did?{...d,stages:(d.stages||[]).filter(s=>s.id!==sid)}:d);
    await saveStructure({...state.structure,districts});
  });
  const addEv = v.querySelector("#add-event");
  if(addEv) addEv.onclick = ()=>{ state.modal={type:"event",data:null}; renderModal(); };
  const bulkEv = v.querySelector("#bulk-event");
  if(bulkEv) bulkEv.onclick = ()=>{ openBulk(); };
  v.querySelectorAll("[data-edit-ev]").forEach(b=>b.onclick=()=>{ const ev=state.events.find(e=>e.id===b.dataset.editEv); state.modal={type:"event",data:ev}; renderModal(); });
  v.querySelectorAll("[data-del-ev]").forEach(b=>b.onclick=async()=>{
    const ev=state.events.find(e=>e.id===b.dataset.delEv);
    if(confirm(`Delete "${ev.title}"? This removes it from everyone's plans.`)) { await deleteEvent(ev.id); toast("Deleted"); }
  });
  // ---- bulk delete (select mode) ----
  const selTog=v.querySelector("#sel-toggle");
  if(selTog) selTog.onclick=()=>{ adminSel.on=!adminSel.on; adminSel.ids.clear(); renderView(); };
  v.querySelectorAll("[data-selev]").forEach(b=>b.onclick=()=>{ const id=b.dataset.selev; adminSel.ids.has(id)?adminSel.ids.delete(id):adminSel.ids.add(id); renderView(); });
  v.querySelectorAll("[data-selday]").forEach(b=>b.onclick=()=>{
    const day=b.dataset.selday; const ids=state.events.filter(e=>e.day===day).map(e=>e.id);
    const allSel=ids.every(id=>adminSel.ids.has(id));
    ids.forEach(id=> allSel ? adminSel.ids.delete(id) : adminSel.ids.add(id));
    renderView();
  });
  const selAll=v.querySelector("#sel-all");
  if(selAll) selAll.onclick=()=>{ if(adminSel.ids.size===state.events.length) adminSel.ids.clear(); else state.events.forEach(e=>adminSel.ids.add(e.id)); renderView(); };
  const selDel=v.querySelector("#sel-del");
  if(selDel) selDel.onclick=async()=>{
    const ids=[...adminSel.ids]; if(!ids.length) return;
    if(!confirm(`Delete ${ids.length} event${ids.length>1?'s':''}? This removes them from everyone's plans and can't be undone.`)) return;
    selDel.disabled=true; selDel.textContent="Deleting…";
    try{
      for(let i=0;i<ids.length;i+=20){ await Promise.all(ids.slice(i,i+20).map(id=>deleteEvent(id))); }
      adminSel.ids.clear(); adminSel.on=false; toast(`Deleted ${ids.length} event${ids.length>1?'s':''}`); renderView();
    }catch(e){ selDel.disabled=false; selDel.textContent="Delete selected"; toast("Some didn't delete — try again"); }
  };
}

let bulk = null;   // {mode,text,day,districtId,stageId,type,createMissing}

function openBulk(){

  bulk = {
    mode:"same", text:"",

/* flexible time parser -> "HH:MM" or null */
function parseTime(raw){
  if(!raw) return null;
  let s = raw.trim().toLowerCase().replace(/\s+/g,"");
  let m = s.match(/^(\d{1,2})(?:[:.](\d{2}))?(am|pm)$/);
  if(m){ let h=+m[1]%12; if(m[3]==="pm") h+=12; const mm=m[2]?+m[2]:0; if(h>23||mm>59) return null; return pad2(h)+":"+pad2(mm); }
  m = s.match(/^(\d{1,2})[:.](\d{2})$/);
  if(m){ const h=+m[1],mm=+m[2]; if(h>23||mm>59) return null; return pad2(h)+":"+pad2(mm); }
  m = s.match(/^(\d{3,4})$/);            // 1800, 930
  if(m){ const n=m[1].padStart(4,"0"); const h=+n.slice(0,2),mm=+n.slice(2); if(h>23||mm>59) return null; return pad2(h)+":"+pad2(mm); }
  m = s.match(/^(\d{1,2})$/);            // bare hour "19"
  if(m){ const h=+m[1]; if(h>23) return null; return pad2(h)+":00"; }
  return null;
}
const pad2 = n => String(n).padStart(2,"0");
const splitFields = line => line.split(/\t|\|/).map(x=>x.trim());
function matchDay(s){ if(!s) return null; const l=s.trim().toLowerCase(); return DAYS.find(d=>d.toLowerCase()===l || d.toLowerCase().startsWith(l)) || null; }
function findDistrict(name){ const l=(name||"").trim().toLowerCase(); return state.structure.districts.find(d=>d.name.toLowerCase()===l) || null; }
function findStage(dist,name){ if(!dist) return null; const l=(name||"").trim().toLowerCase(); return (dist.stages||[]).find(s=>s.name.toLowerCase()===l) || null; }

/* parse the textarea into preview rows */
function parseBulk(){
  const rows = [];
  const lines = bulk.text.split(/\r?\n/);
  for(let i=0;i<lines.length;i++){
    const line = lines[i];
    if(!line.trim() || line.trim().startsWith("#")) continue;
    const f = splitFields(line);
    let r = { raw:line, ok:false, err:"", isNew:false };

    if(bulk.mode==="same"){
      // [start, title] or [start, end, title]
      let start,end,title;
      if(f.length>=3){ start=f[0]; end=f[1]; title=f.slice(2).join(" | "); }
      else if(f.length===2){ start=f[0]; end=""; title=f[1]; }
      else { r.err="Need: Start | Title"; rows.push(r); continue; }
      const dist = state.structure.districts.find(d=>d.id===bulk.districtId);
      const stage = dist && (dist.stages||[]).find(s=>s.id===bulk.stageId);
      r.day=bulk.day; r.title=title;
      r.districtName = dist?dist.name:""; r.stageName = stage?stage.name:"";
      r.districtId=bulk.districtId; r.stageId=bulk.stageId;
      r.start=parseTime(start); r.end=end?parseTime(end):"";
      if(!dist||!stage){ r.err="Pick a district & stage above"; }
      else if(!title){ r.err="Missing title"; }
      else if(!r.start){ r.err="Bad start time"; }
      else if(end && !r.end){ r.err="Bad end time"; }
      else r.ok=true;
    } else {
      // mixed: Day | District | Stage | Title | Start [| End]
      if(f.length<5){ r.err="Need: Day | District | Stage | Title | Start"; rows.push(r); continue; }
      const day=matchDay(f[0]);
      const distName=f[1], stageName=f[2], title=f[3], start=f[4];
      const end=f[5]||"";
      r.day=day; r.districtName=distName; r.stageName=stageName; r.title=title;
      r.start=parseTime(start); r.end=end?parseTime(end):"";
      const dist=findDistrict(distName);
      const stage=dist?findStage(dist,stageName):null;
      if(!day){ r.err="Unknown day '"+f[0]+"'"; }
      else if(!distName||!stageName){ r.err="Missing district/stage"; }
      else if(!title){ r.err="Missing title"; }
      else if(!r.start){ r.err="Bad start time"; }
      else if(end && !r.end){ r.err="Bad end time"; }
      else if((!dist || !stage) && !bulk.createMissing){ r.err="Stage/district not found — tick 'create missing' or add it first"; }
      else { r.ok=true; if(!dist||!stage) r.isNew=true; }
    }
    rows.push(r);
  }
  return rows;
}

function renderBulkModal(){
  const districts = state.structure.districts;
  const distObj = districts.find(d=>d.id===bulk.districtId) || districts[0];
  const stages = distObj ? (distObj.stages||[]) : [];
  if(!stages.find(s=>s.id===bulk.stageId)) bulk.stageId = stages[0]?stages[0].id:"";

  const sameFmt = `One act per line. Fields separated by <code>|</code> (or a tab if you paste from a spreadsheet):<br>
    <code>Start | End | Title</code> &nbsp;— or just <code>Start | Title</code> if there's no end time.<br>
    Times are flexible: <code>18:00</code>, <code>1800</code>, <code>6pm</code>, <code>6:30pm</code> all work.`;
  const mixedFmt = `One act per line, fields separated by <code>|</code> or a tab:<br>
    <code>Day | District | Stage | Title | Start | End</code><br>
    <code>End</code> is optional. Day can be short, e.g. <code>Fri</code>.`;

  const sameControls = `
    <div class="row">
      <label class="field"><span>Day</span><select id="bk-day">${DAYS.map(d=>`<option ${bulk.day===d?'selected':''}>${d}</option>`).join("")}</select></label>
      <label class="field"><span>District</span><select id="bk-dist">${districts.map(d=>`<option value="${d.id}" ${distObj&&d.id===distObj.id?'selected':''}>${esc(d.name)}</option>`).join("")}</select></label>
    </div>
    <div class="row">
      <label class="field"><span>Stage</span><select id="bk-stage">${stages.map(s=>`<option value="${s.id}" ${bulk.stageId===s.id?'selected':''}>${esc(s.name)}</option>`).join("")||'<option value="">— add a stage —</option>'}</select></label>
    </div>`;
  const mixedControls = `
    <label class="chk"><input type="checkbox" id="bk-create" ${bulk.createMissing?'checked':''}>
      Create any districts / stages that don't exist yet</label>`;

  const wrap=document.createElement("div"); wrap.className="modal-bg";
  wrap.innerHTML=`
    <div class="modal">
      <div class="modal-head"><h2>Bulk add</h2><button class="btn ghost sm" id="bk-close">Close</button></div>
      <div class="bulk-tabs">
        <button data-bmode="same" class="${bulk.mode==='same'?'on':''}">One stage at a time</button>
        <button data-bmode="mixed" class="${bulk.mode==='mixed'?'on':''}">Mixed stages</button>
      </div>
      ${bulk.mode==='same'?sameControls:mixedControls}
      <div class="fmt">${bulk.mode==='same'?sameFmt:mixedFmt}</div>
      <textarea class="bulk-ta" id="bk-text" placeholder="${bulk.mode==='same'?'18:00 | 19:00 | The Opening Act\n19:30 | 21:00 | Headliner':'Friday | Main Field | Lakeside Stage | Headliner | 21:00 | 22:30'}">${esc(bulk.text)}</textarea>
      <div id="bk-preview"></div>
      <button class="btn primary block" id="bk-go">Add events</button>
    </div>`;
  document.body.appendChild(wrap);

  const close=()=>{ state.modal=null; bulk=null; wrap.remove(); };
  wrap.querySelector("#bk-close").onclick=close;
  wrap.onclick=e=>{ if(e.target===wrap) close(); };

  wrap.querySelectorAll("[data-bmode]").forEach(b=>b.onclick=()=>{ bulk.mode=b.dataset.bmode; renderBulkModal(); });

  const ta=wrap.querySelector("#bk-text");
  const refreshPreview=()=>{
    const rows=parseBulk();
    const okCount=rows.filter(r=>r.ok).length;
    const badCount=rows.filter(r=>!r.ok).length;
    const newCount=rows.filter(r=>r.ok&&r.isNew).length;
    const pv=wrap.querySelector("#bk-preview");
    if(rows.length===0){ pv.innerHTML=""; }
    else {
      pv.innerHTML=`<div class="prev">
        <div class="prev-head"><span>Preview</span><span>${okCount} ok${badCount?` · ${badCount} to fix`:''}${newCount?` · ${newCount} new place${newCount>1?'s':''}`:''}</span></div>
        <div class="prev-body">${rows.map(r=>`
          <div class="prev-row ${r.ok?(r.isNew?'new':''):'bad'}">
            <span class="pday">${r.day?r.day.slice(0,3):'—'}</span>
            <span class="ptime">${r.start?fmt12(r.start):'?'}${r.end?'–'+fmt12(r.end):''}</span>
            <span class="ptitle">${esc(r.title||r.raw)}</span>
            <span class="ploc">${esc((r.districtName||'')+(r.stageName?' · '+r.stageName:''))}</span>
            <span class="stt">${r.ok?(r.isNew?'+ new':'✓'):esc(r.err)}</span>
          </div>`).join("")}</div></div>`;
    }
    const go=wrap.querySelector("#bk-go");
    go.disabled = okCount===0;
    go.textContent = okCount? `Add ${okCount} event${okCount>1?'s':''}` : "Add events";
  };

  ta.oninput=()=>{ bulk.text=ta.value; refreshPreview(); };
  const sd=wrap.querySelector("#bk-day"); if(sd) sd.onchange=()=>{bulk.day=sd.value;refreshPreview();};
  const sdist=wrap.querySelector("#bk-dist"); if(sdist) sdist.onchange=()=>{
    bulk.districtId=sdist.value;
    const d=districts.find(x=>x.id===bulk.districtId); bulk.stageId=d&&d.stages[0]?d.stages[0].id:"";
    renderBulkModal();
  };
  const sstage=wrap.querySelector("#bk-stage"); if(sstage) sstage.onchange=()=>{bulk.stageId=sstage.value;refreshPreview();};
  const cm=wrap.querySelector("#bk-create"); if(cm) cm.onchange=()=>{bulk.createMissing=cm.checked;refreshPreview();};

  wrap.querySelector("#bk-go").onclick=async()=>{
    const rows=parseBulk().filter(r=>r.ok);
    if(!rows.length) return;
    const go=wrap.querySelector("#bk-go"); go.disabled=true;

    try{
      // 1) create any missing districts/stages (mixed mode)
      if(bulk.mode==="mixed" && bulk.createMissing && rows.some(r=>r.isNew)){
        const draft = JSON.parse(JSON.stringify(state.structure));
        for(const r of rows){
          let d = draft.districts.find(x=>x.name.toLowerCase()===r.districtName.toLowerCase());
          if(!d){ d={id:uid(),name:r.districtName,stages:[]}; draft.districts.push(d); }
          let s = (d.stages||[]).find(x=>x.name.toLowerCase()===r.stageName.toLowerCase());
          if(!s){ s={id:uid(),name:r.stageName}; d.stages=d.stages||[]; d.stages.push(s); }
        }
        await saveStructure(draft);
        state.structure = draft;   // local copy so id lookups below resolve
      }

      // 2) resolve ids + build event payloads
      const payloads = rows.map(r=>{
        let did=r.districtId, dnm=r.districtName, sid=r.stageId, snm=r.stageName;
        if(bulk.mode==="mixed"){
          const d=findDistrict(r.districtName); const s=d?findStage(d,r.stageName):null;
          did=d?d.id:""; dnm=d?d.name:r.districtName; sid=s?s.id:""; snm=s?s.name:r.stageName;
        }
        return { districtId:did, districtName:dnm, stageId:sid, stageName:snm,
                 day:r.day, start:r.start, end:r.end||"", title:r.title.trim(), notes:"" };
      });

      // 3) write in small batches
      go.textContent="Adding…";
      for(let i=0;i<payloads.length;i+=15){
        await Promise.all(payloads.slice(i,i+15).map(p=>saveEvent(p)));
      }
      close(); toast(`Added ${payloads.length} event${payloads.length>1?'s':''}`);
    }catch(e){
      go.disabled=false; go.textContent="Add events";
      const pv=wrap.querySelector("#bk-preview");
      pv.insertAdjacentHTML("afterbegin",`<div class="err">Couldn't save — check your connection and try again.</div>`);
    }
  };

  refreshPreview();
}

/* ============================================================
   FIND — GPS compass + radar to stages
   ============================================================ */
let find = { started:false, enabledOnce: localStorage.getItem("fp_findon")==="1", geoWatch:null, orientBound:false, orientHandler:null,
             pos:null, acc:null, heading:null, hasOrientation:false, headingMode:"auto", target:null, error:null,
             show:{stages:true,people:true,pins:true}, share:false, shareTimer:null, myUpdated:0, lastWrite:0,
             lost:false, autoStopAt:0, autoStopTimer:null, packingSubbed:false, notify:false, notifyTimers:[], notifiedChanges:{}, notifiedMentions:{}, notifiedCalls:{}, sessionStart:Date.now(), orientNeedsGesture:false,
             seedActive:false, seedFrom:null, seedStartT:0, seedPt:null, seedDist:0, seedWatch:null, seedClock:null, orientLastEvent:0, _orientRebinds:0, orientStalled:false };

const R_EARTH = 6371000;
const toRad = d => d*Math.PI/180, toDeg = r => r*180/Math.PI;
function haversine(la1,lo1,la2,lo2){
  const dLa=toRad(la2-la1), dLo=toRad(lo2-lo1);
  const a=Math.sin(dLa/2)**2 + Math.cos(toRad(la1))*Math.cos(toRad(la2))*Math.sin(dLo/2)**2;
  return R_EARTH*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearing(la1,lo1,la2,lo2){
  const y=Math.sin(toRad(lo2-lo1))*Math.cos(toRad(la2));
  const x=Math.cos(toRad(la1))*Math.sin(toRad(la2)) - Math.sin(toRad(la1))*Math.cos(toRad(la2))*Math.cos(toRad(lo2-lo1));
  return (toDeg(Math.atan2(y,x))+360)%360;
}
function fmtDist(m){ return m<1000 ? "~"+Math.round(m/5)*5+" m" : "~"+(m/1000).toFixed(m<10000?1:0)+" km"; }
function cardinal(deg){ return ["N","NE","E","SE","S","SW","W","NW"][Math.round(((deg%360)/45))%8]; }
function relDirText(rel){
  const r=((rel%360)+360)%360;
