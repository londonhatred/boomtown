<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#EFE7D5" />
<title>Festival Planner</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Festival">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFE7D5;
    --card:#F7F1E3;
    --panel:#E7DCC4;
    --ink:#1C1B16;
    --ink-2:#403D32;
    --muted:#7C7458;
    --line:rgba(28,27,22,.18);
    --line-strong:rgba(28,27,22,.4);
    --rule:#1C1B16;
    --accent:#D6371C;
    --accent-ink:#FBF4E4;
    --teal:#1E5A50;
    --gold:#B5852A;
    --violet:#6B4FA0;
    --radius:6px;
    --radius-sm:4px;
    --hard:3px 3px 0 var(--ink);
    --hard-sm:2px 2px 0 var(--ink);
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  /* Dark mode — keeps the warm risograph character: warm-dark ground, warm-light ink,
     lifted accents so they survive on a dark background, softened hard-shadows. */
  [data-theme="dark"]{
    --paper:#1B1916;
    --card:#242019;
    --panel:#2C271E;
    --ink:#EFE7D5;
    --ink-2:#C9BFA6;
    --muted:#9A917A;
    --line:rgba(239,231,213,.16);
    --line-strong:rgba(239,231,213,.34);
    --rule:#EFE7D5;
    --accent:#F2553B;
    --accent-ink:#1B1916;
    --teal:#4FB3A2;
    --gold:#D7A946;
    --violet:#A98BE0;
    --hard:3px 3px 0 rgba(0,0,0,.55);
    --hard-sm:2px 2px 0 rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Archivo",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100dvh;line-height:1.45;
  }
  h1,h2,h3,.display{font-family:"Anton",Impact,sans-serif;font-weight:400;letter-spacing:.01em;line-height:.98;margin:0;text-transform:uppercase}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px}
  a{color:var(--accent)}
  ::selection{background:var(--accent);color:var(--accent-ink)}

  .app{max-width:760px;margin:0 auto;padding:0 16px calc(100px + var(--safe-b))}
  .topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:14px 0;background:var(--paper);border-bottom:2px solid var(--rule)}
  .brand{display:flex;align-items:center;gap:11px;min-width:0;background:none;border:none;padding:0;margin:0;font:inherit;color:inherit;text-align:left;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .brand:active{opacity:.7}
  .brand .mark{width:40px;height:40px;flex:none;background:var(--accent);border:2px solid var(--ink);
    box-shadow:var(--hard-sm);position:relative}
  .brand .mark::after{content:"★";position:absolute;inset:0;display:grid;place-items:center;color:var(--accent-ink);font-size:18px;line-height:1}
  .brand .name{font-family:"Anton";font-size:19px;letter-spacing:.02em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand .sub{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  .who{display:flex;align-items:center;gap:9px;flex:none}
  .avatar{width:34px;height:34px;display:grid;place-items:center;font-weight:800;font-size:13px;
    color:var(--paper);background:var(--ink);border:2px solid var(--ink)}
  .avatar.adm{background:var(--accent);color:var(--accent-ink)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 15px;
    border-radius:var(--radius-sm);font-weight:700;font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;
    background:var(--card);color:var(--ink);border:2px solid var(--ink);transition:transform .06s ease}
  .btn:active{transform:translate(1px,1px)}
  .btn.primary{background:var(--accent);color:var(--accent-ink);box-shadow:var(--hard-sm)}
  .btn.primary:active{box-shadow:1px 1px 0 var(--ink)}
  .btn.lime{background:var(--ink);color:var(--paper)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:8px 11px;font-size:11px}
  .btn.icon{padding:8px 10px}
  .btn.danger{background:transparent;color:var(--accent);border-color:var(--accent)}
  .btn:disabled{opacity:.4;pointer-events:none}
  .btn.block{width:100%}

  .card{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);padding:16px}
  .muted{color:var(--muted)}
  .tag{font-size:11px;color:var(--muted);font-weight:600;text-transform:none;letter-spacing:0}

  .field{display:block;margin-bottom:12px}
  .field>span{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:12px 13px;border-radius:var(--radius-sm);color:var(--ink);
    background:var(--paper);border:2px solid var(--ink);outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:var(--hard-sm)}
  .fld-label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);margin-bottom:6px}
  .inp{width:100%;padding:12px 13px;border-radius:var(--radius-sm);color:var(--ink);background:var(--paper);border:2px solid var(--ink);outline:none;font:inherit}
  .inp:focus{border-color:var(--accent);box-shadow:var(--hard-sm)}
  .col-grid{display:flex;flex-wrap:wrap;gap:9px}
  .col-swatch{width:38px;height:38px;border-radius:50%;border:2px solid var(--ink);cursor:pointer;padding:0;position:relative}
  .col-swatch.on{box-shadow:0 0 0 3px var(--paper),0 0 0 5px var(--ink)}
  .intro-modal{padding:22px 20px calc(20px + var(--safe-b))}
  .intro-dots{display:flex;gap:6px;margin-bottom:4px}
  .intro-dots span{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .intro-dots span.on{background:var(--accent)}
  .rate-line{display:flex;align-items:center;gap:10px;margin-top:8px}
  .rate-open{border:2px solid var(--ink);background:var(--paper);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer}
  .rate-open.rated{background:var(--gold);border-color:var(--gold)}
  .rate-agg{font-size:11.5px;color:var(--ink-2);font-weight:600}
  .rate-modal{padding:20px 20px calc(20px + var(--safe-b));text-align:center}
  .rate-act{font-weight:700;font-size:15px;margin:4px 0 6px}
  .rate-big{font-family:"Anton";font-size:54px;line-height:1;color:var(--accent)}
  .rate-slider{width:100%;margin:14px 0 2px;accent-color:var(--accent)}
  .rate-scale{display:flex;justify-content:space-between;font-size:11px;color:var(--ink-2)}
  .fav{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line);font-size:13.5px}
  .fav:first-child{border-top:none}
  .fav-rank{font-family:"Anton";font-size:17px;color:var(--accent);width:20px;flex:none;text-align:center}
  .fav-name{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fav-bar{height:5px;background:var(--line);border-radius:3px;margin-top:4px;overflow:hidden}
  .fav-bar i{display:block;height:100%;background:var(--teal)}
  .fav-score{font-family:"Anton";font-size:15px;color:var(--teal);flex:none}
  .av{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;font-size:11px;flex:none}
  .depart-card{background:var(--ink);color:var(--paper);border-radius:var(--radius);padding:16px;margin-bottom:14px}
  .depart-head{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(239,231,213,.2);padding-bottom:8px;margin-bottom:10px}
  .depart-lbl{font-family:"Anton";text-transform:uppercase;letter-spacing:.12em;font-size:13px;color:#E8A33D}
  .depart-at{font-family:"Anton";font-size:15px;letter-spacing:.04em}
  .depart-time{font-family:"Anton";font-size:46px;line-height:1;letter-spacing:.02em}
  .depart-time small{font-size:18px;opacity:.7;margin:0 2px 0 1px}
  .depart-act{font-weight:800;font-size:16px;margin-top:8px}
  .depart-meta{font-size:12.5px;opacity:.85;margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .depart-warn{margin-top:10px;background:var(--accent);color:#fff;font-weight:800;font-size:12px;padding:5px 10px;border-radius:7px;display:inline-block;text-transform:uppercase;letter-spacing:.04em}
  .depart-ok{margin-top:10px;color:var(--ink-2);font-weight:700;font-size:12px}
  .tf-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--line)}
  .tf-row:first-child{border-top:none}
  .tf-route{flex:1;min-width:0}
  .tf-stages{font-weight:700;font-size:14px}
  .tf-arrow{color:var(--muted);margin:0 2px}
  .tf-detail{font-size:11.5px;color:var(--ink-2);margin-top:2px}
  .tf-badge{flex:none;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:4px 9px;border-radius:999px;color:#fff}
  .tf-badge.busy{background:var(--gold)}
  .tf-badge.slow{background:var(--accent)}
  .seen-card{background:var(--panel)}
  .seen-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line)}
  .seen-row:first-of-type{border-top:none}
  .seen-info{flex:1;min-width:0}
  .seen-name{font-weight:700;font-size:13.5px}
  .seen-meta{font-size:11.5px;color:var(--ink-2);margin-top:2px}
  .seen-acts{flex:none;display:flex;gap:6px}
  .clash-warn{display:flex;align-items:center;gap:12px;width:100%;background:var(--accent);color:#fff;border:2px solid var(--ink);border-radius:var(--radius);
    padding:13px 14px;margin-bottom:14px;cursor:pointer;font:inherit;text-align:left;-webkit-tap-highlight-color:transparent;box-shadow:var(--hard-sm)}
  .clash-warn .cw-ico{flex:none;font-size:22px;line-height:1}
  .clash-warn .cw-text{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;line-height:1.25}
  .clash-warn .cw-text b{font-size:15px;font-weight:800}
  .clash-warn .cw-sub{font-size:12px;opacity:.92}
  .clash-warn .cw-arrow{flex:none;font-size:22px;line-height:1;opacity:.85;margin-left:2px}
  .clash-warn:active{transform:translateY(1px)}
  .panic-banner{background:var(--accent);color:#fff;border:2px solid var(--ink);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;box-shadow:var(--hard-sm)}
  .panic-banner .panic-hd{display:flex;align-items:center;gap:9px;font-size:16px}
  .panic-banner .panic-ico{font-size:22px;line-height:1}
  .panic-banner .panic-sub{font-size:12.5px;opacity:.92;margin-top:4px;line-height:1.4}
  .panic-banner .btn.ghost{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.4)}
  .safe-card{border:2px solid var(--teal)!important;background:var(--card)}
  .safe-card.done{border-style:dashed!important}
  .weather-nudge{border-left:4px solid var(--gold)!important;background:var(--card)}
  .surv-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-2);margin-top:14px;text-align:left}
  .surv-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px;justify-content:center}
  .surv-chip{border:2px solid var(--ink);background:var(--paper);font:inherit;font-size:12.5px;font-weight:700;padding:5px 12px;border-radius:999px;cursor:pointer;text-transform:capitalize}
  .surv-chip.on{background:var(--teal);color:#fff;border-color:var(--teal)}
  .diary-day{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px}
  .diary-day h3{font-family:"Anton";font-size:22px;text-transform:uppercase;letter-spacing:.02em;margin:0 0 6px}
  .diary-sum{display:flex;flex-wrap:wrap;gap:10px 16px;font-size:12px;color:var(--ink-2);padding-bottom:10px;margin-bottom:8px;border-bottom:1px solid var(--line)}
  .diary-sum b{font-family:"Anton";color:var(--ink);font-size:14px}
  .diary-lines{display:flex;flex-direction:column;gap:6px}
  .diary-line{display:grid;grid-template-columns:54px 22px 1fr;gap:8px;align-items:start;font-size:13.5px;line-height:1.45;padding:3px 0}
  .diary-line .dl-t{font-family:"Anton";color:var(--ink-2);font-size:12px;padding-top:1px;letter-spacing:.02em}
  .diary-line .dl-i{font-size:14px;line-height:1.3}
  .diary-line .dl-txt{min-width:0}
  .diary-line.top .dl-txt{font-weight:700}
  .diary-line.top .dl-t{color:var(--accent)}
  .tri-toggle{display:flex;flex:none;border:2px solid var(--ink);border-radius:999px;overflow:hidden;background:var(--paper)}
  .tri-toggle .tri-opt{appearance:none;border:none;background:transparent;font:inherit;font-size:11px;font-weight:700;padding:5px 10px;cursor:pointer;color:var(--ink-2);border-right:2px solid var(--ink);text-transform:uppercase;letter-spacing:.04em}
  .tri-toggle .tri-opt:last-child{border-right:none}
  .tri-toggle .tri-opt.on{background:var(--violet);color:#fff}
  .energy-card{background:var(--card);border:2px dashed var(--gold);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px}
  .tmrw-card{background:var(--card);border:2px solid var(--violet)}
  .pace-card{background:var(--card);border:2px dashed var(--teal)}
  .fsf-card{background:var(--ink);color:var(--paper);border:none}
  .fsf-card .hc-title{color:var(--paper);opacity:.75;font-size:11px;text-transform:uppercase;letter-spacing:.08em}
  .fsf-grid{display:flex;flex-wrap:wrap;gap:14px 20px;margin-top:8px}
  .fsf-item{min-width:48px}
  .fsf-n{font-family:"Anton";font-size:26px;line-height:1;color:var(--paper)}
  .fsf-n small{font-size:14px}
  .fsf-l{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;opacity:.7;margin-top:3px}
  .reach-home{border:2px solid var(--teal)!important;background:var(--card);display:block;width:100%;text-align:left}
  .reach-list{display:flex;flex-direction:column;gap:6px}
  .reach-row{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:var(--card);border:1.5px solid var(--ink);border-radius:var(--radius-sm);padding:10px 12px;cursor:pointer;font:inherit}
  .reach-name{font-weight:700;font-size:13.5px}
  .reach-picked{color:var(--teal);font-size:11px;font-weight:700}
  .reach-meta{font-size:11.5px;color:var(--ink-2);margin-top:2px}
  .reach-tag{flex:none;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:4px 8px;border-radius:999px}
  .reach-tag.full{background:var(--teal);color:#fff}
  .reach-tag.part{background:var(--gold);color:#fff}
  .cr-row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--card);border:1.5px solid var(--ink);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;cursor:pointer;font:inherit}
  .cr-when{font-family:"Anton";font-size:14px;flex:none;width:54px;color:var(--accent)}
  .cr-mid{flex:1;min-width:0}
  .cr-name{font-weight:700;font-size:13.5px}
  .cr-you{font-size:10.5px;color:var(--teal);font-weight:700}
  .cr-meta{font-size:11.5px;color:var(--ink-2);margin-top:2px}
  .cr-who{flex:none;display:flex;align-items:center;gap:6px}
  .cr-dots{display:flex}
  .cr-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--card);margin-left:-4px}
  .cr-dot:first-child{margin-left:0}
  .cr-count{font-family:"Anton";font-size:15px;color:var(--ink)}
  .oracle-btn{appearance:none;width:32px;height:32px;border-radius:50%;border:2px solid var(--violet);background:var(--card);color:var(--violet);font:inherit;font-weight:800;font-size:14px;cursor:pointer;line-height:1;padding:0;-webkit-tap-highlight-color:transparent}
  .oracle-btn:active{transform:translateY(1px)}
  .oracle-modal .or-act{font-size:14px;line-height:1.4;margin:0 0 12px}
  .oracle-modal .or-verdict{font-family:"Anton";font-size:28px;text-transform:uppercase;letter-spacing:.02em;text-align:center;padding:14px 12px;border:2px solid var(--ink);border-radius:var(--radius);margin:0 0 14px;line-height:1.05}
  .oracle-modal .or-verdict.or-go{background:var(--teal);color:#fff;border-color:var(--teal)}
  .oracle-modal .or-verdict.or-try{background:var(--gold);color:#fff;border-color:var(--gold)}
  .oracle-modal .or-verdict.or-skip{background:var(--accent);color:#fff;border-color:var(--accent)}
  .oracle-modal .or-lines{display:flex;flex-direction:column;gap:6px}
  .oracle-modal .or-line{display:flex;gap:9px;align-items:start;font-size:13.5px;line-height:1.45;padding:4px 0}
  .oracle-modal .or-line .or-mark{flex:none;font-family:"Anton";width:16px;text-align:center}
  .oracle-modal .or-line.good .or-mark{color:var(--teal)}
  .oracle-modal .or-line.bad .or-mark{color:var(--accent)}
  .oracle-modal .or-swing{font-size:12px;color:var(--ink-2);background:var(--card);border-left:3px solid var(--gold);padding:7px 10px;border-radius:4px;margin:-6px 0 12px;line-height:1.4}
  .tmrw-lines{display:flex;flex-direction:column;gap:4px;font-size:13.5px;line-height:1.5;margin-top:4px}
  .mood-chip{display:inline-block;border-radius:50%;border:1.5px solid var(--ink);vertical-align:middle;margin:0 2px 1px 0}
  .mood-strip{display:flex;gap:2px;flex-wrap:wrap;margin:6px 0 10px;padding:6px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .mood-strip .mood-bar{width:6px;height:18px;border-radius:1px}
  .ach-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--ink);border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:6px}
  .ach-trophy{font-size:22px;line-height:1;flex:none}
  .ach-text{flex:1;min-width:0}
  .ach-text b{font-size:14px}
  .ach-when{font-family:"Anton";font-size:11px;color:var(--ink-2);letter-spacing:.04em}
  .dna-sig{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);padding:18px 18px 16px;margin-bottom:14px;box-shadow:var(--hard-sm)}
  .dna-sig .find-note{margin-bottom:4px}
  .dna-sig h3{font-family:"Anton";font-size:21px;letter-spacing:.01em;margin:0;line-height:1.2;color:var(--accent)}
  .dna-stats{display:grid;grid-template-columns:repeat(2, 1fr);gap:8px;margin-bottom:14px}
  .dna-stat{background:var(--card);border:1.5px solid var(--ink);border-radius:var(--radius-sm);padding:12px;text-align:center}
  .dna-stat .n{font-family:"Anton";font-size:24px;line-height:1;color:var(--ink)}
  .dna-stat .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-2);margin-top:4px}
  .dna-row{display:flex;gap:12px;align-items:flex-start;background:var(--card);border:1.5px solid var(--ink);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;font-size:13.5px;line-height:1.45}
  .dna-row .dna-rh{font-family:"Anton";font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-2);min-width:90px;flex:none;padding-top:2px}
  .dna-row > div:last-child{flex:1;min-width:0}
  .dna-scores{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
  .dna-score{display:inline-block;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px}
  .tg-list{display:flex;flex-direction:column;gap:6px}
  .tg-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-top:1px solid var(--line)}
  .tg-row:first-child{border-top:none}
  .tg-name{font-weight:700;font-size:13px;flex:0 0 auto;min-width:60px}
  .tg-mets{display:flex;flex-wrap:wrap;gap:10px;flex:1;justify-content:flex-end}
  .tg-met{display:flex;flex-direction:column;align-items:flex-end;line-height:1}

    border:2px solid var(--ink);border-radius:var(--radius);padding:13px 15px;margin-bottom:14px}
  .share-row b{font-size:14px}
  .switch{flex:none;width:52px;height:30px;border-radius:999px;border:2px solid var(--ink);background:var(--paper);position:relative;transition:background .15s}
  .switch span{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:var(--ink);transition:transform .15s}
  .switch.on{background:var(--accent)}
  .switch.on span{transform:translateX(22px);background:var(--accent-ink)}
  .live-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;background:var(--accent);
    color:var(--accent-ink);font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;border:2px solid var(--ink)}
  .live-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--accent-ink);animation:blink 1.4s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .legend{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
  .leg{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:2px;font-size:11.5px;font-weight:700;
    letter-spacing:.03em;text-transform:uppercase;background:transparent;border:1.5px solid var(--ink);color:var(--ink-2);opacity:.45}
  .leg.on{opacity:1}
  .leg b{font-family:"Anton";font-weight:400;font-size:13px}
  .leg .ldot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--ink)}
  .cemoji{font-size:14px;line-height:1}
  #radar .dot-emoji{font-size:11px}
  .type-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
  .type-chip{padding:9px 13px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;
    background:var(--card);border:2px solid var(--ink);color:var(--ink)}
  .type-chip.on{background:var(--ink);color:var(--paper)}
  .pin-shared{font-size:9.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--accent-ink);
    background:var(--teal);border:1.5px solid var(--ink);border-radius:2px;padding:1px 6px;margin-left:4px}
  .find-actions{display:flex;gap:8px;margin-bottom:14px}
  .find-actions .btn{flex:1;padding:10px 6px;font-size:11px}
  .next-card{background:var(--ink);color:var(--paper);border-radius:var(--radius);padding:15px 16px;margin-bottom:14px}
  .next-card.live{background:var(--accent)}
  .next-card .nc-tag{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;opacity:.8;margin-bottom:5px}
  .next-card .nc-name{font-family:"Anton";font-size:22px;line-height:1;text-transform:uppercase}
  .next-card .nc-meta{font-size:12.5px;margin-top:8px;opacity:.95;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .next-card .area-tag{border-color:rgba(255,255,255,.5)}
  .lost-banner{display:flex;align-items:center;gap:8px;width:100%;background:var(--accent);color:var(--accent-ink);
    border:2px solid var(--ink);border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:14px;font-size:13.5px;font-weight:700;text-align:left;
    box-shadow:var(--hard-sm)}
  .lost-banner b{font-weight:800}
  .tchip.lost{border-color:var(--accent);color:var(--accent)}
  #radar .lost-ring{fill:none;stroke:#D6371C;stroke-width:3;animation:lostpulse 1.1s infinite}
  @keyframes lostpulse{0%,100%{opacity:.2}50%{opacity:.9}}

  /* menu */
  /* sectioned menu */
  .menu-modal{padding-bottom:14px}
  .menu-section{margin-top:16px}
  .menu-section:first-of-type{margin-top:6px}
  .menu-section h3{font-family:"Anton";font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-2);margin:0 0 6px;padding:0 4px}
  .menu-section.admin h3{color:var(--violet)}
  .menu-row{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card);
    border:1.5px solid var(--ink);border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:6px;
    cursor:pointer;font:inherit;width:100%;text-align:left;font-weight:700;font-size:14px;-webkit-tap-highlight-color:transparent}
  .menu-row.on{background:var(--ink);color:var(--paper)}
  .menu-row .mr-arr{color:var(--ink-2);font-size:18px;line-height:1;flex:none}
  .menu-row.on .mr-arr{color:var(--paper)}
  .menu-row.toggle{cursor:default}
  .menu-row .mr-txt{min-width:0;flex:1}
  .menu-row .mr-txt .lbl{font-weight:700;font-size:13.5px}
  .menu-row .mr-txt .sub{font-size:11.5px;color:var(--ink-2);font-weight:400;margin-top:1px;line-height:1.35}
  .menu-section.admin .menu-row{border-color:var(--violet);background:#F7F2EB}
  .menu-foot{display:flex;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--line)}
  .menu-foot .btn{flex:1;font-size:12px;padding:9px 12px}
  .menu-foot .btn.danger{border-color:var(--accent);color:var(--accent)}
  /* legacy aliases (in case anything else still references) */
  .menu-list{display:flex;flex-direction:column;gap:7px}
  .menu-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:var(--radius-sm);
    background:var(--card);border:2px solid var(--ink);font-weight:700;font-size:14.5px;text-align:left}
  .menu-item.on{background:var(--ink);color:var(--paper)}
  .menu-item .mi-e{font-size:18px;line-height:1}

  /* chat */
  .chat-scroll{display:flex;flex-direction:column;gap:10px;min-height:50dvh;padding:4px 2px 10px}
  .msg{max-width:82%;align-self:flex-start;display:flex;flex-direction:column;gap:2px}
  .msg.mine{align-self:flex-end;align-items:flex-end}
  .msg-who{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-left:4px}
  .bubble{background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:9px 13px;font-size:14.5px;line-height:1.35;word-break:break-word}
  .msg.mine .bubble{background:var(--ink);color:var(--paper)}
  .msg.mine .bubble a{color:#ffd9c9}
  .msg-time{font-size:10px;color:var(--muted);margin:0 4px}
  .chat-input{display:flex;gap:8px;padding:8px 0;background:var(--paper)}
  .chat-input input{flex:1;padding:12px 14px;border-radius:var(--radius-sm);background:var(--paper);border:2px solid var(--ink);color:var(--ink);outline:none}
  .chat-input input:focus{border-color:var(--accent)}
  .mention{font-weight:800;color:var(--accent)}
  .msg.mine .mention{color:#ffd9c9}
  .mention.me{background:var(--accent);color:var(--accent-ink);border-radius:3px;padding:0 4px}
  .msg.pinged .bubble{border-color:var(--accent);box-shadow:var(--hard-sm)}
  .chat-compose{position:sticky;bottom:calc(96px + var(--safe-b));background:var(--paper)}
  .mention-pop{position:absolute;left:0;right:56px;bottom:100%;margin-bottom:6px;background:var(--card);
    border:2px solid var(--ink);border-radius:var(--radius-sm);box-shadow:var(--hard);overflow:hidden;max-height:210px;overflow-y:auto}
  .mention-opt{display:flex;align-items:center;gap:10px;width:100%;padding:10px 13px;text-align:left;font-weight:700;font-size:14px;border-bottom:1px solid var(--line)}
  .mention-opt:last-child{border-bottom:none}
  .mention-opt:hover{background:var(--panel)}
  .mention-opt .mo-av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:800;flex:none;border:1.5px solid var(--ink)}

  /* info */
  .info-item{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
  .info-item h3{font-family:"Archivo";font-weight:800;font-size:16px;text-transform:none;margin-bottom:5px}
  .info-body{font-size:14px;color:var(--ink-2);white-space:pre-wrap;line-height:1.5;word-break:break-word}

  /* packing */
  .pack-bar{height:8px;background:var(--panel);border:1.5px solid var(--ink);border-radius:999px;overflow:hidden;margin-bottom:14px}
  .pack-fill{height:100%;background:var(--teal);transition:width .2s}
  .pack-list{display:flex;flex-direction:column;gap:7px}
  .pack-row{display:flex;align-items:center;gap:6px;background:var(--card);border:2px solid var(--ink);border-radius:var(--radius-sm);overflow:hidden}
  .pack-row.on{background:var(--panel)}
  .pack-tap{flex:1;display:flex;align-items:center;gap:11px;padding:11px 13px;text-align:left}
  .pack-box{width:22px;height:22px;flex:none;border:2px solid var(--ink);border-radius:4px;display:grid;place-items:center;font-weight:900;font-size:14px;background:var(--paper)}
  .pack-row.on .pack-box{background:var(--teal);color:#fff}
  .pack-row.on .pack-label{text-decoration:line-through;color:var(--muted)}
  .pack-label{font-size:14.5px;font-weight:600}
  .pack-del{flex:none;padding:0 13px;align-self:stretch;color:var(--muted);font-weight:800}
  .pack-del:hover{color:var(--accent)}

  /* free-time */
  .free-card{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px}
  .free-head{font-family:"Anton";font-size:16px;text-transform:uppercase;letter-spacing:.02em;margin-bottom:4px}
  .free-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line);font-size:14px}
  .free-row .free-day{font-weight:800;font-size:11px;text-transform:uppercase;color:var(--muted);width:32px}
  .free-row .free-len{margin-left:auto;font-size:12px;color:var(--teal);font-weight:700}

  .changed-badge{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--accent-ink);
    background:var(--accent);border:1.5px solid var(--ink);border-radius:2px;padding:2px 7px}

  .sel-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;padding:10px 12px;background:var(--panel);border:2px solid var(--ink);border-radius:var(--radius-sm)}
  .sel-bar .btn{flex:1}
  .day-sel{margin-left:auto;font-family:"Archivo";font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    padding:4px 9px;border-radius:2px;border:1.5px solid var(--ink);background:transparent;color:var(--ink-2)}
  .day-sel.on{background:var(--ink);color:var(--paper)}
  .ev-check{flex:none;width:30px;align-self:stretch;display:grid;place-items:center;background:var(--paper);
    border:2px solid var(--ink);border-radius:var(--radius-sm);font-weight:900;font-size:15px;color:var(--paper)}
  .ev-check.on{background:var(--accent);color:var(--accent-ink)}
  .ev.rowsel{outline:2px solid var(--accent);outline-offset:1px}
  .ev.shift{background:var(--panel)}
  .ev.shift h3{font-family:"Archivo";font-weight:800;font-size:16px;text-transform:none}
  .secret-tag{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--paper);
    background:var(--ink);border-radius:2px;padding:2px 8px}
  .day-pick{display:flex;gap:6px;flex-wrap:wrap}
  .day-opt{flex:1;min-width:54px;padding:10px 6px;border-radius:var(--radius-sm);border:2px solid var(--ink);
    background:var(--card);font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2)}
  .day-opt.on{background:var(--ink);color:var(--paper)}

  /* meetup windows list */
  .meet-sub{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin:2px 0 12px;font-size:11px;color:var(--muted);font-weight:600;line-height:1.4}
  .meet-weigh{flex:none;text-align:right;text-transform:uppercase;letter-spacing:.04em;font-weight:700}
  .link-btn{background:none;border:none;color:var(--accent);font-weight:700;font-size:11px;text-decoration:underline;padding:0;text-transform:none;letter-spacing:0}
  .meet-list{display:flex;flex-direction:column;gap:8px}
  .meet-row{display:flex;align-items:center;gap:12px;padding:11px 13px;background:var(--paper);border:2px solid var(--ink);border-radius:var(--radius-sm);width:100%;text-align:left;cursor:pointer}
  .meet-row:active{transform:translate(1px,1px)}
  .mr-left{flex:1;min-width:0}
  .mr-time{font-family:"Anton";font-size:17px;letter-spacing:.01em;line-height:1}
  .mr-who{font-size:11.5px;color:var(--muted);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
  .mr-right{flex:none;text-align:right}
  .mr-count{font-family:"Anton";font-size:22px;line-height:1;color:var(--teal)}
  .mr-count span{font-family:"Archivo";font-size:12px;color:var(--muted);font-weight:700}
  .mr-len{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:3px}
  .meet-block{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
  .sub-slots{display:flex;flex-wrap:wrap;gap:5px;padding:0 2px}
  .sub-slot{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;background:var(--card);border:1.5px solid var(--line-strong);border-radius:999px;cursor:pointer;font:inherit;color:var(--ink-2);min-height:28px}
  .sub-slot .ss-time{font-size:11px;font-weight:700;line-height:1}
  .sub-slot .ss-count{font-family:"Anton";font-size:12px;background:var(--ink);color:var(--paper);border-radius:999px;padding:1px 6px;line-height:1.3;min-width:14px;text-align:center}
  .sub-slot:active{transform:translate(1px,1px)}
  .sub-slot.on{background:var(--teal);color:#fff;border-color:var(--teal)}
  .sub-slot.on .ss-count{background:#fff;color:var(--teal)}
  .sub-slot.hot{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .sub-slot.clash{background:rgba(214,55,28,.12);border-color:rgba(214,55,28,.55);color:var(--ink-2)}
  .sub-slot.on.clash{background:var(--teal);color:#fff;border-color:rgba(214,55,28,.85);box-shadow:inset 0 0 0 2px rgba(214,55,28,.35)}
  [data-theme="dark"] .sub-slot.clash{background:rgba(242,85,59,.18);border-color:rgba(242,85,59,.55)}

  /* rally calls */
  .live-mini{font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-ink);background:var(--accent);border:1.5px solid var(--ink);border-radius:2px;padding:1px 6px;vertical-align:2px}
  .call-list{display:flex;flex-direction:column;gap:8px}
  .call-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--paper);border:1.5px solid var(--ink);border-radius:var(--radius-sm)}
  .call-main{flex:1;min-width:0}
  .call-title{font-weight:800;font-size:14px}
  .call-sub{font-size:11.5px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* crew picker */
  .crew-list{display:flex;flex-direction:column;gap:7px;max-height:50dvh;overflow-y:auto}
  .crew-opt{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;text-align:left;font-weight:700;font-size:14px;
    background:var(--card);border:2px solid var(--ink);border-radius:var(--radius-sm)}
  .crew-opt.on{background:var(--panel)}
  .crew-opt .crew-chk{margin-left:auto;font-weight:900;color:var(--teal);font-size:16px}
  .crew-opt .mo-av{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:800;flex:none;border:1.5px solid var(--ink)}
  .seed-live{background:var(--ink);color:var(--paper);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:10px;font-size:13px;line-height:1.45}
  .seed-live b{color:var(--gold)}
  .test-banner{background:var(--violet);color:#fff;font-size:12.5px;font-weight:700;padding:7px 12px;display:flex;align-items:center;justify-content:center;gap:10px;text-align:center;line-height:1.3}
  .test-exit{flex:none;background:#fff;color:var(--violet);border:none;border-radius:999px;padding:3px 11px;font-weight:800;font-size:12px;cursor:pointer}
  .app.testmode .topbar{border-top:2px solid var(--violet)}
  .test-step{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
  .test-step .ts-n{flex:none;width:22px;height:22px;border-radius:50%;background:var(--violet);color:#fff;font-weight:800;font-size:12px;display:grid;place-items:center;margin-top:1px}
  button.stat.stat-tap{cursor:pointer;border:2px solid var(--accent);font:inherit;text-align:left;-webkit-tap-highlight-color:transparent}
  button.stat.stat-tap .l{color:var(--accent);font-weight:700}
  .clash-modal-body{overflow-y:auto;max-height:72vh}
  .clash-modal-body .free-card{border:none!important;margin:0;padding:0}
  /* walk-times-from-here list */
  .wt-list{display:flex;flex-direction:column;gap:2px;margin-top:8px}
  .wt-row{display:flex;align-items:center;gap:9px;padding:9px 2px;border-top:1px solid var(--line);width:100%;text-align:left;font-size:13.5px}
  .wt-row:first-child{border-top:none}
  .wt-dot{flex:none;width:11px;height:11px;border-radius:50%;border:1.5px solid var(--ink)}
  .wt-name{flex:1;min-width:0;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .wt-time{flex:none;font-family:"Anton";font-size:14px;color:var(--teal)}
  /* admin walk-time matrix */
  .wm-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table.wm{border-collapse:collapse;font-size:12px;min-width:100%}
  table.wm th,table.wm td{border:1px solid var(--line);padding:5px 7px;text-align:center;white-space:nowrap}
  table.wm thead th,table.wm tbody th{background:var(--panel);font-family:"Anton";font-weight:400;letter-spacing:.02em}
  table.wm td small{font-size:8px;opacity:.6;margin-left:1px}
  .wm-self{color:var(--muted)}
  .wm-meas{background:rgba(30,90,80,.12);color:var(--teal);font-weight:700}
  .wm-est{color:var(--ink-2)}
  .wm-meas-k{color:var(--teal);font-weight:800}
  .wm-est-k{color:var(--ink-2);font-weight:800}
  .seed-live #seed-clock{font-family:"Anton";font-size:16px;margin-left:4px}

  /* ---------- HOME ---------- */
  .home-hi{display:flex;align-items:flex-end;justify-content:space-between;margin:8px 0 16px}
  .home-hello{font-size:13px;color:var(--muted);font-weight:600}
  .home-fname{font-family:"Anton";font-size:28px;line-height:1;text-transform:uppercase;margin-top:3px}
  .home-count{font-size:13px;color:var(--ink-2);font-weight:600;margin-bottom:14px}
  .home-count .hc-n{font-family:"Anton";font-size:24px;color:var(--accent);margin-right:4px}
  .home-card{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);padding:15px 16px;margin-bottom:12px;width:100%;text-align:left;display:block}
  .home-card.accent{background:var(--ink);color:var(--paper)}
  .home-card.accent .find-note,.home-card.accent .hc-meta{color:#cfc7b5}
  .home-card.accent .area-tag{border-color:rgba(255,255,255,.5)}
  .home-card.tappable{cursor:pointer}
  .home-card.tappable:active{transform:translate(1px,1px)}
  .hc-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .hc-title{font-family:"Archivo";font-weight:800;font-size:15px}
  .hc-tag{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;opacity:.8;margin-bottom:6px}
  .hc-big{font-family:"Anton";font-size:24px;line-height:1;text-transform:uppercase}
  .hc-meta{font-size:12.5px;margin-top:8px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .hc-go{font-family:"Anton";color:var(--muted);font-size:20px}
  .hc-pct{font-family:"Anton";font-size:22px;color:var(--teal)}
  .hc-count{font-family:"Anton";color:var(--accent);font-size:15px;margin-left:4px}

  .onnow-list,.crew-rows,.today-list{display:flex;flex-direction:column;gap:2px;margin-top:8px}
  .onnow-row,.crew-row,.today-row{display:flex;align-items:center;gap:9px;padding:8px 2px;border-top:1px solid var(--line);width:100%;text-align:left;font-size:13.5px}
  .onnow-row:first-child,.crew-row:first-child,.today-row:first-child{border-top:none}
  .onnow-title,.today-title{flex:1;min-width:0;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .onnow-end,.crew-where{flex:none;font-size:11px;color:var(--muted);font-weight:600}
  .onnow-mine{color:var(--accent)}
  .today-time{flex:none;font-family:"Anton";font-size:14px;width:54px}
  .crew-nm{flex:1;min-width:0;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .crew-row .mo-av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:10px;font-weight:800;flex:none;border:1.5px solid var(--ink)}

  .attn-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .attn-pill{padding:8px 12px;border-radius:999px;border:2px solid var(--ink);background:var(--paper);font-weight:700;font-size:12.5px}

  if(!festivalStart()) return null;

  if(!items.length) return null;
  const now=Date.now();
  const onNow=items.filter(x=>x.s.getTime()<=now && x.e2.getTime()>now).sort((a,b)=>a.e2-b.e2)[0];
  if(onNow) return {ev:onNow.ev, status:"now", until:onNow.e2, shift:onNow.shift};
  const upcoming=items.filter(x=>x.s.getTime()>now).sort((a,b)=>a.s-b.s)[0];

}
function untilText(mins){
  if(mins<1) return "any moment";
  if(mins<60) return `in ${mins} min`;
  const h=Math.floor(mins/60), m=mins%60;
  if(mins<24*60) return m? `in ${h}h ${m}m` : `in ${h}h`;

async function signup(name, passcode, adminCode){
  name = name.trim();

  const existing = await getDocs(query(colUsers, where("nameLower","==",name.toLowerCase())));
  if(!existing.empty) throw new Error("That name is taken — try logging in instead.");
  const isAdmin = adminCode && adminCode === ADMIN_CODE;
  const ref = await addDoc(colUsers, {
    name, nameLower:name.toLowerCase(), passcode, admin:!!isAdmin, createdAt:serverTimestamp()
  });
  localStorage.setItem("fp_uid", ref.id);
  localStorage.setItem("fp_user", JSON.stringify({ id:ref.id, name, admin:!!isAdmin, _realAdmin: (!TEST_MODE && !!isAdmin) }));
  return { id:ref.id, name, admin:!!isAdmin };
}

// ---- Sleep tracking by absence ----
// Honest method: find long quiet periods in the private trail (no significant movement, no ratings).
// Returns per-day { bed:Date, up:Date, hours:number } where detected.
function sleepNights(){
  if(!adminFeat("sleep")) return [];
  const trail=loadTrail(); if(trail.length<3) return [];
  const minQuiet=4*3600000;    // need at least 4h gap to call it sleep (festival reality)
  const tentRadius=50;         // metres — being within this counts as "still here"
  const nights=[];
  // Walk through trail finding gaps where successive points are close + far apart in time
  let gapStart=null, gapLastPt=null;
  for(let i=1;i<trail.length;i++){
    const prev=trail[i-1], p=trail[i];
    const dt=p.t-prev.t;
    const dist=haversine(prev.lat,prev.lng,p.lat,p.lng);
    // A "still" interval: small movement OR a very long gap (phone went idle)
    if(dist<=tentRadius || dt>30*60000){
      if(!gapStart){ gapStart=prev; gapLastPt=p; }
      else gapLastPt=p;
    } else {
      if(gapStart && (gapLastPt.t-gapStart.t)>=minQuiet){
        nights.push({ bed:new Date(gapStart.t), up:new Date(gapLastPt.t), hours:(gapLastPt.t-gapStart.t)/3600000 });
      }
      gapStart=null; gapLastPt=null;
    }
  }
  // If a gap is still open at the end of trail, it might be ongoing — only report if it's already long enough
  if(gapStart && gapLastPt && (gapLastPt.t-gapStart.t)>=minQuiet){
    nights.push({ bed:new Date(gapStart.t), up:new Date(gapLastPt.t), hours:(gapLastPt.t-gapStart.t)/3600000 });
  }
  return nights;
}

function crowdRadarCard(){

  const upcoming=state.events.filter(e=>{

let _swReg=null, _swReloading=false;
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("./sw.js").then(reg=>{
      _swReg=reg;
      // If there's already a worker waiting (update downloaded on a previous visit), prompt now.
      if(reg.waiting && navigator.serviceWorker.controller) showUpdateBanner();
      // A new worker started installing — when it finishes and one's already controlling, it's an update.
      reg.addEventListener("updatefound", ()=>{
        const nw=reg.installing; if(!nw) return;
        nw.addEventListener("statechange", ()=>{
          if(nw.state==="installed" && navigator.serviceWorker.controller) showUpdateBanner();
        });
      });
    }).catch(()=>{});
    // When the new worker takes control (after the user taps Update), reload once to get the new build.
    navigator.serviceWorker.addEventListener("controllerchange", ()=>{
      if(_swReloading) return; _swReloading=true; location.reload();
    });
  });
  // Check for an update on launch and whenever the app regains focus (no battery-draining polling).
  const checkForUpdate=()=>{ if(_swReg) _swReg.update().catch(()=>{}); };
  document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) checkForUpdate(); });
  window.addEventListener("focus", checkForUpdate);
}

const TIME_VIEWS = new Set(["home","onnow","mine"]);
function timeTick(){
  if(!state.user) return;
  if(document.hidden) return;                       // don't churn while backgrounded
  if(document.querySelector(".modal-bg")) return;   // don't redraw under an open modal
  // don't yank focus mid-typing (chat / search inputs)
  const ae=document.activeElement;
  if(ae && (ae.tagName==="INPUT"||ae.tagName==="TEXTAREA")) return;
  applyRatingTimeGate();                             // reveal any newly-due scheduled ratings
  if(TIME_VIEWS.has(state.view)) renderView();
  scheduleNotifications();                           // re-arm leave-now / starting-soon timers
  maybeRatingNudge();
}
// state.ratings is a time-gated view of state._allRatings: a rating with a future createdAt
// stays hidden until its moment. Real ratings are always in the past, so they're unaffected;
// this is what lets the simulator pre-schedule ratings that "arrive" over the day.
function applyRatingTimeGate(){
  const all = state._allRatings || [];
  const now = Date.now();
  const next = all.filter(r=>{
    // Prefer simAt (the scheduled reveal time for sim ratings); fall back to real createdAt.
    // Previously createdAt was checked first, but sim writes ALSO stamp createdAt=now for ordering,
    // which caused future-scheduled sim ratings to be revealed immediately — the time-gate became a no-op.
    const t = (typeof r.simAt==="number") ? r.simAt
            : (r.createdAt && r.createdAt.toMillis ? r.createdAt.toMillis() : 0);
    return t<=now;
  });
  // only swap + re-render if the visible set actually changed (avoid needless churn)
  const changed = !state.ratings || state.ratings.length!==next.length;
  state.ratings = next;
  if(changed && state.view && TIME_VIEWS.has(state.view) && !document.querySelector(".modal-bg")) {
    const v=document.getElementById("view"); if(v) renderView();
  }
}

    state.messages = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>((a.createdAt&&a.createdAt.toMillis?a.createdAt.toMillis():0)-(b.createdAt&&b.createdAt.toMillis?b.createdAt.toMillis():0)));
    if(state.user){ maybeNotifyMentions(); if((state.view==="chat"||state.view==="browse") && !document.querySelector(".modal-bg")) renderApp(); }
  });
  onSnapshot(colCalls, snap=>{
    state.calls = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(state.user){ maybeNotifyCalls(); if(!document.querySelector(".modal-bg")) renderApp(); }
  });
  onSnapshot(colLegs, snap=>{
    state.legs = snap.docs.map(d=>({id:d.id,...d.data()}));
  });
  onSnapshot(colRatings, snap=>{
    state._allRatings = snap.docs.map(d=>({id:d.id,...d.data()}));
    applyRatingTimeGate();
    checkAchievementTriggers();
    if(state.view==="shared" && !document.querySelector(".modal-bg")) renderView();
  });
  onSnapshot(colSafety, snap=>{
    state.safety = snap.docs.map(d=>({id:d.id,...d.data()}));
    checkAchievementTriggers();
    if((state.view==="home"||state.view==="shared") && !document.querySelector(".modal-bg")) renderView();
  });
  onSnapshot(colCopresence, snap=>{
    state.copresence = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(state.view==="crewdna" && !document.querySelector(".modal-bg")) renderView();
  });
  onSnapshot(colMeetVotes, snap=>{
    state.meetVotes = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(state.view==="mine" && !document.querySelector(".modal-bg")) renderView();
  });
}
function activeCalls(){
  const now=Date.now();
  return state.calls
    .filter(c=> (c.expiresAt||0) > now)
    .sort((a,b)=>((b.createdAt&&b.createdAt.toMillis?b.createdAt.toMillis():0)-(a.createdAt&&a.createdAt.toMillis?a.createdAt.toMillis():0)));
}
function maybeNotifyCalls(){
  if(!state.user || !feat("overlaps")) return;
  const me=state.user.id;
  activeCalls().forEach(c=>{
    if(c.userId===me) return;
    const t=(c.createdAt&&c.createdAt.toMillis)?c.createdAt.toMillis():0;
    if(t<=find.sessionStart) return;
    if(find.notifiedCalls&&find.notifiedCalls[c.id]) return;
    find.notifiedCalls=find.notifiedCalls||{}; find.notifiedCalls[c.id]=true;
    if(feat("notify") && find.notify) pushNotify(`${c.name||"Someone"}: ${callText(c)}`, "Tap to join in the app", "call-"+c.id);
  });
}
function maybeNotifyMentions(){
  if(!state.user) return;
  const me=state.user.id;
  state.messages.forEach(m=>{
    if(m.userId===me) return;
    const t=(m.createdAt&&m.createdAt.toMillis)?m.createdAt.toMillis():0;
    if(t<=find.sessionStart) return;                          // ignore history from before this session
    const mentioned = (m.mentions&&m.mentions.includes(me)) || messageMentionsMe(m.text||"");
    if(!mentioned) return;
    if(find.notifiedMentions[m.id]) return; find.notifiedMentions[m.id]=true;
    if(feat("notify") && find.notify) pushNotify(`${m.name||"Someone"} tagged you`, (m.text||"").slice(0,120), "mention-"+m.id);
  });
}
function subscribeMyPacking(){
  if(!state.user) return;
  onSnapshot(dref("packing",state.user.id), snap=>{
    state.myPacking = snap.exists() ? { checked:snap.data().checked||[], mine:snap.data().mine||[] } : { checked:[], mine:[] };
    if(state.view==="packing" && !document.querySelector(".modal-bg")) renderView();
  });
  // private shifts — only this user's own
  onSnapshot(query(colShifts, where("ownerId","==",state.user.id)), snap=>{
    state.shifts = snap.docs.map(d=>({id:d.id,...d.data()}));
    if((state.view==="mine"||state.view==="shared") && !document.querySelector(".modal-bg")) renderView();
  });
}
async function saveShift(sh){
  const data={ ownerId:state.user.id, label:(sh.label||"").trim()||"Work shift", day:sh.day, start:sh.start, end:sh.end||"", note:(sh.note||"").trim() };
  if(sh.id) await updateDoc(dref("shifts",sh.id), data);
  else await addDoc(colShifts, data);
}
async function deleteShift(id){ await deleteDoc(dref("shifts",id)); }

function allReady(){ return Object.values(state.ready).every(Boolean); }
function afterData(){
  const savedUid = localStorage.getItem("fp_uid");
  if(savedUid && !state.user){
    if(!state.ready.users) return;       // wait for users to resolve identity
    const me = state.users.find(u=>u.id===savedUid);
    if(me){ state.user = {...me}; }
    else {
      // Don't log out over a transient/empty sync — fall back to the locally cached profile.
      let cached=null; try{ cached=JSON.parse(localStorage.getItem("fp_user")||"null"); }catch(e){}
      if(cached && cached.id===savedUid){ state.user = {...cached}; }
      else { localStorage.removeItem("fp_uid"); localStorage.removeItem("fp_user"); renderAuth(); return; }
    }
  }
  if(!state.user){ return; }              // auth screen handles its own render
  // Auto-elevate: if this user is admin in real mode (per their cached profile from real-mode signup/login)
  // but lands in test mode as a non-admin, mirror their admin status into test_users — once.
  if(TEST_MODE && state.user && !window._testUserEnsured){
    window._testUserEnsured = true;
    try{
      const cached = JSON.parse(localStorage.getItem("fp_user")||"null");
      const wantAdmin = !!(cached && cached.id===state.user.id && cached.admin===true && cached._realAdmin===true);
      // Ensure a NAMED user doc exists in test_users (prevents orphaned safety/picks showing raw IDs).
      const existing = state.users.find(u=>u.id===state.user.id);
      if(!existing || (wantAdmin && !state.user.admin)){
        const payload = { name:state.user.name, admin: wantAdmin || !!state.user.admin };
        setDoc(dref("users", state.user.id), payload, {merge:true}).then(()=>{
          state.user = {...state.user, admin: payload.admin};
          if(payload.admin && !existing) toast("Test profile set up");
          renderApp();
        }).catch(()=>{});
      }
    }catch(e){}
  }
  if(!find.packingSubbed){ find.packingSubbed=true; subscribeMyPacking(); }
  if(!allReady()){ root.innerHTML = loaderHTML(); return; }
  renderApp();
  maybeNotifyChanges(); scheduleNotifications();
  if(navigator.onLine) refreshWeather().then(()=>{ if(state.view==="home"&&!document.querySelector(".modal-bg")) renderView(); });
  restorePersistedToggles();
  maybeShowIntro();
}

function showIntro(){
  const slides=[
    {t:"HIYA!", b:`Welcome to ${esc(state.structure.festivalName||"the festival")}! This app lets you plan your festival lineup, see where everyone else is, and navigate the site to find what you want to see.`},
    {t:"PICK YOUR ACTS", b:"In the <b>Lineup</b> tab, select the acts you want to see. Tap the star (★) to make an act a must-see, and the scheduler will make sure you catch all of it."},
    {t:"CLASHES, SOLVED", b:"In the <b>Plan</b> tab you'll see your schedule. If any picks clash, tap the <b>Clashes</b> tile and the system helps you navigate them as best as possible."},
    {t:"DON'T GET LOST", b:"The <b>Find</b> tab helps you navigate to each stage with a live compass — and you can drop pins for your tent or anything useful you spot, like good food or a quiet bar."},
    {t:"YOU'RE SET!", b:"To see your dashboard, tap the star (★) at the top of the screen and you'll get your day at a glance."}
  ];
  let i=0;
  const wrap=document.createElement("div"); wrap.className="modal-bg"; wrap.id="intro-bg";
  document.body.appendChild(wrap);
  const draw=()=>{
    const s=slides[i]; const last=i===slides.length-1;
    wrap.innerHTML=`<div class="modal intro-modal">
      <div class="intro-dots">${slides.map((_,n)=>`<span class="${n===i?'on':''}"></span>`).join("")}</div>
      <h2 style="margin:6px 0 8px">${s.t}</h2>
      <p style="line-height:1.5;color:var(--ink-2);margin:0 0 20px">${s.b}</p>
      <div style="display:flex;gap:8px">
        ${i>0?`<button class="btn ghost" id="intro-back" style="flex:none">Back</button>`:`<button class="btn ghost" id="intro-skip" style="flex:none">Skip</button>`}
        <button class="btn primary" id="intro-next" style="flex:1">${last?"Get started":"Next"}</button>
      </div>
    </div>`;
    const done=()=>{ localStorage.setItem("fp_seenintro","1"); wrap.remove(); };
    wrap.querySelector("#intro-next").onclick=()=>{ if(last) done(); else { i++; draw(); } };
    const back=wrap.querySelector("#intro-back"); if(back) back.onclick=()=>{ i--; draw(); };
    const skip=wrap.querySelector("#intro-skip"); if(skip) skip.onclick=done;
  };
  draw();
}
// Re-apply the user's saved location-sharing & reminder choices after a refresh. Runs once.
let _togglesRestored=false;
function restorePersistedToggles(){
  if(_togglesRestored || !state.user) return;
  _togglesRestored=true;
  // Reminders: only resume if still permitted by the browser
  if(localStorage.getItem("fp_notify")==="1" && !find.notify){
    if(typeof Notification!=="undefined" && Notification.permission==="granted"){
      find.notify=true; scheduleNotifications();
      subscribePush().catch(()=>{});               // refresh server-push subscription if VAPID is configured
    } else {
      localStorage.removeItem("fp_notify");   // permission was revoked; don't keep a dead flag
    }
  }
  // Location sharing: only resume if location features are still on
  if(localStorage.getItem("fp_share")==="1" && !find.share){
    if(locationEnabled() && navigator.geolocation){ startShare(); renderApp(); }
    else localStorage.removeItem("fp_share");
  }
}

function openRatingModal(eventId){
  const ev=state.events.find(e=>e.id===eventId); if(!ev) return;
  // Defence in depth: never let anyone rate a set that hasn't ended yet.
  const ended = eventEnd(ev) && eventEnd(ev).getTime() < Date.now();
  if(!ended){ toast("You can rate this once it's finished"); return; }
  const existing = state.ratings.find(r=>r.id===state.user.id+"__"+eventId);
  let val = existing ? existing.score : 7;
  let tags = new Set((existing && existing.tags) ? existing.tags : []);
  const TAGS = ["vibe","sound","crowd","surprise","dancing"];
  const showSurveys = adminFeat("surveys");
  const wrap=document.createElement("div"); wrap.className="modal-bg";
  document.body.appendChild(wrap);
  const draw=()=>{
    const tagButtons = showSurveys ? TAGS.map(t=>`<button class="surv-chip ${tags.has(t)?'on':''}" data-surv="${t}">${t}</button>`).join("") : "";
    wrap.innerHTML=`<div class="modal rate-modal">
      <div class="modal-head"><h2>Rate it</h2><button class="btn ghost sm" id="rt-close">Close</button></div>
      <div class="rate-act">${esc(ev.title)}</div>
      <div class="rate-big" id="rt-val">${val.toFixed(1)}</div>
      <input type="range" id="rt-slider" min="0" max="10" step="0.5" value="${val}" class="rate-slider">
      <div class="rate-scale"><span>0</span><span>5</span><span>10</span></div>
      ${showSurveys?`<div class="surv-label">What was it?</div><div class="surv-row">${tagButtons}</div>`:""}
      <div style="display:flex;gap:8px;margin-top:16px">
        ${existing?`<button class="btn ghost" id="rt-clear" style="flex:none">Remove</button>`:""}
        <button class="btn primary" id="rt-save" style="flex:1">Save rating</button>
      </div>
    </div>`;
    const slider=wrap.querySelector("#rt-slider");
    const out=wrap.querySelector("#rt-val");
    slider.oninput=()=>{ val=parseFloat(slider.value); out.textContent=val.toFixed(1); };
    wrap.querySelectorAll("[data-surv]").forEach(b=>b.onclick=()=>{ const t=b.dataset.surv; if(tags.has(t)) tags.delete(t); else tags.add(t); b.classList.toggle("on"); });
    wrap.querySelector("#rt-close").onclick=()=>wrap.remove();
    wrap.onclick=e=>{ if(e.target===wrap) wrap.remove(); };
    wrap.querySelector("#rt-save").onclick=async()=>{ await saveRating(eventId, val, [...tags]); wrap.remove(); toast("Rated "+val.toFixed(1)); renderView(); };
    const clr=wrap.querySelector("#rt-clear"); if(clr) clr.onclick=async()=>{ await clearRating(eventId); wrap.remove(); toast("Rating removed"); renderView(); };
  };
  draw();
}

// "before" | "during" | "after" | "nodate"
function festivalPhase(){
  const base=festivalStart(); if(!base) return "nodate";
  const now=Date.now();
  const startMs=new Date(base); startMs.setHours(12,0,0,0);              // gates open ~ noon Wed
  const endMs=new Date(base); endMs.setDate(endMs.getDate()+DAYS.length-1); endMs.setHours(DAY_ROLLOVER_HOUR,0,0,0); endMs.setDate(endMs.getDate()+1); // ~6am after Sunday
  if(now < startMs.getTime()) return "before";
  if(now > endMs.getTime()) return "after";
  return "during";
}
function currentFestivalDay(){
  // which DAY name "now" belongs to, honouring the 6am rollover
  const base=festivalStart(); if(!base) return DAYS[0];
  const now=new Date();
  let idx=Math.round((new Date(now.getFullYear(),now.getMonth(),now.getDate()) - new Date(base.getFullYear(),base.getMonth(),base.getDate()))/86400000);
  if(now.getHours() < DAY_ROLLOVER_HOUR) idx-=1;   // early morning belongs to previous day
  return DAYS[Math.max(0,Math.min(DAYS.length-1,idx))];
}
function onNowEvents(){

function startingSoonEvents(mins){

  return state.events.map(e=>({e,s:eventStart(e)})).filter(x=>x.s && x.s.getTime()>now && x.s.getTime()<=horizon)

// ---- "Did you catch these?" — detect drop-ins from your trail you didn't pick ----
// Scans the trail for ~10+ min of presence near a stage during an unpicked act's window.
// Skips are remembered (localStorage) so a dismissed act never nags again.
const SEEN_KEY = "fp_seen_skips";
const SEEN_MIN_MIN = 10;          // minutes of presence to count as "might have seen it"
function loadSeenSkips(){ try{ return new Set(JSON.parse(localStorage.getItem(SEEN_KEY)||"[]")); }catch(e){ return new Set(); } }
function skipSeenAct(eventId){
  const s=loadSeenSkips(); s.add(eventId);
  try{ localStorage.setItem(SEEN_KEY, JSON.stringify([...s])); }catch(e){}
}
function maybeSeenActs(){
  if(!feat("ratings")) return [];
  const trail=loadTrail();
  if(trail.length<3) return [];
  const stages=stagesWithCoords();
  if(!stages.length) return [];
  const picked=myPickIds();
  const skips=loadSeenSkips();
  const now=Date.now();
  // For each past, unpicked, un-skipped, un-rated event: sum trail time spent within range of its stage during its window.
  const out=[];
  state.events.forEach(ev=>{
    if(picked.has(ev.id) || skips.has(ev.id)) return;
    if(myRating(ev.id)!=null) return;                       // already rated somehow
    const st=stages.find(s=>s.name===ev.stageName); if(!st) return;
    const start=eventStart(ev), end=eventEnd(ev); if(!start||!end) return;
    if(end.getTime()>now) return;                           // not over yet
    const ws=start.getTime(), we=end.getTime();
    // walk trail; accumulate dwell time where consecutive points are near this stage AND within the set window
    let dwellMs=0;
    const rad=stageRadius(st);
    for(let i=1;i<trail.length;i++){
      const p=trail[i], prev=trail[i-1];
      if(p.t<ws || p.t>we) continue;                        // point outside the set's time
      const d=haversine(p.lat,p.lng,st.lat,st.lng);
      if(d>rad) continue;                                   // not at this stage (uses the stage's own size)
      const gap=p.t-prev.t;
      if(gap>0 && gap<10*60000) dwellMs+=gap;               // count the interval (ignore huge gaps = app was closed)
    }
    const mins=Math.round(dwellMs/60000);
    if(mins>=SEEN_MIN_MIN) out.push({ ev, mins });
  });
  // most recent first, cap a few
  out.sort((a,b)=> (eventEnd(b.ev)-eventEnd(a.ev)));
  return out.slice(0,4);
}
function seenActsCard(){

function reachableActs(budgetMin){
  // From current position (or nearest stage), find upcoming acts you can still make.
  if(!locationEnabled() || !find.pos) return null;
  const now=Date.now();
  const horizon = now + (budgetMin||90)*60000;
  const day=currentFestivalDay();
  const out=[];
  state.events.forEach(e=>{
    if(day && e.day!==day) return;
    const start=eventStart(e), end=eventEnd(e); if(!start||!end) return;
    if(end.getTime()<=now) return;                         // already over
    if(start.getTime()>horizon) return;                    // beyond the window we're showing
    const stage=stagesWithCoords().find(s=>s.name===e.stageName);
    if(!stage) return;                                     // need coords to compute reachability
    const sec=walkSecondsFromPos(find.pos, stage.id); if(sec==null) return;
    const arrive = now + sec*1000;
    // Can you catch any of it? (arrive before it ends). How much you'd see:
    const catchable = arrive < end.getTime();
    if(!catchable) return;
    const minsOfSet = Math.round((end.getTime() - Math.max(arrive, start.getTime()))/60000);
    const inTime = arrive <= start.getTime();              // there before it starts
    out.push({ e, stage, walkMin:Math.round(sec/60), inTime, minsOfSet, start, end, picked:myPickIds().has(e.id) });
  });
  // sort: full catches first, then by soonest start
  out.sort((a,b)=> (b.inTime-a.inTime) || (a.start-b.start));
  return out;
}

          <div class="hc-meta"><span class="area-tag" style="--c:${districtColor(np.ev.districtId)}">${esc(np.ev.districtName)}</span> ${esc(np.ev.stageName)} · ${when}${walk?` · ${walk}`:""}</div>
          ${(locationEnabled()&&stagesWithCoords().some(s=>s.name===np.ev.stageName))?`<button class="btn lime sm" data-goto-stage="${esc(np.ev.stageName)}" style="margin-top:10px">Point me there →</button>`:""}</div>`;
      } else {
        // departure-board style countdown to your next pick
        const h=Math.floor(np.mins/60), m=np.mins%60;
        const big = np.mins<60 ? `${np.mins}<small>min</small>` : `${h}<small>h</small> ${String(m).padStart(2,"0")}<small>m</small>`;
        // Real "leave in X": minutes until the set − walk-time to get there.
        let leaveLine = "";
        const st = stagesWithCoords().find(s=>s.name===np.ev.stageName);
        if(st && find.pos){
          const sec = walkSecondsFromPos(find.pos, st.id);
          if(sec!=null){
            const walkMin = Math.max(1, Math.round(sec/60));
            const leaveIn = np.mins - walkMin;
            if(leaveIn<=0) leaveLine = `<div class="depart-warn">Leave now — ~${walkMin} min walk, starts in ${np.mins} min</div>`;
            else if(leaveIn<=15) leaveLine = `<div class="depart-warn">Leave in ${leaveIn} min (~${walkMin} min walk)</div>`;
            else leaveLine = `<div class="depart-ok">Leave in ~${leaveIn} min · ${walkMin} min walk</div>`;
          }
        }
        nextCard=`<div class="depart-card">
          <div class="depart-head"><span class="depart-lbl">Starts in</span><span class="depart-at">${esc(fmt12(np.ev.start))}</span></div>
          <div class="depart-time">${big}</div>
          <div class="depart-act">${esc(np.ev.title)}</div>
          <div class="depart-meta"><span class="area-tag" style="--c:${districtColor(np.ev.districtId)}">${esc(np.ev.districtName)}</span> ${esc(np.ev.stageName)}${walk?` · ${walk}`:""}</div>
          ${leaveLine}
          ${(locationEnabled()&&stagesWithCoords().some(s=>s.name===np.ev.stageName))?`<button class="btn lime sm" data-goto-stage="${esc(np.ev.stageName)}" style="margin-top:10px">Point me there →</button>`:""}
        </div>`;
      }
    }
  }
  cards.push(nextCard);
  // ADVISORY cards (nudges/suggestions) — cap how many show at once so Home stays curated.
  // Priority order: reach (actionable now) > energy/pace (wellbeing) > tomorrow (planning) > weather nudge.
  const ADVISORY_MAX = 2;
  const advisories = [];
  advisories.push(reachCard());
  const energyHtml = energyNudgeCard();
  if(energyHtml) advisories.push(energyHtml);
  else advisories.push(paceCard());          // pace only if energy isn't already nudging
  advisories.push(tomorrowYouCard());
  advisories.push(weatherNudgeCard());
  const shownAdvisories = advisories.filter(Boolean).slice(0, ADVISORY_MAX);
  shownAdvisories.forEach(c=>cards.push(c));

  // ESSENTIAL cards — always shown (safety, weather strip, clashes)
  cards.push(safeCheckInCard());
  cards.push(weatherCard());
  cards.push(clashWarnCard());
  cards.push(seenActsCard());

  // 2) ON NOW across the festival (your areas/picks first feel: just show a few)
  const onNow=onNowEvents();
  if(onNow.length){
    const ids=myPickIds();
    const onnowTarget = (feat("onnow")&&festivalStart()) ? "onnow" : "browse";
    const rows=onNow.slice(0,6).map(e=>`<button class="onnow-row tappable" data-go="${onnowTarget}"><span class="area-tag" style="--c:${districtColor(e.districtId)}">${esc(e.stageName)}</span><span class="onnow-title">${esc(e.title)}${ids.has(e.id)?' <span class="onnow-mine">★</span>':''}</span><span class="onnow-end">til ${esc(fmt12(e.end||""))}</span></button>`).join("");
    cards.push(`<div class="home-card"><div class="hc-title">On now <span class="hc-count">${onNow.length}</span></div><div class="onnow-list">${rows}</div>${onNow.length>6?`<button class="link-btn" data-go="${onnowTarget}" style="margin-top:8px">see all ${onNow.length} →</button>`:""}</div>`);
  }

  // 3) ACTIVE RALLY CALLS
  if(feat("overlaps")){
    const calls=activeCalls();
    if(calls.length){
      const rows=calls.slice(0,3).map(c=>{
        const ins=(c.in||[]).length; const joined=(c.in||[]).includes(state.user.id); const mine=c.userId===state.user.id;
        return `<div class="call-row"><div class="call-main"><div class="call-title">${callText(c)}</div><div class="call-sub">${esc(c.name||'?')} · ${ins} in</div></div>${mine?'':`<button class="btn ${joined?'lime':'primary'} sm" data-joincall="${c.id}">${joined?'✓ In':'I’m in'}</button>`}</div>`;
      }).join("");
      cards.push(`<div class="home-card"><div class="hc-title">Rally calls <span class="live-mini">live</span></div><div class="call-list">${rows}</div><button class="link-btn" data-go="shared" style="margin-top:8px">go to group →</button></div>`);
    }
  }

  // 4) NEEDS ATTENTION (mentions, changed picks)
  const mentions=unreadMentionCount(), changed=changedPickCount();
  if(mentions||changed){
    const bits=[];
    if(mentions) bits.push(`<button class="attn-pill" data-go="chat">${mentions} mention${mentions>1?'s':''}</button>`);
    if(changed) bits.push(`<button class="attn-pill" data-go="mine">${changed} set time${changed>1?'s':''} changed</button>`);
    cards.push(`<div class="home-card"><div class="hc-title">Heads up</div><div class="attn-row">${bits.join("")}</div></div>`);
  }

  // 5) THE CREW (who's sharing, roughly where)
  if(locationEnabled()){
    const ppl=peopleWithCoords();
    if(ppl.length){
      const rows=ppl.slice(0,6).map(p=>{
        let where="sharing"; if(find.pos){ const nr=nearestStage(p.lat,p.lng); const d=haversine(find.pos.lat,find.pos.lng,p.lat,p.lng); where=(nr?("near "+nr.stage.name):fmtDist(d)+" away"); }
        return `<button class="crew-row tappable" data-go="find"><span class="mo-av" style="background:${personColor(p.id)}">${esc(initials(p.name))}</span><span class="crew-nm">${esc(p.name)}${p.lost?' ':''}</span><span class="crew-where">${esc(where)} · ${agoText(p.ts)}</span></button>`;
      }).join("");
      cards.push(`<div class="home-card"><div class="hc-title">Your crew <span class="hc-count">${ppl.length}</span></div><div class="crew-rows">${rows}</div></div>`);
    } else if(!find.share){
      cards.push(`<div class="home-card"><div class="hc-title">Find your crew</div><div class="find-note">Turn on location sharing so you can find each other.</div><button class="btn primary sm" data-go="find" style="margin-top:10px">Open Find →</button></div>`);
    }
  }

  // 6) TODAY'S REMAINING PICKS
  const today=currentFestivalDay();
  const ids=myPickIds(); const now=Date.now();
  const todayLeft=sortEvents(state.events.filter(e=>ids.has(e.id)&&e.day===today)).filter(e=>{ const s=eventStart(e); return s && s.getTime()>now-30*60000; });
  if(todayLeft.length){
    const rows=todayLeft.slice(0,5).map(e=>`<button class="today-row tappable" data-go="mine"><span class="today-time">${esc(fmt12(e.start))}</span><span class="today-title">${esc(e.title)}</span><span class="area-tag" style="--c:${districtColor(e.districtId)}">${esc(e.stageName)}</span></button>`).join("");
    cards.push(`<div class="home-card"><div class="hc-title">Rest of ${today}</div><div class="today-list">${rows}</div>${todayLeft.length>5?`<button class="link-btn" data-go="mine" style="margin-top:8px">full plan →</button>`:""}</div>`);
  }

  // 7) WALK TIMES FROM HERE (compact, nearest 4)
  cards.push(walkTimesCard(4, "Nearest stages"));
  cards.push(crewNearbyCard());

  // 8) SET RECOMMENDATIONS
  cards.push(recsCard());

  // 9) QUICK ACTIONS
  cards.push(homeQuickActions());

  return cards.filter(Boolean).join("");
}

function walkLineFor(ev){
  const st=stagesWithCoords().find(s=>s.name===ev.stageName);
  if(!st||!find.pos) return "";
  const sec=walkSecondsFromPos(find.pos, st.id);
  return sec!=null ? fmtWalk(sec) : "";
}

// acts your crew (or group) is seeing that you're free for and haven't picked
function setRecs(limit){
  if(!feat("recs")||!festivalStart()) return [];
  const me=state.user.id;
  const myIds=myPickIds();
  // who counts: crew if set & in crew mode-ish, else whole group (minus me)
  let peers = state.users.map(u=>u.id).filter(id=>id!==me);
  if(state.crew && state.crew.length) peers = peers.filter(id=>state.crew.includes(id));
  const peerSet=new Set(peers);
  // my busy intervals per day (picks + shifts) for "am I free" test
  const myBusy={};
  DAYS.forEach(d=>{ myBusy[d]=[]; });
  state.events.filter(e=>myIds.has(e.id)).forEach(e=>{ (myBusy[e.day]=myBusy[e.day]||[]).push(timeRangeMin(e)); });
  (state.shifts||[]).forEach(sh=>{ (myBusy[sh.day]=myBusy[sh.day]||[]).push(timeRangeMin({day:sh.day,start:sh.start,end:sh.end||addHour(sh.start)})); });
  const freeFor=e=>{ const [s,en]=timeRangeMin(e); return !(myBusy[e.day]||[]).some(([bs,be])=> s<be && bs<en); };
  // count peer picks per event
  const peerCount={};
  state.picks.forEach(p=>{ if(p.userId!==me && peerSet.has(p.userId)) peerCount[p.eventId]=(peerCount[p.eventId]||0)+1; });
  const now=Date.now();
  const recs=state.events.filter(e=>{
    if(myIds.has(e.id)) return false;                 // already going
    if(!peerCount[e.id]) return false;                // nobody's going
    const ss=eventStart(e); if(ss && ss.getTime()<now-30*60000) return false;  // already passed
    return freeFor(e);                                // you're free
  }).map(e=>({e, n:peerCount[e.id], who:state.picks.filter(p=>p.eventId===e.id && peerSet.has(p.userId)).map(p=>userName(p.userId))}))
    .sort((a,b)=> b.n-a.n || (eventStart(a.e)?.getTime()||0)-(eventStart(b.e)?.getTime()||0));
  return limit?recs.slice(0,limit):recs;
}
