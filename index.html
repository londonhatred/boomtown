/* ---------- CLASH RESOLVER ---------- */
// group a day's picks into clusters of mutually-overlapping events
function clashClusters(day){
  const ids=myPickIds();
  let list=sortEvents(state.events.filter(e=>ids.has(e.id)&&e.day===day))
    .map(e=>({e, r:timeRangeMin(e)}));
  // work shifts are immovable blocks — fold them in so overlapping picks register as clashes
  if(feat("shifts")){
    (state.shifts||[]).filter(sh=>sh.day===day).forEach(sh=>{
      const ev={id:"sh:"+sh.id, title:sh.label||"Work shift", stageName:"", districtId:null, day, start:sh.start, end:sh.end||addHour(sh.start), _shift:true};
      list.push({e:ev, r:timeRangeMin(ev), isShift:true});
    });
    list.sort((a,b)=> a.r[0]-b.r[0] || a.r[1]-b.r[1]);
  }
  const clusters=[];
  let cur=null, curEnd=-1;
  list.forEach(item=>{
    const [s,en]=item.r;
    if(cur && s < curEnd){           // overlaps the running cluster window
      cur.push(item); curEnd=Math.max(curEnd,en);
    } else {
      if(cur && cur.length>1) clusters.push(cur);
      cur=[item]; curEnd=en;
    }
  });
  if(cur && cur.length>1) clusters.push(cur);
  // only keep clusters that contain at least one real pick (not shift-only)
  return clusters.filter(c=>c.some(x=>!x.isShift));
}
function walkMinBetween(aName,bName){
  const sa=stagesWithCoords().find(s=>s.name===aName), sb=stagesWithCoords().find(s=>s.name===bName);
  if(sa&&sb){ const w=walkSeconds(sa.id,sb.id); if(w!=null) return Math.max(1,Math.round(w/60)); }
  return null;
}
// how many of my crew (or whole group if no crew) picked an event
function crewGoing(eventId){
  const me=state.user.id;
  let peers=state.users.map(u=>u.id).filter(id=>id!==me);
  const usingCrew = state.crew && state.crew.length;
  if(usingCrew) peers=peers.filter(id=>state.crew.includes(id));
  const peerSet=new Set(peers);
  return state.picks.filter(p=>p.eventId===eventId && peerSet.has(p.userId)).length;
}
// Route through a clash cluster. Protects must-see acts in full (reserving their time);
// routes the rest into the gaps around them. Returns {route, missed, mustConflict}.
const MIN_WORTH=10;     // minutes — ignore slivers smaller than this
const SOLID_CHUNK=20;   // minutes — below this counts as a "sliver" worth flagging
// find a set of must-sees that all mutually overlap (the contested headliner pile-up)
function clashingMustSet(items){
  const must=myMustSee();
  const ms=items.filter(x=>must.has(x.e.id));
  if(ms.length<2) return [];
  // greedily collect must-sees that overlap the others' shared window
  const overlap=(a,b)=>a.r[0]<b.r[1]&&b.r[0]<a.r[1];
  // build clusters of mutually-overlapping must-sees; return the largest such group of size>=2
  let best=[];
  for(let i=0;i<ms.length;i++){
    const group=[ms[i]];
    for(let j=0;j<ms.length;j++){ if(j!==i && group.every(g=>overlap(g,ms[j]))) group.push(ms[j]); }
    if(group.length>best.length) best=group;
  }
  return best.length>=2?best.sort((a,b)=>a.r[1]-b.r[1]):[];
}
function planCluster(items){
  const must = myMustSee();
  const sorted=[...items].sort((a,b)=> a.r[0]-b.r[0] || a.r[1]-b.r[1]);
  const musts = sorted.filter(x=>must.has(x.e.id) && !x.isShift);
  const conflictMusts = clashingMustSet(sorted.filter(x=>!x.isShift));   // 2+ must-sees that mutually clash
  // protected = work shifts (always) + non-overlapping subset of must-sees (earliest-ending wins)
  const protectedSet=new Set();
  const protectedBlocks=[];
  // shifts are hard, immovable blocks — reserve first
  sorted.filter(x=>x.isShift).forEach(sh=>{ protectedBlocks.push([sh.r[0], sh.r[1]]); protectedSet.add(sh.e.id); });
  if(musts.length){
    [...musts].sort((a,b)=>a.r[1]-b.r[1]).forEach(m=>{
      const [s,e]=m.r;
      if(!protectedBlocks.some(([ps,pe])=> s<pe && ps<e)){ protectedSet.add(m.e.id); protectedBlocks.push([s,e]); }
    });
  }
  const route=[]; const missed=[];
  let freeAt=null, atStage=null;
  for(let i=0;i<sorted.length;i++){
    const it=sorted[i]; const [s,e]=it.r;
    const isProtected=protectedSet.has(it.e.id);
    if(isProtected){
      route.push({item:it, seeFrom:s, seeTo:e, seeMin:e-s, partialStart:false, partialEnd:false, must:!it.isShift, shift:!!it.isShift});
      freeAt=e; atStage=it.e.stageName; continue;
    }
    let arrive = freeAt===null ? s : Math.max(s, freeAt + (walkMinBetween(atStage,it.e.stageName)||0));
    protectedBlocks.forEach(([ps,pe])=>{ if(arrive<pe && ps<=arrive) arrive=pe; });
    let cap=e;
    protectedBlocks.forEach(([ps,pe])=>{ if(ps>=arrive && ps<cap) cap=ps; });
    if(cap-arrive < MIN_WORTH){ missed.push(it); continue; }
    let leaveBy=cap;
    const nxt=sorted[i+1];
    if(nxt && cap===e){
      const wm=walkMinBetween(it.e.stageName, nxt.e.stageName)||0;
      const nxtProtected=protectedSet.has(nxt.e.id);
      const beThereBy = nxtProtected ? nxt.r[0] : (nxt.r[1]-MIN_WORTH);
      const mustLeave = Math.min(e, beThereBy - wm);
      if(mustLeave>=arrive+MIN_WORTH) leaveBy=Math.min(cap, Math.max(mustLeave, arrive));
    }
    route.push({item:it, seeFrom:arrive, seeTo:leaveBy, seeMin:leaveBy-arrive, partialStart:arrive>s, partialEnd:leaveBy<e, must:false});
    freeAt=leaveBy; atStage=it.e.stageName;
  }
  route.sort((a,b)=>a.seeFrom-b.seeFrom);
  // A "parallel alternative": an act that got missed/slivered not because it barely overlaps the
  // cluster, but because it runs concurrently with something already routed. These shouldn't be
  // called "probably skip" — they're a genuine either/or the user should know about.
  const routedIds=new Set(route.map(r=>r.item.e.id));
  const parallels=[];
  // drop a trailing sliver (last segment, non-must, under SOLID_CHUNK) → suggest skipping it,
  // BUT only if it's genuinely a thin fragment, not a full act that simply overlapped a routed one.
  let skipTail=null;
  if(route.length>=2){
    const last=route[route.length-1];
    const fullLen=last.item.r[1]-last.item.r[0];
    if(!last.must && last.seeMin<SOLID_CHUNK){
      if(fullLen>=SOLID_CHUNK){ parallels.push(last.item); route.pop(); }   // substantial act, just overlapped → alternative
      else { skipTail=last.item; route.pop(); }                            // genuinely short overlap → skip
    }
  }
  // any act fully missed but substantial and overlapping a routed act = also a parallel alternative
  for(const m of missed){
    if(m.isShift) continue;
    const [ms,me]=m.r; const fullLen=me-ms;
    if(fullLen>=SOLID_CHUNK && route.some(r=>!r.shift && ms<r.seeTo && r.seeFrom<me)){
      if(!parallels.includes(m)) parallels.push(m);
    }
  }
  const trueMissed = missed.filter(m=>!parallels.includes(m));
  return {route, missed:trueMissed, conflictMusts, skipTail, parallels};
}
// build an even-split route across a set of mutually-clashing must-sees (earliest-ending first)
function splitMustRoute(group){
  // contested window = latest start → earliest end isn't right; use overall span they share.
  const spanStart=Math.max(...group.map(g=>g.r[0]));   // when all are running
  const spanEnd=Math.min(...group.map(g=>g.r[1]));
  // but really you can use each act's own time; simplest fair model: divide [earliest start, latest end] evenly
  const start=Math.min(...group.map(g=>g.r[0]));
  const end=Math.max(...group.map(g=>g.r[1]));
  const n=group.length;
  const ordered=[...group].sort((a,b)=>a.r[1]-b.r[1]);   // earliest-ending first
  const slice=(end-start)/n;
  const segs=[]; let t=start;
  ordered.forEach((g,i)=>{
    let segStart=Math.max(t, g.r[0]);
    let segEnd= i===n-1 ? Math.min(end,g.r[1]) : t+slice;
    segEnd=Math.min(segEnd, g.r[1]);
    if(i>0){ const wm=walkMinBetween(ordered[i-1].e.stageName,g.e.stageName)||0; segStart=Math.max(segStart,t+wm); }
    segs.push({item:g, from:Math.round(segStart), to:Math.round(segEnd), min:Math.max(0,Math.round(segEnd-segStart))});
    t=segEnd;
  });
  return segs;
}
function clusterAdvice(items){
  const {route, missed, conflictMusts, skipTail, parallels}=planCluster(items);

  // ----- multiple clashing must-sees: offer split + pick-one, warn honestly -----
  let header="";
  if(conflictMusts.length>=2){
    const n=conflictMusts.length;
    const names=conflictMusts.map(m=>`★ ${esc(m.e.title)}`).join(", ");
    const splitSegs=splitMustRoute(conflictMusts);
    const splitTxt=splitSegs.map((s,i)=>{
      const wm=i>0?walkMinBetween(splitSegs[i-1].item.e.stageName,s.item.e.stageName):null;
      return `<b>${esc(s.item.e.title)}</b> ${minToHM(s.from)}–${minToHM(s.to)} <span class="ca-dur">~${s.min} min</span>${wm?` <span class="ca-dur">(+~${wm} min walk)</span>`:''}`;
    }).join(" → ");
    const fraction = n===2?"halves each":n===3?"thirds":`1/${n} each`;
    const strong = n>=3 ? `<span class="ca-conflict">${n} must-sees at once — splitting means only ~${Math.round(splitSegs.reduce((a,s)=>a+s.min,0)/n)} min of each. Strongly consider dropping one.</span>`
                        : `<span class="ca-conflict">${names} all clash — you can't see each in full.</span>`;
    // route any NON-must acts into time left after the split ends
    const splitEnd = Math.max(...splitSegs.map(s=>s.to));
    const lastStage = splitSegs[splitSegs.length-1].item.e.stageName;
    const conflictIds = new Set(conflictMusts.map(m=>m.e.id));
    const leftovers=[];
    let freeAt=splitEnd, atStage=lastStage;
    [...items].filter(x=>!conflictIds.has(x.e.id)).sort((a,b)=>a.r[1]-b.r[1]).forEach(x=>{
      const [s,e]=x.r;
      const arrive=Math.max(s, freeAt + (walkMinBetween(atStage,x.e.stageName)||0));
      const seeMin=e-arrive;
      if(seeMin>=MIN_WORTH){ leftovers.push({item:x, from:arrive, to:e, min:seeMin}); freeAt=e; atStage=x.e.stageName; }
    });
    let leftoverTxt="";
    if(leftovers.length){
      leftoverTxt=` <span class="ca-extra">Then still catch ${leftovers.map(l=>`<b>${esc(l.item.e.title)}</b> from ${minToHM(l.from)} (~${l.min} min)`).join(", ")}.</span>`;
    }
    header = `${strong}
      <div class="ca-opt"><span class="ca-lead">Split (${fraction}):</span> ${splitTxt}.${leftoverTxt} <span class="ca-miss">You'd see none of the must-sees in full — usually better to pick one.</span></div>
      <div class="ca-opt"><span class="ca-lead">Or commit:</span> ${conflictMusts.map(m=>`<b>${esc(m.e.title)}</b>`).join(" / ")} — choose your favourite and see it properly.</div>`;
    return header;
  }

  // ----- shift swallows the whole cluster: route is just the shift, everything else missed -----
  const shiftItem = items.find(x=>x.isShift);
  if(shiftItem && missed.length && route.every(r=>r.shift)){
    const missedActs = missed.filter(m=>!m.isShift).map(m=>esc(m.e.title));
    return `<span class="ca-conflict">You're working ${esc(fmt12(shiftItem.e.start))}–${esc(fmt12(shiftItem.e.end))}</span> — you'll miss ${missedActs.join(", ")}.`;
  }

  // ----- normal single-or-no must-see routing -----
  if(route.length<=1){
    // if the one surviving item is a shift, there's nothing to "pick"
    if(route.length===1 && route[0].shift){
      return `<span class="ca-conflict">You're working ${esc(fmt12(route[0].item.e.start))}–${esc(fmt12(route[0].item.e.end))}</span>${missed.length?` — you'll miss ${missed.filter(m=>!m.isShift).map(m=>esc(m.e.title)).join(", ")}.`:'.'}`;
    }
    const stages=[...new Set(items.filter(x=>!x.isShift).map(x=>x.e.stageName))];
    let maxWm=null;
    for(let i=0;i<stages.length;i++)for(let j=i+1;j<stages.length;j++){ const wm=walkMinBetween(stages[i],stages[j]); if(wm!=null&&(maxWm==null||wm>maxWm)) maxWm=wm; }
    let line=`<span class="ca-lead">Pick one</span> — these run at the same time${maxWm!=null?`, stages ~${maxWm} min apart`:''}.`;
    if(skipTail) line+=` <span class="ca-miss">${esc(skipTail.e.title)} barely overlaps — probably skip.</span>`;
    return line;
  }
  const parts=route.map((r,i)=>{
    const t=esc(r.item.e.title);
    const star=r.shift?'':(r.must?'★ ':'');
    if(r.shift){ // shift is a fixed block — phrase as "working"
      return `${star}<b>${t}</b> ${minToHM(r.seeFrom)}–${minToHM(r.seeTo)} <span class="ca-dur">working</span>`;
    }
    const sliver = !r.must && r.seeMin<SOLID_CHUNK;
    const dur=`<span class="ca-dur">~${r.seeMin} min${sliver?' · could skip':''}</span>`;
    if(i===0) return `${star}<b>${t}</b> till ${minToHM(r.seeTo)} ${dur}`;
    const wm=walkMinBetween(route[i-1].item.e.stageName, r.item.e.stageName);
    const verb = r.partialStart ? `catch ${star}<b>${t}</b> from ${minToHM(r.seeFrom)}` : `${star}<b>${t}</b>`;
    return `${verb}${wm!=null?` (~${wm} min walk)`:''}${r.partialEnd?` till ${minToHM(r.seeTo)}`:''} ${dur}`;
  });
  let line=`<span class="ca-lead">One option:</span> ${parts.join(" → ")}.`;
  const hasShift=route.some(r=>r.shift);
  if(missed.length) line += ` <span class="ca-miss">${hasShift?"You're working then — you'll miss":"Can't also fit"} ${missed.map(m=>esc(m.e.title)).join(", ")}.</span>`;
  if(skipTail) line += ` <span class="ca-miss">${esc(skipTail.e.title)}'s only a few min by then — probably skip.</span>`;
  if(parallels && parallels.length){
    line += ` <span class="ca-extra">Also on then: ${parallels.map(p=>`<b>${esc(p.e.title)}</b> (${esc(fmt12(p.e.start))}–${esc(fmt12(p.e.end))})`).join(", ")} — runs alongside, so it's an either/or.</span>`;
  }
  const slivers=route.filter(r=>!r.must && r.seeMin<SOLID_CHUNK);
  if(slivers.length>=Math.max(1,route.length-1) && route.length>=2 && !route.some(r=>r.must)){
    line += ` <span class="ca-miss">That's a lot of dashing for short bits — you might enjoy committing to one or two instead.</span>`;
  }
  return line;
}
function clashCard(limit){
  const ids=myPickIds();
  const days=DAYS.filter(d=> state.events.some(e=>ids.has(e.id)&&e.day===d));
  const clusters=[];
  days.forEach(d=>{ clashClusters(d).forEach(c=>clusters.push({day:d, items:c})); });
  if(!clusters.length) return "";
  const cap = (typeof limit==="number") ? limit : clusters.length;
  const rows=clusters.slice(0,cap).map(c=>{
    const start=c.items.map(x=>x.r[0]).reduce((a,b)=>Math.min(a,b));
    const acts=c.items.map(x=>{
      if(x.isShift){
        return `<div class="ci-act"><span class="ci-title">${esc(x.e.title)}</span><span class="ci-stage">${esc(fmt12(x.e.start))}${x.e.end?'–'+esc(fmt12(x.e.end)):''} · working</span></div>`;
      }
      const n=crewGoing(x.e.id);
      const crewWord=(state.crew&&state.crew.length)?"crew":"going";
      return `<div class="ci-act"><span class="ci-title">${esc(x.e.title)}</span><span class="ci-stage">${esc(fmt12(x.e.start))}${x.e.end?'–'+esc(fmt12(x.e.end)):''}${n?` · ${n} ${crewWord}`:''}</span></div>`;
    }).join("");
    return `<div class="clash-item">
      <div class="clash-when">${c.day.slice(0,3)} · ${minToHM(start)} · ${c.items.length} clash</div>
      <div class="clash-acts">${acts}</div>
      <div class="clash-advice">${clusterAdvice(c.items)}</div>
    </div>`;
  }).join("");
  return `<div class="free-card" style="border-color:var(--accent)"><div class="free-head">${clusters.length} clash${clusters.length>1?'es':''} in your plan</div>
    <div class="find-note" style="margin-bottom:8px">Overlapping picks — grouped by when they collide.</div>
    <div class="clash-list">${rows}</div>${clusters.length>cap?`<div class="find-note" style="margin-top:8px">+${clusters.length-cap} more</div>`:""}</div>`;
}

// ---- Festival recap: per-day + overall "in numbers" ----
function recapStats(dayName){
  // dayName === null → whole festival; else just that day
  const ids=myPickIds();
  const now=Date.now();
  let seen=state.events.filter(e=>ids.has(e.id)).filter(e=>{
    if(dayName && e.day!==dayName) return false;
    const end=eventEnd(e); return end && end.getTime()<=now;       // only count acts that have happened
  });
  // miles walked from the private trail (filter to the day's window if per-day)
  const trail=loadTrail();
  let pts=trail;
  if(dayName){
    const base=dateForDay(dayName);
    if(base){
      const dayStart=new Date(base); dayStart.setHours(DAY_ROLLOVER_HOUR,0,0,0);
      const dayEnd=new Date(dayStart); dayEnd.setDate(dayEnd.getDate()+1);
      pts=trail.filter(p=>p.t>=dayStart.getTime() && p.t<dayEnd.getTime());
    }
  }
  let metres=0;
  for(let i=1;i<pts.length;i++) metres+=haversine(pts[i-1].lat,pts[i-1].lng,pts[i].lat,pts[i].lng);
  const miles=metres/1609.34;
  // clashes survived: clusters (for the day, or all days) fully in the past
  let clashes=0;
  const days = dayName ? [dayName] : DAYS;
  days.forEach(d=>{
    if(!state.events.some(e=>ids.has(e.id)&&e.day===d)) return;
    clashClusters(d).forEach(c=>{
      const evs=c.filter(x=>!x.isShift).map(x=>x.e);
      if(evs.length>=2 && evs.every(e=>{const en=eventEnd(e); return en && en.getTime()<=now;})) clashes++;
    });
  });
  // latest night: latest end among seen picks
  let latest=null;
  seen.forEach(e=>{ const en=eventEnd(e); if(en && (!latest || en>latest)) latest=en; });
  // my ratings + top set
  const myRated=seen.map(e=>({e, r:myRating(e.id)})).filter(x=>x.r!=null).sort((a,b)=>b.r-a.r);
  const topSet=myRated[0]||null;
  return { seenCount:seen.length, miles, clashes, latest, ratedCount:myRated.length, topSet };
}

  const s=recapStats(sel);
  const fmtLate=ts=>{ if(!ts) return "—"; const d=new Date(ts); let h=d.getHours(); const ap=h>=12?"pm":"am"; h=h%12||12; return `${h}${d.getMinutes()?":"+String(d.getMinutes()).padStart(2,"0"):""}${ap}`; };
  const title = sel===null ? `Your ${esc(state.structure.festivalName||"festival")}` : `Your ${sel}`;
  const stat=(n,l)=>`<div class="recap-stat"><div class="n">${n}</div><div class="l">${l}</div></div>`;
  return `
    <div class="sec-head"><div><h2>Festival recap</h2><div class="lead">Your festival in numbers${phase==="during"?" so far":""}.</div></div></div>
    <div class="filters">${chips}</div>

      <h3>${title}</h3>
      <div class="sub">in numbers</div>
      <div class="recap-grid">

        ${stat(s.miles>=0.1?s.miles.toFixed(1):"0", "miles walked")}
        ${stat(s.clashes, "clashes survived")}
        ${stat(fmtLate(s.latest), "latest night")}
      </div>
      ${s.topSet?`<div class="recap-foot">Your top set: <b>${esc(s.topSet.e.title)}</b> · you rated it ${s.topSet.r.toFixed(1)}</div>`:(s.ratedCount===0?`<div class="recap-foot">Rate sets as they finish to crown your top one.</div>`:"")}
    </div>
    <div class="find-note" style="margin-top:12px">Miles walked come from your private trail — only counts time the app's location was on. Updates as the festival goes.</div>
  `;
}
function viewTrail(){
  const trail=loadTrail();
  const stages=stagesWithCoords();
  const head=`<div class="sec-head"><div><h2>Where were you?</h2><div class="lead">A private trail of where you wandered. Stays on your phone only.</div></div></div>`;
  if(trail.length<2){
    return head+emptyState("","Not much yet","Keep the app's location on as you move around and your trail builds up here. Nothing is shared — it's just for you.");
  }
  // collect all points (trail + stages) to compute bounds
  const pts=trail.map(p=>({lat:p.lat,lng:p.lng})).concat(stages.map(s=>({lat:s.lat,lng:s.lng})));
  const lats=pts.map(p=>p.lat), lngs=pts.map(p=>p.lng);
  const minLat=Math.min(...lats), maxLat=Math.max(...lats), minLng=Math.min(...lngs), maxLng=Math.max(...lngs);
  const W=300,H=300,PAD=24;
  const spanLat=(maxLat-minLat)||0.0001, spanLng=(maxLng-minLng)||0.0001;
  const sx=v=>PAD+((v-minLng)/spanLng)*(W-2*PAD);
  const sy=v=>H-PAD-((v-minLat)/spanLat)*(H-2*PAD);   // north up
  const path=trail.map((p,i)=>`${i?'L':'M'}${sx(p.lng).toFixed(1)},${sy(p.lat).toFixed(1)}`).join(" ");
  const stageDots=stages.map(s=>`<circle cx="${sx(s.lng).toFixed(1)}" cy="${sy(s.lat).toFixed(1)}" r="5" fill="${s.color}" stroke="var(--ink)" stroke-width="1.5"/><text x="${sx(s.lng).toFixed(1)}" y="${(sy(s.lat)-8).toFixed(1)}" font-size="8" text-anchor="middle" fill="var(--ink-2)">${esc(abbrev(s.name))}</text>`).join("");
  const start=trail[0], end=trail[trail.length-1];
  const fmtT=ts=>{ const d=new Date(ts); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };
  return head+`
    <div class="card">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%">
        <text x="${W/2}" y="13" text-anchor="middle" font-family="Anton" font-size="11" fill="var(--ink-2)">N ↑</text>
        <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-dasharray="1 6" stroke-linecap="round" stroke-linejoin="round"/>
        ${stageDots}
        <circle cx="${sx(start.lng).toFixed(1)}" cy="${sy(start.lat).toFixed(1)}" r="5" fill="var(--ink-2)"/>
        <circle cx="${sx(end.lng).toFixed(1)}" cy="${sy(end.lat).toFixed(1)}" r="6" fill="var(--accent)"/>
      </svg>
      <div class="find-note" style="display:flex;justify-content:space-between;margin-top:4px">
        <span>● Start ${fmtT(start.t)}</span><span style="color:var(--accent)">● Latest ${fmtT(end.t)}</span>
      </div>
      <div class="find-note" style="margin-top:8px">${trail.length} points · straight lines between them, not exact paths. Coloured dots are pinned stages for reference.</div>
      <button class="btn ghost block" id="trail-clear" style="margin-top:12px">Clear my trail</button>
    </div>`;
}

/* ============================================================
   WIRING (event delegation per view)
   ============================================================ */
function wireView(){
  const v = document.getElementById("view");
  if(!v) return;

  // home / generic navigation tiles
  v.querySelectorAll("[data-go]").forEach(b=>b.onclick=(e)=>{
    if(e.target.closest("[data-joincall],[data-goto-stage]")) return; // let specific actions handle themselves
    if(b.dataset.targetPerson){ find.target="pe:"+b.dataset.targetPerson; find.enabledOnce=true; localStorage.setItem("fp_findon","1"); }
    state.view=b.dataset.go; renderApp();
  });

  // pick toggles (browse / mine / shared)
  v.querySelectorAll("[data-pick]").forEach(b=>b.onclick=async()=>{
    b.classList.toggle("on");
    try{ await togglePick(b.dataset.pick); }catch(e){ toast("Couldn't save — try again"); }
  });
  v.querySelectorAll("[data-must]").forEach(b=>b.onclick=async()=>{
    try{ await toggleMustSee(b.dataset.must); }catch(e){ toast("Couldn't save — try again"); }
  });
  v.querySelectorAll("[data-goto-stage]").forEach(b=>b.onclick=()=>{
    const s=stagesWithCoords().find(x=>x.name===b.dataset.gotoStage);
    if(s) find.target="st:"+s.id;
    find.enabledOnce=true; localStorage.setItem("fp_findon","1"); state.view="find"; renderApp();
  });

  // ---- browse filters ----
  const search = v.querySelector("#search");
  if(search) search.oninput = e=>{ state.filters.search=e.target.value; const pos=e.target.selectionStart; renderView(); const s2=document.querySelector("#search"); if(s2){s2.focus(); s2.setSelectionRange(pos,pos);} };
  v.querySelectorAll("[data-fday]").forEach(b=>b.onclick=()=>{ state.filters.day=b.dataset.fday; renderView(); });
  v.querySelectorAll("[data-fdist]").forEach(b=>b.onclick=()=>{ state.filters.district=b.dataset.fdist; renderView(); });

  // ---- shared friend selector ----
  v.querySelectorAll("[data-friend]").forEach(b=>b.onclick=()=>{ state.sharedFriend=b.dataset.friend; renderView(); });
  v.querySelectorAll("[data-onf]").forEach(b=>b.onclick=()=>{ state.onnowFilter=b.dataset.onf; renderView(); });
  // ---- meetup finder ----
  v.querySelectorAll("[data-meetmode]").forEach(b=>b.onclick=()=>{ state.meetMode=b.dataset.meetmode; renderView(); });
  v.querySelectorAll("[data-meetday]").forEach(b=>b.onclick=()=>{ state.meetDay=b.dataset.meetday; renderView(); });
  const crewEdit=v.querySelector("#crew-edit"); if(crewEdit) crewEdit.onclick=()=>{ state.modal={type:"crew"}; renderModal(); };
  v.querySelectorAll("[data-meetwin]").forEach(b=>b.onclick=()=>{
    const [day,mid]=b.dataset.meetwin.split("|");
    const people=meetPeople(); const {free,busy}=whoFreeAt(day,+mid,people);
    const fNames=free.map(id=>{const u=state.users.find(x=>x.id===id);return u?u.name:"?";});
    const bNames=busy.map(id=>{const u=state.users.find(x=>x.id===id);return u?u.name:"?";});
    state.modal={type:"meetwin",data:{day,mid:+mid,free:fNames,busy:bNames}}; renderModal();
  });
  // ---- rally calls ----
  const callNew=v.querySelector("#call-new"); if(callNew) callNew.onclick=()=>{ state.modal={type:"call"}; renderModal(); };
  v.querySelectorAll("[data-joincall]").forEach(b=>b.onclick=async()=>{ const c=state.calls.find(x=>x.id===b.dataset.joincall); if(c){ try{ await joinCall(c); }catch(e){ toast("Couldn’t update"); } } });
  v.querySelectorAll("[data-endcall]").forEach(b=>b.onclick=async()=>{ if(confirm("End this call?")){ await endCall(b.dataset.endcall); toast("Call ended"); } });

  // ---- find / compass ----
  if(state.view==="find"){
    const en=v.querySelector("#find-enable-btn"); if(en) en.onclick=()=>{ find.enabledOnce=true; localStorage.setItem("fp_findon","1"); enableFind(); };
    // Compass re-enable affordance: iOS needs a fresh user gesture for orientation permission
    // after any page reload (e.g. entering/leaving test mode). GPS can auto-resume; compass can't.
    const cen=v.querySelector("#compass-enable"); if(cen) cen.onclick=()=>{ enableFind(); };
    if(find.enabledOnce && !find.started && !find.error && locationEnabled()){
      // does this device gate orientation behind requestPermission (iOS 13+)?
      const needsGesture = typeof DeviceOrientationEvent!=="undefined" && typeof DeviceOrientationEvent.requestPermission==="function";
      if(needsGesture && !find.orientBound){ find.orientNeedsGesture=true; startFindSensors(true); }  // GPS only, defer compass to a tap
      else startFindSensors();
    }
    v.querySelectorAll("[data-leg]").forEach(b=>b.onclick=()=>{ find.show[b.dataset.leg]=!find.show[b.dataset.leg]; find.target=null; renderView(); });
    const shareTog=v.querySelector("#share-toggle"); if(shareTog) shareTog.onclick=()=>{ if(find.share) stopShare(true); else startShare(); renderApp(); };
    const pinsBtn=v.querySelector("#pins-btn"); if(pinsBtn) pinsBtn.onclick=()=>{ state.modal={type:"pins"}; renderModal(); };
    const beaconBtn=v.querySelector("#beacon-btn"); if(beaconBtn) beaconBtn.onclick=async()=>{
      if(myBeacon()){ if(confirm("Clear your find-me beacon?")){ await clearBeacon(); renderView(); } }
      else { await dropBeacon(); renderView(); }
    };
    const rallyBtn=v.querySelector("#rally-btn"); if(rallyBtn) rallyBtn.onclick=async()=>{ if(getRally()){ find.target="rl:rally"; renderView(); } else { await setRallyHere(); renderView(); } };
    const rallyMove=v.querySelector("#rally-move"); if(rallyMove) rallyMove.onclick=async()=>{ await setRallyHere(); renderView(); };
    const rallyClear=v.querySelector("#rally-clear"); if(rallyClear) rallyClear.onclick=async()=>{ await clearRally(); find.target=null; renderView(); };
    const lostBtn=v.querySelector("#lost-btn"); if(lostBtn) lostBtn.onclick=()=>{
      if(find.lost){ find.lost=false; writeMyLocation(); toast("Marked safe"); }
      else { if(!find.share) startShare(); find.lost=true; writeMyLocation(); toast("Marked lost — your group can find you"); }
      renderApp();
    };
    v.querySelectorAll("[data-target]").forEach(b=>b.onclick=()=>{ find.target = (find.target===b.dataset.target) ? null : b.dataset.target; renderView(); });
    const fclear=v.querySelector("#find-clear"); if(fclear) fclear.onclick=()=>{ find.target=null; renderView(); };
    v.querySelectorAll("[data-fmode]").forEach(b=>b.onclick=()=>{ find.headingMode=b.dataset.fmode; renderView(); });
    if(find.started && find.pos) updateFindDynamic();
  }

  // ---- my plan: print + mark changes seen ----
  const printBtn=v.querySelector("#print-plan"); if(printBtn) printBtn.onclick=()=>window.print();
  const openClash=v.querySelector("#open-clashes"); if(openClash) openClash.onclick=openClashModal;
  const addShift=v.querySelector("#add-shift"); if(addShift) addShift.onclick=()=>{ state.modal={type:"shift",data:null}; renderModal(); };
  v.querySelectorAll("[data-edit-shift]").forEach(b=>b.onclick=()=>{ const sh=state.shifts.find(x=>x.id===b.dataset.editShift); state.modal={type:"shift",data:sh}; renderModal(); });
  v.querySelectorAll("[data-del-shift]").forEach(b=>b.onclick=async()=>{ const sh=state.shifts.find(x=>x.id===b.dataset.delShift); if(confirm(`Delete "${sh.label||'shift'}"?`)){ await deleteShift(sh.id); toast("Shift removed"); } });
  v.querySelectorAll("[data-rate]").forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); openRatingModal(b.dataset.rate); });
  const trailClear=v.querySelector("#trail-clear"); if(trailClear) trailClear.onclick=()=>{ if(confirm("Clear your private location trail?")){ clearTrail(); renderView(); } };
  v.querySelectorAll("[data-recap]").forEach(b=>b.onclick=()=>{ state.recapDay = b.dataset.recap==="__all" ? null : b.dataset.recap; renderView(); });
  if(state.view==="mine") setTimeout(markChangesSeen, 4000);

  // ---- profile ----
  if(state.view==="profile"){
    let pendingColor=personColor(state.user.id);
    const avatar=v.querySelector("#prof-avatar");
    const nameInp=v.querySelector("#prof-name");
    v.querySelectorAll("[data-color]").forEach(b=>b.onclick=()=>{
      pendingColor=b.dataset.color;
      v.querySelectorAll("[data-color]").forEach(x=>x.classList.toggle("on", x===b));
      if(avatar) avatar.style.background=pendingColor;
    });
    if(nameInp) nameInp.oninput=()=>{ if(avatar) avatar.textContent=initials(nameInp.value.trim()||"?"); };
    const save=v.querySelector("#prof-save");
    if(save) save.onclick=async()=>{
      const newName=(nameInp.value||"").trim();
      if(!newName){ toast("Name can't be empty"); return; }
      save.disabled=true; save.textContent="Saving…";
      try{ await saveProfile(newName, pendingColor); toast("Profile saved"); renderApp(); }
      catch(e){ save.disabled=false; save.textContent="Save profile"; toast(e.message||"Couldn't save"); }
    };
  }

  // ---- chat ----
  if(state.view==="chat"){
    const sc=v.querySelector("#chat-scroll"); if(sc) sc.scrollTop=sc.scrollHeight;
    const send=v.querySelector("#chat-send"), txt=v.querySelector("#chat-text"), pop=v.querySelector("#mention-pop");
    const closePop=()=>{ if(pop){ pop.style.display="none"; pop.innerHTML=""; } };
    const doSend=async()=>{ const t=txt.value; if(!t.trim())return; txt.value=""; closePop(); try{ await sendMessage(t); }catch(e){ toast("Couldn’t send — check connection"); } };
    if(send) send.onclick=doSend;

    // current @-fragment immediately before the caret, if any
    const activeFrag=()=>{
      const pos=txt.selectionStart||0; const before=txt.value.slice(0,pos);
      const m=before.match(/(^|\s)@([^\s@]*)$/);
      return m? {q:m[2], start:pos-m[2].length-1, end:pos} : null;
    };
    const renderPop=()=>{
      const f=activeFrag();
      if(!f){ closePop(); return; }
      const others=state.users.filter(u=>u.id!==state.user.id && u.name.toLowerCase().includes(f.q.toLowerCase())).slice(0,6);
      if(!others.length){ closePop(); return; }
      pop.innerHTML=others.map(u=>`<button class="mention-opt" data-uid="${u.id}"><span class="mo-av" style="background:${personColor(u.id)}">${esc(initials(u.name))}</span>${esc(u.name)}</button>`).join("");
      pop.style.display="block";
      pop.querySelectorAll("[data-uid]").forEach(b=>b.onclick=()=>{
        const u=state.users.find(x=>x.id===b.dataset.uid);
        const val=txt.value;
        txt.value = val.slice(0,f.start) + "@"+u.name+" " + val.slice(f.end);
        const caret=f.start+u.name.length+2; txt.focus(); txt.setSelectionRange(caret,caret);
        closePop();
      });
    };
    if(txt){
      txt.addEventListener("input",renderPop);
      txt.addEventListener("keydown",e=>{
        if(e.key==="Enter"){ e.preventDefault(); doSend(); }
        else if(e.key==="Escape"){ closePop(); }
      });
      txt.addEventListener("blur",()=>setTimeout(closePop,150));
    }
  }

  // ---- info ----
  const infoAdd=v.querySelector("#info-add"); if(infoAdd) infoAdd.onclick=()=>{ state.modal={type:"info",data:null}; renderInfoModal(); };
  v.querySelectorAll("[data-edit-info]").forEach(b=>b.onclick=()=>{ const it=(state.structure.infoItems||[]).find(x=>x.id===b.dataset.editInfo); state.modal={type:"info",data:it}; renderInfoModal(); });
  v.querySelectorAll("[data-del-info]").forEach(b=>b.onclick=async()=>{ if(confirm("Delete this info?")){ await deleteInfoItem(b.dataset.delInfo); toast("Deleted"); } });

  // ---- packing ----
  v.querySelectorAll("[data-pack]").forEach(b=>b.onclick=()=>togglePack(b.dataset.pack));
  v.querySelectorAll("[data-delmine]").forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); removeMyPack(b.dataset.delmine); });
  const packAdd=v.querySelector("#pack-add"); if(packAdd) packAdd.onclick=()=>{ const inp=v.querySelector("#pack-add-input"); addMyPack(inp.value); };
  const packAddInp=v.querySelector("#pack-add-input"); if(packAddInp) packAddInp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ addMyPack(e.target.value); } });
  const packShared=v.querySelector("#pack-shared"); if(packShared) packShared.onclick=()=>{ state.modal={type:"packlist"}; renderPackListModal(); };

  // ---- admin ----
  const saveName = v.querySelector("#save-name");
  if(saveName) saveName.onclick = async()=>{
    const name = v.querySelector("#fest-name").value.trim() || FESTIVAL_NAME_DEFAULT;
    await saveStructure({...state.structure, festivalName:name}); toast("Saved");
  };
  const locTog = v.querySelector("#loc-toggle");
  if(locTog) locTog.onclick = async()=>{
    const next = !locationEnabled();
    if(!next && find.share) stopShare();
    await saveStructure({...state.structure, locationEnabled:next});
    toast(next?"Location features on":"Location features off");
  };
  const saveDate = v.querySelector("#save-date");
  if(saveDate) saveDate.onclick = async()=>{ await saveStructure({...state.structure, festivalStartDate:v.querySelector("#fest-date").value||""}); toast("Saved"); };
  const saveAuto = v.querySelector("#save-autostop");
  if(saveAuto) saveAuto.onclick = async()=>{ const h=Math.min(24,Math.max(1,+v.querySelector("#autostop-hrs").value||4)); await saveStructure({...state.structure, autoStopHours:h}); toast("Saved"); };
  const seedBtn=v.querySelector("#seed-walk");
  if(seedBtn) seedBtn.onclick=()=>{ if(find.seedActive) stopSeedWalk(); else startSeedWalk(); };
  const resetWalk=v.querySelector("#reset-walk");
  if(resetWalk) resetWalk.onclick=async()=>{
    if(!confirm("Wipe all learned walk-time data so it relearns at the festival? Stages, picks and everything else are kept.")) return;
    resetWalk.disabled=true; resetWalk.textContent="Clearing…";
    try{ await clearWalkData(); toast("Walk-time data cleared"); renderView(); }
    catch(e){ resetWalk.disabled=false; resetWalk.textContent="Reset walk-time data"; toast("Couldn't clear — try again"); }
  };
  const tEnter=v.querySelector("#test-enter");
  if(tEnter) tEnter.onclick=()=>{ if(confirm("Enter test mode? The app switches to a separate sandbox — your real festival data stays exactly as it is. You can exit any time.")) setTestMode(true); };
  const tExit2=v.querySelector("#test-exit2");
  if(tExit2) tExit2.onclick=()=>setTestMode(false);
  const tStages=v.querySelector("#test-stages");
  if(tStages) tStages.onclick=async()=>{
    if(!confirm("Create/reset the test stages? Existing pins on test stages are kept so walk-data stays meaningful. (Sandbox only — real festival untouched.)")) return;
    tStages.disabled=true; tStages.textContent="Creating…";
    try{ await createTestStages(); toast("Test stages ready — pin them in Find, then walk between them"); renderApp(); }
    catch(e){ tStages.disabled=false; tStages.textContent="Create test stages"; toast("Couldn't create — try again"); }
  };
  const tLineup=v.querySelector("#test-lineup");
  if(tLineup) tLineup.onclick=async()=>{
    if(!confirm("Generate a lineup onto the test stages? This replaces existing test acts but keeps your stages, pins and walk-data.")) return;
    tLineup.disabled=true; tLineup.textContent="Generating…";
    try{ await generateTestLineup(); toast("Lineup ready — check Home & On now"); renderApp(); }
    catch(e){ tLineup.disabled=false; tLineup.textContent="Generate lineup"; toast(e.message==="no-stages"?"Create test stages first":"Couldn't generate — try again"); }
  };
  const tWipe=v.querySelector("#test-wipe");
  if(tWipe) tWipe.onclick=async()=>{
    if(!confirm("Wipe all test data (acts, stages, picks, walk-data) in the sandbox? Your real festival is untouched.")) return;
    tWipe.disabled=true; tWipe.textContent="Wiping…";
    try{ await wipeTestData(); toast("Test data wiped"); renderApp(); }
    catch(e){ tWipe.disabled=false; tWipe.textContent="Wipe test data"; toast("Couldn't wipe — try again"); }
  };
  v.querySelectorAll("[data-feat]").forEach(b=>b.onclick=async()=>{
    const k=b.dataset.feat; const features={...(state.structure.features||{})}; features[k]=!feat(k);
    await saveStructure({...state.structure, features});
  });
  v.querySelectorAll("[data-del-user]").forEach(b=>b.onclick=async()=>{
    const u=state.users.find(x=>x.id===b.dataset.delUser); if(!u) return;
    if(!confirm(`Remove ${u.name}? This deletes their account and all their picks, pins and shared location. They can sign up again later. This can't be undone.`)) return;
    b.disabled=true; b.textContent="Removing…";
    try{ await deleteUserAccount(u.id); toast(`${u.name} removed`); }
    catch(e){ b.disabled=false; b.textContent="Remove"; toast("Couldn't remove — try again"); }
  });
  const addDist = v.querySelector("#add-dist");
  if(addDist) addDist.onclick = async()=>{
    const inp = v.querySelector("#new-dist"); const name=inp.value.trim();
    if(!name) return;
    const districts=[...state.structure.districts, {id:uid(),name,stages:[],color:nextAreaColor()}];
    await saveStructure({...state.structure,districts}); inp.value="";
  };
  v.querySelectorAll("[data-setcolor]").forEach(b=>b.onclick=async()=>{
    const [did,color]=b.dataset.setcolor.split(":");
    const districts=state.structure.districts.map(x=>x.id===did?{...x,color}:x);
    await saveStructure({...state.structure,districts});
  });
  v.querySelectorAll("[data-del-d]").forEach(b=>b.onclick=async()=>{
    const id=b.dataset.delD;
    const d = state.structure.districts.find(x=>x.id===id);
    const used = state.events.some(e=>e.districtId===id);
    if(used){ if(!confirm(`"${d.name}" has events scheduled. Delete the district anyway? (Events stay but lose their area link.)`)) return; }
    else if(!confirm(`Delete district "${d.name}"?`)) return;
    const districts=state.structure.districts.filter(x=>x.id!==id);
    await saveStructure({...state.structure,districts});
  });
  v.querySelectorAll("[data-rename-d]").forEach(b=>b.onclick=async()=>{
    const id=b.dataset.renameD; const d=state.structure.districts.find(x=>x.id===id);
    const name=prompt("Rename district:",d.name); if(!name||!name.trim()) return;
    const districts=state.structure.districts.map(x=>x.id===id?{...x,name:name.trim()}:x);
    await saveStructure({...state.structure,districts});
  });
  v.querySelectorAll("[data-add-s]").forEach(b=>b.onclick=async()=>{
    const did=b.dataset.addS; const inp=v.querySelector(`[data-stage-input="${did}"]`);
    const name=inp.value.trim(); if(!name) return;
    const districts=state.structure.districts.map(d=>d.id===did?{...d,stages:[...(d.stages||[]),{id:uid(),name}]}:d);
    await saveStructure({...state.structure,districts}); inp.value="";
  });
  v.querySelectorAll("[data-loc-s]").forEach(b=>b.onclick=()=>{
    const [did,sid]=b.dataset.locS.split(":");
    const dist=state.structure.districts.find(x=>x.id===did);
    const st=dist&&(dist.stages||[]).find(x=>x.id===sid);
    if(!st) return;
    const saveCoords=async(lat,lng)=>{
      const districts=state.structure.districts.map(d=>d.id!==did?d:{...d,stages:d.stages.map(s=>s.id!==sid?s:{...s,lat,lng})});
      await saveStructure({...state.structure,districts}); toast(`Pinned ${st.name}`);
    };
    const manual=()=>{
      const v2=prompt(`Enter coordinates for "${st.name}" as: latitude, longitude`, (typeof st.lat==="number")?`${st.lat}, ${st.lng}`:"");
      if(!v2) return;
      const m=v2.split(/[, ]+/).map(x=>parseFloat(x)).filter(n=>!isNaN(n));
      if(m.length!==2||Math.abs(m[0])>90||Math.abs(m[1])>180){ toast("Couldn't read those coordinates"); return; }
      saveCoords(m[0],m[1]);
    };
    if(!navigator.geolocation){ manual(); return; }
    const orig=b.textContent; b.textContent="Locating…"; b.disabled=true;
    navigator.geolocation.getCurrentPosition(
      pos=>{ b.textContent=orig; b.disabled=false; saveCoords(+pos.coords.latitude.toFixed(6),+pos.coords.longitude.toFixed(6)); },
      err=>{ b.textContent=orig; b.disabled=false; toast(err.code===1?"Location blocked — enter manually":"No GPS fix — enter manually"); manual(); },
      {enableHighAccuracy:true,timeout:12000,maximumAge:0}
    );
  });
  v.querySelectorAll("[data-clearloc-s]").forEach(b=>b.onclick=async()=>{
    const [did,sid]=b.dataset.clearlocS.split(":");
    const districts=state.structure.districts.map(d=>d.id!==did?d:{...d,stages:d.stages.map(s=>{ if(s.id!==sid) return s; const {lat,lng,...rest}=s; return rest; })});
    await saveStructure({...state.structure,districts}); toast("Location cleared");
  });
  v.querySelectorAll("[data-del-s]").forEach(b=>b.onclick=async()=>{
    const [did,sid]=b.dataset.delS.split(":");
    const districts=state.structure.districts.map(d=>d.id===did?{...d,stages:(d.stages||[]).filter(s=>s.id!==sid)}:d);
    await saveStructure({...state.structure,districts});
  });
  const addEv = v.querySelector("#add-event");
  if(addEv) addEv.onclick = ()=>{ state.modal={type:"event",data:null}; renderModal(); };
  const bulkEv = v.querySelector("#bulk-event");
  if(bulkEv) bulkEv.onclick = ()=>{ openBulk(); };
  v.querySelectorAll("[data-edit-ev]").forEach(b=>b.onclick=()=>{ const ev=state.events.find(e=>e.id===b.dataset.editEv); state.modal={type:"event",data:ev}; renderModal(); });
  v.querySelectorAll("[data-del-ev]").forEach(b=>b.onclick=async()=>{
    const ev=state.events.find(e=>e.id===b.dataset.delEv);
    if(confirm(`Delete "${ev.title}"? This removes it from everyone's plans.`)) { await deleteEvent(ev.id); toast("Deleted"); }
  });
  // ---- bulk delete (select mode) ----
  const selTog=v.querySelector("#sel-toggle");
  if(selTog) selTog.onclick=()=>{ adminSel.on=!adminSel.on; adminSel.ids.clear(); renderView(); };
  v.querySelectorAll("[data-selev]").forEach(b=>b.onclick=()=>{ const id=b.dataset.selev; adminSel.ids.has(id)?adminSel.ids.delete(id):adminSel.ids.add(id); renderView(); });
  v.querySelectorAll("[data-selday]").forEach(b=>b.onclick=()=>{
    const day=b.dataset.selday; const ids=state.events.filter(e=>e.day===day).map(e=>e.id);
    const allSel=ids.every(id=>adminSel.ids.has(id));
    ids.forEach(id=> allSel ? adminSel.ids.delete(id) : adminSel.ids.add(id));
    renderView();
  });
  const selAll=v.querySelector("#sel-all");
  if(selAll) selAll.onclick=()=>{ if(adminSel.ids.size===state.events.length) adminSel.ids.clear(); else state.events.forEach(e=>adminSel.ids.add(e.id)); renderView(); };
  const selDel=v.querySelector("#sel-del");
  if(selDel) selDel.onclick=async()=>{
    const ids=[...adminSel.ids]; if(!ids.length) return;
    if(!confirm(`Delete ${ids.length} event${ids.length>1?'s':''}? This removes them from everyone's plans and can't be undone.`)) return;
    selDel.disabled=true; selDel.textContent="Deleting…";
    try{
      for(let i=0;i<ids.length;i+=20){ await Promise.all(ids.slice(i,i+20).map(id=>deleteEvent(id))); }
      adminSel.ids.clear(); adminSel.on=false; toast(`Deleted ${ids.length} event${ids.length>1?'s':''}`); renderView();
    }catch(e){ selDel.disabled=false; selDel.textContent="Delete selected"; toast("Some didn't delete — try again"); }
  };
}

/* ============================================================
   EVENT MODAL (admin add / edit)
   ============================================================ */
function renderModal(){
  if(!state.modal) return;
  const existing = document.querySelector(".modal-bg");
  if(existing) existing.remove();
  if(state.modal.type==="bulk"){ renderBulkModal(); return; }
  if(state.modal.type==="pins"){ renderPinsModal(); return; }
  if(state.modal.type==="pin"){ renderPinModal(); return; }
  if(state.modal.type==="info"){ renderInfoModal(); return; }
  if(state.modal.type==="shift"){ renderShiftModal(); return; }
  if(state.modal.type==="call"){ renderCallModal(); return; }
  if(state.modal.type==="crew"){ renderCrewModal(); return; }
  if(state.modal.type==="meetwin"){ renderMeetWinModal(); return; }
  if(state.modal.type==="packlist"){ renderPackListModal(); return; }
  if(state.modal.type!=="event") return;

  const ev = state.modal.data || {};
  const districts = state.structure.districts;
  const selDist = ev.districtId || (districts[0]&&districts[0].id) || "";
  const distObj = districts.find(d=>d.id===selDist);
  const stages = distObj? (distObj.stages||[]) : [];
  const selStage = ev.stageId || (stages[0]&&stages[0].id) || "";

  const wrap=document.createElement("div"); wrap.className="modal-bg";
  wrap.innerHTML=`
    <div class="modal">
      <div class="modal-head">
        <h2>${ev.id?"Edit event":"Add event"}</h2>
        <button class="btn ghost sm" id="m-close">Close</button>
      </div>
      <div id="m-err"></div>
      <label class="field"><span>Title</span><input id="m-title" value="${esc(ev.title||"")}" placeholder="e.g. Sunset DJ set"></label>
      <div class="row">
        <label class="field"><span>District</span>
          <select id="m-dist">${districts.map(d=>`<option value="${d.id}" ${d.id===selDist?'selected':''}>${esc(d.name)}</option>`).join("")}</select>
        </label>
        <label class="field"><span>Stage</span>
          <select id="m-stage">${stages.map(s=>`<option value="${s.id}" ${s.id===selStage?'selected':''}>${esc(s.name)}</option>`).join("") || `<option value="">— add a stage first —</option>`}</select>
        </label>
      </div>
      <label class="field"><span>Day</span>
        <select id="m-day">${DAYS.map(d=>`<option ${ev.day===d?'selected':''}>${d}</option>`).join("")}</select>
      </label>
      <div class="row">
        <label class="field"><span>Start</span><input id="m-start" type="time" value="${esc(ev.start||"")}"></label>
        <label class="field"><span>End</span><input id="m-end" type="time" value="${esc(ev.end||"")}"></label>
      </div>
      <label class="field"><span>Notes <span class="tag">(optional)</span></span><textarea id="m-notes" rows="2" placeholder="anything worth remembering">${esc(ev.notes||"")}</textarea></label>
      <button class="btn primary block" id="m-save">${ev.id?"Save changes":"Add to lineup"}</button>
    </div>`;
  document.body.appendChild(wrap);

  const close=()=>{ state.modal=null; wrap.remove(); };
  wrap.querySelector("#m-close").onclick=close;

/* flexible time parser -> "HH:MM" or null */
function parseTime(raw){
  if(!raw) return null;
  let s = raw.trim().toLowerCase().replace(/\s+/g,"");
  let m = s.match(/^(\d{1,2})(?:[:.](\d{2}))?(am|pm)$/);
  if(m){ let h=+m[1]%12; if(m[3]==="pm") h+=12; const mm=m[2]?+m[2]:0; if(h>23||mm>59) return null; return pad2(h)+":"+pad2(mm); }
  m = s.match(/^(\d{1,2})[:.](\d{2})$/);
  if(m){ const h=+m[1],mm=+m[2]; if(h>23||mm>59) return null; return pad2(h)+":"+pad2(mm); }
  m = s.match(/^(\d{3,4})$/);            // 1800, 930
  if(m){ const n=m[1].padStart(4,"0"); const h=+n.slice(0,2),mm=+n.slice(2); if(h>23||mm>59) return null; return pad2(h)+":"+pad2(mm); }
  m = s.match(/^(\d{1,2})$/);            // bare hour "19"
  if(m){ const h=+m[1]; if(h>23) return null; return pad2(h)+":00"; }
  return null;
}
const pad2 = n => String(n).padStart(2,"0");
const splitFields = line => line.split(/\t|\|/).map(x=>x.trim());
function matchDay(s){ if(!s) return null; const l=s.trim().toLowerCase(); return DAYS.find(d=>d.toLowerCase()===l || d.toLowerCase().startsWith(l)) || null; }
function findDistrict(name){ const l=(name||"").trim().toLowerCase(); return state.structure.districts.find(d=>d.name.toLowerCase()===l) || null; }
function findStage(dist,name){ if(!dist) return null; const l=(name||"").trim().toLowerCase(); return (dist.stages||[]).find(s=>s.name.toLowerCase()===l) || null; }

/* parse the textarea into preview rows */
function parseBulk(){
  const rows = [];
  const lines = bulk.text.split(/\r?\n/);
  for(let i=0;i<lines.length;i++){
    const line = lines[i];
    if(!line.trim() || line.trim().startsWith("#")) continue;
    const f = splitFields(line);
    let r = { raw:line, ok:false, err:"", isNew:false };

    if(bulk.mode==="same"){
      // [start, title] or [start, end, title]
      let start,end,title;
      if(f.length>=3){ start=f[0]; end=f[1]; title=f.slice(2).join(" | "); }
      else if(f.length===2){ start=f[0]; end=""; title=f[1]; }
      else { r.err="Need: Start | Title"; rows.push(r); continue; }
      const dist = state.structure.districts.find(d=>d.id===bulk.districtId);
      const stage = dist && (dist.stages||[]).find(s=>s.id===bulk.stageId);
      r.day=bulk.day; r.title=title;
      r.districtName = dist?dist.name:""; r.stageName = stage?stage.name:"";
      r.districtId=bulk.districtId; r.stageId=bulk.stageId;
      r.start=parseTime(start); r.end=end?parseTime(end):"";
      if(!dist||!stage){ r.err="Pick a district & stage above"; }
      else if(!title){ r.err="Missing title"; }
      else if(!r.start){ r.err="Bad start time"; }
      else if(end && !r.end){ r.err="Bad end time"; }
      else r.ok=true;
    } else {
      // mixed: Day | District | Stage | Title | Start [| End]
      if(f.length<5){ r.err="Need: Day | District | Stage | Title | Start"; rows.push(r); continue; }
      const day=matchDay(f[0]);
      const distName=f[1], stageName=f[2], title=f[3], start=f[4];
      const end=f[5]||"";
      r.day=day; r.districtName=distName; r.stageName=stageName; r.title=title;
      r.start=parseTime(start); r.end=end?parseTime(end):"";
      const dist=findDistrict(distName);
      const stage=dist?findStage(dist,stageName):null;
      if(!day){ r.err="Unknown day '"+f[0]+"'"; }
      else if(!distName||!stageName){ r.err="Missing district/stage"; }
      else if(!title){ r.err="Missing title"; }
      else if(!r.start){ r.err="Bad start time"; }
      else if(end && !r.end){ r.err="Bad end time"; }
      else if((!dist || !stage) && !bulk.createMissing){ r.err="Stage/district not found — tick 'create missing' or add it first"; }
      else { r.ok=true; if(!dist||!stage) r.isNew=true; }
    }
    rows.push(r);
  }
  return rows;
}

/* ============================================================
   FIND — GPS compass + radar to stages
   ============================================================ */
let find = { started:false, enabledOnce: localStorage.getItem("fp_findon")==="1", geoWatch:null, orientBound:false, orientHandler:null,
             pos:null, acc:null, heading:null, hasOrientation:false, headingMode:"auto", target:null, error:null,
             show:{stages:true,people:true,pins:true}, share:false, shareTimer:null, myUpdated:0, lastWrite:0,
             lost:false, autoStopAt:0, autoStopTimer:null, packingSubbed:false, notify:false, notifyTimers:[], notifiedChanges:{}, notifiedMentions:{}, notifiedCalls:{}, sessionStart:Date.now(), orientNeedsGesture:false,
             seedActive:false, seedFrom:null, seedStartT:0, seedPt:null, seedDist:0, seedWatch:null, seedClock:null, orientLastEvent:0 };

const R_EARTH = 6371000;
const toRad = d => d*Math.PI/180, toDeg = r => r*180/Math.PI;
function haversine(la1,lo1,la2,lo2){
  const dLa=toRad(la2-la1), dLo=toRad(lo2-lo1);
  const a=Math.sin(dLa/2)**2 + Math.cos(toRad(la1))*Math.cos(toRad(la2))*Math.sin(dLo/2)**2;
  return R_EARTH*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearing(la1,lo1,la2,lo2){
  const y=Math.sin(toRad(lo2-lo1))*Math.cos(toRad(la2));
  const x=Math.cos(toRad(la1))*Math.sin(toRad(la2)) - Math.sin(toRad(la1))*Math.cos(toRad(la2))*Math.cos(toRad(lo2-lo1));
  return (toDeg(Math.atan2(y,x))+360)%360;
}
function fmtDist(m){ return m<1000 ? "~"+Math.round(m/5)*5+" m" : "~"+(m/1000).toFixed(m<10000?1:0)+" km"; }
function cardinal(deg){ return ["N","NE","E","SE","S","SW","W","NW"][Math.round(((deg%360)/45))%8]; }
function relDirText(rel){
  const r=((rel%360)+360)%360;
  const i=Math.round(r/45)%8;
  return ["straight ahead","ahead & right","to your right","behind-right","behind you","behind-left","to your left","ahead & left"][i];
}
function stagesWithCoords(){
  const out=[];
  state.structure.districts.forEach(d=>(d.stages||[]).forEach(s=>{
    if(typeof s.lat==="number" && typeof s.lng==="number")
      out.push({id:s.id,name:s.name,sub:d.name,color:districtColor(d.id),lat:s.lat,lng:s.lng});
  }));
  return out;
}

/* ============================================================
   WALK-TIME LEARNING
   Seed routes (admin-walked) + crowdsourced legs from movement,
   median-based, with straight-line fallback. Stored as derived
   leg samples only — no long-term raw GPS trails.
   ============================================================ */
const STAGE_RADIUS = 35;        // metres: "you're at this stage"
const HERE_RADIUS = 15;         // metres: close enough to show "HERE" instead of a jittery small distance
const WALK_MPS_FALLBACK = 1.15; // ~4.1 km/h walking, padded for crowds
const DETOUR_FACTOR = 1.35;     // straight-line → real path padding
const MIN_LEG_SEC = 40, MAX_LEG_SEC = 60*60;       // sanity bounds
const MAX_LEG_SPEED = 3.0;      // m/s; faster = probably a vehicle/GPS jump, discard
let trip = null;                 // {fromStage, startT, lastPt, lastT, dist}

function nearestStage(lat,lng){
  let best=null, bd=Infinity;
  stagesWithCoords().forEach(s=>{ const d=haversine(lat,lng,s.lat,s.lng); if(d<bd){ bd=d; best=s; } });
  return best && bd<=STAGE_RADIUS ? {stage:best, dist:bd} : null;
}
function trackTrip(pos, acc){
  if(!feat("overlaps")&&!locationEnabled()) return;   // tie to location features
  if(acc && acc>60) return;                            // ignore very fuzzy fixes
  const now=Date.now(); const here=nearestStage(pos.lat,pos.lng);
  if(!trip){
    if(here) trip={fromStage:here.stage.id, startT:now, lastPt:pos, lastT:now, dist:0};
    return;
  }
  // accumulate path distance with a plausible-speed filter
  const seg=haversine(trip.lastPt.lat,trip.lastPt.lng,pos.lat,pos.lng);
  const dt=(now-trip.lastT)/1000;
  if(dt>0 && seg/dt <= MAX_LEG_SPEED){ trip.dist+=seg; }
  trip.lastPt=pos; trip.lastT=now;
  // arrived at a different stage? record the leg.
  if(here && here.stage.id!==trip.fromStage){
    const sec=Math.round((now-trip.startT)/1000);
    if(sec>=MIN_LEG_SEC && sec<=MAX_LEG_SEC && trip.dist>10){
      recordLeg(trip.fromStage, here.stage.id, sec, Math.round(trip.dist));
    }
    trip={fromStage:here.stage.id, startT:now, lastPt:pos, lastT:now, dist:0}; // chain onward
  }
}
const legKey=(a,b)=> a<b ? a+"__"+b : b+"__"+a;   // undirected pair
async function recordLeg(a,b,sec,dist){
  try{ await addDoc(colLegs, { pair:legKey(a,b), sec, dist, by:state.user.id, at:serverTimestamp() }); }catch(e){}
}
// admin "walk this route now" — records a high-trust seed leg from the timed walk
async function recordSeedLeg(a,b,sec,dist){
  try{ await addDoc(colLegs, { pair:legKey(a,b), sec, dist, by:state.user.id, seed:true, at:serverTimestamp() }); }catch(e){}
}

function median(arr){ if(!arr.length) return null; const s=[...arr].sort((x,y)=>x-y); const m=Math.floor(s.length/2); return s.length%2?s[m]:(s[m-1]+s[m])/2; }
// walk seconds between two stage ids: measured median if we have it, else straight-line estimate
function walkSeconds(aId,bId){
  if(aId===bId) return 0;
  const key=legKey(aId,bId);
  const samples=state.legs.filter(l=>l.pair===key);
  if(samples.length){
    // weight seeds a bit by counting them twice
    const times=[]; samples.forEach(l=>{ times.push(l.sec); if(l.seed) times.push(l.sec); });
    const med=median(times); if(med) return med;
  }
  // fallback: straight-line × detour ÷ walking speed
  const A=stagesWithCoords().find(s=>s.id===aId), B=stagesWithCoords().find(s=>s.id===bId);
  if(!A||!B) return null;
  const d=haversine(A.lat,A.lng,B.lat,B.lng)*DETOUR_FACTOR;
  return Math.round(d/WALK_MPS_FALLBACK);
}
function walkSecondsFromPos(pos,bId){
  // distance from a free GPS point to a target stage (used for leave-now / clash when located but not at a stage)
  const B=stagesWithCoords().find(s=>s.id===bId); if(!B||!pos) return null;
  const here=nearestStage(pos.lat,pos.lng);
  if(here) return walkSeconds(here.stage.id,bId);
  const d=haversine(pos.lat,pos.lng,B.lat,B.lng)*DETOUR_FACTOR;
  return Math.round(d/WALK_MPS_FALLBACK);
}
function fmtWalk(sec){ if(sec==null) return ""; const m=Math.max(1,Math.round(sec/60)); return "~"+m+" min walk"; }
// stages with a walk-time from the user's current position, nearest-first
function walkTimesFromHere(limit){
  if(!locationEnabled() || !find.pos) return [];
  const out=stagesWithCoords().map(s=>{
    const sec=walkSecondsFromPos(find.pos, s.id);
    const dist=haversine(find.pos.lat, find.pos.lng, s.lat, s.lng);
    return { stage:s, sec:(sec==null?Infinity:sec), dist };
  }).filter(x=>isFinite(x.sec)).sort((a,b)=>a.sec-b.sec);
  return limit?out.slice(0,limit):out;
}
function walkTimesCard(limit, title){
  const list=walkTimesFromHere(limit);
  if(!list.length) return "";
  const rows=list.map(x=>{
    const here = x.dist!=null && x.dist<=HERE_RADIUS;
    return `<button class="wt-row tappable" data-goto-stage="${esc(x.stage.name)}"><span class="wt-dot" style="background:${x.stage.color}"></span><span class="wt-name">${esc(x.stage.name)}</span><span class="wt-time${here?' here':''}">${here?"HERE":fmtWalk(x.sec).replace(" walk","")}</span></button>`;
  }).join("");
  return `<div class="home-card"><div class="hc-title">${title||"Walk times from here"}</div><div class="wt-list">${rows}</div></div>`;
}
async function clearWalkData(){
  const snap=await getDocs(colLegs);
  const ids=snap.docs.map(d=>d.id);
  for(let i=0;i<ids.length;i+=20){ await Promise.all(ids.slice(i,i+20).map(id=>deleteDoc(dref("legs",id)))); }
  await saveStructure({...state.structure, walkReset:Date.now()});
}
// ============================================================
//  TEST MODE sandbox — generate a believable festival & wipe it.
//  In test mode all collections are already prefixed (test_), so these
//  writes/deletes only ever touch the sandbox, never real data.
// ============================================================
// Step 1: create the test STAGES only (the "map") — no acts. Preserves existing pins/coords if re-run.
async function createTestStages(){
  if(!TEST_MODE) return;
  const now=new Date();
  // Anchor the festival day so that NOW reliably reads as "during" (the phase gate opens at noon).
  // If it's currently before noon, use YESTERDAY as the start date so the noon gate is already passed.
  const anchor=new Date(now);
  if(now.getHours() < 12) anchor.setDate(anchor.getDate()-1);
  const ymd=`${anchor.getFullYear()}-${String(anchor.getMonth()+1).padStart(2,"0")}-${String(anchor.getDate()).padStart(2,"0")}`;
  // default stage map
  const defaults=[
    {id:"t_main", name:"Main Field",  stages:[{id:"t_s1",name:"Main Stage"}]},

    {id:"t_barn", name:"The Barn",    stages:[{id:"t_s3",name:"Barn Stage"}]},

// Step 2: generate the LINEUP onto the existing test stages. Wipes only events, keeps stages/pins/walk-data.
async function generateTestLineup(){
  if(!TEST_MODE) return;
  // need stages first
  const stages=[];
  (state.structure.districts||[]).forEach(d=>(d.stages||[]).forEach(st=>stages.push({d, st})));
  if(!stages.length) throw new Error("no-stages");
  // wipe existing events + picks only (NOT stages, pins or legs)
  const esnap=await getDocs(colEvents); const eids=esnap.docs.map(d=>d.id);
  for(let i=0;i<eids.length;i+=20){ await Promise.all(eids.slice(i,i+20).map(id=>deleteDoc(dref("events",id)))); }
  const psnap=await getDocs(colPicks); const pids=psnap.docs.map(d=>d.id);
  for(let i=0;i<pids.length;i+=20){ await Promise.all(pids.slice(i,i+20).map(id=>deleteDoc(dref("picks",id)))); }
  const day=currentFestivalDay();   // tag acts to the day "now" resolves to (matches the date anchor)
  // Anchor the window to a clean quarter-hour ~30 min ago, so every act (base + a 15-min multiple)
  // lands neatly on :00/:15/:30/:45 — like a real festival programme. Something's already "on now".
  const QUARTER=15*60000;
  const base=Math.floor((Date.now()-30*60000)/QUARTER)*QUARTER;
  const at=o=>toHM(new Date(base+o*60000));
  const ACTS=["Aurora Skies","Midnight Caller","The Velvet Drop","Echo & Pulse","Glass Animals Jr","Sunbeam Collective",
    "Bass Theory","Northern Lights","Paper Tigers","The Lowlands","Disco Volante","Neon Forest","Wild Honey",
    "Tidal","Crooked Teeth","Mr Scruff Jr","Lunar Tide","Brass Monkey","The Haxans","Solar Flare","Cosmic Dust",
    "Riptide","Golden Hour","Static Bloom","Moth & Moon","Deep End","The Foxgloves","Velvet Sky","Iron Bloom",
    "Sable & Sons","The Quiet Hours","Marigold","Pulsewidth","Honeytrap","The Wandering","Cinder","Low Country",
    "Saltwater","Ember & Oak","Night Bus","The Reverie","Wax Lyrical","Dust Devils","Slow Tide","Kingfisher",
    "The Gloaming","Copper Wren","Fathom","Tin Soldiers","Hidden Hand","Wildflower"];
  let ai=0; const ev=[];
  stages.forEach((s,si)=>{
    // First act on the first 3 stages all START at the same clean boundary (minute 15) → a genuine
    // cross-stage clash the planner can route between. Other stages stagger in 15-min steps.
    let t = si<3 ? 15 : si*15;
    const windowEnd=600;                                   // 10-hour window
    // Lengths weighted to mirror the real Boomtown distribution from the live CSV:
    // 60min ≈ 60%, 90min ≈ 20%, then 45, 75, 120, 30 — heavy on the clean hour/90.
    const LENS=[60,60,60,60,60,60,90,90,90,45,75,30,120];
    // Gaps mirror reality too: half of acts back-to-back, half with a 30-min changeover, occasional 15.
    const GAPS=[0,0,0,0,0,30,30,30,30,15];
    while(t<windowEnd && ai<ACTS.length){
      const len=LENS[Math.floor(Math.random()*LENS.length)];
      ev.push({ districtId:s.d.id, districtName:s.d.name, stageId:s.st.id, stageName:s.st.name, day, start:at(t), end:at(t+len), title:ACTS[ai++], notes:"" });
      t+=len+GAPS[Math.floor(Math.random()*GAPS.length)];  // next act on THIS stage starts after this one ends, still on a boundary
    }
  });
  // (no extra overlay — each stage runs its own sequential chain, so there is never
  //  more than one act on the same stage at once; clashes only ever occur across stages.)
  for(const e of ev){ await addDoc(colEvents, {...e, createdAt:serverTimestamp()}); }
}

function startSeedWalk(){
  if(!navigator.geolocation){ toast("Location not supported"); return; }
  navigator.geolocation.getCurrentPosition(p=>{
    const here=nearestStage(p.coords.latitude,p.coords.longitude);
    if(!here){ toast("Stand at a stage to start timing"); return; }
    find.seedActive=true; find.seedFrom=here.stage.id; find.seedStartT=Date.now();
    find.seedPt={lat:p.coords.latitude,lng:p.coords.longitude}; find.seedDist=0;
    find.seedWatch=navigator.geolocation.watchPosition(q=>{
      const pos={lat:q.coords.latitude,lng:q.coords.longitude};
      if(find.seedPt){ const seg=haversine(find.seedPt.lat,find.seedPt.lng,pos.lat,pos.lng); if(seg<200) find.seedDist+=seg; }
      find.seedPt=pos;
    }, ()=>{}, {enableHighAccuracy:true,maximumAge:0,timeout:20000});
    find.seedClock=setInterval(()=>{ const el=document.getElementById("seed-clock"); if(el){ const s=Math.round((Date.now()-find.seedStartT)/1000); el.textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); } },1000);
    toast("Timing — walk to another stage"); renderView();
  }, ()=>toast("Couldn't get location"), {enableHighAccuracy:true,maximumAge:0,timeout:15000});
}
function stopSeedWalk(){
  const finish=(lat,lng)=>{
    const here=nearestStage(lat,lng);
    cleanupSeed();
    if(!here || here.stage.id===find.seedFrom){ toast("Stop at a different stage to save the route"); renderView(); return; }
    const sec=Math.round((Date.now()-find.seedStartT)/1000);
    recordSeedLeg(find.seedFrom, here.stage.id, sec, Math.round(find.seedDist));
    const from=stagesWithCoords().find(s=>s.id===find.seedFrom), to=here.stage;
    toast(`Saved ${from?from.name:"?"} → ${to.name}: ~${Math.max(1,Math.round(sec/60))} min`); renderView();
  };
  if(navigator.geolocation) navigator.geolocation.getCurrentPosition(p=>finish(p.coords.latitude,p.coords.longitude), ()=>{ if(find.seedPt) finish(find.seedPt.lat,find.seedPt.lng); else { cleanupSeed(); renderView(); } }, {enableHighAccuracy:true,maximumAge:0,timeout:15000});
  else if(find.seedPt) finish(find.seedPt.lat,find.seedPt.lng);
}
function cleanupSeed(){
  if(find.seedWatch!=null && navigator.geolocation) navigator.geolocation.clearWatch(find.seedWatch);
  if(find.seedClock) clearInterval(find.seedClock);

}

const TRAIL_KEY="fp_trail", TRAIL_MIN_GAP=180000, TRAIL_MIN_MOVE=20, TRAIL_MAX=400;
function loadTrail(){ try{ return JSON.parse(localStorage.getItem(TRAIL_KEY)||"[]"); }catch(e){ return []; } }
function recordTrailPoint(pos){
  if(!pos) return;
  const t=loadTrail();
  const last=t[t.length-1];
  const now=Date.now();
  if(last){
    if(now-last.t < TRAIL_MIN_GAP) return;                               // at most one point / 3 min
    if(haversine(last.lat,last.lng,pos.lat,pos.lng) < TRAIL_MIN_MOVE) return;  // ignore standing still
  }
  t.push({lat:+pos.lat.toFixed(5), lng:+pos.lng.toFixed(5), t:now});
  while(t.length>TRAIL_MAX) t.shift();
  try{ localStorage.setItem(TRAIL_KEY, JSON.stringify(t)); }catch(e){}
}
function clearTrail(){ localStorage.removeItem(TRAIL_KEY); }

      <p class="find-note" style="margin-bottom:14px">${editing?"“Move here” updates this pin to wherever you're standing now.":"This pin will be saved at your current location."}</p>
      <div class="row" style="gap:8px">
        ${editing?'<button class="btn ghost" id="p-move" style="flex:1">Move here</button>':''}
        <button class="btn primary" id="p-save" style="flex:2">${editing?"Save":"Drop pin here"}</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
  const close=()=>{ state.modal={type:"pins"}; renderPinsModal(); };
  wrap.querySelector("#p-close").onclick=close;
  wrap.onclick=e=>{ if(e.target===wrap){ state.modal=null; wrap.remove(); } };
  wrap.querySelectorAll("[data-ptype]").forEach(b=>b.onclick=()=>{ curType=b.dataset.ptype; wrap.querySelectorAll("[data-ptype]").forEach(x=>x.classList.toggle("on",x===b)); });
  const err=m=>wrap.querySelector("#p-err").innerHTML=`<div class="err">${esc(m)}</div>`;

  const doSave=async(coords)=>{
    const label=wrap.querySelector("#p-label").value;
    const shared=wrap.querySelector("#p-shared").checked;
    const noteEl=wrap.querySelector("#p-note"); const note=noteEl?noteEl.value:(p.note||"");
    try{
      await savePin({ id:p.id, label, type:curType, shared, note, lat:coords.lat, lng:coords.lng });
      toast(editing?"Pin saved":"Pin dropped"); state.modal={type:"pins"}; renderPinsModal();
    }catch(e){ err("Couldn't save — try again."); }
  };
  wrap.querySelector("#p-save").onclick=()=>{
    if(editing && p.lat!=null){ doSave({lat:p.lat,lng:p.lng}); }   // keep location, just update fields
    else if(find.pos){ doSave(find.pos); }
    else err("No location yet — open the Find tab first.");
  };
  const mv=wrap.querySelector("#p-move");
  if(mv) mv.onclick=()=>{ if(find.pos) doSave(find.pos); else err("No current location yet."); };
}

/* ---- live location sharing (periodic, battery-friendly) ---- */
function writeMyLocation(){
  if(!find.share || !find.pos || !state.user) return;
  find.myUpdated=Date.now();
  trackTrip(find.pos, find.acc);   // crowdsourced walk-time learning
  setDoc(dref("locations",state.user.id),
    { name:state.user.name, lat:+find.pos.lat.toFixed(6), lng:+find.pos.lng.toFixed(6), acc:find.acc||null, lost:!!find.lost, updatedAt:serverTimestamp() }
  ).catch(()=>{});
}
function startShare(){
  if(find.shareTimer) return;
  if(!navigator.geolocation){ toast("Location not supported"); return; }
  if(!locationEnabled()){ toast("Location features are off"); return; }
  find.share=true;
  const fix=()=>navigator.geolocation.getCurrentPosition(
    p=>{ find.pos={lat:p.coords.latitude,lng:p.coords.longitude}; find.acc=p.coords.accuracy; writeMyLocation();
         if(state.view==="find" && document.getElementById("radar")) updateFindDynamic(); },
    e=>{ if(e.code===1){ toast("Location blocked"); stopShare(); renderApp(); } },
    {enableHighAccuracy:true,maximumAge:30000,timeout:20000}
  );
  fix();
  find.shareTimer=setInterval(fix, BATTERY_SAVER ? 300000 : 90000);   // 5 min in saver, else ~1.5 min
  localStorage.setItem("fp_share","1");       // remember across refreshes
  if(feat("autoStop")){
    const hrs=Math.max(1, +state.structure.autoStopHours || 4);
    find.autoStopAt=Date.now()+hrs*3600000;
    find.autoStopTimer=setTimeout(()=>{ stopShare(true); toast("Auto-stopped sharing"); if(state.user) renderApp(); }, hrs*3600000);
  }
}
function stopShare(userInitiated=false){
  find.share=false; find.lost=false;
  if(userInitiated) localStorage.removeItem("fp_share");   // keep saved intent through GPS hiccups / auto-stop
  if(find.shareTimer){ clearInterval(find.shareTimer); find.shareTimer=null; }
  if(find.autoStopTimer){ clearTimeout(find.autoStopTimer); find.autoStopTimer=null; }
  find.autoStopAt=0;
  trip = null;   // drop any in-progress trip trail
  if(state.user) deleteDoc(dref("locations",state.user.id)).catch(()=>{});
}
window.addEventListener("pagehide",()=>{ if(find.share && state.user){ try{ deleteDoc(dref("locations",state.user.id)); }catch(e){} } });

function enableFind(){
  // iOS needs an explicit gesture-triggered permission request for the compass
  find.orientNeedsGesture=false;
  try{
    if(typeof DeviceOrientationEvent!=="undefined" && typeof DeviceOrientationEvent.requestPermission==="function"){
      DeviceOrientationEvent.requestPermission().then(()=>{ bindOrientation(); if(state.view==="find") renderView(); }).catch(()=>{});
    }
  }catch(e){}
  startFindSensors();
}
function bindOrientation(){
  if(find.orientBound) return;
  let lastPaint=0;
  const handler=ev=>{
    let h=null;
    if(typeof ev.webkitCompassHeading==="number" && !isNaN(ev.webkitCompassHeading)) h=ev.webkitCompassHeading;
    else if(ev.alpha!=null){ const off=(screen.orientation&&screen.orientation.angle)||0; h=(360-ev.alpha+off)%360; }
    if(h==null||isNaN(h)) return;
    find.heading=h;
    find.orientLastEvent=Date.now();           // watchdog: note we're receiving events
    const had=find.hasOrientation; find.hasOrientation=true;
    if(state.view!=="find") return;
    if(!had){ renderView(); return; }
    const now=Date.now();
    if(now-lastPaint < 100) return;            // throttle: at most ~10 updates/sec (compass fires far faster)
    lastPaint=now;
    updateFindDynamic();
  };
  find.orientHandler=handler;
  window.addEventListener("deviceorientationabsolute",handler,true);
  window.addEventListener("deviceorientation",handler,true);
  find.orientBound=true;
  find.orientLastEvent=Date.now();
}
// Recover a stalled compass (iOS sometimes silently stops delivering orientation events,
// e.g. after heavy DOM work like pinning a stage). Tear the listener down and re-add it —
// permission persists for the session, so no re-prompt is needed.
function rebindOrientation(){
  if(find.orientHandler){
    window.removeEventListener("deviceorientationabsolute",find.orientHandler,true);
    window.removeEventListener("deviceorientation",find.orientHandler,true);
  }
  find.orientBound=false; find.orientHandler=null;
  bindOrientation();
}
// Watchdog: if the compass was working but events have gone quiet for ~4s while Find is open, re-bind.
function checkOrientationAlive(){
  if(!find.orientBound || !find.hasOrientation) return;
  if(state.view!=="find") return;
  if(find.orientLastEvent && Date.now()-find.orientLastEvent > 4000){
    rebindOrientation();
  }
}
function startFindSensors(skipOrientation){
  if(find.started) return;
  find.started=true; find.error=null;
  if(navigator.geolocation){
    find.geoWatch=navigator.geolocation.watchPosition(
      p=>{ const a=p.coords.accuracy;
           // skip a wildly inaccurate reading if we already have a decent recent fix
           if(find.pos && a>120 && find.acc && find.acc<a*0.6){ return; }
           const firstFix = !find.pos;
           find.pos={lat:p.coords.latitude,lng:p.coords.longitude}; find.acc=a; find.error=null;
           recordTrailPoint(find.pos);
           if(firstFix && navigator.onLine){
             // coords may not have existed when weather first tried to load (no pinned stages yet) — retry now
             refreshWeather().then(()=>{ if(state.view==="home"&&!document.querySelector(".modal-bg")) renderView(); }).catch(()=>{});
           }
           if(state.view==="find"){ if(!document.getElementById("radar")) renderView(); else updateFindDynamic(); } },
      e=>{ find.error = e.code===1 ? "denied" : "unavailable"; if(state.view==="find") renderView(); },
      BATTERY_SAVER ? {enableHighAccuracy:false,maximumAge:60000,timeout:30000} : {enableHighAccuracy:true,maximumAge:0,timeout:20000}
    );
  } else { find.error="unsupported"; }
  if(!skipOrientation) bindOrientation();
  if(state.view==="find") renderView();
}
function stopFindSensors(){
  if(find.geoWatch!=null && navigator.geolocation) navigator.geolocation.clearWatch(find.geoWatch);
  find.geoWatch=null;
  if(find.orientBound && find.orientHandler){
    window.removeEventListener("deviceorientationabsolute",find.orientHandler,true);
    window.removeEventListener("deviceorientation",find.orientHandler,true);
  }
  find.orientBound=false; find.started=false;
}

function updateFindDynamic(){
  const radar=document.getElementById("radar");
  if(!radar || !find.pos) return;
  const targets=buildTargets();
  if(!targets.length) return;
  const headingUp = find.headingMode!=="north" && find.hasOrientation;
  const heading = headingUp ? (find.heading||0) : 0;
  const cx=140, cy=140, maxR=120;

  const items=targets.map(t=>({ ...t,
    d:haversine(find.pos.lat,find.pos.lng,t.lat,t.lng),
    b:bearing(find.pos.lat,find.pos.lng,t.lat,t.lng) }));
  const scale=Math.max(...items.map(s=>s.d), 30);

  items.forEach(s=>{
    const rel=(headingUp? s.b-heading : s.b)*Math.PI/180;
    const rr=Math.min(s.d/scale,1)*maxR;
    const x=cx+Math.sin(rel)*rr, y=cy-Math.cos(rel)*rr;
    const g=document.getElementById("dot-"+s.id);
    if(g){ g.setAttribute("transform",`translate(${x.toFixed(1)},${y.toFixed(1)})`); g.classList.toggle("sel",s.id===find.target); }
  });

  const r1=document.getElementById("ring-half"); if(r1) r1.textContent=fmtDist(scale/2);
  const r2=document.getElementById("ring-full"); if(r2) r2.textContent=fmtDist(scale);
  const fwd=document.getElementById("fwd-label"); if(fwd) fwd.textContent = headingUp ? "▲" : "N";

  const t=items.find(s=>s.id===find.target);
  const arrow=document.getElementById("findarrow");
  const ro=document.getElementById("find-readout");
  if(t){
    const rel = headingUp ? t.b-heading : t.b;
    if(arrow){ arrow.style.display=""; arrow.setAttribute("transform",`rotate(${rel.toFixed(1)} 140 140)`); }
    if(ro){
      ro.querySelector(".r-name").textContent=t.name;
      const here = t.d!=null && t.d<=HERE_RADIUS;
      ro.classList.toggle("r-here", here);
      if(here){
        ro.querySelector(".r-dist").innerHTML=`HERE`;
        let dir = t.kind==="person" ? (t.lost?"needs help · together":"you're together") : "you're here";
        ro.querySelector(".r-dir").textContent = dir;
      } else {
        ro.querySelector(".r-dist").innerHTML=`${fmtDist(t.d)}<small>away</small>`;
        let dir = headingUp ? relDirText(rel) : (cardinal(t.b)+" of you");
        if(t.kind==="person") dir = (t.lost?"needs help · ":"")+dir+(t.ts?(" · "+agoText(t.ts)):"");
        else if(t.kind==="rally") dir = "🚩 meet-up point · "+dir;
        else if(t.kind==="pin") dir += " · "+(t.note?esc(t.note):(t.mine?"your pin":esc(t.ownerName||"shared")+"'s pin"));
        ro.querySelector(".r-dir").textContent = dir;
      }
    }
  } else if(arrow){ arrow.style.display="none"; }

  const acc=document.getElementById("find-acc"); if(acc && find.acc) acc.textContent="GPS ±"+Math.round(find.acc)+" m";
}

/* ============================================================
   EXTRAS — chat, info, packing, free-time, reminders, alerts
