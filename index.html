<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#EFE7D5" />
<title>Festival Planner</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Festival">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFE7D5;
    --card:#F7F1E3;
    --panel:#E7DCC4;
    --ink:#1C1B16;
    --ink-2:#403D32;
    --muted:#7C7458;
    --line:rgba(28,27,22,.18);
    --line-strong:rgba(28,27,22,.4);
    --rule:#1C1B16;
    --accent:#D6371C;
    --accent-ink:#FBF4E4;
    --teal:#1E5A50;
    --gold:#B5852A;
    --violet:#6B4FA0;
    --radius:6px;
    --radius-sm:4px;
    --hard:3px 3px 0 var(--ink);
    --hard-sm:2px 2px 0 var(--ink);
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Archivo",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100dvh;line-height:1.45;
  }
  h1,h2,h3,.display{font-family:"Anton",Impact,sans-serif;font-weight:400;letter-spacing:.01em;line-height:.98;margin:0;text-transform:uppercase}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px}
  a{color:var(--accent)}
  ::selection{background:var(--accent);color:var(--accent-ink)}

  .app{max-width:760px;margin:0 auto;padding:0 16px calc(100px + var(--safe-b))}
  .topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:14px 0;background:var(--paper);border-bottom:2px solid var(--rule)}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand .mark{width:40px;height:40px;flex:none;background:var(--accent);border:2px solid var(--ink);
    box-shadow:var(--hard-sm);position:relative}
  .brand .mark::after{content:"★";position:absolute;inset:0;display:grid;place-items:center;color:var(--accent-ink);font-size:18px;line-height:1}
  .brand .name{font-family:"Anton";font-size:19px;letter-spacing:.02em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand .sub{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  .who{display:flex;align-items:center;gap:9px;flex:none}
  .avatar{width:34px;height:34px;display:grid;place-items:center;font-weight:800;font-size:13px;
    color:var(--paper);background:var(--ink);border:2px solid var(--ink)}
  .avatar.adm{background:var(--accent);color:var(--accent-ink)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 15px;
    border-radius:var(--radius-sm);font-weight:700;font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;
    background:var(--card);color:var(--ink);border:2px solid var(--ink);transition:transform .06s ease}
  .btn:active{transform:translate(1px,1px)}
  .btn.primary{background:var(--accent);color:var(--accent-ink);box-shadow:var(--hard-sm)}
  .btn.primary:active{box-shadow:1px 1px 0 var(--ink)}
  .btn.lime{background:var(--ink);color:var(--paper)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:8px 11px;font-size:11px}
  .btn.icon{padding:8px 10px}
  .btn.danger{background:transparent;color:var(--accent);border-color:var(--accent)}
  .btn:disabled{opacity:.4;pointer-events:none}
  .btn.block{width:100%}

  .card{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);padding:16px}
  .muted{color:var(--muted)}
  .tag{font-size:11px;color:var(--muted);font-weight:600;text-transform:none;letter-spacing:0}

  .field{display:block;margin-bottom:12px}
  .field>span{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:12px 13px;border-radius:var(--radius-sm);color:var(--ink);
    background:var(--paper);border:2px solid var(--ink);outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:var(--hard-sm)}
  .row{display:flex;gap:10px}.row>*{flex:1}

  .auth-wrap{min-height:100dvh;display:grid;place-items:center;padding:24px}
  .auth{width:100%;max-width:390px}
  .auth .hero{text-align:left;margin-bottom:26px;border-bottom:3px solid var(--ink);padding-bottom:18px}
  .auth .hero h1{font-size:58px;color:var(--ink);line-height:.9}
  .auth .hero h1 .amp{color:var(--accent)}
  .auth .hero p{color:var(--ink-2);margin:14px 0 0;font-size:14px;font-weight:500}
  .seg{display:flex;border:2px solid var(--ink);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:18px}
  .seg button{flex:1;padding:11px;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:var(--card)}
  .seg button.on{background:var(--ink);color:var(--paper)}
  .note{font-size:12px;color:var(--muted);margin-top:14px;text-align:left;line-height:1.5}
  .err{background:transparent;border:2px solid var(--accent);color:var(--accent);padding:10px 12px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;font-weight:600}

  .nav{position:fixed;left:0;right:0;bottom:0;z-index:50;padding:0;background:var(--paper);border-top:2px solid var(--rule)}
  .nav-inner{max-width:760px;margin:0 auto;display:flex;padding:6px 8px calc(6px + var(--safe-b))}
  .nav-inner button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;
    color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-bottom:3px solid transparent}
  .nav-inner button svg{width:21px;height:21px}
  .nav-inner button.on{color:var(--ink);border-bottom-color:var(--accent)}
  .nav-inner button.on svg{stroke:var(--accent)}

  .sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin:18px 0 14px;
    border-bottom:2px solid var(--ink);padding-bottom:10px}
  .sec-head h2{font-size:30px}
  .sec-head .lead{color:var(--muted);font-size:12px;margin-top:6px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}

  .filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
  .filters::-webkit-scrollbar{display:none}
  .chip{flex:none;padding:7px 13px;border-radius:2px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    background:transparent;border:1.5px solid var(--ink);color:var(--ink-2);white-space:nowrap}
  .chip.on{background:var(--ink);color:var(--paper)}
  .search{width:100%;padding:12px 14px;border-radius:var(--radius-sm);background:var(--paper);border:2px solid var(--ink);color:var(--ink);outline:none;margin-bottom:12px}
  .search:focus{border-color:var(--accent);box-shadow:var(--hard-sm)}

  .day-label{font-family:"Anton";font-size:24px;text-transform:uppercase;letter-spacing:.02em;margin:26px 0 12px;
    display:flex;align-items:center;gap:12px;color:var(--ink)}
  .day-label::after{content:"";flex:1;height:2px;background:var(--ink)}
  .ev{display:flex;gap:12px;align-items:stretch;background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);
    padding:12px;margin-bottom:10px;position:relative}
  .ev .time{flex:none;width:62px;text-align:center;display:flex;flex-direction:column;justify-content:center;border-right:2px solid var(--ink);padding-right:10px}
  .ev .time .t{font-family:"Anton";font-size:17px}
  .ev .time .t2{font-size:10.5px;color:var(--muted);margin-top:3px;font-weight:600}
  .ev .body{flex:1;min-width:0}
  .ev .body h3{font-family:"Archivo";font-weight:800;font-size:17px;letter-spacing:-.01em;text-transform:none}
  .ev .meta{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px;align-items:center}
  .ev .loc{font-size:12px;color:var(--ink-2);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
  .ev .notes{font-size:13px;color:var(--ink-2);margin-top:7px}
  .ev .act{flex:none;display:flex;align-items:center}
  .pick-btn{width:44px;height:44px;border-radius:var(--radius-sm);display:grid;place-items:center;background:var(--paper);border:2px solid var(--ink)}
  .pick-btn svg{width:22px;height:22px;fill:none;stroke:var(--ink);stroke-width:2.4}
  .pick-btn.on{background:var(--accent);border-color:var(--ink)}
  .pick-btn.on svg{stroke:var(--accent-ink)}
  .ev.clash{outline:2px solid var(--accent);outline-offset:2px}
  .clash-note{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--accent);margin-top:7px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
  .area-tag{display:inline-flex;align-items:center;font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
    color:#fff;background:var(--c,#777);padding:3px 9px;border-radius:2px;border:1.5px solid var(--ink)}
  .cdot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--ink);display:inline-block;margin-right:1px;vertical-align:-1px}

  .goers{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
  .goer{font-size:11px;font-weight:700;padding:3px 9px;border-radius:2px;background:transparent;border:1.5px solid var(--line-strong);color:var(--ink-2)}
  .goer.me{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .count-badge{font-family:"Anton";font-size:13px;color:var(--accent);letter-spacing:.03em}

  .empty{text-align:center;padding:48px 20px;color:var(--muted)}
  .empty .big{font-size:42px;margin-bottom:10px;filter:grayscale(.2)}
  .empty h3{font-family:"Anton";color:var(--ink);margin-bottom:8px;font-size:22px}

  .admin-block{margin-bottom:14px}
  .district{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
  .district .dh{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 14px;background:var(--ink);color:var(--paper)}
  .district .dh .nm{font-family:"Anton";font-size:17px;letter-spacing:.02em;display:flex;align-items:center;gap:9px}
  .dswatch{width:16px;height:16px;border-radius:3px;border:2px solid var(--paper);flex:none}
  .palette{display:flex;flex-wrap:wrap;gap:7px;padding:11px 14px 4px;align-items:center}
  .palette .plabel{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-right:2px}
  .palette .sw{width:26px;height:26px;border-radius:4px;border:2px solid var(--ink);cursor:pointer;position:relative}
  .palette .sw.on::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:14px;font-weight:900;text-shadow:0 1px 2px rgba(0,0,0,.5)}
  .district .dh .btn{border-color:var(--paper);color:var(--paper)}
  .district .dh .btn.danger{color:var(--paper);border-color:var(--paper)}
  .stages{padding:11px 14px;display:flex;flex-wrap:wrap;gap:8px}
  .stage-chip{display:flex;align-items:center;gap:7px;padding:6px 6px 6px 11px;border-radius:2px;background:var(--paper);border:1.5px solid var(--ink);font-size:13px;font-weight:700}
  .stage-chip button{color:var(--muted);font-weight:800;line-height:1;padding:2px 4px}
  .stage-chip button:hover{color:var(--accent)}
  .add-inline{display:flex;gap:8px;align-items:center;padding:0 14px 13px}
  .add-inline input{flex:1;padding:10px 11px;border-radius:var(--radius-sm);background:var(--paper);border:2px solid var(--ink);color:var(--ink);outline:none;font-size:14px}

  .modal-bg{position:fixed;inset:0;z-index:60;background:rgba(28,27,22,.55);display:grid;place-items:end center;padding:0}
  .modal{width:100%;max-width:760px;background:var(--paper);border-top:3px solid var(--ink);border-radius:0;
    padding:18px 18px calc(20px + var(--safe-b));max-height:94dvh;overflow:auto;animation:slideup .2s ease}
  @keyframes slideup{from{transform:translateY(30px)}to{transform:translateY(0)}}
  .modal h2{font-size:26px}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;border-bottom:2px solid var(--ink);padding-bottom:12px}

  .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(104px + var(--safe-b));z-index:80;
    background:var(--ink);color:var(--paper);font-weight:700;font-size:12.5px;letter-spacing:.05em;text-transform:uppercase;
    padding:11px 18px;border-radius:var(--radius-sm);box-shadow:var(--hard);animation:pop .18s ease}
  @keyframes pop{from{transform:translate(-50%,8px);opacity:0}to{transform:translate(-50%,0);opacity:1}}

  .loader{min-height:60dvh;display:grid;place-items:center;color:var(--muted)}
  .spin{width:32px;height:32px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--accent);animation:sp 1s linear infinite;margin:0 auto 14px}
  @keyframes sp{to{transform:rotate(360deg)}}

  .stat-row{display:flex;gap:10px;margin-bottom:14px}
  .stat{flex:1;background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);padding:13px}
  .stat .n{font-family:"Anton";font-size:30px;line-height:1}
  .stat .l{font-size:10.5px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.06em;font-weight:700}

  .config-warn{background:var(--card);border:2px solid var(--accent);border-radius:var(--radius);padding:16px;font-size:13.5px;line-height:1.6}
  .config-warn code{background:var(--panel);padding:2px 6px;border-radius:3px;font-size:12.5px}

  /* bulk importer */
  .bulk-tabs{display:flex;border:2px solid var(--ink);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:14px}
  .bulk-tabs button{flex:1;padding:10px;font-weight:700;font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);background:var(--card)}
  .bulk-tabs button.on{background:var(--accent);color:var(--accent-ink)}
  .bulk-ta{width:100%;min-height:150px;padding:12px 13px;border-radius:var(--radius-sm);background:var(--paper);
    border:2px solid var(--ink);color:var(--ink);outline:none;font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:13.5px;line-height:1.7;resize:vertical}
  .bulk-ta:focus{border-color:var(--accent)}
  .fmt{background:var(--panel);border:1.5px dashed var(--line-strong);border-radius:var(--radius-sm);padding:11px 13px;font-size:12.5px;line-height:1.6;margin-bottom:12px}
  .fmt code{background:var(--paper);padding:1px 5px;border-radius:3px;font-size:12px}
  .prev{border:2px solid var(--ink);border-radius:var(--radius-sm);margin:12px 0;overflow:hidden}
  .prev-head{background:var(--ink);color:var(--paper);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:8px 12px;display:flex;justify-content:space-between}
  .prev-body{max-height:230px;overflow:auto}
  .prev-row{display:flex;gap:10px;align-items:baseline;padding:8px 12px;border-bottom:1px solid var(--line);font-size:13px}
  .prev-row:last-child{border-bottom:none}
  .prev-row .pday{width:34px;flex:none;font-weight:800;font-size:10px;text-transform:uppercase;color:var(--muted)}
  .prev-row .ptime{width:96px;flex:none;font-family:ui-monospace,monospace;font-size:12px;font-weight:600}
  .prev-row .ptitle{flex:1;min-width:0;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .prev-row .ploc{font-size:11px;color:var(--muted);flex:none;max-width:38%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .prev-row.bad{background:rgba(214,55,28,.08)}
  .prev-row.bad .ptitle{color:var(--accent)}
  .prev-row .stt{flex:none;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em}
  .prev-row.bad .stt{color:var(--accent)}
  .prev-row.new .stt{color:var(--teal)}
  .chk{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;margin-bottom:12px;cursor:pointer}
  .chk input{width:20px;height:20px;accent-color:var(--accent)}

  /* admin stage rows with location */
  .stage-list{flex-direction:column;align-items:stretch;gap:7px}
  .stage-row{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--paper);
    border:1.5px solid var(--ink);border-radius:var(--radius-sm);padding:7px 9px 7px 12px}
  .stage-row .sname{font-weight:700;font-size:14px;display:flex;align-items:center;gap:6px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .stage-row .locdot{font-size:13px}
  .srow-act{display:flex;gap:6px;flex:none}
  .btn.xs{padding:6px 9px;font-size:10px;letter-spacing:.04em}
  .btn.xs.del{padding:6px 8px;color:var(--muted)}
  .btn.xs.del:hover{color:var(--accent)}

  /* find / compass */
  .find-enable{text-align:center;padding:30px 18px}
  .find-enable .big{font-size:46px;margin-bottom:10px}
  .find-enable h3{font-family:"Anton";font-size:22px;margin-bottom:8px}
  .find-enable p{color:var(--ink-2);font-size:13.5px;max-width:340px;margin:0 auto 18px;line-height:1.55}
  .readout{background:var(--ink);color:var(--paper);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .readout .r-name{font-family:"Anton";font-size:20px;letter-spacing:.02em;line-height:1}
  .readout .r-dir{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#d8cdb2;margin-top:5px;font-weight:700}
  .readout .r-dist{font-family:"Anton";font-size:30px;color:var(--paper);line-height:1;text-align:right}
  .readout .r-dist small{display:block;font-family:"Archivo";font-size:10px;letter-spacing:.06em;color:#d8cdb2;font-weight:700;margin-top:3px;text-transform:uppercase}
  .radar-wrap{display:flex;justify-content:center;margin:4px 0 12px}
  #radar{width:100%;max-width:320px;height:auto;touch-action:manipulation}
  #radar .ring{fill:none;stroke:var(--line-strong);stroke-width:1.5}
  #radar .ring-lbl{fill:var(--muted);font:600 9px Archivo,sans-serif;letter-spacing:.04em}
  #radar .cross{stroke:var(--line);stroke-width:1}
  #radar .me{fill:var(--ink)}
  #radar .fwd{fill:var(--accent)}
  #radar .fwd-lbl{fill:var(--muted);font:700 9px Archivo,sans-serif;letter-spacing:.08em;text-transform:uppercase}
  #radar .rdot{cursor:pointer}
  #radar .rdot circle{stroke:var(--ink);stroke-width:2}
  #radar .rdot text{fill:var(--ink);font:700 9.5px Archivo,sans-serif}
  #radar .rdot.sel circle{stroke-width:3}
  #radar .rdot.sel text{font-weight:800}
  #radar .needle{fill:var(--accent);stroke:var(--ink);stroke-width:1.5}
  .find-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .find-acc{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.04em;text-transform:uppercase}
  .mode-toggle{display:flex;border:2px solid var(--ink);border-radius:var(--radius-sm);overflow:hidden}
  .mode-toggle button{padding:7px 12px;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);background:var(--card)}
  .mode-toggle button.on{background:var(--ink);color:var(--paper)}
  .target-chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
  .target-chips::-webkit-scrollbar{display:none}
  .tchip{flex:none;display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:2px;font-size:12px;font-weight:700;
    background:transparent;border:1.5px solid var(--ink);color:var(--ink-2);white-space:nowrap}
  .tchip.on{background:var(--ink);color:var(--paper)}
  .tchip .cdot{margin:0}
  .find-note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:4px}
  #radar .dot-init{fill:#fff;font:800 8px Archivo,sans-serif;text-shadow:0 1px 1px rgba(0,0,0,.4)}
  #radar .dot-name{fill:var(--ink);font:700 9.5px Archivo,sans-serif}
  .share-row{display:flex;align-items:center;justify-content:space-between;gap:14px;background:var(--card);

  .lost-banner{display:flex;align-items:center;gap:8px;width:100%;background:var(--accent);color:var(--accent-ink);

  /* menu */

  .msg-time{font-size:10px;color:var(--muted);margin:0 4px}
  .chat-input{position:sticky;bottom:calc(96px + var(--safe-b));display:flex;gap:8px;padding:8px 0;background:var(--paper)}
  .chat-input input{flex:1;padding:12px 14px;border-radius:var(--radius-sm);background:var(--paper);border:2px solid var(--ink);color:var(--ink);outline:none}

  .info-item{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
  .info-item h3{font-family:"Archivo";font-weight:800;font-size:16px;text-transform:none;margin-bottom:5px}

  .pack-bar{height:8px;background:var(--panel);border:1.5px solid var(--ink);border-radius:999px;overflow:hidden;margin-bottom:14px}

  .pack-list{display:flex;flex-direction:column;gap:7px}
  .pack-row{display:flex;align-items:center;gap:6px;background:var(--card);border:2px solid var(--ink);border-radius:var(--radius-sm);overflow:hidden}
  .pack-row.on{background:var(--panel)}
  .pack-tap{flex:1;display:flex;align-items:center;gap:11px;padding:11px 13px;text-align:left}
  .pack-box{width:22px;height:22px;flex:none;border:2px solid var(--ink);border-radius:4px;display:grid;place-items:center;font-weight:900;font-size:14px;background:var(--paper)}
  .pack-row.on .pack-box{background:var(--teal);color:#fff}
  .pack-row.on .pack-label{text-decoration:line-through;color:var(--muted)}
  .pack-label{font-size:14.5px;font-weight:600}
  .pack-del{flex:none;padding:0 13px;align-self:stretch;color:var(--muted);font-weight:800}
  .pack-del:hover{color:var(--accent)}

  /* free-time */
  .free-card{background:var(--card);border:2px solid var(--ink);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px}
  .free-head{font-family:"Anton";font-size:16px;text-transform:uppercase;letter-spacing:.02em;margin-bottom:4px}
  .free-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line);font-size:14px}
  .free-row .free-day{font-weight:800;font-size:11px;text-transform:uppercase;color:var(--muted);width:32px}
  .free-row .free-len{margin-left:auto;font-size:12px;color:var(--teal);font-weight:700}

  .changed-badge{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--accent-ink);
    background:var(--accent);border:1.5px solid var(--ink);border-radius:2px;padding:2px 7px}

  .sel-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;padding:10px 12px;background:var(--panel);border:2px solid var(--ink);border-radius:var(--radius-sm)}
  .sel-bar .btn{flex:1}
  .day-sel{margin-left:auto;font-family:"Archivo";font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    padding:4px 9px;border-radius:2px;border:1.5px solid var(--ink);background:transparent;color:var(--ink-2)}
  .day-sel.on{background:var(--ink);color:var(--paper)}
  .ev-check{flex:none;width:30px;align-self:stretch;display:grid;place-items:center;background:var(--paper);
    border:2px solid var(--ink);border-radius:var(--radius-sm);font-weight:900;font-size:15px;color:var(--paper)}
  .ev-check.on{background:var(--accent);color:var(--accent-ink)}
  .ev.rowsel{outline:2px solid var(--accent);outline-offset:1px}

  .offline-bar{position:fixed;left:0;right:0;top:0;z-index:90;display:none;align-items:center;justify-content:center;gap:8px;
    background:var(--ink);color:var(--paper);font-size:12px;font-weight:700;letter-spacing:.02em;padding:7px 14px;text-align:center;line-height:1.3}
  .offline-bar .od{width:8px;height:8px;border-radius:50%;background:var(--gold);flex:none}
  body.is-offline .offline-bar{display:flex}
  body.is-offline .topbar{top:30px}
  body.is-offline .app{padding-top:30px}

  @media print{
    .nav,.topbar,.no-print,.next-card .btn,.stat-row,.filters,.pick-btn,.act,.find-actions{display:none !important}
    body{background:#fff;color:#000}

    .ev{box-shadow:none !important;border:1px solid #999;break-inside:avoid}

  }
</style>

<body>
<div id="root"></div>

<script type="module">
/* ============================================================
   FESTIVAL PLANNER
   ------------------------------------------------------------
   SETUP (see README.md for full steps):
   1. Create a free Firebase project, enable Cloud Firestore.
   2. Paste your config into FIREBASE_CONFIG below.
   3. Set ADMIN_CODE to a secret only you know — entering it on
      sign-up makes that account an admin.
   ============================================================ */

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBTbrKrHADeshcLQb4TyD2F99HVvRRb7MQ",
  authDomain: "boomtown-32345.firebaseapp.com",
  projectId: "boomtown-32345",
  storageBucket: "boomtown-32345.firebasestorage.app",
  messagingSenderId: "138467434890",
  appId: "1:138467434890:web:042ff480bdad8e5705a873"
};

const ADMIN_CODE = "change-me-admin";   // <-- change this before deploying
const FESTIVAL_NAME_DEFAULT = "Our Festival";

/* ------------------------------------------------------------ */

const DAYS = ["Wednesday","Thursday","Friday","Saturday","Sunday"];
const AREA_COLORS = ["#D6371C","#1E5A50","#2B4C9B","#B5852A","#7A3B6B","#3C6B33","#A0522D","#41566B","#B5306E","#1C1B16"];
const NO_AREA_COLOR = "#8A8068";
function districtColor(id){
  const idx = state.structure.districts.findIndex(x=>x.id===id);
  if(idx<0) return NO_AREA_COLOR;
  const d = state.structure.districts[idx];
  return d.color || AREA_COLORS[idx % AREA_COLORS.length];
}
function nextAreaColor(){
  const used = new Set(state.structure.districts.map(d=>d.color).filter(Boolean));
  return AREA_COLORS.find(c=>!used.has(c)) || AREA_COLORS[state.structure.districts.length % AREA_COLORS.length];
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
  collection, doc, onSnapshot, setDoc, deleteDoc,
  getDocs, query, where, addDoc, updateDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const root = document.getElementById("root");

/* ---- Config guard ---- */
if (FIREBASE_CONFIG.apiKey === "PASTE_YOUR_API_KEY") {
  root.innerHTML = `<div class="auth-wrap"><div class="auth">
    <div class="hero"><h1>Festival Planner</h1></div>
    <div class="config-warn">
      <b>Almost there — Firebase isn't configured yet.</b><br><br>
      Open <code>index.html</code> and paste your Firebase project config into the
      <code>FIREBASE_CONFIG</code> object near the top of the script, then set your
      secret <code>ADMIN_CODE</code>. Full step-by-step instructions are in
      <code>README.md</code>. Reload this page once that's done.
    </div>
  </div></div>`;
  throw new Error("Firebase not configured");
}

const app = initializeApp(FIREBASE_CONFIG);
// Offline-first: cache reads locally and queue writes to replay when signal returns.
let db;
try {
  db = initializeFirestore(app, { localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }) });
} catch (e) {
  db = getFirestore(app);
}

/* ---- Firestore refs ---- */
const refStructure = doc(db, "meta", "structure");
const colEvents    = collection(db, "events");
const colUsers     = collection(db, "users");
const colPicks     = collection(db, "picks");
const colLocations = collection(db, "locations");
const colPins      = collection(db, "pins");
const colMessages  = collection(db, "messages");
const colPacking   = collection(db, "packing");

/* ---- App state ---- */
const state = {
  user: null,                 // {id,name,admin}
  structure: { festivalName: FESTIVAL_NAME_DEFAULT, districts: [] },
  events: [],                 // [{id,...}]
  users: [],                  // [{id,name,admin}]
  picks: [],                  // [{id,userId,eventId}]
  messages: [],               // [{id,userId,name,text,createdAt}]
  myPacking: { checked:[], mine:[] },
  menuOpen: false,
  locations: [],              // [{id(userId),name,lat,lng,acc,updatedAt}]
  pins: [],                   // [{id,ownerId,ownerName,label,type,lat,lng,shared,updatedAt}]
  view: "browse",
  ready: { events:false, users:false, picks:false, structure:false },
  filters: { day:"all", district:"all", search:"" },
  sharedFriend: "all",
  modal: null
};

/* ---- Helpers ---- */
const uid = () => Math.random().toString(36).slice(2,10);
const esc = s => (s??"").toString().replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const toMin = t => { if(!t) return 0; const [h,m]=t.split(":").map(Number); return h*60+(m||0); };
const dayIdx = d => DAYS.indexOf(d);
function timeRangeMin(ev){ // returns [start, end] in minutes, handling past-midnight
  let s = toMin(ev.start), e = toMin(ev.end);
  if (e <= s) e += 24*60;
  return [s,e];
}
function overlaps(a,b){
  if (a.day !== b.day) return false;
  const [as,ae]=timeRangeMin(a), [bs,be]=timeRangeMin(b);
  return as < be && bs < ae;
}
function fmt12(t){
  if(!t) return "";
  let [h,m]=t.split(":").map(Number);
  const ap = h>=12 ? "pm":"am"; let hh = h%12; if(hh===0) hh=12;
  return m? `${hh}:${String(m).padStart(2,"0")}${ap}` : `${hh}${ap}`;
}
function initials(name){
  return name.trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase() || "?";
}
/* admin feature flags (default ON) and festival-date helpers */
function feat(name){ const f=state.structure.features; return f ? f[name]!==false : true; }
function festivalStart(){ const s=state.structure.festivalStartDate; return s ? new Date(s+"T00:00:00") : null; }
function dateForDay(day){ const base=festivalStart(); if(!base) return null; const d=new Date(base); d.setDate(d.getDate()+Math.max(0,DAYS.indexOf(day))); return d; }
function eventStart(ev){ const d=dateForDay(ev.day); if(!d||!ev.start) return null; const [h,m]=ev.start.split(":").map(Number); const dt=new Date(d); dt.setHours(h,m||0,0,0); return dt; }
function eventEnd(ev){ const s=eventStart(ev); if(!s) return null; if(!ev.end) return new Date(s.getTime()+60*60000); const [h,m]=ev.end.split(":").map(Number); const dt=new Date(s); dt.setHours(h,m||0,0,0); if(dt<=s) dt.setDate(dt.getDate()+1); return dt; }
function nextPickInfo(){
  if(!festivalStart()) return null;
  const ids=myPickIds();
  const items=state.events.filter(e=>ids.has(e.id)).map(e=>({ev:e,s:eventStart(e),e2:eventEnd(e)})).filter(x=>x.s);
  if(!items.length) return null;
  const now=Date.now();
  const onNow=items.filter(x=>x.s.getTime()<=now && x.e2.getTime()>now).sort((a,b)=>a.e2-b.e2)[0];
  if(onNow) return {ev:onNow.ev, status:"now", until:onNow.e2};
  const upcoming=items.filter(x=>x.s.getTime()>now).sort((a,b)=>a.s-b.s)[0];
  if(upcoming) return {ev:upcoming.ev, status:"soon", at:upcoming.s, mins:Math.round((upcoming.s.getTime()-now)/60000)};
  return null;
}
function untilText(mins){
  if(mins<1) return "any moment";
  if(mins<60) return `in ${mins} min`;
  const h=Math.floor(mins/60), m=mins%60;
  if(mins<24*60) return m? `in ${h}h ${m}m` : `in ${h}h`;
  const d=Math.round(mins/1440); return `in ${d} day${d>1?'s':''}`;
}
function next5am(from){ const d=new Date(from); const r=new Date(d); r.setHours(5,0,0,0); if(r<=d) r.setDate(r.getDate()+1); return r.getTime(); }
function toast(msg){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),1700);
}

/* ---- Auth (lightweight, friends-only) ---- */
async function signup(name, passcode, adminCode){
  name = name.trim();
  if(name.length<2) throw new Error("Please enter your name.");
  if(passcode.length<3) throw new Error("Passcode must be at least 3 characters.");
  const existing = await getDocs(query(colUsers, where("nameLower","==",name.toLowerCase())));
  if(!existing.empty) throw new Error("That name is taken — try logging in instead.");
  const isAdmin = adminCode && adminCode === ADMIN_CODE;
  const ref = await addDoc(colUsers, {
    name, nameLower:name.toLowerCase(), passcode, admin:!!isAdmin, createdAt:serverTimestamp()
  });
  localStorage.setItem("fp_uid", ref.id);
  localStorage.setItem("fp_user", JSON.stringify({ id:ref.id, name, admin:!!isAdmin }));
  return { id:ref.id, name, admin:!!isAdmin };
}
async function login(name, passcode){
  name = name.trim();
  const snap = await getDocs(query(colUsers, where("nameLower","==",name.toLowerCase())));
  if(snap.empty) throw new Error("No account with that name.");
  const d = snap.docs[0];
  if(d.data().passcode !== passcode) throw new Error("Wrong passcode.");
  localStorage.setItem("fp_uid", d.id);
  localStorage.setItem("fp_user", JSON.stringify({ id:d.id, name:d.data().name, admin:!!d.data().admin }));
  return { id:d.id, name:d.data().name, admin:!!d.data().admin };
}
function logout(){ localStorage.removeItem("fp_uid"); localStorage.removeItem("fp_user"); location.reload(); }

/* ---- Data writes ---- */
async function saveStructure(s){ await setDoc(refStructure, s); }
async function togglePick(eventId){
  const id = `${state.user.id}__${eventId}`;
  const ref = doc(db,"picks",id);
  const has = state.picks.some(p=>p.id===id);
  if(has) await deleteDoc(ref);
  else await setDoc(ref, { userId:state.user.id, eventId, createdAt:serverTimestamp() });
}
async function saveEvent(ev){
  const data = {
    districtId:ev.districtId, districtName:ev.districtName,
    stageId:ev.stageId, stageName:ev.stageName,
    day:ev.day, start:ev.start, end:ev.end,
    title:ev.title.trim(), notes:(ev.notes||"").trim()
  };
  if(ev.id){
    const prev = state.events.find(e=>e.id===ev.id);
    if(prev && (prev.day!==data.day || prev.start!==data.start || prev.end!==data.end)) data.changedAt = serverTimestamp();
    await updateDoc(doc(db,"events",ev.id), data);
  }
  else await addDoc(colEvents, {...data, createdAt:serverTimestamp()});
}
async function deleteEvent(id){
  await deleteDoc(doc(db,"events",id));
  // clean up picks for this event
  const mine = state.picks.filter(p=>p.eventId===id);
  await Promise.all(mine.map(p=>deleteDoc(doc(db,"picks",p.id))));
}

/* ============================================================
   BOOT
   ============================================================ */
let authMode = "login";
let adminSel = { on:false, ids:new Set() };

// PWA: register the service worker (offline app shell + notifications)
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{ navigator.serviceWorker.register("./sw.js").catch(()=>{}); });
}
// Offline indicator: a slim banner that appears when there's no connection
function setupOfflineBanner(){
  const bar=document.createElement("div"); bar.className="offline-bar"; bar.id="offline-bar";
  bar.innerHTML='<span class="od"></span> Offline — showing the last synced info. Anything you change will sync when you’re back.';
  document.body.appendChild(bar);
  const sync=()=>{ document.body.classList.toggle("is-offline", !navigator.onLine); };
  window.addEventListener("online", ()=>{ sync(); toast("Back online — syncing"); });
  window.addEventListener("offline", ()=>{ sync(); });
  sync();
}
setupOfflineBanner();

// Fire a notification via the SW if possible (survives backgrounding better), else direct.
function pushNotify(title, body, tag){
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.controller){
      navigator.serviceWorker.controller.postMessage({type:"notify", title, body, tag});
      return;
    }
  }catch(e){}
  try{ new Notification(title, {body, icon:"./icon-192.png", tag}); }catch(e){}
}

const savedUid = localStorage.getItem("fp_uid");
subscribeAll();
if(savedUid){ root.innerHTML = loaderHTML(); }
else { renderAuth(); }

function subscribeAll(){
  onSnapshot(refStructure, snap=>{
    if(snap.exists()){
      const d = snap.data();
      state.structure = { ...d, festivalName:d.festivalName||FESTIVAL_NAME_DEFAULT, districts:d.districts||[] };
    }
    state.ready.structure=true; afterData();
  }, ()=>{ state.ready.structure=true; afterData(); });

  onSnapshot(colEvents, snap=>{
    state.events = snap.docs.map(d=>({id:d.id,...d.data()}));
    state.ready.events=true; afterData();
  });
  onSnapshot(colUsers, snap=>{
    state.users = snap.docs.map(d=>({id:d.id,name:d.data().name,admin:!!d.data().admin}));
    state.ready.users=true;
    // refresh current user (admin status / name) from live data
    if(state.user){
      const me = state.users.find(u=>u.id===state.user.id);
      if(me) state.user = {...state.user, name:me.name, admin:me.admin};
    }
    afterData();
  });
  onSnapshot(colPicks, snap=>{
    state.picks = snap.docs.map(d=>({id:d.id,...d.data()}));
    state.ready.picks=true; afterData();
  });
  onSnapshot(colLocations, snap=>{
    state.locations = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(state.user && state.view==="find") renderView();
  });
  onSnapshot(colPins, snap=>{
    state.pins = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(state.user && state.view==="find" && !document.querySelector(".modal-bg")) renderView();
  });
  onSnapshot(colMessages, snap=>{
    state.messages = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>((a.createdAt&&a.createdAt.toMillis?a.createdAt.toMillis():0)-(b.createdAt&&b.createdAt.toMillis?b.createdAt.toMillis():0)));
    if(state.user && state.view==="chat" && !document.querySelector(".modal-bg")) renderView();
  });
}
function subscribeMyPacking(){
  if(!state.user) return;
  onSnapshot(doc(db,"packing",state.user.id), snap=>{
    state.myPacking = snap.exists() ? { checked:snap.data().checked||[], mine:snap.data().mine||[] } : { checked:[], mine:[] };
    if(state.view==="packing" && !document.querySelector(".modal-bg")) renderView();
  });
}

function allReady(){ return Object.values(state.ready).every(Boolean); }
function afterData(){
  const savedUid = localStorage.getItem("fp_uid");
  if(savedUid && !state.user){
    if(!state.ready.users) return;       // wait for users to resolve identity
    const me = state.users.find(u=>u.id===savedUid);
    if(me){ state.user = {...me}; }
    else {
      // Don't log out over a transient/empty sync — fall back to the locally cached profile.
      let cached=null; try{ cached=JSON.parse(localStorage.getItem("fp_user")||"null"); }catch(e){}
      if(cached && cached.id===savedUid){ state.user = {...cached}; }
      else { localStorage.removeItem("fp_uid"); localStorage.removeItem("fp_user"); renderAuth(); return; }
    }
  }
  if(!state.user){ return; }              // auth screen handles its own render
  if(!find.packingSubbed){ find.packingSubbed=true; subscribeMyPacking(); }
  if(!allReady()){ root.innerHTML = loaderHTML(); return; }
  renderApp();
  maybeNotifyChanges(); scheduleNotifications();
}

    ${authMode==='signup' ? `<label class="field"><span>Admin code <span class="tag">(organisers only — leave blank otherwise)</span></span><input id="au-admin" type="password" autocomplete="off" placeholder="optional"></label>`:""}
    <button class="btn primary block" id="au-go">${authMode==='login'?'Log in':'Create account'}</button>
    <p class="note">This is a lightweight login for a friend group — please don't reuse an important password. Anyone with the link can join.</p>
  </div></div>`;

  root.querySelectorAll("[data-am]").forEach(b=>b.onclick=()=>{ authMode=b.dataset.am; renderAuth(); });
  const go = root.querySelector("#au-go");
  const errBox = root.querySelector("#auth-err");
  const showErr = m => errBox.innerHTML = `<div class="err">${esc(m)}</div>`;
  go.onclick = async ()=>{
    const name = root.querySelector("#au-name").value;
    const pass = root.querySelector("#au-pass").value;
    const adm  = authMode==='signup' ? root.querySelector("#au-admin").value : "";
    errBox.innerHTML=""; go.disabled=true; go.textContent="…";
    try{
      const u = authMode==='login' ? await login(name,pass) : await signup(name,pass,adm);
      state.user = u;

function openMenu(){
  const items=[];
  items.push(["browse","Browse the lineup","🎫"]);
  items.push(["mine","My plan","🎟️"]);
  items.push(["shared","The group","👥"]);

  if(feat("info")) items.push(["info","Festival info","ℹ️"]);

  const wrap=document.createElement("div"); wrap.className="modal-bg";
  wrap.innerHTML=`<div class="modal">
    <div class="modal-head"><h2>Menu</h2><button class="btn ghost sm" id="mn-close">Close</button></div>
    <div class="menu-list">
      ${items.map(([v,l,e])=>`<button class="menu-item ${state.view===v?'on':''}" data-go="${v}"><span class="mi-e">${e}</span>${l}</button>`).join("")}

function renderView(){
  if(state.view!=="find" && find.started) stopFindSensors();

/* ---------- shared rendering bits ---------- */
function myPickIds(){ return new Set(state.picks.filter(p=>p.userId===state.user.id).map(p=>p.eventId)); }
function sortEvents(list){
  return [...list].sort((a,b)=> dayIdx(a.day)-dayIdx(b.day) || toMin(a.start)-toMin(b.start) || (a.title||"").localeCompare(b.title||""));
}
function eventCard(ev, {picked, clash, changed}={}){
  const goers = state.picks.filter(p=>p.eventId===ev.id);
  const count = goers.length;
  const c = districtColor(ev.districtId);
  return `
  <div class="ev ${clash?'clash':''}" data-ev="${ev.id}" style="box-shadow:inset 5px 0 0 ${c}">
    <div class="time">
      <div class="t">${esc(fmt12(ev.start))}</div>
      <div class="t2">${ev.end?('→ '+esc(fmt12(ev.end))):''}</div>
    </div>
    <div class="body">
      <h3>${esc(ev.title)}</h3>
      <div class="meta">
        <span class="area-tag" style="--c:${c}">${esc(ev.districtName)}</span>
        <span class="loc">${esc(ev.stageName)}</span>
        ${changed?'<span class="changed-badge">⚠ time changed</span>':''}
      </div>
      ${ev.notes?`<div class="notes">${esc(ev.notes)}</div>`:""}
      ${clash?`<div class="clash-note">⚠ Overlaps with another pick</div>`:""}
      ${count?`<div class="goers">${attendeeChips(goers)}</div>`:""}
    </div>
    <div class="act">
      <button class="pick-btn ${picked?'on':''}" data-pick="${ev.id}" aria-label="add to my plan">
        <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
      </button>
    </div>
  </div>`;
}
function attendeeChips(goers){
  const names = goers.map(g=>{
    const u = state.users.find(x=>x.id===g.userId);
    return { id:g.userId, name:u?u.name:"?" };
  });
  return names.map(n=>`<span class="goer ${n.id===state.user.id?'me':''}">${esc(n.name)}</span>`).join("");
}
function groupByDay(list){
  const m = {}; DAYS.forEach(d=>m[d]=[]);
  list.forEach(e=>{ if(!m[e.day]) m[e.day]=[]; m[e.day].push(e); });
  return m;
}

/* ---------- BROWSE ---------- */
function viewBrowse(){
  const f = state.filters;
  const picks = myPickIds();
  let list = state.events.slice();
  if(f.day!=="all") list = list.filter(e=>e.day===f.day);
  if(f.district!=="all") list = list.filter(e=>e.districtId===f.district);
  if(f.search) list = list.filter(e=>(e.title||"").toLowerCase().includes(f.search.toLowerCase()) || (e.districtName||"").toLowerCase().includes(f.search.toLowerCase()) || (e.stageName||"").toLowerCase().includes(f.search.toLowerCase()));
  list = sortEvents(list);

  const dayChips = ["all",...DAYS].map(d=>`<button class="chip ${f.day===d?'on':''}" data-fday="${d}">${d==="all"?"All days":d.slice(0,3)}</button>`).join("");
  const distChips = ["all",...state.structure.districts.map(d=>d.id)].map(id=>{
    const d = state.structure.districts.find(x=>x.id===id);
    const dot = id==="all" ? "" : `<span class="cdot" style="background:${districtColor(id)}"></span>`;
    return `<button class="chip ${f.district===id?'on':''}" data-fdist="${id}">${dot}${id==="all"?"All areas":esc(d?d.name:"")}</button>`;
  }).join("");

  let body;
  if(state.events.length===0){
    body = emptyState("🎪","No events yet", state.user.admin? "Head to Manage to add your districts, stages and the lineup." : "The organiser hasn't added the lineup yet — check back soon.");
  } else if(list.length===0){
    body = emptyState("🔍","Nothing matches","Try clearing a filter or your search.");
  } else {
    const g = groupByDay(list);
    body = DAYS.filter(d=>g[d] && g[d].length).map(d=>`
      <div class="day-label">${d}</div>
      ${g[d].map(e=>eventCard(e,{picked:picks.has(e.id)})).join("")}
    `).join("");
  }

  return `
    <div class="sec-head"><div><h2>Browse the lineup</h2><div class="lead">Tap the ✓ to add an act to your plan.</div></div></div>
    <input class="search" id="search" placeholder="Search acts, stages, areas…" value="${esc(f.search)}">
    <div class="filters">${dayChips}</div>
    <div class="filters">${distChips}</div>
    ${body}
  `;
}

/* ---------- MY PLAN ---------- */
function viewMine(){
  const ids = myPickIds();
  let list = sortEvents(state.events.filter(e=>ids.has(e.id)));
  // clash detection
  const clashSet = new Set();
  for(let i=0;i<list.length;i++) for(let j=i+1;j<list.length;j++){
    if(overlaps(list[i],list[j])){ clashSet.add(list[i].id); clashSet.add(list[j].id); }
  }
  const daysActive = new Set(list.map(e=>e.day)).size;

  if(list.length===0){
    return `
      <div class="sec-head"><div><h2>My plan</h2><div class="lead">Your personal weekend schedule.</div></div></div>
      ${emptyState("🎟️","Nothing picked yet","Go to Browse and tap the ✓ on acts you want to catch.")}`;
  }
  const g = groupByDay(list);
  let nextCard="";
  if(feat("nextAct") && festivalStart()){
    const np=nextPickInfo();
    if(np){
      const hasLoc = locationEnabled() && stagesWithCoords().some(s=>s.name===np.ev.stageName);
      const when = np.status==="now" ? `On now · until ${esc(fmt12(toHM(np.until)))}` : `${untilText(np.mins)} · ${esc(fmt12(np.ev.start))}`;
      nextCard=`<div class="next-card ${np.status==='now'?'live':''}">
        <div class="nc-tag">${np.status==="now"?"Happening now":"Up next"}</div>
        <div class="nc-name">${esc(np.ev.title)}</div>
        <div class="nc-meta"><span class="area-tag" style="--c:${districtColor(np.ev.districtId)}">${esc(np.ev.districtName)}</span> ${esc(np.ev.stageName)} · ${when}</div>
        ${hasLoc?`<button class="btn lime sm" data-goto-stage="${esc(np.ev.stageName)}" style="margin-top:10px">Point me there →</button>`:""}
      </div>`;
    }
  }
  return `
    <div class="sec-head"><div><h2>My plan</h2><div class="lead">${list.length} pick${list.length>1?'s':''}${clashSet.size?` · ⚠ ${clashSet.size/2|0} clash${clashSet.size>2?'es':''}`:''}</div></div>
      <button class="btn ghost sm no-print" id="print-plan" style="flex:none">Print</button></div>
    ${nextCard}
    <div class="stat-row">
      <div class="stat"><div class="n">${list.length}</div><div class="l">Picks</div></div>
      <div class="stat"><div class="n">${daysActive}</div><div class="l">Days out</div></div>
      <div class="stat"><div class="n">${clashSet.size/2|0}</div><div class="l">Clashes</div></div>
    </div>
    ${DAYS.filter(d=>g[d]&&g[d].length).map(d=>`
      <div class="day-label">${d}</div>
      ${g[d].map(e=>eventCard(e,{picked:true,clash:clashSet.has(e.id),changed:eventChanged(e)})).join("")}
    `).join("")}
  `;
}
function toHM(date){ return String(date.getHours()).padStart(2,"0")+":"+String(date.getMinutes()).padStart(2,"0"); }

/* ---------- GROUP / SHARED ---------- */
function viewShared(){
  const friend = state.sharedFriend;
  const friendChips = ["all",...state.users.map(u=>u.id)].map(id=>{
    const u = state.users.find(x=>x.id===id);
    const label = id==="all" ? "Everyone" : (u? (u.id===state.user.id?`${u.name} (you)`:u.name) : "");
    return `<button class="chip ${friend===id?'on':''}" data-friend="${id}">${esc(label)}</button>`;
  }).join("");

  let list, lead, body;
  if(friend==="all"){
    // events with at least one pick, sorted, showing all attendees
    const pickedEventIds = new Set(state.picks.map(p=>p.eventId));
    list = sortEvents(state.events.filter(e=>pickedEventIds.has(e.id)));
    lead = "Everything anyone in the group has picked.";
    if(list.length===0){
      body = emptyState("👥","No group picks yet","Once people start choosing acts, the shared schedule fills up here.");
    } else {
      const g = groupByDay(list);
      body = DAYS.filter(d=>g[d]&&g[d].length).map(d=>`
        <div class="day-label">${d}</div>
        ${g[d].map(e=>sharedCard(e)).join("")}
      `).join("");
    }
  } else {
    const fids = new Set(state.picks.filter(p=>p.userId===friend).map(p=>p.eventId));
    list = sortEvents(state.events.filter(e=>fids.has(e.id)));
    const fu = state.users.find(u=>u.id===friend);
    lead = `${fu?esc(fu.name):"This person"}'s schedule.`;
    // clash detection for that friend
    const clashSet=new Set();
    for(let i=0;i<list.length;i++)for(let j=i+1;j<list.length;j++) if(overlaps(list[i],list[j])){clashSet.add(list[i].id);clashSet.add(list[j].id);}
    if(list.length===0){
      body = emptyState("🤷","No picks yet",`${fu?esc(fu.name):"They"} hasn't chosen anything yet.`);
    }else{
      const g=groupByDay(list);
      body = DAYS.filter(d=>g[d]&&g[d].length).map(d=>`
        <div class="day-label">${d}</div>
        ${g[d].map(e=>eventCard(e,{picked:myPickIds().has(e.id),clash:clashSet.has(e.id)})).join("")}
      `).join("");
    }
  }

  return `
    <div class="sec-head"><div><h2>The group</h2><div class="lead">${lead}</div></div></div>
    <div class="filters">${friendChips}</div>
    ${friend==="all"?freeTimeCard():""}
    ${body}
  `;
}
function sharedCard(ev){
  const goers = state.picks.filter(p=>p.eventId===ev.id);

  <div class="ev" data-ev="${ev.id}" style="box-shadow:inset 5px 0 0 ${c}">
    <div class="time"><div class="t">${esc(fmt12(ev.start))}</div><div class="t2">${ev.end?('→ '+esc(fmt12(ev.end))):''}</div></div>
    <div class="body">
      <h3>${esc(ev.title)} <span class="count-badge">· ${goers.length} going</span></h3>
      <div class="meta"><span class="area-tag" style="--c:${c}">${esc(ev.districtName)}</span><span class="loc">${esc(ev.stageName)}</span></div>
      <div class="goers">${attendeeChips(goers)}</div>

      <div class="share-row" style="border:none;padding:0;margin:0;background:none">
        <div style="min-width:0">
          <b>Location features</b>
          <div class="find-note">${locationEnabled()?"On — the Find map, stage pins and live sharing are available to everyone.":"Off — the Find tab is hidden for everyone and all live sharing is stopped."}</div>
        </div>
        <button class="switch ${locationEnabled()?'on':''}" id="loc-toggle" role="switch" aria-checked="${locationEnabled()}"><span></span></button>
      </div>
    </div>

    ${locationEnabled()?`<div class="card admin-block">
      <div style="font-family:Anton;font-size:15px;text-transform:uppercase;letter-spacing:.03em;margin-bottom:12px">Map extras</div>
      <label class="field"><span>Festival start date <span class="tag">(the Wednesday — powers the “up next” prompt)</span></span>
        <div class="row" style="gap:8px"><input id="fest-date" type="date" value="${esc(s.festivalStartDate||"")}"><button class="btn primary" id="save-date" style="flex:none">Save</button></div>
      </label>
      ${[["nextAct","“Up next” prompt","Shows your next pick &amp; a “point me there” button"],
         ["rally","Rally / meet-up point","One shared beacon anyone can drop; clears itself at 5am"],
         ["pinNotes","Notes on pins","Lets people add a note like “row F, blue flag”"],
         ["lost","“I’m lost” button","Big SOS that flags someone on everyone’s map"],
         ["autoStop","Auto-stop sharing","Stops a person’s live sharing after a set time"]].map(([k,t,d])=>`
        <div class="share-row" style="border:none;padding:8px 0;margin:0;background:none;border-top:1px solid var(--line)">
          <div style="min-width:0"><b style="font-size:13.5px">${t}</b><div class="find-note">${d}</div></div>
          <button class="switch ${feat(k)?'on':''}" data-feat="${k}" role="switch" aria-checked="${feat(k)}"><span></span></button>
        </div>`).join("")}
      ${feat("autoStop")?`<label class="field" style="margin:12px 0 0"><span>Auto-stop sharing after (hours)</span>
        <div class="row" style="gap:8px"><input id="autostop-hrs" type="number" min="1" max="24" value="${esc(String(s.autoStopHours||4))}"><button class="btn primary" id="save-autostop" style="flex:none">Save</button></div></label>`:""}
    </div>`:""}

    <div class="card admin-block">
      <div style="font-family:Anton;font-size:15px;text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px">App features</div>
      ${[["chat","Group chat","Shared message board for the crew"],
         ["info","Festival info board","Post essentials: links, water, medical, emergency"],
         ["packing","Packing list","Shared checklist everyone ticks off"],
         ["overlaps","Free-time finder","Suggests gaps to meet up / eat in the Group tab"],
         ["alerts","Set-time change alerts","Flags picks on people’s plans when a time changes"],
         ["notify","Reminders / notifications","Lets people opt in to “starting soon” nudges"]].map(([k,t,d])=>`
        <div class="share-row" style="border:none;padding:8px 0;margin:0;background:none;border-top:1px solid var(--line)">
          <div style="min-width:0"><b style="font-size:13.5px">${t}</b><div class="find-note">${d}</div></div>
          <button class="switch ${feat(k)?'on':''}" data-feat="${k}" role="switch" aria-checked="${feat(k)}"><span></span></button>
        </div>`).join("")}
    </div>

    <div class="sec-head" style="margin-top:24px"><div><h2 style="font-size:18px">Districts &amp; stages</h2></div></div>
    ${districtsHTML}
    <div class="card admin-block" style="margin-top:4px">
      <label class="field" style="margin:0"><span>Add a district</span>
        <div class="row" style="gap:8px">
          <input id="new-dist" placeholder="e.g. Main Field">
          <button class="btn lime" id="add-dist" style="flex:none">Add</button>
        </div>
      </label>
    </div>

    <div class="sec-head" style="margin-top:24px">
      <div><h2 style="font-size:18px">Lineup</h2><div class="lead">${state.events.length} event${state.events.length!==1?'s':''}${adminSel.on?` · ${adminSel.ids.size} selected`:''}</div></div>
      <div style="display:flex;gap:8px;flex:none">
        ${state.events.length?`<button class="btn ghost sm" id="sel-toggle">${adminSel.on?'Done':'Select'}</button>`:''}
        <button class="btn lime sm" id="bulk-event" ${s.districts.length?'':'disabled'}>Bulk add</button>
        <button class="btn primary sm" id="add-event" ${s.districts.length?'':'disabled'}>+ Add</button>
      </div>
    </div>
    ${adminSel.on?`<div class="sel-bar">
      <button class="btn ghost sm" id="sel-all">${adminSel.ids.size===state.events.length?'Deselect all':'Select all'}</button>
      <button class="btn danger sm" id="sel-del" ${adminSel.ids.size?'':'disabled'}>Delete ${adminSel.ids.size||''} selected</button>
    </div>`:""}
    ${s.districts.length? "" : `<div class="config-warn">Add at least one district and stage before creating events.</div>`}
    ${adminEventList()}
  `;
}
function adminEventList(){
  const list = sortEvents(state.events);
  if(!list.length) return state.structure.districts.length? emptyState("🎵","No events yet","Tap “Add event” to start building the lineup.") : "";
  const g = groupByDay(list);
  const sel = adminSel.on;
  return DAYS.filter(d=>g[d]&&g[d].length).map(d=>{
    const dayIds=g[d].map(e=>e.id);
    const allSel=sel && dayIds.every(id=>adminSel.ids.has(id));
    return `
    <div class="day-label">${d}${sel?`<button class="day-sel ${allSel?'on':''}" data-selday="${d}">${allSel?'✓ day':'select day'}</button>`:''}</div>
    ${g[d].map(e=>{
      const checked=adminSel.ids.has(e.id);
      return `<div class="ev ${sel&&checked?'rowsel':''}" data-ev="${e.id}" style="box-shadow:inset 5px 0 0 ${districtColor(e.districtId)}">
        ${sel?`<button class="ev-check ${checked?'on':''}" data-selev="${e.id}" aria-label="select">${checked?'✓':''}</button>`:''}
        <div class="time"><div class="t">${esc(fmt12(e.start))}</div><div class="t2">${e.end?('→ '+esc(fmt12(e.end))):''}</div></div>
        <div class="body">
          <h3>${esc(e.title)}</h3>
          <div class="meta"><span class="area-tag" style="--c:${districtColor(e.districtId)}">${esc(e.districtName)}</span><span class="loc">${esc(e.stageName)}</span></div>
        </div>
        ${sel?'':`<div class="act" style="flex-direction:column;gap:6px">
          <button class="btn ghost sm" data-edit-ev="${e.id}">Edit</button>
          <button class="btn danger sm" data-del-ev="${e.id}">Del</button>
        </div>`}
      </div>`;
    }).join("")}
  `;}).join("");
}

/* ---------- empty state ---------- */
function emptyState(big,title,text){
  return `<div class="empty"><div class="big">${big}</div><h3>${esc(title)}</h3><div>${esc(text)}</div></div>`;
}

/* ============================================================
   WIRING (event delegation per view)
   ============================================================ */
function wireView(){
  const v = document.getElementById("view");
  if(!v) return;

  // pick toggles (browse / mine / shared)
  v.querySelectorAll("[data-pick]").forEach(b=>b.onclick=async()=>{
    b.classList.toggle("on");
    try{ await togglePick(b.dataset.pick); }catch(e){ toast("Couldn't save — try again"); }
  });
  v.querySelectorAll("[data-goto-stage]").forEach(b=>b.onclick=()=>{
    const s=stagesWithCoords().find(x=>x.name===b.dataset.gotoStage);
    if(s) find.target="st:"+s.id;
    find.enabledOnce=true; state.view="find"; renderApp();
  });

  // ---- browse filters ----
  const search = v.querySelector("#search");
  if(search) search.oninput = e=>{ state.filters.search=e.target.value; const pos=e.target.selectionStart; renderView(); const s2=document.querySelector("#search"); if(s2){s2.focus(); s2.setSelectionRange(pos,pos);} };
  v.querySelectorAll("[data-fday]").forEach(b=>b.onclick=()=>{ state.filters.day=b.dataset.fday; renderView(); });
  v.querySelectorAll("[data-fdist]").forEach(b=>b.onclick=()=>{ state.filters.district=b.dataset.fdist; renderView(); });

  // ---- shared friend selector ----
  v.querySelectorAll("[data-friend]").forEach(b=>b.onclick=()=>{ state.sharedFriend=b.dataset.friend; renderView(); });

  // ---- find / compass ----
  if(state.view==="find"){
    const en=v.querySelector("#find-enable-btn"); if(en) en.onclick=()=>{ find.enabledOnce=true; enableFind(); };
    if(find.enabledOnce && !find.started && !find.error && locationEnabled()) startFindSensors();
    v.querySelectorAll("[data-leg]").forEach(b=>b.onclick=()=>{ find.show[b.dataset.leg]=!find.show[b.dataset.leg]; find.target=null; renderView(); });
    const shareTog=v.querySelector("#share-toggle"); if(shareTog) shareTog.onclick=()=>{ if(find.share) stopShare(); else startShare(); renderApp(); };
    const pinsBtn=v.querySelector("#pins-btn"); if(pinsBtn) pinsBtn.onclick=()=>{ state.modal={type:"pins"}; renderModal(); };
    const rallyBtn=v.querySelector("#rally-btn"); if(rallyBtn) rallyBtn.onclick=async()=>{ if(getRally()){ find.target="rl:rally"; renderView(); } else { await setRallyHere(); renderView(); } };
    const rallyMove=v.querySelector("#rally-move"); if(rallyMove) rallyMove.onclick=async()=>{ await setRallyHere(); renderView(); };
    const rallyClear=v.querySelector("#rally-clear"); if(rallyClear) rallyClear.onclick=async()=>{ await clearRally(); find.target=null; renderView(); };
    const lostBtn=v.querySelector("#lost-btn"); if(lostBtn) lostBtn.onclick=()=>{
      if(find.lost){ find.lost=false; writeMyLocation(); toast("Marked safe"); }
      else { if(!find.share) startShare(); find.lost=true; writeMyLocation(); toast("Marked lost — your group can find you"); }
      renderApp();
    };
    v.querySelectorAll("[data-target]").forEach(b=>b.onclick=()=>{ find.target=b.dataset.target; renderView(); });
    v.querySelectorAll("[data-fmode]").forEach(b=>b.onclick=()=>{ find.headingMode=b.dataset.fmode; renderView(); });
    if(find.started && find.pos) updateFindDynamic();
  }

  // ---- my plan: print + mark changes seen ----
  const printBtn=v.querySelector("#print-plan"); if(printBtn) printBtn.onclick=()=>window.print();
  if(state.view==="mine") setTimeout(markChangesSeen, 4000);

  // ---- chat ----
  if(state.view==="chat"){
    const sc=v.querySelector("#chat-scroll"); if(sc) sc.scrollTop=sc.scrollHeight;
    const send=v.querySelector("#chat-send"), txt=v.querySelector("#chat-text");
    const doSend=async()=>{ const t=txt.value; if(!t.trim())return; txt.value=""; try{ await sendMessage(t); }catch(e){ toast("Couldn’t send — check connection"); } };
    if(send) send.onclick=doSend;
    if(txt) txt.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); doSend(); } });
  }

  // ---- info ----
  const infoAdd=v.querySelector("#info-add"); if(infoAdd) infoAdd.onclick=()=>{ state.modal={type:"info",data:null}; renderInfoModal(); };
  v.querySelectorAll("[data-edit-info]").forEach(b=>b.onclick=()=>{ const it=(state.structure.infoItems||[]).find(x=>x.id===b.dataset.editInfo); state.modal={type:"info",data:it}; renderInfoModal(); });
  v.querySelectorAll("[data-del-info]").forEach(b=>b.onclick=async()=>{ if(confirm("Delete this info?")){ await deleteInfoItem(b.dataset.delInfo); toast("Deleted"); } });

  // ---- packing ----
  v.querySelectorAll("[data-pack]").forEach(b=>b.onclick=()=>togglePack(b.dataset.pack));
  v.querySelectorAll("[data-delmine]").forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); removeMyPack(b.dataset.delmine); });
  const packAdd=v.querySelector("#pack-add"); if(packAdd) packAdd.onclick=()=>{ const inp=v.querySelector("#pack-add-input"); addMyPack(inp.value); };
  const packAddInp=v.querySelector("#pack-add-input"); if(packAddInp) packAddInp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ addMyPack(e.target.value); } });
  const packShared=v.querySelector("#pack-shared"); if(packShared) packShared.onclick=()=>{ state.modal={type:"packlist"}; renderPackListModal(); };

  // ---- admin ----
  const saveName = v.querySelector("#save-name");
  if(saveName) saveName.onclick = async()=>{
    const name = v.querySelector("#fest-name").value.trim() || FESTIVAL_NAME_DEFAULT;
    await saveStructure({...state.structure, festivalName:name}); toast("Saved");
  };
  const locTog = v.querySelector("#loc-toggle");
  if(locTog) locTog.onclick = async()=>{
    const next = !locationEnabled();
    if(!next && find.share) stopShare();
    await saveStructure({...state.structure, locationEnabled:next});
    toast(next?"Location features on":"Location features off");
  };
  const saveDate = v.querySelector("#save-date");
  if(saveDate) saveDate.onclick = async()=>{ await saveStructure({...state.structure, festivalStartDate:v.querySelector("#fest-date").value||""}); toast("Saved"); };
  const saveAuto = v.querySelector("#save-autostop");
  if(saveAuto) saveAuto.onclick = async()=>{ const h=Math.min(24,Math.max(1,+v.querySelector("#autostop-hrs").value||4)); await saveStructure({...state.structure, autoStopHours:h}); toast("Saved"); };
  v.querySelectorAll("[data-feat]").forEach(b=>b.onclick=async()=>{
    const k=b.dataset.feat; const features={...(state.structure.features||{})}; features[k]=!feat(k);
    await saveStructure({...state.structure, features});
  });
  const addDist = v.querySelector("#add-dist");
  if(addDist) addDist.onclick = async()=>{
    const inp = v.querySelector("#new-dist"); const name=inp.value.trim();
    if(!name) return;
    const districts=[...state.structure.districts, {id:uid(),name,stages:[],color:nextAreaColor()}];
    await saveStructure({...state.structure,districts}); inp.value="";
  };
  v.querySelectorAll("[data-setcolor]").forEach(b=>b.onclick=async()=>{
    const [did,color]=b.dataset.setcolor.split(":");
    const districts=state.structure.districts.map(x=>x.id===did?{...x,color}:x);
    await saveStructure({...state.structure,districts});
  });
  v.querySelectorAll("[data-del-d]").forEach(b=>b.onclick=async()=>{
    const id=b.dataset.delD;
    const d = state.structure.districts.find(x=>x.id===id);
    const used = state.events.some(e=>e.districtId===id);
    if(used){ if(!confirm(`"${d.name}" has events scheduled. Delete the district anyway? (Events stay but lose their area link.)`)) return; }
    else if(!confirm(`Delete district "${d.name}"?`)) return;
    const districts=state.structure.districts.filter(x=>x.id!==id);
    await saveStructure({...state.structure,districts});
  });
  v.querySelectorAll("[data-rename-d]").forEach(b=>b.onclick=async()=>{
    const id=b.dataset.renameD; const d=state.structure.districts.find(x=>x.id===id);
    const name=prompt("Rename district:",d.name); if(!name||!name.trim()) return;
    const districts=state.structure.districts.map(x=>x.id===id?{...x,name:name.trim()}:x);
    await saveStructure({...state.structure,districts});
  });
  v.querySelectorAll("[data-add-s]").forEach(b=>b.onclick=async()=>{
    const did=b.dataset.addS; const inp=v.querySelector(`[data-stage-input="${did}"]`);
    const name=inp.value.trim(); if(!name) return;
    const districts=state.structure.districts.map(d=>d.id===did?{...d,stages:[...(d.stages||[]),{id:uid(),name}]}:d);
    await saveStructure({...state.structure,districts}); inp.value="";
  });
  v.querySelectorAll("[data-loc-s]").forEach(b=>b.onclick=()=>{
    const [did,sid]=b.dataset.locS.split(":");
    const dist=state.structure.districts.find(x=>x.id===did);
    const st=dist&&(dist.stages||[]).find(x=>x.id===sid);
    if(!st) return;
    const saveCoords=async(lat,lng)=>{
      const districts=state.structure.districts.map(d=>d.id!==did?d:{...d,stages:d.stages.map(s=>s.id!==sid?s:{...s,lat,lng})});
      await saveStructure({...state.structure,districts}); toast(`Pinned ${st.name}`);
    };
    const manual=()=>{
      const v2=prompt(`Enter coordinates for "${st.name}" as: latitude, longitude`, (typeof st.lat==="number")?`${st.lat}, ${st.lng}`:"");
      if(!v2) return;
      const m=v2.split(/[, ]+/).map(x=>parseFloat(x)).filter(n=>!isNaN(n));
      if(m.length!==2||Math.abs(m[0])>90||Math.abs(m[1])>180){ toast("Couldn't read those coordinates"); return; }
      saveCoords(m[0],m[1]);
    };
    if(!navigator.geolocation){ manual(); return; }
    const orig=b.textContent; b.textContent="Locating…"; b.disabled=true;
    navigator.geolocation.getCurrentPosition(
      pos=>{ b.textContent=orig; b.disabled=false; saveCoords(+pos.coords.latitude.toFixed(6),+pos.coords.longitude.toFixed(6)); },
      err=>{ b.textContent=orig; b.disabled=false; toast(err.code===1?"Location blocked — enter manually":"No GPS fix — enter manually"); manual(); },
      {enableHighAccuracy:true,timeout:12000,maximumAge:0}
    );
  });
  v.querySelectorAll("[data-clearloc-s]").forEach(b=>b.onclick=async()=>{
    const [did,sid]=b.dataset.clearlocS.split(":");
    const districts=state.structure.districts.map(d=>d.id!==did?d:{...d,stages:d.stages.map(s=>{ if(s.id!==sid) return s; const {lat,lng,...rest}=s; return rest; })});
    await saveStructure({...state.structure,districts}); toast("Location cleared");
  });
  v.querySelectorAll("[data-del-s]").forEach(b=>b.onclick=async()=>{
    const [did,sid]=b.dataset.delS.split(":");
    const districts=state.structure.districts.map(d=>d.id===did?{...d,stages:(d.stages||[]).filter(s=>s.id!==sid)}:d);
    await saveStructure({...state.structure,districts});
  });
  const addEv = v.querySelector("#add-event");
  if(addEv) addEv.onclick = ()=>{ state.modal={type:"event",data:null}; renderModal(); };
  const bulkEv = v.querySelector("#bulk-event");
  if(bulkEv) bulkEv.onclick = ()=>{ openBulk(); };
  v.querySelectorAll("[data-edit-ev]").forEach(b=>b.onclick=()=>{ const ev=state.events.find(e=>e.id===b.dataset.editEv); state.modal={type:"event",data:ev}; renderModal(); });
  v.querySelectorAll("[data-del-ev]").forEach(b=>b.onclick=async()=>{
    const ev=state.events.find(e=>e.id===b.dataset.delEv);
    if(confirm(`Delete "${ev.title}"? This removes it from everyone's plans.`)) { await deleteEvent(ev.id); toast("Deleted"); }
  });
  // ---- bulk delete (select mode) ----
  const selTog=v.querySelector("#sel-toggle");
  if(selTog) selTog.onclick=()=>{ adminSel.on=!adminSel.on; adminSel.ids.clear(); renderView(); };
  v.querySelectorAll("[data-selev]").forEach(b=>b.onclick=()=>{ const id=b.dataset.selev; adminSel.ids.has(id)?adminSel.ids.delete(id):adminSel.ids.add(id); renderView(); });
  v.querySelectorAll("[data-selday]").forEach(b=>b.onclick=()=>{
    const day=b.dataset.selday; const ids=state.events.filter(e=>e.day===day).map(e=>e.id);
    const allSel=ids.every(id=>adminSel.ids.has(id));
    ids.forEach(id=> allSel ? adminSel.ids.delete(id) : adminSel.ids.add(id));
    renderView();
  });
  const selAll=v.querySelector("#sel-all");
  if(selAll) selAll.onclick=()=>{ if(adminSel.ids.size===state.events.length) adminSel.ids.clear(); else state.events.forEach(e=>adminSel.ids.add(e.id)); renderView(); };
  const selDel=v.querySelector("#sel-del");
  if(selDel) selDel.onclick=async()=>{
    const ids=[...adminSel.ids]; if(!ids.length) return;
    if(!confirm(`Delete ${ids.length} event${ids.length>1?'s':''}? This removes them from everyone's plans and can't be undone.`)) return;
    selDel.disabled=true; selDel.textContent="Deleting…";
    try{
      for(let i=0;i<ids.length;i+=20){ await Promise.all(ids.slice(i,i+20).map(id=>deleteEvent(id))); }
      adminSel.ids.clear(); adminSel.on=false; toast(`Deleted ${ids.length} event${ids.length>1?'s':''}`); renderView();
    }catch(e){ selDel.disabled=false; selDel.textContent="Delete selected"; toast("Some didn't delete — try again"); }
  };
}

/* ============================================================
   EVENT MODAL (admin add / edit)
   ============================================================ */
function renderModal(){
  if(!state.modal) return;
  const existing = document.querySelector(".modal-bg");
  if(existing) existing.remove();
  if(state.modal.type==="bulk"){ renderBulkModal(); return; }
  if(state.modal.type==="pins"){ renderPinsModal(); return; }
  if(state.modal.type==="pin"){ renderPinModal(); return; }
  if(state.modal.type==="info"){ renderInfoModal(); return; }
  if(state.modal.type==="packlist"){ renderPackListModal(); return; }
  if(state.modal.type!=="event") return;

  const ev = state.modal.data || {};
  const districts = state.structure.districts;
  const selDist = ev.districtId || (districts[0]&&districts[0].id) || "";
  const distObj = districts.find(d=>d.id===selDist);
  const stages = distObj? (distObj.stages||[]) : [];
  const selStage = ev.stageId || (stages[0]&&stages[0].id) || "";

  const wrap=document.createElement("div"); wrap.className="modal-bg";
  wrap.innerHTML=`
    <div class="modal">
      <div class="modal-head">
        <h2>${ev.id?"Edit event":"Add event"}</h2>
        <button class="btn ghost sm" id="m-close">Close</button>
      </div>
      <div id="m-err"></div>
      <label class="field"><span>Title</span><input id="m-title" value="${esc(ev.title||"")}" placeholder="e.g. Sunset DJ set"></label>
      <div class="row">
        <label class="field"><span>District</span>
          <select id="m-dist">${districts.map(d=>`<option value="${d.id}" ${d.id===selDist?'selected':''}>${esc(d.name)}</option>`).join("")}</select>
        </label>
        <label class="field"><span>Stage</span>
          <select id="m-stage">${stages.map(s=>`<option value="${s.id}" ${s.id===selStage?'selected':''}>${esc(s.name)}</option>`).join("") || `<option value="">— add a stage first —</option>`}</select>
        </label>
      </div>
      <label class="field"><span>Day</span>
        <select id="m-day">${DAYS.map(d=>`<option ${ev.day===d?'selected':''}>${d}</option>`).join("")}</select>
      </label>
      <div class="row">
        <label class="field"><span>Start</span><input id="m-start" type="time" value="${esc(ev.start||"")}"></label>
        <label class="field"><span>End</span><input id="m-end" type="time" value="${esc(ev.end||"")}"></label>
      </div>
      <label class="field"><span>Notes <span class="tag">(optional)</span></span><textarea id="m-notes" rows="2" placeholder="anything worth remembering">${esc(ev.notes||"")}</textarea></label>
      <button class="btn primary block" id="m-save">${ev.id?"Save changes":"Add to lineup"}</button>
    </div>`;
  document.body.appendChild(wrap);

  const close=()=>{ state.modal=null; wrap.remove(); };
  wrap.querySelector("#m-close").onclick=close;
  wrap.onclick=e=>{ if(e.target===wrap) close(); };

  const distSel=wrap.querySelector("#m-dist");
  const stageSel=wrap.querySelector("#m-stage");
  distSel.onchange=()=>{
    const d=districts.find(x=>x.id===distSel.value); const sts=d?(d.stages||[]):[];
    stageSel.innerHTML = sts.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join("") || `<option value="">— add a stage first —</option>`;
  };

  const errBox=wrap.querySelector("#m-err");
  wrap.querySelector("#m-save").onclick=async()=>{
    const title=wrap.querySelector("#m-title").value.trim();

/* flexible time parser -> "HH:MM" or null */
function parseTime(raw){
  if(!raw) return null;
  let s = raw.trim().toLowerCase().replace(/\s+/g,"");
  let m = s.match(/^(\d{1,2})(?:[:.](\d{2}))?(am|pm)$/);
  if(m){ let h=+m[1]%12; if(m[3]==="pm") h+=12; const mm=m[2]?+m[2]:0; if(h>23||mm>59) return null; return pad2(h)+":"+pad2(mm); }
  m = s.match(/^(\d{1,2})[:.](\d{2})$/);
  if(m){ const h=+m[1],mm=+m[2]; if(h>23||mm>59) return null; return pad2(h)+":"+pad2(mm); }
  m = s.match(/^(\d{3,4})$/);            // 1800, 930
  if(m){ const n=m[1].padStart(4,"0"); const h=+n.slice(0,2),mm=+n.slice(2); if(h>23||mm>59) return null; return pad2(h)+":"+pad2(mm); }
  m = s.match(/^(\d{1,2})$/);            // bare hour "19"
  if(m){ const h=+m[1]; if(h>23) return null; return pad2(h)+":00"; }
  return null;
}
const pad2 = n => String(n).padStart(2,"0");
const splitFields = line => line.split(/\t|\|/).map(x=>x.trim());
function matchDay(s){ if(!s) return null; const l=s.trim().toLowerCase(); return DAYS.find(d=>d.toLowerCase()===l || d.toLowerCase().startsWith(l)) || null; }
function findDistrict(name){ const l=(name||"").trim().toLowerCase(); return state.structure.districts.find(d=>d.name.toLowerCase()===l) || null; }
function findStage(dist,name){ if(!dist) return null; const l=(name||"").trim().toLowerCase(); return (dist.stages||[]).find(s=>s.name.toLowerCase()===l) || null; }

/* parse the textarea into preview rows */
function parseBulk(){
  const rows = [];
  const lines = bulk.text.split(/\r?\n/);
  for(let i=0;i<lines.length;i++){
    const line = lines[i];
    if(!line.trim() || line.trim().startsWith("#")) continue;
    const f = splitFields(line);
    let r = { raw:line, ok:false, err:"", isNew:false };

    if(bulk.mode==="same"){
      // [start, title] or [start, end, title]
      let start,end,title;
      if(f.length>=3){ start=f[0]; end=f[1]; title=f.slice(2).join(" | "); }
      else if(f.length===2){ start=f[0]; end=""; title=f[1]; }
      else { r.err="Need: Start | Title"; rows.push(r); continue; }
      const dist = state.structure.districts.find(d=>d.id===bulk.districtId);
      const stage = dist && (dist.stages||[]).find(s=>s.id===bulk.stageId);
      r.day=bulk.day; r.title=title;
      r.districtName = dist?dist.name:""; r.stageName = stage?stage.name:"";
      r.districtId=bulk.districtId; r.stageId=bulk.stageId;
      r.start=parseTime(start); r.end=end?parseTime(end):"";
      if(!dist||!stage){ r.err="Pick a district & stage above"; }
      else if(!title){ r.err="Missing title"; }
      else if(!r.start){ r.err="Bad start time"; }
      else if(end && !r.end){ r.err="Bad end time"; }
      else r.ok=true;
    } else {
      // mixed: Day | District | Stage | Title | Start [| End]
      if(f.length<5){ r.err="Need: Day | District | Stage | Title | Start"; rows.push(r); continue; }
      const day=matchDay(f[0]);
      const distName=f[1], stageName=f[2], title=f[3], start=f[4];
      const end=f[5]||"";
      r.day=day; r.districtName=distName; r.stageName=stageName; r.title=title;
      r.start=parseTime(start); r.end=end?parseTime(end):"";
      const dist=findDistrict(distName);
      const stage=dist?findStage(dist,stageName):null;
      if(!day){ r.err="Unknown day '"+f[0]+"'"; }
      else if(!distName||!stageName){ r.err="Missing district/stage"; }
      else if(!title){ r.err="Missing title"; }
      else if(!r.start){ r.err="Bad start time"; }
      else if(end && !r.end){ r.err="Bad end time"; }
      else if((!dist || !stage) && !bulk.createMissing){ r.err="Stage/district not found — tick 'create missing' or add it first"; }
      else { r.ok=true; if(!dist||!stage) r.isNew=true; }
    }
    rows.push(r);
  }
  return rows;
}

      <textarea class="bulk-ta" id="bk-text" placeholder="${bulk.mode==='same'?'18:00 | 19:00 | The Opening Act\n19:30 | 21:00 | Headliner':'Friday | Main Field | Lakeside Stage | Headliner | 21:00 | 22:30'}">${esc(bulk.text)}</textarea>
      <div id="bk-preview"></div>
      <button class="btn primary block" id="bk-go">Add events</button>
    </div>`;
  document.body.appendChild(wrap);

  const close=()=>{ state.modal=null; bulk=null; wrap.remove(); };
  wrap.querySelector("#bk-close").onclick=close;
  wrap.onclick=e=>{ if(e.target===wrap) close(); };

  wrap.querySelectorAll("[data-bmode]").forEach(b=>b.onclick=()=>{ bulk.mode=b.dataset.bmode; renderBulkModal(); });

  const ta=wrap.querySelector("#bk-text");
  const refreshPreview=()=>{
    const rows=parseBulk();
    const okCount=rows.filter(r=>r.ok).length;
    const badCount=rows.filter(r=>!r.ok).length;
    const newCount=rows.filter(r=>r.ok&&r.isNew).length;
    const pv=wrap.querySelector("#bk-preview");
    if(rows.length===0){ pv.innerHTML=""; }
    else {
      pv.innerHTML=`<div class="prev">
