        <div class="prev-body">${rows.map(r=>`
          <div class="prev-row ${r.ok?(r.isNew?'new':''):'bad'}">
            <span class="pday">${r.day?r.day.slice(0,3):'—'}</span>
            <span class="ptime">${r.start?fmt12(r.start):'?'}${r.end?'–'+fmt12(r.end):''}</span>
            <span class="ptitle">${esc(r.title||r.raw)}</span>
            <span class="ploc">${esc((r.districtName||'')+(r.stageName?' · '+r.stageName:''))}</span>
            <span class="stt">${r.ok?(r.isNew?'+ new':'✓'):esc(r.err)}</span>
          </div>`).join("")}</div></div>`;
    }
    const go=wrap.querySelector("#bk-go");
    go.disabled = okCount===0;
    go.textContent = okCount? `Add ${okCount} event${okCount>1?'s':''}` : "Add events";
  };

  ta.oninput=()=>{ bulk.text=ta.value; refreshPreview(); };
  const sd=wrap.querySelector("#bk-day"); if(sd) sd.onchange=()=>{bulk.day=sd.value;refreshPreview();};
  const sdist=wrap.querySelector("#bk-dist"); if(sdist) sdist.onchange=()=>{
    bulk.districtId=sdist.value;
    const d=districts.find(x=>x.id===bulk.districtId); bulk.stageId=d&&d.stages[0]?d.stages[0].id:"";
    renderBulkModal();
  };
  const sstage=wrap.querySelector("#bk-stage"); if(sstage) sstage.onchange=()=>{bulk.stageId=sstage.value;refreshPreview();};
  const cm=wrap.querySelector("#bk-create"); if(cm) cm.onchange=()=>{bulk.createMissing=cm.checked;refreshPreview();};

  wrap.querySelector("#bk-go").onclick=async()=>{
    const rows=parseBulk().filter(r=>r.ok);
    if(!rows.length) return;
    const go=wrap.querySelector("#bk-go"); go.disabled=true;

    try{
      // 1) create any missing districts/stages (mixed mode)
      if(bulk.mode==="mixed" && bulk.createMissing && rows.some(r=>r.isNew)){
        const draft = JSON.parse(JSON.stringify(state.structure));
        for(const r of rows){
          let d = draft.districts.find(x=>x.name.toLowerCase()===r.districtName.toLowerCase());
          if(!d){ d={id:uid(),name:r.districtName,stages:[]}; draft.districts.push(d); }
          let s = (d.stages||[]).find(x=>x.name.toLowerCase()===r.stageName.toLowerCase());
          if(!s){ s={id:uid(),name:r.stageName}; d.stages=d.stages||[]; d.stages.push(s); }
        }
        await saveStructure(draft);
        state.structure = draft;   // local copy so id lookups below resolve
      }

      // 2) resolve ids + build event payloads
      const payloads = rows.map(r=>{
        let did=r.districtId, dnm=r.districtName, sid=r.stageId, snm=r.stageName;
        if(bulk.mode==="mixed"){
          const d=findDistrict(r.districtName); const s=d?findStage(d,r.stageName):null;
          did=d?d.id:""; dnm=d?d.name:r.districtName; sid=s?s.id:""; snm=s?s.name:r.stageName;
        }
        return { districtId:did, districtName:dnm, stageId:sid, stageName:snm,
                 day:r.day, start:r.start, end:r.end||"", title:r.title.trim(), notes:"" };
      });

      // 3) write in small batches
      go.textContent="Adding…";
      for(let i=0;i<payloads.length;i+=15){
        await Promise.all(payloads.slice(i,i+15).map(p=>saveEvent(p)));
      }
      close(); toast(`Added ${payloads.length} event${payloads.length>1?'s':''}`);
    }catch(e){
      go.disabled=false; go.textContent="Add events";
      const pv=wrap.querySelector("#bk-preview");
      pv.insertAdjacentHTML("afterbegin",`<div class="err">Couldn't save — check your connection and try again.</div>`);
    }
  };

  refreshPreview();
}

const R_EARTH = 6371000;
const toRad = d => d*Math.PI/180, toDeg = r => r*180/Math.PI;
function haversine(la1,lo1,la2,lo2){
  const dLa=toRad(la2-la1), dLo=toRad(lo2-lo1);
  const a=Math.sin(dLa/2)**2 + Math.cos(toRad(la1))*Math.cos(toRad(la2))*Math.sin(dLo/2)**2;
  return R_EARTH*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearing(la1,lo1,la2,lo2){
  const y=Math.sin(toRad(lo2-lo1))*Math.cos(toRad(la2));
  const x=Math.cos(toRad(la1))*Math.sin(toRad(la2)) - Math.sin(toRad(la1))*Math.cos(toRad(la2))*Math.cos(toRad(lo2-lo1));
  return (toDeg(Math.atan2(y,x))+360)%360;
}
function fmtDist(m){ return m<1000 ? "~"+Math.round(m/5)*5+" m" : "~"+(m/1000).toFixed(m<10000?1:0)+" km"; }
function cardinal(deg){ return ["N","NE","E","SE","S","SW","W","NW"][Math.round(((deg%360)/45))%8]; }
function relDirText(rel){
  const r=((rel%360)+360)%360;
  const i=Math.round(r/45)%8;
  return ["straight ahead","ahead & right","to your right","behind-right","behind you","behind-left","to your left","ahead & left"][i];
}
function stagesWithCoords(){
  const out=[];
  state.structure.districts.forEach(d=>(d.stages||[]).forEach(s=>{
    if(typeof s.lat==="number" && typeof s.lng==="number")
      out.push({id:s.id,name:s.name,sub:d.name,color:districtColor(d.id),lat:s.lat,lng:s.lng});
  }));
  return out;
}
function personColor(id){ let h=0; for(let i=0;i<id.length;i++) h=(h*31+id.charCodeAt(i))>>>0; return AREA_COLORS[h%AREA_COLORS.length]; }
function peopleWithCoords(){
  const now=Date.now(); const out=[];
  state.locations.forEach(l=>{
    if(l.id===state.user.id) return;
    if(typeof l.lat!=="number" || typeof l.lng!=="number") return;
    const ts = (l.updatedAt && l.updatedAt.toMillis) ? l.updatedAt.toMillis() : now;
    if(now-ts > 8*60*1000) return;            // hide stale (>8 min, ~5 missed updates)
    const u=state.users.find(x=>x.id===l.id);
    out.push({id:l.id, name:(u?u.name:(l.name||"Friend")), color:personColor(l.id), lat:l.lat, lng:l.lng, ts, lost:!!l.lost});
  });
  return out;
}

function pinMeta(t){ return PIN_TYPES[t] || PIN_TYPES.other; }
function pinsForMe(){
  const me=state.user.id; const out=[];

      <p class="find-note" style="margin-bottom:14px">${editing?"“Move here” updates this pin to wherever you're standing now.":"This pin will be saved at your current location."}</p>
      <div class="row" style="gap:8px">
        ${editing?'<button class="btn ghost" id="p-move" style="flex:1">Move here</button>':''}
        <button class="btn primary" id="p-save" style="flex:2">${editing?"Save":"Drop pin here"}</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
  const close=()=>{ state.modal={type:"pins"}; renderPinsModal(); };
  wrap.querySelector("#p-close").onclick=close;
  wrap.onclick=e=>{ if(e.target===wrap){ state.modal=null; wrap.remove(); } };
  wrap.querySelectorAll("[data-ptype]").forEach(b=>b.onclick=()=>{ curType=b.dataset.ptype; wrap.querySelectorAll("[data-ptype]").forEach(x=>x.classList.toggle("on",x===b)); });
  const err=m=>wrap.querySelector("#p-err").innerHTML=`<div class="err">${esc(m)}</div>`;

  const doSave=async(coords)=>{
    const label=wrap.querySelector("#p-label").value;
    const shared=wrap.querySelector("#p-shared").checked;
    const noteEl=wrap.querySelector("#p-note"); const note=noteEl?noteEl.value:(p.note||"");
    try{
      await savePin({ id:p.id, label, type:curType, shared, note, lat:coords.lat, lng:coords.lng });
      toast(editing?"Pin saved":"Pin dropped"); state.modal={type:"pins"}; renderPinsModal();
    }catch(e){ err("Couldn't save — try again."); }
  };
  wrap.querySelector("#p-save").onclick=()=>{
    if(editing && p.lat!=null){ doSave({lat:p.lat,lng:p.lng}); }   // keep location, just update fields
    else if(find.pos){ doSave(find.pos); }
    else err("No location yet — open the Find tab first.");
  };
  const mv=wrap.querySelector("#p-move");
  if(mv) mv.onclick=()=>{ if(find.pos) doSave(find.pos); else err("No current location yet."); };
}

/* ---- live location sharing (periodic, battery-friendly) ---- */
function writeMyLocation(){
  if(!find.share || !find.pos || !state.user) return;
  find.myUpdated=Date.now();
  setDoc(doc(db,"locations",state.user.id),
    { name:state.user.name, lat:+find.pos.lat.toFixed(6), lng:+find.pos.lng.toFixed(6), acc:find.acc||null, lost:!!find.lost, updatedAt:serverTimestamp() }
  ).catch(()=>{});
}
function startShare(){
  if(find.shareTimer) return;
  if(!navigator.geolocation){ toast("Location not supported"); return; }
  if(!locationEnabled()){ toast("Location features are off"); return; }
  find.share=true;
  const fix=()=>navigator.geolocation.getCurrentPosition(
    p=>{ find.pos={lat:p.coords.latitude,lng:p.coords.longitude}; find.acc=p.coords.accuracy; writeMyLocation();
         if(state.view==="find" && document.getElementById("radar")) updateFindDynamic(); },
    e=>{ if(e.code===1){ toast("Location blocked"); stopShare(); renderApp(); } },
    {enableHighAccuracy:true,maximumAge:30000,timeout:20000}
  );
  fix();
  find.shareTimer=setInterval(fix, 90000);   // ~ every 1.5 min
  if(feat("autoStop")){
    const hrs=Math.max(1, +state.structure.autoStopHours || 4);
    find.autoStopAt=Date.now()+hrs*3600000;
    find.autoStopTimer=setTimeout(()=>{ stopShare(); toast("Auto-stopped sharing"); if(state.user) renderApp(); }, hrs*3600000);
  }
}
function stopShare(){
  find.share=false; find.lost=false;
  if(find.shareTimer){ clearInterval(find.shareTimer); find.shareTimer=null; }
  if(find.autoStopTimer){ clearTimeout(find.autoStopTimer); find.autoStopTimer=null; }
  find.autoStopAt=0;
  if(state.user) deleteDoc(doc(db,"locations",state.user.id)).catch(()=>{});
}
window.addEventListener("pagehide",()=>{ if(find.share && state.user){ try{ deleteDoc(doc(db,"locations",state.user.id)); }catch(e){} } });

function enableFind(){
  // iOS needs an explicit gesture-triggered permission request for the compass
  try{
    if(typeof DeviceOrientationEvent!=="undefined" && typeof DeviceOrientationEvent.requestPermission==="function"){
      DeviceOrientationEvent.requestPermission().then(()=>bindOrientation()).catch(()=>{});
    }
  }catch(e){}
  startFindSensors();
}
function bindOrientation(){
  if(find.orientBound) return;
  const handler=ev=>{
    let h=null;
    if(typeof ev.webkitCompassHeading==="number" && !isNaN(ev.webkitCompassHeading)) h=ev.webkitCompassHeading;
    else if(ev.alpha!=null){ const off=(screen.orientation&&screen.orientation.angle)||0; h=(360-ev.alpha+off)%360; }
    if(h==null||isNaN(h)) return;
    find.heading=h;
    const had=find.hasOrientation; find.hasOrientation=true;
    if(state.view==="find"){ if(!had) renderView(); else updateFindDynamic(); }
  };
  find.orientHandler=handler;
  window.addEventListener("deviceorientationabsolute",handler,true);
  window.addEventListener("deviceorientation",handler,true);
  find.orientBound=true;
}
function startFindSensors(){
  if(find.started) return;
  find.started=true; find.error=null;
  if(navigator.geolocation){
    find.geoWatch=navigator.geolocation.watchPosition(
      p=>{ const a=p.coords.accuracy;
           // skip a wildly inaccurate reading if we already have a decent recent fix
           if(find.pos && a>120 && find.acc && find.acc<a*0.6){ return; }
           find.pos={lat:p.coords.latitude,lng:p.coords.longitude}; find.acc=a; find.error=null;
           if(state.view==="find"){ if(!document.getElementById("radar")) renderView(); else updateFindDynamic(); } },
      e=>{ find.error = e.code===1 ? "denied" : "unavailable"; if(state.view==="find") renderView(); },
      {enableHighAccuracy:true,maximumAge:0,timeout:20000}
    );
  } else { find.error="unsupported"; }
  bindOrientation();
  if(state.view==="find") renderView();
}
function stopFindSensors(){
  if(find.geoWatch!=null && navigator.geolocation) navigator.geolocation.clearWatch(find.geoWatch);
  find.geoWatch=null;
  if(find.orientBound && find.orientHandler){
    window.removeEventListener("deviceorientationabsolute",find.orientHandler,true);
    window.removeEventListener("deviceorientation",find.orientHandler,true);
  }
  find.orientBound=false; find.started=false;
}

        <line class="cross" x1="140" y1="20" x2="140" y2="260"></line>

    <p class="find-note" style="margin-top:12px">Hold the phone flat for the compass. If the arrow drifts, wave it in a figure-8, or switch to North-up. People &amp; pins update roughly every 1½ minutes.</p>

}

function updateFindDynamic(){
  const radar=document.getElementById("radar");
  if(!radar || !find.pos) return;
  const targets=buildTargets();
  if(!targets.length) return;
  const headingUp = find.headingMode!=="north" && find.hasOrientation;
  const heading = headingUp ? (find.heading||0) : 0;
  const cx=140, cy=140, maxR=120;

  const items=targets.map(t=>({ ...t,
    d:haversine(find.pos.lat,find.pos.lng,t.lat,t.lng),
    b:bearing(find.pos.lat,find.pos.lng,t.lat,t.lng) }));
  const scale=Math.max(...items.map(s=>s.d), 30);

  items.forEach(s=>{
    const rel=(headingUp? s.b-heading : s.b)*Math.PI/180;
    const rr=Math.min(s.d/scale,1)*maxR;
    const x=cx+Math.sin(rel)*rr, y=cy-Math.cos(rel)*rr;
    const g=document.getElementById("dot-"+s.id);
    if(g){ g.setAttribute("transform",`translate(${x.toFixed(1)},${y.toFixed(1)})`); g.classList.toggle("sel",s.id===find.target); }
  });

  const r1=document.getElementById("ring-half"); if(r1) r1.textContent=fmtDist(scale/2);
  const r2=document.getElementById("ring-full"); if(r2) r2.textContent=fmtDist(scale);
  const fwd=document.getElementById("fwd-label"); if(fwd) fwd.textContent = headingUp ? "▲" : "N";

  const t=items.find(s=>s.id===find.target);
  const arrow=document.getElementById("findarrow");
  const ro=document.getElementById("find-readout");
  if(t){
    const rel = headingUp ? t.b-heading : t.b;
    if(arrow){ arrow.style.display=""; arrow.setAttribute("transform",`rotate(${rel.toFixed(1)} 140 140)`); }
    if(ro){
      ro.querySelector(".r-name").textContent=t.name;
      ro.querySelector(".r-dist").innerHTML=`${fmtDist(t.d)}<small>away</small>`;
      let dir = headingUp ? relDirText(rel) : (cardinal(t.b)+" of you");
      if(t.kind==="person") dir = (t.lost?"🆘 needs help · ":"")+dir+(t.ts?(" · "+agoText(t.ts)):"");
      else if(t.kind==="rally") dir = "🚩 meet-up point · "+dir;
      else if(t.kind==="pin") dir += " · "+(t.note?esc(t.note):(t.mine?"your pin":esc(t.ownerName||"shared")+"'s pin"));
      ro.querySelector(".r-dir").textContent = dir;
    }
  } else if(arrow){ arrow.style.display="none"; }

  const acc=document.getElementById("find-acc"); if(acc && find.acc) acc.textContent="GPS ±"+Math.round(find.acc)+" m";
}

/* ============================================================
   EXTRAS — chat, info, packing, free-time, reminders, alerts
   ============================================================ */
function linkify(s){ return esc(s).replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>'); }
function clockMs(ms){ const d=new Date(ms); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function minToHM(m){ m=((m%1440)+1440)%1440; return fmt12(String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0")); }

/* ---- change alerts ---- */
function seenChanges(){ try{ return JSON.parse(localStorage.getItem("fp_seen")||"{}"); }catch(e){ return {}; } }
function markChangesSeen(){ const m={}; state.events.forEach(e=>{ if(e.changedAt&&e.changedAt.toMillis) m[e.id]=e.changedAt.toMillis(); }); localStorage.setItem("fp_seen", JSON.stringify(m)); }
function eventChanged(ev){ if(!feat("alerts")||!ev.changedAt||!ev.changedAt.toMillis) return false; return ev.changedAt.toMillis() > (seenChanges()[ev.id]||0); }

/* ---- reminders / notifications ---- */
function notifyState(){
  if(typeof Notification==="undefined") return "Not supported on this browser.";
  if(find.notify) return "On — a nudge ~15 min before your picks"+(festivalStart()?" (while the app is open).":", once the organiser sets the festival date.");
  return "Get a nudge ~15 min before your picks, and if a set time changes. Works while the app is open.";
}
async function toggleNotify(){
  if(find.notify){ find.notify=false; find.notifyTimers.forEach(clearTimeout); find.notifyTimers=[]; toast("Reminders off"); return; }
  if(typeof Notification==="undefined"){ toast("Notifications not supported"); return; }
  try{ const p = Notification.permission==="granted" ? "granted" : await Notification.requestPermission(); if(p!=="granted"){ toast("Notifications blocked"); return; } }
  catch(e){ toast("Notifications unavailable"); return; }
  find.notify=true; scheduleNotifications(); toast("Reminders on");
}
function scheduleNotifications(){
  find.notifyTimers.forEach(clearTimeout); find.notifyTimers=[];
  if(!feat("notify")||!find.notify||!festivalStart()) return;
  if(typeof Notification==="undefined"||Notification.permission!=="granted") return;
  const ids=myPickIds(), now=Date.now();
  state.events.filter(e=>ids.has(e.id)).forEach(e=>{
    const s=eventStart(e); if(!s) return;
    const lead=s.getTime()-15*60000;
    if(lead>now && lead-now < 12*3600000)
      find.notifyTimers.push(setTimeout(()=>{ pushNotify("Starting soon", `${e.title} at ${e.stageName} in ~15 min`, "soon-"+e.id); }, lead-now));
  });
}
function maybeNotifyChanges(){
  if(!feat("alerts")||!feat("notify")||!find.notify) return;
  if(typeof Notification==="undefined"||Notification.permission!=="granted") return;
  const ids=myPickIds();
  state.events.forEach(e=>{
    if(!ids.has(e.id)||!e.changedAt||!e.changedAt.toMillis) return;
    const t=e.changedAt.toMillis();
    if(t>find.sessionStart && find.notifiedChanges[e.id]!==t){
      find.notifiedChanges[e.id]=t;
      pushNotify("Set time changed", `${e.title} → ${e.day} ${fmt12(e.start)} at ${e.stageName}`, "chg-"+e.id);
    }
  });
}

  await saveStructure({...state.structure, infoItems:items});
}
async function deleteInfoItem(id){ await saveStructure({...state.structure, infoItems:(state.structure.infoItems||[]).filter(x=>x.id!==id)}); }
function renderInfoModal(){
  const existing=document.querySelector(".modal-bg"); if(existing) existing.remove();
  const it=state.modal.data||{};
  const wrap=document.createElement("div"); wrap.className="modal-bg";
  wrap.innerHTML=`<div class="modal">
    <div class="modal-head"><h2>${it.id?"Edit info":"Add info"}</h2><button class="btn ghost sm" id="i-close">Close</button></div>
    <div id="i-err"></div>
    <label class="field"><span>Title</span><input id="i-title" value="${esc(it.title||"")}" placeholder="e.g. Medical tent"></label>
    <label class="field"><span>Details <span class="tag">(links work)</span></span><textarea id="i-body" rows="4" placeholder="e.g. Behind the Main Stage, open 24h. Emergency: 0800 000 000">${esc(it.body||"")}</textarea></label>
    <button class="btn primary block" id="i-save">${it.id?"Save":"Add"}</button>
  </div>`;
  document.body.appendChild(wrap);
  const close=()=>{ state.modal=null; wrap.remove(); };
  wrap.querySelector("#i-close").onclick=close; wrap.onclick=e=>{ if(e.target===wrap) close(); };
  wrap.querySelector("#i-save").onclick=async()=>{
    const title=wrap.querySelector("#i-title").value.trim(), body=wrap.querySelector("#i-body").value.trim();
    if(!title) return wrap.querySelector("#i-err").innerHTML=`<div class="err">Give it a title.</div>`;
    try{ await saveInfoItem({id:it.id,title,body}); close(); toast("Saved"); }catch(e){ wrap.querySelector("#i-err").innerHTML=`<div class="err">Couldn’t save.</div>`; }
  };
}

/* ---- packing list ---- */
function viewPacking(){
  const shared=state.structure.packingItems||[];
  const mine=state.myPacking.mine||[];
  const checked=new Set(state.myPacking.checked||[]);
  const all=[...shared.map(i=>({...i,shared:true})), ...mine.map(i=>({...i,shared:false}))];
  const done=all.filter(i=>checked.has(i.id)).length;
  const isAdmin=state.user.admin;
  const rows = all.length ? all.map(i=>`<div class="pack-row ${checked.has(i.id)?'on':''}">
      <button class="pack-tap" data-pack="${i.id}"><span class="pack-box">${checked.has(i.id)?'✓':''}</span><span class="pack-label">${esc(i.label)}</span></button>
      ${!i.shared?`<button class="pack-del" data-delmine="${i.id}">✕</button>`:''}
    </div>`).join("") : `<div class="empty"><div class="big">🎒</div><h3>Nothing on the list</h3><div>${isAdmin?'Add the shared list below — you can paste your friend’s whole list at once.':'Add your own items below, or wait for the shared list.'}</div></div>`;
  const pct = all.length? Math.round(done/all.length*100):0;
  return `<div class="sec-head"><div><h2>Packing list</h2><div class="lead">${all.length?`${done}/${all.length} packed`:'Tick things off as you pack.'}</div></div></div>
    ${all.length?`<div class="pack-bar"><div class="pack-fill" style="width:${pct}%"></div></div>`:''}
    <div class="pack-list">${rows}</div>
    <div class="add-inline" style="padding:14px 0 0"><input id="pack-add-input" placeholder="Add your own item…"><button class="btn lime sm" id="pack-add">Add</button></div>
    ${isAdmin?`<button class="btn ghost block" id="pack-shared" style="margin-top:12px">Edit shared list (paste your friend’s)</button>`:''}`;
}
async function savePacking(){ await setDoc(doc(db,"packing",state.user.id), { checked:state.myPacking.checked||[], mine:state.myPacking.mine||[] }); }
function togglePack(id){ const c=new Set(state.myPacking.checked); c.has(id)?c.delete(id):c.add(id); state.myPacking.checked=[...c]; savePacking().catch(()=>{}); renderView(); }
function addMyPack(label){ label=(label||"").trim(); if(!label) return; state.myPacking.mine=[...(state.myPacking.mine||[]),{id:uid(),label:label.slice(0,80)}]; savePacking().catch(()=>{}); renderView(); }
function removeMyPack(id){ state.myPacking.mine=(state.myPacking.mine||[]).filter(x=>x.id!==id); const c=new Set(state.myPacking.checked); c.delete(id); state.myPacking.checked=[...c]; savePacking().catch(()=>{}); renderView(); }
async function saveSharedPacking(text){
  const prev=state.structure.packingItems||[];
  const items=text.split(/\r?\n/).map(s=>s.trim()).filter(Boolean).map(l=>{ const ex=prev.find(p=>p.label.toLowerCase()===l.toLowerCase()); return {id:ex?ex.id:uid(), label:l.slice(0,80)}; });
  await saveStructure({...state.structure, packingItems:items});
}
function renderPackListModal(){
  const existing=document.querySelector(".modal-bg"); if(existing) existing.remove();
  const text=(state.structure.packingItems||[]).map(i=>i.label).join("\n");
  const wrap=document.createElement("div"); wrap.className="modal-bg";
  wrap.innerHTML=`<div class="modal">
    <div class="modal-head"><h2>Shared packing list</h2><button class="btn ghost sm" id="pl-close">Close</button></div>
    <div class="fmt">One item per line. Paste your friend’s list straight in — existing ticks are kept for items you don’t change.</div>
    <textarea class="bulk-ta" id="pl-text" placeholder="Tent\nSleeping bag\nWellies\nSun cream\nReusable bottle">${esc(text)}</textarea>
    <button class="btn primary block" id="pl-save" style="margin-top:12px">Save list</button>
  </div>`;
  document.body.appendChild(wrap);
  const close=()=>{ state.modal=null; wrap.remove(); };
  wrap.querySelector("#pl-close").onclick=close; wrap.onclick=e=>{ if(e.target===wrap) close(); };
  wrap.querySelector("#pl-save").onclick=async()=>{ try{ await saveSharedPacking(wrap.querySelector("#pl-text").value); close(); toast("List saved"); }catch(e){ toast("Couldn’t save"); } };
}

/* ---- free-time finder ---- */
function freeWindows(){
  const out=[]; const ids=new Set(state.picks.map(p=>p.eventId));
  DAYS.forEach(day=>{
    const evs=state.events.filter(e=>ids.has(e.id)&&e.day===day);
    if(evs.length<2) return;
    const iv=evs.map(e=>{ let s=toMin(e.start), en=e.end?toMin(e.end):s+60; if(en<=s) en+=1440; return [s,en]; }).sort((a,b)=>a[0]-b[0]);
    const merged=[]; iv.forEach(x=>{ const last=merged[merged.length-1]; if(last && x[0]<=last[1]) last[1]=Math.max(last[1],x[1]); else merged.push([...x]); });
    for(let i=0;i<merged.length-1;i++){ const gap=merged[i+1][0]-merged[i][1]; if(gap>=45) out.push({day, start:merged[i][1], end:merged[i+1][0], mins:gap}); }
  });
  return out;
}
function freeTimeCard(){
  if(!feat("overlaps")) return "";
  const w=freeWindows();
  if(!w.length) return "";
  const top=w.slice(0,5).map(g=>`<div class="free-row"><span class="free-day">${g.day.slice(0,3)}</span><b>${minToHM(g.start)} – ${minToHM(g.end)}</b><span class="free-len">${Math.floor(g.mins/60)?Math.floor(g.mins/60)+'h ':''}${g.mins%60?g.mins%60+'m':''} free</span></div>`).join("");
  return `<div class="free-card"><div class="free-head">🍔 Good times to meet up / eat</div><div class="find-note" style="margin-bottom:8px">Gaps where nobody in the group has anything booked.</div>${top}</div>`;
}
